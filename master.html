<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Master - Sistema de Pontuação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Sistema de Módulos de Jogos -->
    <script src="games/game-interface.js"></script>
    <script src="games/game-system.js"></script>
    <script src="games/generic.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getDatabase, ref, set, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBudmIz5XvRzhlOfj0wHI0W5EIles3wsmY",
            authDomain: "contador-de-pontos-321ee.firebaseapp.com",
            projectId: "contador-de-pontos-321ee",
            storageBucket: "contador-de-pontos-321ee.firebasestorage.app",
            messagingSenderId: "817191889469",
            appId: "1:817191889469:web:cfb88023612f6b37491854",
            databaseURL: "https://contador-de-pontos-321ee-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.rtdb = getDatabase(app);
        window.fbModules = { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        const CLIENT_URL = 'https://alpces.github.io/score/client.html';
        
        // Tipo de jogo atual (para futura expansão)
        const GAME_TYPE = 'generic';

        const playBuzzer = () => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 0.3);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.6);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 0.9);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 1.2);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 1.5);
            
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime + 1.8);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);
        };

        window.addEventListener('firebaseReady', () => {
            const { useState, useEffect, createElement: h } = React;
            const { db, rtdb, fbModules } = window;
            const { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update } = fbModules;

            function App() {
                const [setupComplete, setSetupComplete] = useState(false);
                const [numTables, setNumTables] = useState(0);
                const [initialScore, setInitialScore] = useState(0);
                const [buzzerText, setBuzzerText] = useState('BUZZER');
                const [blockBuzzerAtZero, setBlockBuzzerAtZero] = useState(false);
                const [enableBuzzer, setEnableBuzzer] = useState(true);
                const [enableTextInput, setEnableTextInput] = useState(false);
                const [startWithBuzzersBlocked, setStartWithBuzzersBlocked] = useState(true);
                const [buzzersBlocked, setBuzzersBlocked] = useState(true);

                const [tables, setTables] = useState([]);
                const [categories, setCategories] = useState([]);
                const [yellowCategory, setYellowCategory] = useState(null);
                const [redCategory, setRedCategory] = useState(null);
                const [usedCategories, setUsedCategories] = useState([]);

                const [showLeaderboard, setShowLeaderboard] = useState(false);
                const [leaderboardRevealPosition, setLeaderboardRevealPosition] = useState(null);
                const [showScores, setShowScores] = useState(false);
                const [flashEffects, setFlashEffects] = useState({});
                const [showPredefined, setShowPredefined] = useState(false);
                const [showHistory, setShowHistory] = useState(false);
                const [showManageTables, setShowManageTables] = useState(false);
                const [showSessionCode, setShowSessionCode] = useState(false);
                const [showQRCode, setShowQRCode] = useState(false);

                const [sessionId, setSessionId] = useState(null);
                const [customSessionCode, setCustomSessionCode] = useState('');
                const [codeError, setCodeError] = useState('');
                const [codeCopied, setCodeCopied] = useState(false);
                const [connectedClients, setConnectedClients] = useState({});
                const [buzzers, setBuzzers] = useState({});
                const [textResponses, setTextResponses] = useState({});
                const [showResponses, setShowResponses] = useState(false);
                const [responseScoreAdjustments, setResponseScoreAdjustments] = useState({});
                const [textInputActive, setTextInputActive] = useState(false);
                const [textInputSeconds, setTextInputSeconds] = useState(25);
                const [textInputTimeRemaining, setTextInputTimeRemaining] = useState(0);

                const [tempNames, setTempNames] = useState({});
                const [tempCategories, setTempCategories] = useState(['']);
                const [predefinedCategories, setPredefinedCategories] = useState([]);
                // ===================================
                // ESTADOS - HISTÓRICO E SESSÕES
                // ===================================
                const [sessionHistory, setSessionHistory] = useState([]);
                const [activeSessions, setActiveSessions] = useState([]);
                const [selectedHistoryEntry, setSelectedHistoryEntry] = useState(null);
                const [availableLogos, setAvailableLogos] = useState([]);
                const [selectedLogos, setSelectedLogos] = useState([]);
                
                const [showExistingSessionDialog, setShowExistingSessionDialog] = useState(false);
                const [existingSessionData, setExistingSessionData] = useState(null);
                const [showEndSessionModal, setShowEndSessionModal] = useState(false);

                useEffect(() => {
                    (async () => {
                        try {
                            const snap = await getDocs(collection(db, 'categories'));
                            const cats = [];
                            snap.forEach(d => cats.push(d.data().name));
                            setPredefinedCategories(cats.sort());
                        } catch (e) { console.error(e); }
                    })();
                }, []);

                useEffect(() => {
                    const checkLogos = () => {
                        const logos = [];
                        let loadedCount = 0;
                        const totalToCheck = 5;
                        
                        for (let i = 1; i <= totalToCheck; i++) {
                            const img = new Image();
                            const logoPath = `logo${i}.png`;
                            
                            img.onload = () => {
                                logos.push(logoPath);
                                loadedCount++;
                                if (loadedCount === totalToCheck) {
                                    setAvailableLogos(logos.sort());
                                }
                            };
                            
                            img.onerror = () => {
                                loadedCount++;
                                if (loadedCount === totalToCheck) {
                                    setAvailableLogos(logos.sort());
                                }
                            };
                            
                            img.src = logoPath;
                        }
                    };
                    checkLogos();
                }, []);

                useEffect(() => {
                    if (!showHistory) return;
                    
                    // Monitorar histórico de sessões arquivadas
                    const historyRef = ref(rtdb, 'sessionHistory');
                    const unsubHistory = onValue(historyRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const history = Object.keys(data).map(key => ({
                                id: key,
                                ...data[key]
                            }));
                            // Ordenar por timestamp (mais recente primeiro)
                            history.sort((a, b) => b.timestamp - a.timestamp);
                            setSessionHistory(history);
                        } else {
                            setSessionHistory([]);
                        }
                    });
                    
                    return () => {
                        unsubHistory();
                    };
                }, [showHistory]);
                
                // CORREÇÃO: Monitorar sessões ativas SEMPRE (não depende de showHistory)
                // Uma sessão é considerada "aberta" se existir em sessions/ E:
                // - active === true OU
                // - active não está definido (sessões antigas sem o campo)
                // Uma sessão só é considerada "fechada" se foi arquivada (removida de sessions/)
                useEffect(() => {
                    // Monitorar sessões ativas (abertas) o tempo todo
                    const sessionsRef = ref(rtdb, 'sessions');
                    const unsubSessions = onValue(sessionsRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const active = Object.keys(data)
                                .filter(code => {
                                    // Verifica se tem gameState
                                    const gameState = data[code]?.gameState;
                                    if (!gameState) return false;
                                    // Sessão é ativa se: active === true OU active não está definido (undefined)
                                    // Só é inativa se active === false explicitamente
                                    return gameState.active !== false;
                                })
                                .map(code => ({
                                    sessionId: code,
                                    timestamp: data[code].gameState?.timestamp || Date.now(),
                                    ...data[code].gameState
                                }))
                                .sort((a, b) => b.timestamp - a.timestamp);
                            setActiveSessions(active);
                            console.log(`📊 Sessões abertas detectadas: ${active.length}`, active.map(s => s.sessionId));
                        } else {
                            setActiveSessions([]);
                            console.log('📊 Nenhuma sessão aberta');
                        }
                    });
                    
                    return () => {
                        unsubSessions();
                    };
                }, []); // Array vazio = monitora sempre

                useEffect(() => {
                    if (!setupComplete || !sessionId) return;

                    const clientsRef = ref(rtdb, `sessions/${sessionId}/clients`);
                    const buzzersRef = ref(rtdb, `sessions/${sessionId}/buzzers`);
                    const responsesRef = ref(rtdb, `sessions/${sessionId}/textResponses`);

                    const unsubClients = onValue(clientsRef, (snapshot) => {
                        const data = snapshot.val() || {};
                        setConnectedClients(data);
                        
                        if (numTables === 0) {
                            const newTables = Object.values(data).map(client => ({
                                id: client.tableNumber,
                                name: client.teamName || '',
                                score: initialScore
                            }));
                            setTables(prev => {
                                const merged = [...prev];
                                newTables.forEach(nt => {
                                    const existing = merged.find(t => t.id === nt.id);
                                    if (!existing) {
                                        merged.push(nt);
                                    } else if (nt.name && nt.name !== `Mesa ${nt.id}`) {
                                        // Atualiza o nome se o cliente reconectou com um nome diferente
                                        existing.name = nt.name;
                                    }
                                });
                                return merged.sort((a, b) => a.id - b.id);
                            });
                        } else {
                            setTables(prev => prev.map(t => {
                                const client = Object.values(data).find(c => c.tableNumber === t.id);
                                if (client) {
                                    // Só atualiza o nome se o cliente forneceu um nome personalizado
                                    // Se for apenas "Mesa X", mantém o nome atual
                                    const newName = (client.teamName && client.teamName !== `Mesa ${t.id}`) 
                                        ? client.teamName 
                                        : t.name;
                                    return { ...t, name: newName };
                                }
                                return t;
                            }));
                        }
                    });

                    const unsubBuzzers = onValue(buzzersRef, (snapshot) => {
                        const data = snapshot.val() || {};
                        const prevBuzzers = { ...buzzers };
                        setBuzzers(data);
                        
                        Object.keys(data).forEach(key => {
                            if (data[key].pressed && !prevBuzzers[key]?.pressed) {
                                playBuzzer();
                            }
                        });
                    });

                    const unsubResponses = onValue(responsesRef, (snapshot) => {
                        const data = snapshot.val() || {};
                        setTextResponses(data);
                    });

                    return () => {
                        unsubClients();
                        unsubBuzzers();
                        unsubResponses();
                    };
                }, [setupComplete, sessionId]);

                const saveCats = async (cats) => {
                    try {
                        const snap = await getDocs(collection(db, 'categories'));
                        await Promise.all(snap.docs.map(d => deleteDoc(doc(db, 'categories', d.id))));
                        await Promise.all(cats.map((cat, i) => setDoc(doc(db, 'categories', `cat_${i}`), { name: cat })));
                        setPredefinedCategories(cats);
                    } catch (e) { 
                        console.error('Erro ao guardar categorias:', e); 
                    }
                };

                const syncGame = async () => {
                    if (!sessionId) return;
                    try {
                        await set(ref(rtdb, `sessions/${sessionId}/gameState`), {
                            gameType: GAME_TYPE,
                            tables: tables.map(t => ({ id: t.id, name: t.name, score: t.score })),
                            yellowCategory, redCategory, categories, active: true, 
                            buzzerText, blockBuzzerAtZero, 
                            enableBuzzer, enableTextInput,
                            buzzersBlocked,
                            selectedLogos,
                            textInputActive, textInputTimeRemaining,
                            timestamp: Date.now()
                        });
                    } catch (e) { console.error(e); }
                };

                useEffect(() => { if (setupComplete && sessionId) syncGame(); }, [tables, yellowCategory, redCategory, textInputActive, textInputTimeRemaining, buzzersBlocked, selectedLogos]);

                useEffect(() => {
                    if (textInputActive && textInputTimeRemaining > 0) {
                        const timer = setTimeout(() => {
                            setTextInputTimeRemaining(textInputTimeRemaining - 1);
                        }, 1000);
                        return () => clearTimeout(timer);
                    } else if (textInputTimeRemaining === 0 && textInputActive && textInputSeconds !== 0) {
                        setTextInputActive(false);
                    }
                }, [textInputActive, textInputTimeRemaining, textInputSeconds]);

                /**
                 * Iniciar uma nova sessão de jogo
                 * Valida o código, verifica conflitos com sessões ativas
                 * e cria a sessão se tudo estiver ok
                 */
                const initGame = async () => {
                    setCodeError('');
                    
                    let finalCode = customSessionCode.trim().toUpperCase();
                    
                    // Validar código personalizado
                    if (finalCode) {
                        if (finalCode.length > 10) {
                            setCodeError('Código não pode ter mais de 10 caracteres');
                            return;
                        }
                        if (!/^[A-Z0-9]+$/.test(finalCode)) {
                            setCodeError('Código só pode conter letras e números');
                            return;
                        }
                        
                        // VERIFICAÇÃO CRÍTICA: Existe uma sessão ATIVA com este código?
                        const activeSessionRef = ref(rtdb, `sessions/${finalCode}/gameState`);
                        const activeSessionSnapshot = await new Promise((resolve) => {
                            onValue(activeSessionRef, resolve, { onlyOnce: true });
                        });
                        
                        const activeSessionData = activeSessionSnapshot.val();
                        
                        console.log(`🔍 Verificando código "${finalCode}":`, activeSessionData ? 'SESSÃO ATIVA ENCONTRADA' : 'Código disponível');
                        
                        if (activeSessionData && activeSessionData.active) {
                            // Sessão ativa encontrada - mostrar diálogo para escolher ação
                            console.log(`⚠️ Sessão ativa encontrada: ${finalCode}`, activeSessionData);
                            setExistingSessionData({ 
                                code: finalCode, 
                                isOpen: true,
                                data: activeSessionData 
                            });
                            setShowExistingSessionDialog(true);
                            return;
                        }
                    } else {
                        // Gerar código aleatório único
                        finalCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                    }

                    // Continuar com a criação da sessão
                    await proceedWithSessionCreation(finalCode);
                };

                /**
                 * Criar sessão após todas as validações
                 * Esta função é chamada após confirmar que não há conflitos
                 * @param {string} finalCode - Código validado da sessão
                 */
                const proceedWithSessionCreation = async (finalCode) => {
                    // Inicializar mesas conforme configuração
                    if (numTables > 0) {
                        // Modo fixo: criar mesas pré-definidas
                        setTables(Array.from({ length: numTables }, (_, i) => ({ 
                            id: i + 1, 
                            name: tempNames[i + 1] || '', 
                            score: initialScore 
                        })));
                    } else {
                        // Modo dinâmico: mesas criadas quando clientes se conectam
                        setTables([]);
                    }
                    
                    // Filtrar categorias vazias
                    setCategories(tempCategories.filter(c => c.trim()));
                    setSessionId(finalCode);
                    setSetupComplete(true);
                    
                    // Mostrar pontos por defeito
                    setShowScores(true);
                    
                    // Definir estado inicial dos buzzers
                    const initialBuzzersBlocked = enableBuzzer ? startWithBuzzersBlocked : false;
                    setBuzzersBlocked(initialBuzzersBlocked);
                    
                    // CRÍTICO: Criar a sessão imediatamente no Firebase
                    // Aguardar um pouco para os estados serem aplicados
                    setTimeout(async () => {
                        try {
                            await set(ref(rtdb, `sessions/${finalCode}/gameState`), {
                                gameType: GAME_TYPE,
                                tables: numTables > 0 ? Array.from({ length: numTables }, (_, i) => ({ 
                                    id: i + 1, 
                                    name: tempNames[i + 1] || '', 
                                    score: initialScore 
                                })) : [],
                                yellowCategory: null,
                                redCategory: null,
                                categories: tempCategories.filter(c => c.trim()),
                                active: true,
                                buzzerText: buzzerText,
                                blockBuzzerAtZero: blockBuzzerAtZero,
                                enableBuzzer: enableBuzzer,
                                enableTextInput: enableTextInput,
                                buzzersBlocked: initialBuzzersBlocked,
                                selectedLogos: selectedLogos,
                                textInputActive: false,
                                textInputTimeRemaining: 0,
                                timestamp: Date.now()
                            });
                            console.log(`✅ Sessão ${finalCode} criada no Firebase`);
                        } catch (e) {
                            console.error('❌ Erro ao criar sessão no Firebase:', e);
                        }
                    }, 100);
                };

                /**
                 * Lidar com escolha quando encontra sessão existente
                 * Opções: Carregar sessão / Arquivar e criar nova / Cancelar
                 * @param {string} choice - 'yes', 'no' ou 'cancel'
                 */
                const handleExistingSessionChoice = async (choice) => {
                    const { code, data } = existingSessionData;
                    
                    if (choice === 'yes') {
                        // ===== OPÇÃO 1: Carregar a sessão existente =====
                        setShowExistingSessionDialog(false);
                        
                        // Reconstruir objeto para loadSession
                        const sessionEntry = {
                            sessionId: code,
                            tables: data.tables || [],
                            categories: data.categories || [],
                            yellowCategory: data.yellowCategory,
                            redCategory: data.redCategory,
                            buzzerText: data.buzzerText || 'BUZZER',
                            blockBuzzerAtZero: data.blockBuzzerAtZero || false,
                            initialScore: data.initialScore || 0,
                            enableBuzzer: data.enableBuzzer !== undefined ? data.enableBuzzer : true,
                            enableTextInput: data.enableTextInput || false
                        };
                        
                        // Carregar sem pedir confirmação adicional
                        loadSession(sessionEntry, true);
                        
                    } else if (choice === 'no') {
                        // ===== OPÇÃO 2: Arquivar sessão antiga e criar nova =====
                        setShowExistingSessionDialog(false);
                        
                        try {
                            // PASSO 1: Marcar sessão como inativa PRIMEIRO
                            console.log(`🔒 Marcando sessão ${code} como inativa antes de arquivar...`);
                            await update(ref(rtdb, `sessions/${code}/gameState`), { 
                                active: false,
                                closedAt: Date.now()
                            });
                            
                            // Aguardar Firebase processar
                            await new Promise(resolve => setTimeout(resolve, 200));
                            
                            // PASSO 2: Preparar dados para arquivamento
                            const historyData = {
                                sessionId: code,
                                timestamp: Date.now(),
                                tables: data.tables || [],
                                emails: {},
                                categories: data.categories || [],
                                yellowCategory: data.yellowCategory || null,
                                redCategory: data.redCategory || null,
                                buzzerText: data.buzzerText || 'BUZZER',
                                blockBuzzerAtZero: data.blockBuzzerAtZero || false,
                                initialScore: data.initialScore || 0,
                                enableBuzzer: data.enableBuzzer !== undefined ? data.enableBuzzer : true,
                                enableTextInput: data.enableTextInput || false,
                                archived: true
                            };

                            // Gerar ID único para o histórico
                            const historyId = Math.random().toString(36).substring(2, 12);
                            
                            // PASSO 3: Salvar no histórico
                            await set(ref(rtdb, `sessionHistory/${historyId}`), historyData);
                            console.log(`📦 Sessão ${code} arquivada com ID: ${historyId}`);
                            
                            // PASSO 4: Remover a sessão ativa do Firebase
                            await remove(ref(rtdb, `sessions/${code}`));
                            console.log(`🗑️ Sessão ${code} removida de sessions/`);
                            
                            // Aguardar Firebase processar a remoção
                            await new Promise(resolve => setTimeout(resolve, 200));
                            
                            // PASSO 5: Verificar se foi realmente removida
                            const verifyRef = ref(rtdb, `sessions/${code}`);
                            const verifySnapshot = await new Promise((resolve) => {
                                onValue(verifyRef, resolve, { onlyOnce: true });
                            });
                            
                            if (verifySnapshot.exists()) {
                                console.warn(`⚠️ Sessão ${code} ainda existe, tentando remover novamente...`);
                                await remove(ref(rtdb, `sessions/${code}`));
                                await new Promise(resolve => setTimeout(resolve, 200));
                            }
                            
                            // PASSO 6: Criar nova sessão com o mesmo código (agora disponível)
                            console.log(`✅ Criando nova sessão com código ${code}...`);
                            await proceedWithSessionCreation(code);
                            
                        } catch (e) {
                            console.error('Erro ao arquivar sessão antiga:', e);
                            alert('Erro ao arquivar a sessão antiga. Detalhes: ' + e.message);
                            // Mostrar diálogo novamente para tentar outra vez
                            setShowExistingSessionDialog(true);
                        }
                    } else {
                        // ===== OPÇÃO 3: Cancelar =====
                        setShowExistingSessionDialog(false);
                        setExistingSessionData(null);
                    }
                };

                const updateScore = (id, change) => {
                    setTables(prev => prev.map(t => t.id === id ? { ...t, score: Math.max(0, t.score + change) } : t));
                    const txt = change > 0 ? `+${change}` : `${change}`;
                    const flashId = `${id}_${Date.now()}`;
                    setFlashEffects(p => ({ ...p, [flashId]: { tableId: id, text: txt } }));
                    setTimeout(() => setFlashEffects(p => { const u = { ...p }; delete u[flashId]; return u; }), 400);
                };

                const changeCategory = (setter, current) => {
                    const avail = categories.filter(c => !usedCategories.includes(c) && c !== current);
                    if (!avail.length) return;
                    const cat = avail[Math.floor(Math.random() * avail.length)];
                    setUsedCategories([...usedCategories, cat]);
                    setter(cat);
                };

                const resetBuzzer = async (tableId) => {
                    if (!sessionId) return;
                    try {
                        await update(ref(rtdb, `sessions/${sessionId}/buzzers/${tableId}`), {
                            pressed: false,
                            timestamp: null,
                            enabled: true
                        });
                    } catch (e) { console.error(e); }
                };

                const resetAllBuzzers = async () => {
                    if (!sessionId) return;
                    try {
                        const updates = {};
                        Object.keys(buzzers).forEach(key => {
                            updates[`${key}/pressed`] = false;
                            updates[`${key}/timestamp`] = null;
                            updates[`${key}/enabled`] = true;
                        });
                        await update(ref(rtdb, `sessions/${sessionId}/buzzers`), updates);
                    } catch (e) { console.error(e); }
                };

                const resetAllTextResponses = async () => {
                    if (!sessionId) return;
                    try {
                        await remove(ref(rtdb, `sessions/${sessionId}/textResponses`));
                        setTextResponses({});
                        setTextInputActive(false);
                        setTextInputTimeRemaining(0);
                    } catch (e) { console.error(e); }
                };

                const activateTextInput = async () => {
                    if (Object.keys(textResponses).length > 0) {
                        alert('Tem respostas pendentes. Aplique os pontos e feche primeiro.');
                        return;
                    }
                    setTextInputActive(true);
                    setTextInputTimeRemaining(textInputSeconds);
                };

                const applyScoreAdjustments = () => {
                    Object.entries(responseScoreAdjustments).forEach(([tableId, adjustment]) => {
                        if (adjustment !== 0) {
                            updateScore(parseInt(tableId), adjustment);
                        }
                    });
                    setResponseScoreAdjustments({});
                };

                const closeResponsesScreen = async () => {
                    applyScoreAdjustments();
                    await resetAllTextResponses();
                    setShowResponses(false);
                    setTextInputActive(false);
                    setTextInputTimeRemaining(0);
                };

                /**
                 * Função auxiliar: Limpa todos os estados e volta ao setup
                 */
                const resetToSetup = () => {
                    setSetupComplete(false); 
                    setTables([]); 
                    setCategories([]); 
                    setYellowCategory(null); 
                    setRedCategory(null);
                    setUsedCategories([]); 
                    setTempNames({}); 
                    setTempCategories(['']); 
                    setInitialScore(0); 
                    setNumTables(0);
                    setShowLeaderboard(false); 
                    setLeaderboardRevealPosition(null); 
                    setShowScores(false);
                    setFlashEffects({}); 
                    setSessionId(null); 
                    setCodeCopied(false); 
                    setConnectedClients({}); 
                    setBuzzers({});
                    setTextResponses({});
                    setShowSessionCode(false); 
                    setBuzzerText('BUZZER'); 
                    setBlockBuzzerAtZero(false); 
                    setShowQRCode(false);
                    setCustomSessionCode(''); 
                    setCodeError('');
                    setEnableBuzzer(true);
                    setEnableTextInput(false);
                    setShowResponses(false);
                    setSelectedLogos([]);
                    setShowEndSessionModal(false);
                    setStartWithBuzzersBlocked(true);
                    setBuzzersBlocked(true);
                };

                /**
                 * Terminar Sessão - Opção 1: Arquivar e Fechar
                 * Guarda no histórico, remove de sessions/, volta ao setup
                 */
                const endSessionArchive = async () => {
                    if (!sessionId) return;
                    
                    try {
                        const currentSessionId = sessionId;
                        
                        // Preparar dados para o histórico
                        const historyData = {
                            sessionId: currentSessionId,
                            timestamp: Date.now(),
                            gameType: GAME_TYPE,
                            tables: tables.map(t => ({ id: t.id, name: t.name, score: t.score })),
                            emails: {},
                            categories: categories,
                            yellowCategory: yellowCategory,
                            redCategory: redCategory,
                            buzzerText: buzzerText,
                            blockBuzzerAtZero: blockBuzzerAtZero,
                            initialScore: initialScore,
                            enableBuzzer: enableBuzzer,
                            enableTextInput: enableTextInput,
                            buzzersBlocked: buzzersBlocked,
                            selectedLogos: selectedLogos,
                            archived: true
                        };
                        
                        // Adicionar emails dos clientes
                        Object.values(connectedClients).forEach(client => {
                            historyData.emails[client.tableNumber] = client.emails || [];
                        });
                        
                        // PASSO 1: Marcar sessão como inativa
                        console.log(`🔒 Marcando sessão ${currentSessionId} como inativa...`);
                        await update(ref(rtdb, `sessions/${currentSessionId}/gameState`), { 
                            active: false,
                            closedAt: Date.now()
                        });
                        await new Promise(resolve => setTimeout(resolve, 200));
                        
                        // PASSO 2: Salvar no histórico
                        const historyId = Math.random().toString(36).substring(2, 12);
                        await set(ref(rtdb, `sessionHistory/${historyId}`), historyData);
                        console.log(`📦 Sessão ${currentSessionId} arquivada com ID: ${historyId}`);
                        
                        // PASSO 3: Remover de sessions/
                        await remove(ref(rtdb, `sessions/${currentSessionId}`));
                        console.log(`🗑️ Sessão ${currentSessionId} removida de sessions/`);
                        
                        // Verificar remoção
                        await new Promise(resolve => setTimeout(resolve, 200));
                        const verifyRef = ref(rtdb, `sessions/${currentSessionId}`);
                        const verifySnapshot = await new Promise((resolve) => {
                            onValue(verifyRef, resolve, { onlyOnce: true });
                        });
                        if (verifySnapshot.exists()) {
                            await remove(ref(rtdb, `sessions/${currentSessionId}`));
                        }
                        
                        // Voltar ao setup
                        resetToSetup();
                        
                    } catch (e) {
                        console.error('❌ Erro ao arquivar sessão:', e);
                        alert('Erro ao arquivar sessão: ' + e.message);
                    }
                };

                /**
                 * Terminar Sessão - Opção 2: Pausar (deixar aberta)
                 * Mantém em sessions/, volta ao setup (pode retomar depois)
                 */
                const endSessionPause = () => {
                    console.log(`⏸️ Sessão ${sessionId} pausada (permanece aberta em sessions/)`);
                    resetToSetup();
                };

                /**
                 * Carregar uma sessão do histórico ou sessão ativa
                 * IMPORTANTE: Limpa completamente a sessão anterior do Firebase antes de carregar a nova
                 * @param {Object} entry - Dados da sessão a carregar
                 * @param {boolean} skipConfirm - Se true, não pede confirmação
                 */
                const loadSession = async (entry, skipConfirm = false) => {
                    if (!skipConfirm && !confirm('Deseja carregar esta sessão?')) return;
                    
                    const code = entry.sessionId;
                    const loadedTables = entry.tables || [];
                    const loadedCategories = entry.categories || [];

                    console.log(`🔄 Carregando sessão: ${code}`);

                    // Fechar ecrãs secundários
                    setShowHistory(false);
                    setSelectedHistoryEntry(null);
                    setSetupComplete(false);
                    
                    try {
                        // PASSO 1: Limpar COMPLETAMENTE a sessão anterior do Firebase
                        if (sessionId && sessionId !== code) {
                            console.log(`🧹 Limpando sessão anterior: ${sessionId}`);
                            await remove(ref(rtdb, `sessions/${sessionId}`));
                            await new Promise(resolve => setTimeout(resolve, 300));
                        }
                        
                        // PASSO 2: Verificar se a sessão que vamos carregar já existe
                        const checkRef = ref(rtdb, `sessions/${code}/gameState`);
                        const checkSnapshot = await new Promise((resolve) => {
                            onValue(checkRef, resolve, { onlyOnce: true });
                        });
                        
                        if (checkSnapshot.exists()) {
                            console.log(`⚠️ Sessão ${code} já existe no Firebase - limpando para recriar`);
                            await remove(ref(rtdb, `sessions/${code}`));
                            await new Promise(resolve => setTimeout(resolve, 300));
                        }
                        
                    } catch (e) {
                        console.error('❌ Erro ao limpar sessões antigas:', e);
                    }
                    
                    // PASSO 3: Restaurar dados da sessão localmente
                    setTables(loadedTables);
                    setNumTables(0); // Sempre modo dinâmico ao carregar
                    setCategories(loadedCategories);
                    setYellowCategory(entry.yellowCategory || null);
                    setRedCategory(entry.redCategory || null);
                    setUsedCategories([entry.yellowCategory, entry.redCategory].filter(Boolean));
                    setBuzzerText(entry.buzzerText || 'BUZZER');
                    setBlockBuzzerAtZero(entry.blockBuzzerAtZero || false);
                    setInitialScore(entry.initialScore || 0);
                    setEnableBuzzer(entry.enableBuzzer !== undefined ? entry.enableBuzzer : true);
                    setEnableTextInput(entry.enableTextInput || false);
                    setSelectedLogos(entry.selectedLogos || []);
                    
                    // Restaurar estado de buzzers bloqueados (default: true ao carregar)
                    const loadedBuzzersBlocked = entry.buzzersBlocked !== undefined ? entry.buzzersBlocked : true;
                    setBuzzersBlocked(loadedBuzzersBlocked);
                    
                    // Limpar estados temporários
                    // Mostrar pontos por defeito
                    setShowScores(true);
                    setFlashEffects({});
                    setCodeCopied(false);
                    setConnectedClients({});
                    setBuzzers({});
                    setTextResponses({});
                    setShowSessionCode(false);
                    setShowQRCode(false);
                    setShowManageTables(false);
                    setShowLeaderboard(false);
                    setLeaderboardRevealPosition(null);
                    setShowResponses(false);
                    
                    // Ativar a nova sessão
                    setSessionId(code);
                    setSetupComplete(true);
                    
                    // PASSO 4: Criar a sessão no Firebase com os dados carregados
                    setTimeout(async () => {
                        try {
                            await set(ref(rtdb, `sessions/${code}/gameState`), {
                                gameType: entry.gameType || GAME_TYPE,
                                tables: loadedTables,
                                yellowCategory: entry.yellowCategory || null,
                                redCategory: entry.redCategory || null,
                                categories: loadedCategories,
                                active: true,
                                buzzerText: entry.buzzerText || 'BUZZER',
                                blockBuzzerAtZero: entry.blockBuzzerAtZero || false,
                                enableBuzzer: entry.enableBuzzer !== undefined ? entry.enableBuzzer : true,
                                enableTextInput: entry.enableTextInput || false,
                                buzzersBlocked: loadedBuzzersBlocked,
                                selectedLogos: entry.selectedLogos || [],
                                textInputActive: false,
                                textInputTimeRemaining: 0,
                                timestamp: Date.now()
                            });
                            console.log(`✅ Sessão ${code} carregada e recriada no Firebase com sucesso`);
                        } catch (e) {
                            console.error('❌ Erro ao recriar sessão no Firebase:', e);
                        }
                    }, 200);
                };

                const removeTable = async (tableId) => {
                    if (!confirm(`Tem a certeza que deseja remover a Mesa ${tableId}?`)) return;
                    
                    try {
                        await remove(ref(rtdb, `sessions/${sessionId}/clients/${tableId}`));
                        await remove(ref(rtdb, `sessions/${sessionId}/buzzers/${tableId}`));
                        await remove(ref(rtdb, `sessions/${sessionId}/textResponses/${tableId}`));
                        setTables(prev => prev.filter(t => t.id !== tableId));
                    } catch (e) {
                        console.error(e);
                        alert('Erro ao remover mesa');
                    }
                };

                const resetAllScores = () => {
                    if (!confirm('Tem a certeza que deseja resetar todas as pontuações?')) return;
                    const newScore = prompt('Pontuação inicial para todas as mesas:', '0');
                    if (newScore === null) return;
                    const score = Math.max(0, parseInt(newScore) || 0);
                    setTables(prev => prev.map(t => ({ ...t, score: score })));
                    setInitialScore(score);
                };

                const deleteHistoryEntry = async (entryId) => {
                    if (!confirm('Tem a certeza que deseja eliminar este registo?')) return;
                    try {
                        await remove(ref(rtdb, `sessionHistory/${entryId}`));
                        setSessionHistory(sessionHistory.filter(h => h.id !== entryId));
                    } catch (e) { console.error(e); }
                };

                /**
                 * Fechar e arquivar uma sessão ativa
                 * IMPORTANTE: Primeiro marca active: false, depois arquiva e remove
                 * @param {string} sessionCode - Código da sessão a fechar
                 */
                const closeActiveSession = async (sessionCode) => {
                    if (!confirm(`Tem a certeza que deseja fechar e arquivar a sessão "${sessionCode}"?`)) return;
                    
                    try {
                        // Buscar dados da sessão ativa
                        const sessionRef = ref(rtdb, `sessions/${sessionCode}/gameState`);
                        const snapshot = await new Promise((resolve) => {
                            onValue(sessionRef, resolve, { onlyOnce: true });
                        });
                        const sessionData = snapshot.val();
                        
                        if (!sessionData) {
                            alert('Sessão não encontrada');
                            return;
                        }
                        
                        // PASSO 1: Marcar sessão como inativa PRIMEIRO (segurança extra)
                        await update(ref(rtdb, `sessions/${sessionCode}/gameState`), { 
                            active: false,
                            closedAt: Date.now()
                        });
                        console.log(`🔒 Sessão ${sessionCode} marcada como inativa`);
                        
                        // Aguardar Firebase processar
                        await new Promise(resolve => setTimeout(resolve, 200));
                        
                        // Buscar clientes conectados
                        const clientsRef = ref(rtdb, `sessions/${sessionCode}/clients`);
                        const clientsSnapshot = await new Promise((resolve) => {
                            onValue(clientsRef, resolve, { onlyOnce: true });
                        });
                        const clientsData = clientsSnapshot.val() || {};
                        
                        // PASSO 2: Criar entrada no histórico
                        const historyData = {
                            sessionId: sessionCode,
                            timestamp: Date.now(),
                            tables: sessionData.tables || [],
                            emails: {},
                            categories: sessionData.categories || [],
                            yellowCategory: sessionData.yellowCategory || null,
                            redCategory: sessionData.redCategory || null,
                            buzzerText: sessionData.buzzerText || 'BUZZER',
                            blockBuzzerAtZero: sessionData.blockBuzzerAtZero || false,
                            initialScore: sessionData.initialScore || 0,
                            enableBuzzer: sessionData.enableBuzzer !== undefined ? sessionData.enableBuzzer : true,
                            enableTextInput: sessionData.enableTextInput || false,
                            archived: true
                        };
                        
                        // Adicionar emails dos clientes
                        Object.values(clientsData).forEach(client => {
                            historyData.emails[client.tableNumber] = client.emails || [];
                        });
                        
                        // Salvar no histórico
                        const historyId = Math.random().toString(36).substring(2, 12);
                        await set(ref(rtdb, `sessionHistory/${historyId}`), historyData);
                        console.log(`📦 Sessão ${sessionCode} arquivada com ID: ${historyId}`);
                        
                        // PASSO 3: Remover sessão do nó sessions/ completamente
                        await remove(ref(rtdb, `sessions/${sessionCode}`));
                        console.log(`🗑️ Sessão ${sessionCode} removida de sessions/`);
                        
                        // Aguardar Firebase processar a remoção
                        await new Promise(resolve => setTimeout(resolve, 200));
                        
                        // PASSO 4: Verificar se foi realmente removida
                        const verifyRef = ref(rtdb, `sessions/${sessionCode}`);
                        const verifySnapshot = await new Promise((resolve) => {
                            onValue(verifyRef, resolve, { onlyOnce: true });
                        });
                        
                        if (verifySnapshot.exists()) {
                            console.warn(`⚠️ Sessão ${sessionCode} ainda existe após remoção, tentando novamente...`);
                            await remove(ref(rtdb, `sessions/${sessionCode}`));
                        }
                        
                        alert(`Sessão "${sessionCode}" foi fechada e arquivada com sucesso!`);
                    } catch (e) {
                        console.error('Erro ao fechar sessão:', e);
                        alert('Erro ao fechar sessão: ' + e.message);
                    }
                };

                const generateQRCodeUrl = () => {
                    const url = `${CLIENT_URL}?session=${sessionId}`;
                    return `https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(url)}`;
                };

                const downloadQRCode = async () => {
                    try {
                        const qrUrl = generateQRCodeUrl();
                        const response = await fetch(qrUrl);
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `qrcode_${sessionId}.png`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    } catch (e) {
                        console.error('Erro ao fazer download:', e);
                        alert('Erro ao fazer download do QR Code');
                    }
                };

                const sorted = () => [...tables].sort((a, b) => b.score - a.score);

                const getBuzzerOrder = () => {
                    return Object.entries(buzzers)
                        .filter(([_, b]) => b.pressed)
                        .sort((a, b) => a[1].timestamp - b[1].timestamp)
                        .map(([id, b], idx) => ({ tableId: parseInt(id), order: idx + 1, timestamp: b.timestamp }));
                };

                const getTextResponsesOrder = () => {
                    return Object.entries(textResponses)
                        .filter(([_, r]) => r.submitted)
                        .sort((a, b) => a[1].timestamp - b[1].timestamp)
                        .map(([id, r], idx) => ({ 
                            tableId: parseInt(id), 
                            order: idx + 1, 
                            timestamp: r.timestamp,
                            text: r.text
                        }));
                };

                const formatDate = (timestamp) => {
                    const date = new Date(timestamp);
                    return date.toLocaleDateString('pt-PT') + ' ' + date.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                };

                const formatTime = (timestamp) => {
                    const date = new Date(timestamp);
                    return date.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                };

                // MODAL: Sessão Existente
                if (showExistingSessionDialog && existingSessionData) {
                    return h('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full' },
                            h('div', { className: 'text-center mb-6' },
                                h('div', { className: 'w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center mx-auto mb-4' },
                                    h('span', { className: 'text-3xl' }, '⚠️')
                                ),
                                h('h2', { className: 'text-2xl font-bold text-gray-800 mb-2' }, 'Sessão Aberta Encontrada'),
                                h('p', { className: 'text-gray-600' }, 
                                    `Já existe uma sessão aberta com o código "${existingSessionData.code}".`
                                ),
                                h('p', { className: 'text-gray-600 mt-2' }, 
                                    'Deseja carregar a sessão anterior?'
                                )
                            ),
                            h('div', { className: 'space-y-3' },
                                h('button', { 
                                    onClick: () => handleExistingSessionChoice('yes'),
                                    className: 'w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition'
                                }, 'Sim - Carregar Sessão Anterior'),
                                h('button', { 
                                    onClick: () => handleExistingSessionChoice('no'),
                                    className: 'w-full bg-orange-600 text-white py-3 rounded-lg font-bold hover:bg-orange-700 transition'
                                }, 'Não - Arquivar e Criar Nova'),
                                h('button', { 
                                    onClick: () => handleExistingSessionChoice('cancel'),
                                    className: 'w-full bg-gray-500 text-white py-3 rounded-lg font-bold hover:bg-gray-600 transition'
                                }, 'Cancelar')
                            ),
                            h('p', { className: 'text-xs text-gray-500 mt-4 text-center' }, 
                                'Escolhendo "Não", a sessão anterior será arquivada e uma nova sessão será criada com o mesmo código.'
                            )
                        )
                    );
                }

                // MODAL: Terminar Sessão
                if (showEndSessionModal) {
                    return h('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-md w-full' },
                            h('div', { className: 'text-center mb-6' },
                                h('div', { className: 'w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4' },
                                    h('span', { className: 'text-3xl' }, '🏁')
                                ),
                                h('h2', { className: 'text-2xl font-bold text-gray-800 mb-2' }, 'Terminar Sessão'),
                                h('p', { className: 'text-gray-600' }, 
                                    `Sessão: ${sessionId}`
                                ),
                                h('p', { className: 'text-gray-600 mt-1' }, 
                                    `${tables.length} mesa(s) • ${tables.reduce((acc, t) => acc + t.score, 0)} pontos totais`
                                )
                            ),
                            h('div', { className: 'space-y-3' },
                                h('button', { 
                                    onClick: endSessionArchive,
                                    className: 'w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition flex items-center justify-center gap-2'
                                }, 
                                    h('span', null, '📦'),
                                    h('span', null, 'Arquivar e Fechar')
                                ),
                                h('p', { className: 'text-xs text-gray-500 text-center -mt-1 mb-2' }, 
                                    'Guarda no histórico e termina definitivamente'
                                ),
                                h('button', { 
                                    onClick: endSessionPause,
                                    className: 'w-full bg-yellow-500 text-white py-3 rounded-lg font-bold hover:bg-yellow-600 transition flex items-center justify-center gap-2'
                                }, 
                                    h('span', null, '⏸️'),
                                    h('span', null, 'Pausar (deixar aberta)')
                                ),
                                h('p', { className: 'text-xs text-gray-500 text-center -mt-1 mb-2' }, 
                                    'Pode retomar mais tarde em "Gestão de Sessões"'
                                ),
                                h('button', { 
                                    onClick: () => setShowEndSessionModal(false),
                                    className: 'w-full bg-gray-400 text-white py-3 rounded-lg font-bold hover:bg-gray-500 transition flex items-center justify-center gap-2'
                                }, 
                                    h('span', null, '❌'),
                                    h('span', null, 'Cancelar')
                                )
                            )
                        )
                    );
                }

                // ECRÃ: Respostas de Texto
                if (showResponses) {
                    // Desativar input nos clientes enquanto visualiza respostas
                    if (textInputActive) {
                        setTextInputActive(false);
                        syncGame();
                    }
                    
                    const responses = getTextResponsesOrder();
                    
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-pink-900 p-3' },
                        h('div', { className: 'max-w-6xl mx-auto pt-4' },
                            h('div', { className: 'bg-white rounded-2xl p-4' },
                                h('div', { className: 'flex justify-between mb-4' },
                                    h('h2', { className: 'text-xl font-bold' }, 'Respostas Recebidas'),
                                    h('button', { 
                                        onClick: closeResponsesScreen, 
                                        className: 'px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700' 
                                    }, 'Aplicar Pontos e Fechar')
                                ),
                                                                    responses.length === 0
                                    ? h('p', { className: 'text-gray-600 text-center py-8' }, 'Nenhuma resposta recebida')
                                    : h('div', { className: 'space-y-3' },
                                        responses.map(r => {
                                            const table = tables.find(t => t.id === r.tableId);
                                            const adjustment = responseScoreAdjustments[r.tableId] || 0;
                                            
                                            return h('div', { key: r.tableId, className: 'bg-gray-50 p-4 rounded-lg border-2 border-gray-200' },
                                                h('div', { className: 'flex justify-between items-start gap-4' },
                                                    h('div', { className: 'flex-1' },
                                                        h('div', { className: 'flex items-center gap-2 mb-2' },
                                                            h('span', { className: 'inline-block bg-indigo-600 text-white px-3 py-1 rounded-full text-sm font-bold' }, `${r.order}º`),
                                                            h('span', { className: 'font-bold text-lg text-gray-800' }, table?.name || `Mesa ${r.tableId}`),
                                                            h('span', { className: 'text-sm text-gray-600' }, `(Mesa ${r.tableId})`),
                                                            h('span', { className: 'text-xs text-gray-500 ml-auto' }, formatTime(r.timestamp))
                                                        ),
                                                        h('div', { className: 'bg-white p-3 rounded border border-gray-300' },
                                                            h('p', { className: 'text-gray-800 whitespace-pre-wrap' }, r.text)
                                                        )
                                                    ),
                                                    h('div', { className: 'flex flex-col items-end gap-2 flex-shrink-0' },
                                                        h('div', { className: 'flex items-center gap-1' },
                                                            h('button', { 
                                                                onClick: () => setResponseScoreAdjustments(p => ({ ...p, [r.tableId]: (p[r.tableId] || 0) - 1 })),
                                                                className: 'px-2 py-1 bg-red-500 text-white rounded font-bold hover:bg-red-600 text-sm'
                                                            }, '-1'),
                                                            h('button', { 
                                                                onClick: () => setResponseScoreAdjustments(p => ({ ...p, [r.tableId]: (p[r.tableId] || 0) + 1 })),
                                                                className: 'px-2 py-1 bg-green-500 text-white rounded font-bold hover:bg-green-600 text-sm'
                                                            }, '+1'),
                                                            h('button', { 
                                                                onClick: () => setResponseScoreAdjustments(p => ({ ...p, [r.tableId]: (p[r.tableId] || 0) + 5 })),
                                                                className: 'px-2 py-1 bg-purple-500 text-white rounded font-bold hover:bg-purple-600 text-sm'
                                                            }, '+5')
                                                        ),
                                                        h('input', {
                                                            type: 'number',
                                                            value: adjustment,
                                                            onChange: (e) => setResponseScoreAdjustments(p => ({ ...p, [r.tableId]: parseInt(e.target.value) || 0 })),
                                                            className: 'w-20 px-2 py-1 border-2 border-gray-300 rounded text-center font-bold text-sm'
                                                        }),
                                                        adjustment !== 0 && h('span', { className: `text-sm font-bold ${adjustment > 0 ? 'text-green-600' : 'text-red-600'}` }, 
                                                            adjustment > 0 ? `+${adjustment}` : `${adjustment}`
                                                        )
                                                    )
                                                )
                                            );
                                        })
                                    )
                            )
                        )
                    );
                }

                // ECRÃ: Gerir Mesas
                if (showManageTables) {
                    const allTables = tables.map(t => ({
                        id: t.id,
                        name: t.name,
                        score: t.score,
                        isConnected: Object.values(connectedClients).some(c => c.tableNumber === t.id)
                    })).sort((a, b) => a.id - b.id);
