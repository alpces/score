<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Deception Murder — Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/session-core.js"></script>
    <style>
        @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
        .slide-in { animation: slideIn .2s ease-out; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .fade-in { animation: fadeIn .2s ease-out; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, remove, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        const app = initializeApp(window.FirebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, set, remove, onValue, update, get };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    window.addEventListener('firebaseReady', function () {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;

        var GAME_TYPE   = 'deception';
        var CLIENT_URL  = window.AppConfig.CLIENT_DECEPTION_URL;

        /* ── role display ─────────────────────────────────────────── */
        var ROLE_LABELS = {
            assassino:   { label: 'Assassino',    icon: '🔪', color: 'text-rose-300',   bg: 'bg-rose-500/15',   border: 'border-rose-500/30'   },
            cumplice:    { label: 'Cúmplice',     icon: '🤝', color: 'text-orange-300', bg: 'bg-orange-500/15', border: 'border-orange-500/30' },
            testemunha:  { label: 'Testemunha',   icon: '👁️', color: 'text-yellow-300', bg: 'bg-yellow-500/15', border: 'border-yellow-500/30' },
            investigador:{ label: 'Investigador', icon: '🔍', color: 'text-blue-300',   bg: 'bg-blue-500/15',   border: 'border-blue-500/30'   },
            detetive:    { label: 'Detetive',     icon: '🕵️', color: 'text-purple-300', bg: 'bg-purple-500/15', border: 'border-purple-500/30' }
        };

        /* ── role distribution ────────────────────────────────────── */
        function buildRoles(clients, useComplexRoles) {
            var tableNums = Object.values(clients)
                .filter(function (c) { return c && c.tableNumber; })
                .map(function (c) { return c.tableNumber; })
                .sort(function (a, b) { return a - b; });
            if (!tableNums.length) return null;

            var shuffled = tableNums.slice().sort(function () { return Math.random() - 0.5; });

            var seq = ['assassino'];
            if (useComplexRoles && shuffled.length >= 3) seq.push('cumplice');
            if (useComplexRoles && shuffled.length >= 4) seq.push('testemunha');
            while (seq.length < shuffled.length) seq.push('investigador');

            var assassinTable    = shuffled[0];
            var ac               = clients[assassinTable] || {};
            var aBlue            = ac.blueCard || '';
            var aRed             = ac.redCard  || '';
            var aName            = ac.teamName || ('Mesa ' + assassinTable);

            var accompliceIdx    = seq.indexOf('cumplice');
            var accompliceTable  = accompliceIdx >= 0 ? shuffled[accompliceIdx] : null;
            var apName           = accompliceTable && clients[accompliceTable]
                ? (clients[accompliceTable].teamName || 'Mesa ' + accompliceTable)
                : null;

            var roles = {};
            shuffled.forEach(function (tNum, i) {
                var role = seq[i], si = {};
                if (role === 'assassino') {
                    si = { blueCard: aBlue, redCard: aRed };
                } else if (role === 'cumplice') {
                    si = { assassinTable: assassinTable, assassinTeamName: aName, blueCard: aBlue, redCard: aRed };
                } else if (role === 'testemunha') {
                    var inv = [aName, apName || ('Mesa ' + accompliceTable)];
                    if (Math.random() < 0.5) inv.reverse();
                    si = { involvedTables: inv };
                }
                roles[tNum] = { role: role, secretInfo: si };
            });
            return { roles: roles, assassinTable: assassinTable };
        }

        /* ── presence dot ────────────────────────────────────────── */
        function connDot(sinceMs) {
            if (sinceMs < 30000) return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-emerald-400 flex-shrink-0' });
            if (sinceMs < 60000) return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-yellow-400 flex-shrink-0' });
            return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-slate-600 flex-shrink-0' });
        }

        /* ── App ─────────────────────────────────────────────────── */
        function App() {
            /* setup inputs */
            var c1 = useState('');        var codeInput = c1[0];     var setCodeInput = c1[1];
            var c2 = useState('Acusar'); var buzzerName = c2[0];    var setBuzzerName = c2[1];
            var c3 = useState('5');      var accusePts = c3[0];     var setAccusePts = c3[1];
            var c4 = useState('5');      var victoryPts = c4[0];    var setVictoryPts = c4[1];

            /* session */
            var s1 = useState('');  var sessionCode = s1[0];  var setSessionCode = s1[1];
            var s2 = useState(null);var gameData = s2[0];     var setGameData = s2[1];
            var s3 = useState({});  var clients = s3[0];      var setClients = s3[1];
            var s4 = useState({});  var lastSeen = s4[0];     var setLastSeen = s4[1];
            var s5 = useState(0);   var tick = s5[0];         var setTick = s5[1];

            /* UI modals */
            var u1 = useState(false); var showQR = u1[0];           var setShowQR = u1[1];
            var u2 = useState(false); var showLeaderboard = u2[0];  var setShowLeaderboard = u2[1];
            var u3 = useState(false); var showNewRound = u3[0];     var setShowNewRound = u3[1];
            var u4 = useState(false); var showCloseConfirm = u4[0]; var setShowCloseConfirm = u4[1];
            var u5 = useState(false); var codeCopied = u5[0];       var setCodeCopied = u5[1];
            var u6 = useState(false); var useRoles = u6[0];         var setUseRoles = u6[1];
            var u7 = useState(false); var closing = u7[0];          var setClosing = u7[1];

            var prevClientCountRef = useRef(0);

            /* presence tick */
            useEffect(function () {
                var iv = setInterval(function () { setTick(function (t) { return t + 1; }); }, 5000);
                return function () { clearInterval(iv); };
            }, []);

            /* restore code from URL */
            useEffect(function () {
                var p = new URLSearchParams(window.location.search);
                var u = p.get('session');
                if (u) setCodeInput(u.toUpperCase());
            }, []);

            /* Firebase listeners */
            useEffect(function () {
                if (!sessionCode) return;
                var u1 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), function (snap) {
                    var d = snap.val();
                    if (!d || d.active === false) { setGameData(null); return; }
                    setGameData(d);
                });
                var u2 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients'), function (snap) {
                    var raw = snap.val() || {};
                    var ls = {};
                    Object.keys(raw).forEach(function (k) {
                        if (raw[k] && raw[k].tableNumber) ls[raw[k].tableNumber] = raw[k].lastSeen || 0;
                    });
                    setLastSeen(ls);
                    setClients(raw);
                });
                return function () { u1(); u2(); };
            }, [sessionCode]);

            /* auto-manage useRoles toggle based on client count */
            useEffect(function () {
                var n = Object.values(clients).filter(function (c) { return c && c.tableNumber; }).length;
                var prev = prevClientCountRef.current;
                prevClientCountRef.current = n;
                if (n <= 4) {
                    setUseRoles(false);
                } else if (prev <= 4) {
                    setUseRoles(true);
                }
            }, [clients]);

            /* ── session actions ─────────────────────────────────── */
            var createSession = async function () {
                var code = codeInput.trim().toUpperCase();
                if (!code) return;
                var gs = {
                    gameType: GAME_TYPE, active: true, phase: 'waiting', round: 0,
                    buzzerName: buzzerName.trim() || 'Acusar',
                    config: {
                        accusationPoints:  parseInt(accusePts)  || 5,
                        roleVictoryPoints: parseInt(victoryPts) || 5
                    },
                    roles: {}, assassinTable: null, accusations: {}, scores: {},
                    timestamp: Date.now()
                };
                await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), gs);
                setSessionCode(code);
            };

            var startRound = function () {
                if (!sessionCode || !gameData) return;
                var nextRound = ((gameData.round) || 0) + 1;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), {
                    phase: 'setup', round: nextRound,
                    roles: {}, assassinTable: null, accusations: {},
                    timestamp: Date.now()
                });
                setShowNewRound(false);
            };

            var distributeRoles = function () {
                if (!sessionCode || !gameData) return;
                var result = buildRoles(clients, useRoles);
                if (!result) { alert('Não há mesas ligadas.'); return; }
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), {
                    phase: 'running', roles: result.roles, assassinTable: result.assassinTable,
                    accusations: {}, timestamp: Date.now()
                });
            };

            var resetAllAccusations = function () {
                if (!sessionCode) return;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { accusations: {} });
            };

            var resetOneAccusation = function (tableNum) {
                if (!sessionCode) return;
                fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState/accusations/' + tableNum));
            };

            var markCorrect = function (tableNum) {
                if (!gameData) return;
                var pts = (gameData.config && gameData.config.accusationPoints) || parseInt(accusePts) || 5;
                var scores = Object.assign({}, gameData.scores || {});
                scores[tableNum] = (scores[tableNum] || 0) + pts;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { scores: scores });
            };

            var confirmRoleVictory = function () {
                if (!gameData) return;
                var pts = (gameData.config && gameData.config.roleVictoryPoints) || parseInt(victoryPts) || 5;
                var roles = gameData.roles || {};
                var scores = Object.assign({}, gameData.scores || {});
                Object.keys(roles).forEach(function (tNum) {
                    var r = roles[tNum] && roles[tNum].role;
                    if (r === 'assassino' || r === 'cumplice') {
                        scores[tNum] = (scores[tNum] || 0) + pts;
                    }
                });
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { scores: scores });
            };

            var closeSession = async function () {
                setClosing(true);
                try {
                    await fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { active: false });
                    setTimeout(async function () {
                        try { await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode)); } catch (e) {}
                    }, 600);
                } catch (e) {}
                setSessionCode(''); setGameData(null); setClients({}); setLastSeen({});
                setShowCloseConfirm(false); setClosing(false);
            };

            var copyLink = function () {
                var url = CLIENT_URL + '?session=' + sessionCode;
                navigator.clipboard.writeText(url).catch(function () {});
                setCodeCopied(true);
                setTimeout(function () { setCodeCopied(false); }, 2000);
            };

            /* ── derived ─────────────────────────────────────────── */
            var phase = gameData ? (gameData.phase || 'waiting') : 'waiting';
            var roles = gameData ? (gameData.roles || {}) : {};
            var accusations = gameData ? (gameData.accusations || {}) : {};
            var scores = gameData ? (gameData.scores || {}) : {};
            var assassinTable = gameData ? gameData.assassinTable : null;
            var accusePtsNow  = (gameData && gameData.config && gameData.config.accusationPoints) || parseInt(accusePts) || 5;
            var victoryPtsNow = (gameData && gameData.config && gameData.config.roleVictoryPoints) || parseInt(victoryPts) || 5;

            var sortedClients = Object.values(clients)
                .filter(function (c) { return c && c.tableNumber; })
                .sort(function (a, b) { return a.tableNumber - b.tableNumber; });

            var accusationList = Object.values(accusations)
                .sort(function (a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });

            var hasScores = Object.keys(scores).some(function (k) { return (scores[k] || 0) > 0; });

            var sortedScores = Object.keys(scores)
                .map(Number)
                .filter(function (t) { return (scores[t] || 0) > 0; })
                .sort(function (a, b) { return (scores[b] || 0) - (scores[a] || 0); });

            var clientCount = sortedClients.length;
            var rolesToggleLocked = clientCount <= 4;
            var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(CLIENT_URL + '?session=' + sessionCode);

            /* ── SETUP SCREEN ──────────────────────────────────────── */
            if (!sessionCode) {
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-rose-950/20 flex flex-col items-center justify-center px-4 py-8' },
                    h('div', { className: 'w-full max-w-sm flex flex-col gap-6' },
                        h('div', { className: 'text-center' },
                            h('div', { className: 'text-7xl mb-3' }, '🔪'),
                            h('h1', { className: 'text-2xl font-black' }, 'Deception Murder'),
                            h('p', { className: 'text-slate-400 text-sm mt-1' }, 'in Hong Kong — Master')
                        ),
                        h('div', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-6 flex flex-col gap-4' },
                            h('label', { className: 'flex flex-col gap-1.5 text-sm' },
                                h('span', { className: 'font-semibold text-slate-300' }, 'Código da sessão'),
                                h('input', {
                                    className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm outline-none focus:border-rose-400 font-mono tracking-widest',
                                    placeholder: 'Ex: HK01',
                                    value: codeInput,
                                    onChange: function (e) { setCodeInput(e.target.value.toUpperCase()); }
                                })
                            ),
                            h('details', { className: 'text-sm' },
                                h('summary', { className: 'cursor-pointer font-semibold text-slate-400 hover:text-slate-200 select-none py-1' }, 'Configuração avançada ▾'),
                                h('div', { className: 'mt-3 flex flex-col gap-3' },
                                    h('label', { className: 'flex flex-col gap-1' },
                                        h('span', { className: 'font-semibold text-slate-300' }, 'Nome do botão de acusação'),
                                        h('input', {
                                            className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-rose-400',
                                            value: buzzerName,
                                            onChange: function (e) { setBuzzerName(e.target.value); }
                                        })
                                    ),
                                    h('div', { className: 'grid grid-cols-2 gap-3' },
                                        h('label', { className: 'flex flex-col gap-1' },
                                            h('span', { className: 'font-semibold text-slate-300 text-xs' }, 'Pts acusação correta'),
                                            h('input', {
                                                className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-rose-400 text-center font-bold',
                                                type: 'number', min: '0', value: accusePts,
                                                onChange: function (e) { setAccusePts(e.target.value); }
                                            })
                                        ),
                                        h('label', { className: 'flex flex-col gap-1' },
                                            h('span', { className: 'font-semibold text-slate-300 text-xs' }, 'Pts vitória papel'),
                                            h('input', {
                                                className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-rose-400 text-center font-bold',
                                                type: 'number', min: '0', value: victoryPts,
                                                onChange: function (e) { setVictoryPts(e.target.value); }
                                            })
                                        )
                                    )
                                )
                            ),
                            h('button', {
                                className: 'mt-1 rounded-xl bg-rose-600 px-4 py-3 font-bold text-white hover:bg-rose-500 active:scale-95 transition-all',
                                onClick: createSession
                            }, 'Criar sessão')
                        ),
                        h('a', { href: 'masters.html', className: 'text-center text-sm text-slate-500 hover:text-slate-300' }, '← Voltar aos jogos')
                    )
                );
            }

            /* ── GAME SCREEN ───────────────────────────────────────── */

            /* New Round modal */
            function NewRoundModal() {
                return h('div', {
                    className: 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4',
                    onClick: function (e) { if (e.target === e.currentTarget) setShowNewRound(false); }
                },
                    h('div', { className: 'bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-sm slide-in flex flex-col gap-5' },
                        h('div', {},
                            h('div', { className: 'text-xl font-black' }, '▶ Nova Ronda'),
                            gameData && h('div', { className: 'text-sm text-slate-400 mt-0.5' }, 'Ronda ' + (((gameData.round) || 0) + 1))
                        ),
                        h('label', {
                            className: 'flex items-start gap-3 rounded-2xl border cursor-pointer px-4 py-3 transition-colors ' +
                                (rolesToggleLocked
                                    ? 'border-slate-800 bg-slate-950/50 opacity-50 cursor-not-allowed'
                                    : useRoles
                                        ? 'border-orange-500/40 bg-orange-950/30'
                                        : 'border-slate-700 bg-slate-950/50 hover:border-slate-600')
                        },
                            h('input', {
                                type: 'checkbox',
                                className: 'mt-0.5 w-4 h-4 flex-shrink-0 accent-orange-500',
                                checked: useRoles,
                                disabled: rolesToggleLocked,
                                onChange: function (e) { setUseRoles(e.target.checked); }
                            }),
                            h('div', {},
                                h('div', { className: 'font-semibold text-sm ' + (rolesToggleLocked ? 'text-slate-500' : 'text-slate-200') },
                                    '🤝 👁️ Usar Cúmplice e Testemunha'
                                ),
                                h('div', { className: 'text-xs mt-0.5 ' + (rolesToggleLocked ? 'text-slate-600' : 'text-slate-400') },
                                    rolesToggleLocked
                                        ? 'Necessário mais de 4 mesas (' + clientCount + ' ligadas)'
                                        : 'Cúmplice (N≥3), Testemunha (N≥4) — ' + clientCount + ' mesas ligadas'
                                )
                            )
                        ),
                        h('div', { className: 'flex gap-3' },
                            h('button', {
                                className: 'flex-1 rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold hover:bg-slate-700',
                                onClick: function () { setShowNewRound(false); }
                            }, 'Cancelar'),
                            h('button', {
                                className: 'flex-1 rounded-xl bg-rose-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-rose-500 active:scale-95 transition-all',
                                onClick: startRound
                            }, 'Iniciar ronda')
                        )
                    )
                );
            }

            /* QR modal */
            function QRModal() {
                return h('div', {
                    className: 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4',
                    onClick: function (e) { if (e.target === e.currentTarget) setShowQR(false); }
                },
                    h('div', { className: 'bg-white rounded-3xl p-6 w-full max-w-xs slide-in flex flex-col items-center gap-4' },
                        h('div', { className: 'text-lg font-black text-gray-800' }, '📱 Entrar na sessão'),
                        h('img', { src: qrUrl, alt: 'QR Code', className: 'rounded-2xl w-48 h-48', width: 192, height: 192 }),
                        h('div', { className: 'font-mono font-bold text-2xl text-gray-800 tracking-widest' }, sessionCode),
                        h('button', {
                            className: 'w-full rounded-xl border border-gray-300 bg-gray-100 px-4 py-2.5 text-sm font-semibold text-gray-700 hover:bg-gray-200',
                            onClick: copyLink
                        }, codeCopied ? '✓ Link copiado!' : 'Copiar link'),
                        h('button', {
                            className: 'text-sm text-gray-400 hover:text-gray-600',
                            onClick: function () { setShowQR(false); }
                        }, 'Fechar')
                    )
                );
            }

            /* Leaderboard modal */
            function LeaderboardModal() {
                var all = sortedClients.map(function (c) {
                    return { tableNumber: c.tableNumber, teamName: c.teamName, score: scores[c.tableNumber] || 0 };
                }).sort(function (a, b) { return b.score - a.score; });
                var medals = ['🥇', '🥈', '🥉'];
                return h('div', {
                    className: 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4',
                    onClick: function (e) { if (e.target === e.currentTarget) setShowLeaderboard(false); }
                },
                    h('div', { className: 'bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-sm slide-in flex flex-col gap-4 max-h-[80vh]' },
                        h('div', { className: 'flex items-center justify-between' },
                            h('div', { className: 'text-xl font-black' }, '🏆 Ranking'),
                            h('button', { className: 'text-slate-400 hover:text-white text-sm', onClick: function () { setShowLeaderboard(false); } }, '✕')
                        ),
                        h('div', { className: 'flex flex-col gap-2 overflow-y-auto' },
                            all.map(function (entry, i) {
                                var rl = roles[entry.tableNumber] ? (ROLE_LABELS[roles[entry.tableNumber].role] || null) : null;
                                return h('div', {
                                    key: entry.tableNumber,
                                    className: 'flex items-center justify-between gap-3 rounded-xl border border-slate-800 bg-slate-950/60 px-4 py-2.5'
                                },
                                    h('div', { className: 'flex items-center gap-2' },
                                        h('span', { className: 'text-lg w-6 text-center flex-shrink-0' }, medals[i] || (i + 1) + 'º'),
                                        h('div', {},
                                            h('div', { className: 'font-semibold text-sm' }, 'Mesa ' + entry.tableNumber + (entry.teamName ? ' · ' + entry.teamName : '')),
                                            rl && h('div', { className: 'text-xs ' + rl.color }, rl.icon + ' ' + rl.label)
                                        )
                                    ),
                                    h('span', { className: 'text-lg font-black ' + (entry.score > 0 ? 'text-amber-300' : 'text-slate-600') }, entry.score + ' pts')
                                );
                            })
                        )
                    )
                );
            }

            /* Close confirm modal */
            function CloseConfirmModal() {
                return h('div', { className: 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4' },
                    h('div', { className: 'bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-xs slide-in flex flex-col gap-4' },
                        h('div', { className: 'text-center' },
                            h('div', { className: 'text-4xl mb-2' }, '⚠️'),
                            h('div', { className: 'font-black text-lg' }, 'Fechar sessão?'),
                            h('div', { className: 'text-slate-400 text-sm mt-1' },
                                'A sessão ', h('span', { className: 'font-mono font-bold text-white' }, sessionCode),
                                ' será encerrada e as mesas serão desligadas.'
                            )
                        ),
                        h('div', { className: 'flex gap-3' },
                            h('button', {
                                className: 'flex-1 rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold hover:bg-slate-700',
                                onClick: function () { setShowCloseConfirm(false); },
                                disabled: closing
                            }, 'Cancelar'),
                            h('button', {
                                className: 'flex-1 rounded-xl bg-rose-700 px-4 py-2.5 text-sm font-bold text-white hover:bg-rose-600 disabled:opacity-50',
                                onClick: closeSession,
                                disabled: closing
                            }, closing ? 'A fechar...' : 'Fechar sessão')
                        )
                    )
                );
            }

            return h('div', { className: 'min-h-screen bg-slate-950 flex flex-col' },

                /* ── header ── */
                h('div', { className: 'flex items-center justify-between gap-3 px-4 py-3 border-b border-slate-800 bg-slate-900/90 sticky top-0 z-10' },
                    h('div', { className: 'flex items-center gap-3 min-w-0' },
                        h('div', { className: 'text-xl font-black flex-shrink-0' }, '🔪'),
                        h('div', { className: 'min-w-0' },
                            h('div', { className: 'font-bold text-sm truncate' }, 'Deception Murder'),
                            h('div', { className: 'flex items-center gap-2 text-xs text-slate-400' },
                                h('span', { className: 'font-mono font-bold text-slate-300' }, sessionCode),
                                h('span', {}, '·'),
                                h('span', {}, clientCount + ' mesas'),
                                gameData && h('span', {}, '· ' + (phase === 'waiting' ? 'Aguarda' : phase === 'setup' ? 'Escolha de cartas' : 'Ronda ' + (gameData.round || 1)))
                            )
                        )
                    ),
                    h('div', { className: 'flex items-center gap-1.5 flex-shrink-0' },
                        h('button', {
                            className: 'rounded-xl border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-semibold hover:bg-slate-700',
                            onClick: function () { setShowQR(true); },
                            title: 'QR Code / Link'
                        }, '📱'),
                        h('button', {
                            className: 'rounded-xl border border-slate-700 bg-slate-800 px-3 py-2 text-sm font-semibold hover:bg-slate-700',
                            onClick: function () { setShowLeaderboard(true); },
                            title: 'Ranking'
                        }, '🏆'),
                        h('button', {
                            className: 'rounded-xl border border-rose-700/50 bg-rose-950/40 px-3 py-2 text-sm font-semibold text-rose-300 hover:bg-rose-900/40',
                            onClick: function () { setShowCloseConfirm(true); }
                        }, 'Fechar')
                    )
                ),

                /* ── body ── */
                h('div', { className: 'flex-1 grid lg:grid-cols-[300px_minmax(0,1fr)] gap-0' },

                    /* ── LEFT: tables list ── */
                    h('div', { className: 'border-r border-slate-800 bg-slate-900/40 p-4 flex flex-col gap-3 lg:max-h-[calc(100vh-56px)] lg:overflow-y-auto' },
                        h('div', { className: 'flex items-center justify-between' },
                            h('div', { className: 'text-sm font-bold text-slate-400 uppercase tracking-wide' }, 'Mesas'),
                            h('div', { className: 'text-xs text-slate-500' }, clientCount + ' ligadas')
                        ),
                        !sortedClients.length && h('div', { className: 'text-sm text-slate-600 text-center py-4' }, 'Nenhuma mesa ligada'),
                        sortedClients.map(function (client) {
                            var tNum = client.tableNumber;
                            var roleEntry = roles[tNum];
                            var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || null) : null;
                            var ls = lastSeen[tNum] || 0;
                            var since = ls ? (Date.now() - ls + tick * 0) : 999999;
                            since = ls ? (Date.now() - ls) : 999999;
                            var sc = scores[tNum] || 0;

                            return h('div', {
                                key: tNum,
                                className: 'rounded-2xl border border-slate-800 bg-slate-950/60 p-3 flex flex-col gap-1.5'
                            },
                                h('div', { className: 'flex items-start justify-between gap-2' },
                                    h('div', { className: 'flex items-center gap-2 min-w-0' },
                                        connDot(since),
                                        h('div', { className: 'min-w-0' },
                                            h('div', { className: 'font-bold text-sm truncate' },
                                                'Mesa ' + tNum + (client.teamName ? ' · ' + client.teamName : '')
                                            )
                                        )
                                    ),
                                    h('div', { className: 'flex items-center gap-1.5 flex-shrink-0' },
                                        sc > 0 && h('span', { className: 'text-xs font-bold text-amber-300' }, sc + 'pts'),
                                        rl && h('span', {
                                            className: 'rounded-full px-2 py-0.5 text-xs font-bold border ' + rl.bg + ' ' + rl.border + ' ' + rl.color
                                        }, rl.icon)
                                    )
                                ),
                                rl && h('div', { className: 'text-xs ' + rl.color + ' pl-4' }, rl.label),
                                /* cards: only for assassin */
                                String(tNum) === String(assassinTable) && roleEntry && h('div', { className: 'grid grid-cols-2 gap-1.5 mt-1' },
                                    h('div', { className: 'rounded-lg border border-blue-500/30 bg-blue-950/30 px-2 py-1.5 text-center' },
                                        h('div', { className: 'text-xs text-blue-400' }, '🔵'),
                                        h('div', { className: 'text-xs font-bold text-blue-200 truncate' },
                                            (roleEntry.secretInfo && roleEntry.secretInfo.blueCard) || client.blueCard || '—'
                                        )
                                    ),
                                    h('div', { className: 'rounded-lg border border-rose-500/30 bg-rose-950/30 px-2 py-1.5 text-center' },
                                        h('div', { className: 'text-xs text-rose-400' }, '🔴'),
                                        h('div', { className: 'text-xs font-bold text-rose-200 truncate' },
                                            (roleEntry.secretInfo && roleEntry.secretInfo.redCard) || client.redCard || '—'
                                        )
                                    )
                                ),
                                /* per-table accusation reset */
                                accusations[tNum] && h('div', { className: 'flex items-center justify-between mt-1 rounded-lg border border-rose-500/20 bg-rose-950/20 px-2 py-1' },
                                    h('span', { className: 'text-xs text-rose-300' }, '⚡ Acusação enviada'),
                                    h('button', {
                                        className: 'text-xs text-slate-400 hover:text-white underline',
                                        onClick: function () { resetOneAccusation(tNum); }
                                    }, 'Repor')
                                )
                            );
                        })
                    ),

                    /* ── RIGHT: game controls ── */
                    h('div', { className: 'p-5 flex flex-col gap-5 lg:max-h-[calc(100vh-56px)] lg:overflow-y-auto' },

                        /* WAITING phase */
                        phase === 'waiting' && h('div', { className: 'flex flex-col items-center justify-center flex-1 gap-6 py-12 fade-in' },
                            h('div', { className: 'text-center' },
                                h('div', { className: 'text-6xl mb-4' }, '🔪'),
                                h('div', { className: 'text-2xl font-black' }, 'Sessão pronta'),
                                h('div', { className: 'text-slate-400 text-sm mt-1' },
                                    clientCount > 0
                                        ? clientCount + ' mesa' + (clientCount !== 1 ? 's' : '') + ' ligada' + (clientCount !== 1 ? 's' : '') + '. Quando estiver pronto, inicia a primeira ronda.'
                                        : 'Aguarda que as mesas se liguem...'
                                )
                            ),
                            h('button', {
                                className: 'rounded-2xl bg-rose-600 px-8 py-4 text-xl font-black text-white hover:bg-rose-500 active:scale-95 transition-all shadow-lg shadow-rose-900/40',
                                onClick: function () { setShowNewRound(true); }
                            }, '▶ Nova Ronda')
                        ),

                        /* SETUP phase */
                        phase === 'setup' && h('div', { className: 'flex flex-col gap-5 fade-in' },
                            h('div', { className: 'rounded-2xl border border-amber-500/30 bg-amber-950/30 px-4 py-4' },
                                h('div', { className: 'font-bold text-amber-200 mb-1' }, '📋 Ronda ' + (gameData ? gameData.round : '—')),
                                h('div', { className: 'text-sm text-amber-200/80' }, 'As mesas estão a escolher as suas cartas. Quando todas tiverem guardado, distribui os papéis.')
                            ),
                            /* card status per table */
                            h('div', { className: 'flex flex-col gap-2' },
                                h('div', { className: 'text-sm font-semibold text-slate-400' }, 'Estado das cartas:'),
                                sortedClients.map(function (client) {
                                    var hasCards = !!(client.blueCard || client.redCard);
                                    return h('div', { key: client.tableNumber, className: 'flex items-center gap-3 rounded-xl border border-slate-800 bg-slate-900/60 px-3 py-2.5' },
                                        h('span', { className: hasCards ? 'text-emerald-400 text-lg' : 'text-slate-600 text-lg' }, hasCards ? '✓' : '○'),
                                        h('div', { className: 'flex-1 min-w-0' },
                                            h('div', { className: 'text-sm font-semibold truncate' }, 'Mesa ' + client.tableNumber + (client.teamName ? ' · ' + client.teamName : '')),
                                            hasCards && h('div', { className: 'text-xs text-slate-400 truncate' },
                                                '🔵 ' + (client.blueCard || '—') + '  🔴 ' + (client.redCard || '—')
                                            )
                                        )
                                    );
                                })
                            ),
                            h('button', {
                                className: 'rounded-2xl bg-indigo-600 px-6 py-4 text-lg font-black text-white hover:bg-indigo-500 active:scale-95 transition-all',
                                onClick: distributeRoles
                            }, '🎲 Distribuir Papéis')
                        ),

                        /* RUNNING phase */
                        phase === 'running' && h('div', { className: 'flex flex-col gap-5 fade-in' },

                            /* action row */
                            h('div', { className: 'flex flex-wrap gap-2' },
                                h('button', {
                                    className: 'rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold hover:bg-slate-700',
                                    onClick: resetAllAccusations
                                }, '↺ Resetar botões'),
                                h('button', {
                                    className: 'rounded-xl border border-orange-500/30 bg-orange-500/10 px-4 py-2.5 text-sm font-semibold text-orange-300 hover:bg-orange-500/20',
                                    onClick: confirmRoleVictory
                                }, '🏆 Vitória assassino+cúmplice (+' + victoryPtsNow + 'pts)'),
                                h('button', {
                                    className: 'rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-2.5 text-sm font-semibold text-emerald-300 hover:bg-emerald-500/20',
                                    onClick: function () { setShowNewRound(true); }
                                }, '▶ Nova ronda')
                            ),

                            /* accusations */
                            h('div', { className: 'flex flex-col gap-3' },
                                h('div', { className: 'text-sm font-semibold text-slate-400 uppercase tracking-wide' },
                                    'Acusações (' + accusationList.length + ')'
                                ),
                                !accusationList.length && h('div', { className: 'rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-5 text-sm text-slate-500 text-center' },
                                    'Nenhuma acusação recebida.'
                                ),
                                accusationList.map(function (acc) {
                                    var tNum = acc.tableNumber;
                                    var roleEntry = roles[tNum];
                                    var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || null) : null;
                                    var ts = acc.timestamp ? new Date(acc.timestamp).toLocaleTimeString('pt-PT') : '';
                                    return h('div', {
                                        key: tNum,
                                        className: 'rounded-2xl border border-rose-500/20 bg-rose-950/20 p-4 slide-in'
                                    },
                                        h('div', { className: 'flex items-start justify-between gap-2 mb-3' },
                                            h('div', {},
                                                h('div', { className: 'font-bold' }, 'Mesa ' + tNum + (acc.teamName ? ' · ' + acc.teamName : '')),
                                                rl && h('div', { className: 'text-xs mt-0.5 ' + rl.color }, rl.icon + ' ' + rl.label),
                                                ts && h('div', { className: 'text-xs text-slate-500 mt-0.5' }, ts)
                                            ),
                                            h('span', { className: 'text-rose-400 text-xl' }, '⚡')
                                        ),
                                        h('div', { className: 'flex flex-wrap gap-2' },
                                            h('button', {
                                                className: 'rounded-xl bg-emerald-600 px-4 py-2 text-sm font-bold text-white hover:bg-emerald-500',
                                                onClick: function () { markCorrect(tNum); }
                                            }, '✓ Correta (+' + accusePtsNow + ' pts)'),
                                            h('button', {
                                                className: 'rounded-xl border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-semibold hover:bg-slate-700',
                                                onClick: function () { resetOneAccusation(tNum); }
                                            }, '↺ Repor botão')
                                        )
                                    );
                                })
                            )
                        )
                    )
                ),

                /* ── modals ── */
                showNewRound && NewRoundModal(),
                showQR && QRModal(),
                showLeaderboard && LeaderboardModal(),
                showCloseConfirm && CloseConfirmModal()
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
