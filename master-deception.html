<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Deception Murder — Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/session-core.js"></script>
    <style>
        @keyframes slideIn { from{transform:translateY(-6px);opacity:0} to{transform:translateY(0);opacity:1} }
        .slide-in { animation: slideIn .18s ease-out; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, remove, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        const app = initializeApp(window.FirebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, set, remove, onValue, update, get };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    window.addEventListener('firebaseReady', function () {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;

        var GAME_TYPE = 'deception';
        var CLIENT_URL = window.AppConfig.CLIENT_DECEPTION_URL;

        /* ── role label map (for master display) ─────────────────── */
        var ROLE_LABELS = {
            assassino:   { label: 'Assassino',   icon: '🔪', color: 'text-rose-300',   bg: 'bg-rose-500/15',   border: 'border-rose-500/30'   },
            cumplice:    { label: 'Cúmplice',    icon: '🤝', color: 'text-orange-300', bg: 'bg-orange-500/15', border: 'border-orange-500/30' },
            testemunha:  { label: 'Testemunha',  icon: '👁️', color: 'text-yellow-300', bg: 'bg-yellow-500/15', border: 'border-yellow-500/30' },
            investigador:{ label: 'Investigador',icon: '🔍', color: 'text-blue-300',   bg: 'bg-blue-500/15',   border: 'border-blue-500/30'   },
            detetive:    { label: 'Detetive',    icon: '🕵️', color: 'text-purple-300', bg: 'bg-purple-500/15', border: 'border-purple-500/30' }
        };

        /* ── presence ─────────────────────────────────────────────── */
        function connDot(sinceMs) {
            if (sinceMs < 30000) return h('span', { className: 'inline-block w-2 h-2 rounded-full bg-emerald-400' });
            if (sinceMs < 60000) return h('span', { className: 'inline-block w-2 h-2 rounded-full bg-yellow-400' });
            return h('span', { className: 'inline-block w-2 h-2 rounded-full bg-slate-600' });
        }

        /* ── role distribution ────────────────────────────────────── */
        function buildRoles(clients, n) {
            var tableNums = Object.keys(clients)
                .filter(function (k) { return clients[k] && clients[k].tableNumber; })
                .map(Number).sort(function (a, b) { return a - b; });
            if (!tableNums.length) return null;

            /* shuffle */
            var shuffled = tableNums.slice().sort(function () { return Math.random() - 0.5; });

            /* role sequence: assassino always first, then cumplice, testemunha, rest investigators */
            var seq = ['assassino'];
            if (shuffled.length >= 3) seq.push('cumplice');
            if (shuffled.length >= 4) seq.push('testemunha');
            while (seq.length < shuffled.length) seq.push('investigador');

            var assassinTable = shuffled[0];
            var ac = clients[assassinTable] || {};
            var aBlue = ac.blueCard || '';
            var aRed  = ac.redCard  || '';
            var aName = ac.teamName || ('Mesa ' + assassinTable);

            var accompliceTable = seq.indexOf('cumplice') >= 0 ? shuffled[seq.indexOf('cumplice')] : null;
            var apName = accompliceTable && clients[accompliceTable]
                ? (clients[accompliceTable].teamName || 'Mesa ' + accompliceTable)
                : null;

            var roles = {};
            shuffled.forEach(function (tNum, i) {
                var role = seq[i];
                var si = {};
                if (role === 'assassino') {
                    si = { blueCard: aBlue, redCard: aRed };
                } else if (role === 'cumplice') {
                    si = { assassinTable: assassinTable, assassinTeamName: aName, blueCard: aBlue, redCard: aRed };
                } else if (role === 'testemunha') {
                    var inv = [aName, apName || ('Mesa ' + accompliceTable)];
                    if (Math.random() < 0.5) inv.reverse();
                    si = { involvedTables: inv };
                }
                roles[tNum] = { role: role, secretInfo: si };
            });

            return { roles: roles, assassinTable: assassinTable };
        }

        /* ── App ──────────────────────────────────────────────────── */
        function App() {
            /* config inputs */
            var c1 = useState('');   var codeInput = c1[0];         var setCodeInput = c1[1];
            var c2 = useState('4');  var tableCount = c2[0];        var setTableCount = c2[1];
            var c3 = useState('Acusar'); var buzzerName = c3[0];    var setBuzzerName = c3[1];
            var c4 = useState('5');  var accusePts = c4[0];         var setAccusePts = c4[1];
            var c5 = useState('5');  var victoryPts = c5[0];        var setVictoryPts = c5[1];

            /* session */
            var s1 = useState('');   var sessionCode = s1[0];       var setSessionCode = s1[1];
            var s2 = useState(null); var gameData = s2[0];          var setGameData = s2[1];
            var s3 = useState({});   var clients = s3[0];           var setClients = s3[1];
            var s4 = useState({});   var lastSeen = s4[0];          var setLastSeen = s4[1];
            var s5 = useState(0);    var tick = s5[0];              var setTick = s5[1];
            var s6 = useState(false); var codeCopied = s6[0];       var setCodeCopied = s6[1];

            /* presence tick */
            useEffect(function () {
                var iv = setInterval(function () { setTick(function (t) { return t + 1; }); }, 5000);
                return function () { clearInterval(iv); };
            }, []);

            /* restore code from URL */
            useEffect(function () {
                var p = new URLSearchParams(window.location.search);
                var u = p.get('session');
                if (u) setCodeInput(u.toUpperCase());
            }, []);

            /* Firebase listeners */
            useEffect(function () {
                if (!sessionCode) return;
                var u1 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), function (snap) {
                    var d = snap.val();
                    if (!d || d.active === false) { setGameData(null); return; }
                    setGameData(d);
                });
                var u2 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients'), function (snap) {
                    var raw = snap.val() || {};
                    var ls = {};
                    Object.keys(raw).forEach(function (k) {
                        if (raw[k] && raw[k].tableNumber) ls[raw[k].tableNumber] = raw[k].lastSeen || 0;
                    });
                    setLastSeen(ls);
                    setClients(raw);
                });
                return function () { u1(); u2(); };
            }, [sessionCode]);

            /* ── session actions ── */
            var createSession = async function () {
                var code = codeInput.trim().toUpperCase();
                if (!code) return;
                var gs = {
                    gameType: GAME_TYPE,
                    active: true,
                    phase: 'setup',
                    round: 1,
                    buzzerName: buzzerName.trim() || 'Acusar',
                    config: {
                        accusationPoints:  parseInt(accusePts)  || 5,
                        roleVictoryPoints: parseInt(victoryPts) || 5
                    },
                    roles: {}, assassinTable: null,
                    accusations: {}, scores: {},
                    timestamp: Date.now()
                };
                await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), gs);
                setSessionCode(code);
            };

            var distributeRoles = function () {
                if (!sessionCode || !gameData) return;
                var result = buildRoles(clients);
                if (!result) { alert('Não há mesas ligadas.'); return; }
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), {
                    phase: 'running',
                    roles: result.roles,
                    assassinTable: result.assassinTable,
                    accusations: {},
                    timestamp: Date.now()
                });
            };

            var newRound = function () {
                if (!sessionCode || !gameData) return;
                var nextRound = ((gameData.round) || 1) + 1;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), {
                    phase: 'setup',
                    round: nextRound,
                    roles: {}, assassinTable: null,
                    accusations: {},
                    timestamp: Date.now()
                });
            };

            var resetAllAccusations = function () {
                if (!sessionCode) return;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { accusations: {} });
            };

            var resetOneAccusation = function (tableNum) {
                if (!sessionCode) return;
                fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState/accusations/' + tableNum));
            };

            var markCorrect = function (tableNum) {
                if (!gameData) return;
                var pts = (gameData.config && gameData.config.accusationPoints) || parseInt(accusePts) || 5;
                var scores = Object.assign({}, gameData.scores || {});
                scores[tableNum] = (scores[tableNum] || 0) + pts;
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { scores: scores });
            };

            var confirmRoleVictory = function () {
                if (!gameData) return;
                var pts = (gameData.config && gameData.config.roleVictoryPoints) || parseInt(victoryPts) || 5;
                var roles = gameData.roles || {};
                var scores = Object.assign({}, gameData.scores || {});
                Object.keys(roles).forEach(function (tNum) {
                    var r = roles[tNum] && roles[tNum].role;
                    if (r === 'assassino' || r === 'cumplice') {
                        scores[tNum] = (scores[tNum] || 0) + pts;
                    }
                });
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { scores: scores });
            };

            var copyCode = function () {
                if (!sessionCode) return;
                var url = CLIENT_URL + '?session=' + sessionCode;
                navigator.clipboard.writeText(url).catch(function () {});
                setCodeCopied(true);
                setTimeout(function () { setCodeCopied(false); }, 2000);
            };

            /* ── derived ── */
            var phase = gameData ? (gameData.phase || 'setup') : null;
            var roles = gameData ? (gameData.roles || {}) : {};
            var accusations = gameData ? (gameData.accusations || {}) : {};
            var scores = gameData ? (gameData.scores || {}) : {};
            var assassinTable = gameData ? gameData.assassinTable : null;
            var now = Date.now();

            var sortedClients = Object.values(clients)
                .filter(function (c) { return c && c.tableNumber; })
                .sort(function (a, b) { return a.tableNumber - b.tableNumber; });

            var accusationList = Object.values(accusations)
                .sort(function (a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });

            /* ── RENDER ── */
            return h('div', { className: 'max-w-7xl mx-auto px-4 py-6' },

                /* title row */
                h('div', { className: 'flex flex-wrap items-center justify-between gap-3 mb-6' },
                    h('div', {},
                        h('h1', { className: 'text-3xl font-black' }, '🕵️ Deception Murder in Hong Kong'),
                        h('p', { className: 'text-slate-400 text-sm mt-0.5' }, 'Master · Distribui papéis, acompanha acusações e pontuação')
                    ),
                    h('a', { href: 'masters.html', className: 'rounded-xl border border-white/15 bg-white/10 px-4 py-2 text-sm font-semibold hover:bg-white/20' }, '← Voltar')
                ),

                h('div', { className: 'grid gap-6 lg:grid-cols-[340px_minmax(0,1fr)]' },

                    /* ── LEFT: config panel ── */
                    h('div', { className: 'flex flex-col gap-4' },

                        /* session setup */
                        h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('h2', { className: 'text-lg font-bold mb-4' }, 'Sessão'),
                            h('div', { className: 'flex flex-col gap-3' },
                                h('label', { className: 'flex flex-col gap-1 text-sm' },
                                    h('span', { className: 'font-semibold text-slate-300' }, 'Código da sessão'),
                                    h('input', {
                                        className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-amber-400 font-mono',
                                        placeholder: 'Ex: HK01',
                                        value: codeInput,
                                        onChange: function (e) { setCodeInput(e.target.value.toUpperCase()); }
                                    })
                                ),
                                h('label', { className: 'flex flex-col gap-1 text-sm' },
                                    h('span', { className: 'font-semibold text-slate-300' }, 'Número de mesas'),
                                    h('input', {
                                        className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-amber-400',
                                        type: 'number', min: '1', max: '12',
                                        value: tableCount,
                                        onChange: function (e) { setTableCount(e.target.value); }
                                    })
                                ),
                                h('div', { className: 'border-t border-slate-800 pt-3 mt-1 flex flex-col gap-3' },
                                    h('label', { className: 'flex flex-col gap-1 text-sm' },
                                        h('span', { className: 'font-semibold text-slate-300' }, 'Nome do botão de acusação'),
                                        h('input', {
                                            className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-amber-400',
                                            value: buzzerName,
                                            onChange: function (e) { setBuzzerName(e.target.value); }
                                        })
                                    ),
                                    h('label', { className: 'flex flex-col gap-1 text-sm' },
                                        h('span', { className: 'font-semibold text-slate-300' }, 'Pontos por acusação correta'),
                                        h('input', {
                                            className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-amber-400',
                                            type: 'number', min: '0',
                                            value: accusePts,
                                            onChange: function (e) { setAccusePts(e.target.value); }
                                        })
                                    ),
                                    h('label', { className: 'flex flex-col gap-1 text-sm' },
                                        h('span', { className: 'font-semibold text-slate-300' }, 'Pontos por vitória de papel (assassino/cúmplice)'),
                                        h('input', {
                                            className: 'rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-amber-400',
                                            type: 'number', min: '0',
                                            value: victoryPts,
                                            onChange: function (e) { setVictoryPts(e.target.value); }
                                        })
                                    )
                                ),
                                h('button', {
                                    className: 'mt-1 rounded-xl bg-amber-500 px-4 py-2.5 text-sm font-bold text-slate-950 hover:bg-amber-400',
                                    onClick: createSession
                                }, sessionCode ? 'Recriar sessão' : 'Criar sessão')
                            )
                        ),

                        /* actions (only when session active) */
                        gameData && h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20 flex flex-col gap-3' },
                            h('h2', { className: 'text-lg font-bold mb-1' }, 'Controlo'),
                            h('button', {
                                className: 'rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-indigo-500',
                                onClick: distributeRoles
                            }, '🎲 Distribuir papéis'),
                            h('button', {
                                className: 'rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold hover:bg-slate-700',
                                onClick: resetAllAccusations
                            }, '↺ Resetar todos os botões'),
                            h('button', {
                                className: 'rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-2.5 text-sm font-semibold text-emerald-300 hover:bg-emerald-500/20',
                                onClick: newRound
                            }, '▶ Nova ronda'),
                            h('hr', { className: 'border-slate-700' }),
                            h('button', {
                                className: 'rounded-xl border border-orange-500/30 bg-orange-500/10 px-4 py-2.5 text-sm font-semibold text-orange-300 hover:bg-orange-500/20',
                                onClick: confirmRoleVictory
                            }, '🏆 Confirmar vitória de assassino e cúmplice'),
                            h('p', { className: 'text-xs text-slate-500' },
                                'Usa este botão quando todos os botões de acusação foram usados e ninguém acertou — atribui ' + (victoryPts || '5') + ' pts a cada.'
                            )
                        ),

                        /* link copy */
                        sessionCode && h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('h2', { className: 'text-sm font-bold text-slate-400 mb-2' }, 'Link para jogadores'),
                            h('button', {
                                className: 'w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-mono text-slate-300 hover:bg-slate-700 text-left truncate',
                                onClick: copyCode,
                                title: 'Copiar link'
                            }, codeCopied ? '✓ Copiado!' : CLIENT_URL + '?session=' + sessionCode)
                        )
                    ),

                    /* ── RIGHT: game state ── */
                    h('div', { className: 'flex flex-col gap-6' },

                        /* session badge */
                        h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('div', { className: 'flex items-center justify-between gap-3 mb-3' },
                                h('h2', { className: 'text-lg font-bold' }, 'Estado da sessão'),
                                sessionCode
                                    ? h('span', { className: 'rounded-full border border-emerald-500/30 bg-emerald-500/10 px-3 py-1 text-sm font-bold text-emerald-300 font-mono' }, sessionCode + ' · ' + (phase === 'setup' ? 'Escolha de cartas' : phase === 'running' ? 'Em jogo' : '—'))
                                    : h('span', { className: 'rounded-full border border-slate-700 bg-slate-800 px-3 py-1 text-sm text-slate-400' }, 'Sem sessão')
                            ),
                            gameData && h('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-3 text-center' },
                                h('div', { className: 'rounded-xl bg-slate-950/70 border border-slate-800 p-3' },
                                    h('div', { className: 'text-xs text-slate-400 mb-1' }, 'Ronda'),
                                    h('div', { className: 'text-2xl font-black' }, gameData.round || 1)
                                ),
                                h('div', { className: 'rounded-xl bg-slate-950/70 border border-slate-800 p-3' },
                                    h('div', { className: 'text-xs text-slate-400 mb-1' }, 'Mesas'),
                                    h('div', { className: 'text-2xl font-black' }, sortedClients.length)
                                ),
                                h('div', { className: 'rounded-xl bg-slate-950/70 border border-slate-800 p-3' },
                                    h('div', { className: 'text-xs text-slate-400 mb-1' }, 'Papéis'),
                                    h('div', { className: 'text-2xl font-black' }, Object.keys(roles).length)
                                ),
                                h('div', { className: 'rounded-xl bg-slate-950/70 border border-slate-800 p-3' },
                                    h('div', { className: 'text-xs text-slate-400 mb-1' }, 'Acusações'),
                                    h('div', { className: 'text-2xl font-black' }, accusationList.length)
                                )
                            ),
                            !gameData && h('p', { className: 'text-sm text-slate-500' }, 'Cria uma sessão para começar.')
                        ),

                        /* tables list */
                        h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('div', { className: 'flex items-center justify-between gap-3 mb-4' },
                                h('h2', { className: 'text-lg font-bold' }, 'Mesas e papéis'),
                                h('span', { className: 'text-xs text-slate-500' }, 'Cartas visíveis apenas para o assassino')
                            ),
                            !sortedClients.length && h('p', { className: 'text-sm text-slate-500' }, 'Nenhuma mesa ligada.'),
                            h('div', { className: 'flex flex-col gap-3' },
                                sortedClients.map(function (client) {
                                    var tNum = client.tableNumber;
                                    var roleEntry = roles[tNum];
                                    var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || ROLE_LABELS.investigador) : null;
                                    var isAssassin = String(tNum) === String(assassinTable);
                                    var sc = scores[tNum] || 0;
                                    var ls = lastSeen[tNum] || 0;
                                    var since = ls ? (now - ls + tick * 0) : 999999;
                                    /* tick is read to force re-render; actual since computed at render */
                                    since = ls ? (Date.now() - ls) : 999999;

                                    return h('div', {
                                        key: tNum,
                                        className: 'rounded-2xl border border-slate-800 bg-slate-950/70 p-3 slide-in'
                                    },
                                        h('div', { className: 'flex items-start justify-between gap-2' },
                                            h('div', { className: 'flex items-center gap-2' },
                                                connDot(since),
                                                h('div', {},
                                                    h('div', { className: 'font-bold text-sm' }, 'Mesa ' + tNum),
                                                    h('div', { className: 'text-xs text-slate-400' }, client.teamName || '—')
                                                )
                                            ),
                                            h('div', { className: 'flex items-center gap-2' },
                                                sc > 0 && h('span', { className: 'text-xs font-bold text-amber-300' }, sc + ' pts'),
                                                rl
                                                    ? h('span', {
                                                        className: 'rounded-full px-2.5 py-1 text-xs font-bold border ' + rl.bg + ' ' + rl.border + ' ' + rl.color
                                                    }, rl.icon + ' ' + rl.label)
                                                    : h('span', { className: 'text-xs text-slate-600' }, '—')
                                            )
                                        ),
                                        /* cards: only show for assassin */
                                        isAssassin && roleEntry && h('div', { className: 'mt-2 grid grid-cols-2 gap-2' },
                                            h('div', { className: 'rounded-lg border border-blue-500/30 bg-blue-950/30 px-2 py-1.5 text-center' },
                                                h('div', { className: 'text-xs text-blue-400' }, '🔵 Azul'),
                                                h('div', { className: 'text-sm font-bold text-blue-200' }, (roleEntry.secretInfo && roleEntry.secretInfo.blueCard) || client.blueCard || '—')
                                            ),
                                            h('div', { className: 'rounded-lg border border-rose-500/30 bg-rose-950/30 px-2 py-1.5 text-center' },
                                                h('div', { className: 'text-xs text-rose-400' }, '🔴 Vermelha'),
                                                h('div', { className: 'text-sm font-bold text-rose-200' }, (roleEntry.secretInfo && roleEntry.secretInfo.redCard) || client.redCard || '—')
                                            )
                                        ),
                                        /* per-table accusation reset */
                                        accusations[tNum] && h('div', { className: 'mt-2 flex items-center justify-between gap-2 rounded-lg border border-slate-700 bg-slate-900 px-2 py-1.5' },
                                            h('span', { className: 'text-xs text-rose-300' }, '⚡ Acusação enviada'),
                                            h('button', {
                                                className: 'text-xs text-slate-400 hover:text-white underline',
                                                onClick: function () { resetOneAccusation(tNum); }
                                            }, 'Repor botão')
                                        )
                                    );
                                })
                            )
                        ),

                        /* accusations */
                        h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('div', { className: 'flex items-center justify-between gap-3 mb-4' },
                                h('h2', { className: 'text-lg font-bold' }, 'Acusações pendentes'),
                                accusationList.length > 0 && h('button', {
                                    className: 'text-xs text-slate-400 hover:text-white underline',
                                    onClick: resetAllAccusations
                                }, 'Resetar todas')
                            ),
                            !accusationList.length && h('p', { className: 'text-sm text-slate-500' }, 'Nenhuma acusação recebida.'),
                            h('div', { className: 'flex flex-col gap-3' },
                                accusationList.map(function (acc) {
                                    var tNum = acc.tableNumber;
                                    var roleEntry = roles[tNum];
                                    var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || null) : null;
                                    var ts = acc.timestamp ? new Date(acc.timestamp).toLocaleTimeString('pt-PT') : '';
                                    return h('div', {
                                        key: tNum,
                                        className: 'rounded-2xl border border-rose-500/20 bg-rose-950/20 p-4 slide-in'
                                    },
                                        h('div', { className: 'flex items-start justify-between gap-2 mb-3' },
                                            h('div', {},
                                                h('div', { className: 'font-bold' }, 'Mesa ' + tNum + (acc.teamName ? ' · ' + acc.teamName : '')),
                                                rl && h('div', { className: 'text-xs mt-0.5 ' + rl.color }, rl.icon + ' ' + rl.label),
                                                ts && h('div', { className: 'text-xs text-slate-500 mt-0.5' }, ts)
                                            ),
                                            h('span', { className: 'text-rose-400 text-lg' }, '⚡')
                                        ),
                                        h('div', { className: 'flex flex-wrap gap-2' },
                                            h('button', {
                                                className: 'rounded-xl bg-emerald-600 px-4 py-2 text-sm font-bold text-white hover:bg-emerald-500',
                                                onClick: function () { markCorrect(tNum); }
                                            }, '✓ Acusação correta (+' + ((gameData && gameData.config && gameData.config.accusationPoints) || accusePts) + ' pts)'),
                                            h('button', {
                                                className: 'rounded-xl border border-slate-700 bg-slate-800 px-4 py-2 text-sm font-semibold hover:bg-slate-700',
                                                onClick: function () { resetOneAccusation(tNum); }
                                            }, '↺ Repor botão')
                                        )
                                    );
                                })
                            )
                        ),

                        /* scoreboard */
                        Object.keys(scores).length > 0 && h('section', { className: 'rounded-3xl border border-slate-800 bg-slate-900/80 p-5 shadow-2xl shadow-black/20' },
                            h('h2', { className: 'text-lg font-bold mb-4' }, '🏆 Pontuação'),
                            h('div', { className: 'flex flex-col gap-2' },
                                Object.keys(scores)
                                    .map(Number)
                                    .sort(function (a, b) { return (scores[b] || 0) - (scores[a] || 0); })
                                    .map(function (tNum) {
                                        var client = clients[tNum] || {};
                                        var roleEntry = roles[tNum];
                                        var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || null) : null;
                                        return h('div', {
                                            key: tNum,
                                            className: 'flex items-center justify-between gap-3 rounded-xl border border-slate-800 bg-slate-950/60 px-4 py-2.5'
                                        },
                                            h('div', {},
                                                h('span', { className: 'font-semibold' }, 'Mesa ' + tNum + (client.teamName ? ' · ' + client.teamName : '')),
                                                rl && h('span', { className: 'ml-2 text-xs ' + rl.color }, rl.icon + ' ' + rl.label)
                                            ),
                                            h('span', { className: 'text-xl font-black text-amber-300' }, scores[tNum] + ' pts')
                                        );
                                    })
                            )
                        )
                    )
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
