<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Deception Murder — Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/session-core.js"></script>
    <!-- Bandeiras SVG via flag-icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <!-- i18n -->
    <script src="shared/i18n.js"></script>
    <script src="shared/i18n-pt.js"></script>
    <script src="shared/i18n-en.js"></script>
    <!-- Língua padrão do master: 'pt', isolada do score_lang dos clientes -->
    <script>
    (function() {
        var MASTER_LANG_KEY = 'score_lang_master';
        var savedLang;
        try { savedLang = localStorage.getItem(MASTER_LANG_KEY); } catch(e) {}
        var masterLang = savedLang || 'pt';
        var _origSetLang = I18n.setLang;
        I18n.setLang = function(lang) {
            _origSetLang(lang);
            try { localStorage.setItem(MASTER_LANG_KEY, lang); } catch(e) {}
        };
        I18n.setLang(masterLang);
    })();
    </script>
    <style>
        @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
        .slide-in { animation: slideIn .2s ease-out; }
        @keyframes accuseFlash {
            0%,100% { border-color:rgba(239,68,68,.5); background-color:rgba(127,29,29,.4); box-shadow:0 0 0 0 rgba(239,68,68,.4); }
            50%      { border-color:rgba(239,68,68,.9); background-color:rgba(185,28,28,.5); box-shadow:0 0 12px 4px rgba(239,68,68,.5); }
        }
        .accuse-flash { animation: accuseFlash .7s ease-in-out infinite; }
        .lang-flag { display: inline-block; width: 1.5rem; height: 1.5rem; flex-shrink: 0; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, remove, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        const app = initializeApp(window.FirebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, set, remove, onValue, update, get };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    window.addEventListener('firebaseReady', function () {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;

        var GAME_TYPE  = 'deception';
        var CLIENT_URL = (window.AppConfig && window.AppConfig.CLIENT_DECEPTION_URL)
            || (window.location.origin + window.location.pathname.replace('master-deception.html', 'client-deception.html'));
        var MASTER_MODE_KEY = 'decMasterMode';
        var ROLE_TEXTS_PATH = 'gameConfig/deception/roleTexts';

        /* ── siren ────────────────────────────────────────────────── */
        function playSiren() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.setValueAtTime(650, ctx.currentTime + 0.3);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.6);
                osc.frequency.setValueAtTime(650, ctx.currentTime + 0.9);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 1.2);
                osc.frequency.setValueAtTime(650, ctx.currentTime + 1.5);
                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                gain.gain.setValueAtTime(0.4, ctx.currentTime + 1.7);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 2.0);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 2.0);
                osc.onended = function () { try { ctx.close(); } catch (e) {} };
            } catch (e) {}
        }

        /* ── role defaults + localStorage ─────────────────────────── */
        var T = I18n.t;

        function buildRoleLabels() {
            return {
                assassino:   { label: T('dec_role_assassino'),    icon: '🔪', color: 'text-rose-300',   bg: 'bg-rose-500/15',   border: 'border-rose-500/30'   },
                cumplice:    { label: T('dec_role_cumplice'),     icon: '🤝', color: 'text-orange-300', bg: 'bg-orange-500/15', border: 'border-orange-500/30' },
                testemunha:  { label: T('dec_role_testemunha'),   icon: '👁️', color: 'text-yellow-300', bg: 'bg-yellow-500/15', border: 'border-yellow-500/30' },
                investigador:{ label: T('dec_role_investigador'), icon: '🔍', color: 'text-blue-300',   bg: 'bg-blue-500/15',   border: 'border-blue-500/30'   }
            };
        }

        function buildDefaultRoleTexts() {
            return {
                assassino:    T('dec_role_text_assassino'),
                cumplice:     T('dec_role_text_cumplice'),
                testemunha:   T('dec_role_text_testemunha'),
                investigador: T('dec_role_text_investigador')
            };
        }

        function loadRoleTexts() {
            var defaults = buildDefaultRoleTexts();
            try {
                var s = localStorage.getItem('dec_roleTexts');
                if (s) return Object.assign({}, defaults, JSON.parse(s));
            } catch (e) {}
            return defaults;
        }

        function persistRoleTexts(t) {
            try { localStorage.setItem('dec_roleTexts', JSON.stringify(t)); } catch (e) {}
        }

        /* ── role distribution ────────────────────────────────────── */
        function buildRoles(clients, useComplexRoles) {
            var tableNums = Object.values(clients)
                .filter(function (c) { return c && c.tableNumber; })
                .map(function (c) { return c.tableNumber; })
                .sort(function (a, b) { return a - b; });
            if (!tableNums.length) return null;

            var shuffled = tableNums.slice().sort(function () { return Math.random() - 0.5; });

            var seq = ['assassino'];
            if (useComplexRoles && shuffled.length >= 3) seq.push('cumplice');
            if (useComplexRoles && shuffled.length >= 4) seq.push('testemunha');
            while (seq.length < shuffled.length) seq.push('investigador');

            var aTable = shuffled[0];
            var ac     = clients[aTable] || {};
            var aBlue  = ac.blueCard || '';
            var aRed   = ac.redCard  || '';
            var aName  = ac.teamName || ('Mesa ' + aTable);

            var apIdx   = seq.indexOf('cumplice');
            var apTable = apIdx >= 0 ? shuffled[apIdx] : null;
            var apName  = apTable && clients[apTable]
                ? (clients[apTable].teamName || 'Mesa ' + apTable) : null;

            var roles = {};
            shuffled.forEach(function (tNum, i) {
                var role = seq[i], si = {};
                if (role === 'assassino') {
                    si = { blueCard: aBlue, redCard: aRed };
                    if (apTable) { si.cumpliceTable = apTable; si.cumpliceTeamName = apName || ('Mesa ' + apTable); }
                } else if (role === 'cumplice') si = { assassinTable: aTable, assassinTeamName: aName, blueCard: aBlue, redCard: aRed };
                else if (role === 'testemunha') {
                    var inv = [aName, apName || ('Mesa ' + apTable)];
                    if (Math.random() < 0.5) inv.reverse();
                    si = { involvedTables: inv };
                }
                roles[tNum] = { role: role, secretInfo: si };
            });
            return { roles: roles, assassinTable: aTable };
        }

        /* ── presence dot ─────────────────────────────────────────── */
        function connDot(ms) {
            if (ms < 30000) return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-emerald-400 flex-shrink-0' });
            if (ms < 60000) return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-yellow-400 flex-shrink-0' });
            return h('span', { className: 'inline-block w-2.5 h-2.5 rounded-full bg-slate-600 flex-shrink-0' });
        }

        /* ── App ─────────────────────────────────────────────────── */
        function App() {
            /* setup inputs */
            var ci = useState('');           var codeInput = ci[0];    var setCodeInput = ci[1];
            var bn = useState(T('dec_buzzer_default')); var buzzerName = bn[0]; var setBuzzerName = bn[1];
            var ap = useState('5');          var accusePts = ap[0];    var setAccusePts = ap[1];
            var vp = useState('5');          var victoryPts = vp[0];        var setVictoryPts = vp[1];
            var pp = useState('2');          var participationPts = pp[0];  var setParticipationPts = pp[1];
            var rt = useState(loadRoleTexts); var roleTexts = rt[0];        var setRoleTexts = rt[1];

            /* i18n: estado de língua para forçar re-render quando a língua muda */
            var lg1 = useState(I18n.getCurrentLang()); var lang = lg1[0]; var setLang = lg1[1];
            var lg2 = useState(false); var showLangDrop = lg2[0]; var setShowLangDrop = lg2[1];
            useEffect(function () {
                var handler = function (e) { setLang(e.detail.lang); };
                window.addEventListener('i18n:change', handler);
                return function () { window.removeEventListener('i18n:change', handler); };
            }, []);
            var ROLE_LABELS = buildRoleLabels();

            /* session — lazy init trata ?mode=public&session=CODE diretamente */
            var sc = useState(function() {
                var params = new URLSearchParams(window.location.search);
                var urlMode = params.get('mode');
                var urlSession = params.get('session');
                if (urlMode === 'public' && urlSession) return urlSession.toUpperCase();
                return '';
            });
            var sessionCode = sc[0]; var setSessionCode = sc[1];
            var gd = useState(null); var gameData = gd[0];    var setGameData = gd[1];
            var cl = useState({});   var clients = cl[0];     var setClients = cl[1];
            var ls = useState({});   var lastSeen = ls[0];    var setLastSeen = ls[1];
            var tk = useState(0);    var tick = tk[0];        var setTick = tk[1];

            /* sessions list (setup screen) */
            var as = useState([]); var activeSessions = as[0]; var setActiveSessions = as[1];
            var sh = useState([]); var sessionHistory = sh[0]; var setSessionHistory = sh[1];

            /* UI */
            var u1 = useState(false); var showQR = u1[0];           var setShowQR = u1[1];
            var u2 = useState(false); var showLeaderboard = u2[0];  var setShowLeaderboard = u2[1];
            var u3 = useState(false); var showNewRound = u3[0];     var setShowNewRound = u3[1];
            var u4 = useState(false); var showCloseConfirm = u4[0]; var setShowCloseConfirm = u4[1];
            var u5 = useState(false); var showExistDialog = u5[0];  var setShowExistDialog = u5[1];
            var u6 = useState(null);  var existingData = u6[0];     var setExistingData = u6[1];
            var u7 = useState(false); var showHistory = u7[0];      var setShowHistory = u7[1];
            var u8 = useState(false); var showRoleConfig = u8[0];   var setShowRoleConfig = u8[1];
            var u9 = useState(false); var codeCopied = u9[0];       var setCodeCopied = u9[1];
            var ua = useState(false); var useRoles = ua[0];         var setUseRoles = ua[1];
            var ub = useState({});    var flashingTables = ub[0];   var setFlashingTables = ub[1];
            var uc = useState(false); var closing = uc[0];          var setClosing = uc[1];
            var hid = useState(null); var histInfoId = hid[0];     var setHistInfoId = hid[1];

            /* master mode — lazy init lê URL e sessionStorage no primeiro render */
            var mm  = useState(function() {
                var params = new URLSearchParams(window.location.search);
                var urlMode = params.get('mode');
                if (urlMode === 'public' || urlMode === 'console') return urlMode;
                var saved; try { saved = sessionStorage.getItem(MASTER_MODE_KEY); } catch(e) {}
                return (saved === 'console' || saved === 'public') ? saved : null;
            });
            var masterMode = mm[0]; var setMasterMode = mm[1];

            var mc2 = useState(function() {
                var params = new URLSearchParams(window.location.search);
                var urlMode = params.get('mode');
                if (urlMode === 'public' || urlMode === 'console') return true;
                var saved; try { saved = sessionStorage.getItem(MASTER_MODE_KEY); } catch(e) {}
                return saved === 'console' || saved === 'public';
            });
            var modeChosen = mc2[0]; var setModeChosen = mc2[1];
            /* projector state (read-only) */
            var pb1 = useState(null);  var publicState   = pb1[0];   var setPublicState   = pb1[1];
            var pb2 = useState({});    var publicClients = pb2[0];   var setPublicClients = pb2[1];

            var prevClientCountRef    = useRef(0);
            var prevAccusationsRef    = useRef({});
            var autoEndedRef          = useRef(false);
            var publicSyncTimerRef    = useRef(null);

            /* presence tick */
            useEffect(function () {
                var iv = setInterval(function () { setTick(function (t) { return t + 1; }); }, 5000);
                return function () { clearInterval(iv); };
            }, []);

            /* URL restore — só preenche o campo de código da consola se tiver ?session= sem ?mode=public */
            useEffect(function () {
                var params = new URLSearchParams(window.location.search);
                var urlSession = params.get('session');
                var urlMode = params.get('mode');
                if (urlSession && !(urlMode === 'public' && urlSession)) {
                    setCodeInput(urlSession.toUpperCase());
                }
                /* migração: limpar localStorage antigo se existir */
                try { localStorage.removeItem(MASTER_MODE_KEY); } catch(e) {}
            }, []);

            /* textos dos papéis: o valor partilhado no Firebase (gameConfig/deception/roleTexts)
               é a fonte de verdade entre masters/dispositivos — sobrepõe a cópia local se existir */
            useEffect(function () {
                fm.get(fm.ref(rtdb, ROLE_TEXTS_PATH)).then(function (snap) {
                    var shared = snap.val();
                    if (shared) {
                        var merged = Object.assign({}, buildDefaultRoleTexts(), shared);
                        setRoleTexts(merged);
                        persistRoleTexts(merged);
                    }
                }).catch(function () {});
            }, []);

            var switchMode = function () {
                setMasterMode(null); setModeChosen(false);
                try { sessionStorage.removeItem(MASTER_MODE_KEY); } catch(e) {}
            };
            var chooseMode = function (mode) {
                setMasterMode(mode); setModeChosen(true);
                try { sessionStorage.setItem(MASTER_MODE_KEY, mode); } catch(e) {}
            };

            /* subscribe active sessions (setup only) */
            useEffect(function () {
                if (sessionCode) return;
                return SessionCore.subscribeActiveSessions({
                    rtdb: rtdb, fm: fm, gameType: GAME_TYPE, onChange: setActiveSessions
                });
            }, [sessionCode]);

            /* subscribe session history */
            useEffect(function () {
                if (!showHistory) return;
                return SessionCore.subscribeSessionHistory({
                    rtdb: rtdb, fm: fm, gameType: GAME_TYPE, onChange: setSessionHistory
                });
            }, [showHistory]);

            /* Firebase listeners (game — consola only) */
            useEffect(function () {
                if (!sessionCode || masterMode === 'public') return;
                var u1 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), function (snap) {
                    var d = snap.val();
                    if (!d || d.active === false) { setGameData(null); setSessionCode(''); return; }
                    setGameData(d);
                });
                var u2 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients'), function (snap) {
                    var raw = snap.val() || {};
                    var lsMap = {};
                    Object.keys(raw).forEach(function (k) {
                        if (raw[k] && raw[k].tableNumber) lsMap[raw[k].tableNumber] = raw[k].lastSeen || 0;
                    });
                    setLastSeen(lsMap);
                    setClients(raw);
                });
                return function () { u1(); u2(); };
            }, [sessionCode, masterMode]);

            /* publicState sync (consola → Firebase, debounced) */
            useEffect(function () {
                if (!sessionCode || masterMode !== 'console' || !gameData) return;
                if (publicSyncTimerRef.current) clearTimeout(publicSyncTimerRef.current);
                publicSyncTimerRef.current = setTimeout(function () {
                    fm.set(fm.ref(rtdb, 'sessions/' + sessionCode + '/publicState'), {
                        phase: gameData.phase || 'waiting',
                        round: gameData.round || 0,
                        scores: gameData.scores || {},
                        roundResult: gameData.roundResult || null,
                        timestamp: Date.now()
                    }).catch(function(e) { console.error('Sync publicState:', e); });
                }, 200);
                return function () { clearTimeout(publicSyncTimerRef.current); };
            }, [sessionCode, masterMode, gameData]);

            /* publicState + clients subscription (projeção) */
            useEffect(function () {
                if (!sessionCode || masterMode !== 'public') return;
                var u1 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/publicState'), function (snap) {
                    setPublicState(snap.val() || null);
                });
                var u2 = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients'), function (snap) {
                    setPublicClients(snap.val() || {});
                });
                return function () { u1(); u2(); setPublicState(null); setPublicClients({}); };
            }, [sessionCode, masterMode]);

            /* auto-manage useRoles toggle */
            useEffect(function () {
                var n = Object.values(clients).filter(function (c) { return c && c.tableNumber; }).length;
                var prev = prevClientCountRef.current;
                prevClientCountRef.current = n;
                if (n <= 4) setUseRoles(false);
                else if (prev <= 4) setUseRoles(true);
            }, [clients]);

            /* siren + flash on new accusations */
            var accusations     = gameData ? (gameData.accusations || {}) : {};
            var accusationsKey  = Object.keys(accusations).sort().join(',');
            useEffect(function () {
                var prev = prevAccusationsRef.current;
                var newKeys = Object.keys(accusations).filter(function (k) { return !prev[k]; });
                if (newKeys.length > 0) {
                    playSiren();
                    setFlashingTables(function (ft) {
                        var n = Object.assign({}, ft);
                        newKeys.forEach(function (k) { n[k] = true; });
                        return n;
                    });
                    setTimeout(function () {
                        setFlashingTables(function (ft) {
                            var n = Object.assign({}, ft);
                            newKeys.forEach(function (k) { delete n[k]; });
                            return n;
                        });
                    }, 6000);
                }
                prevAccusationsRef.current = accusations;
            }, [accusationsKey]);

            /* reset autoEndedRef when new round starts (phase → running) */
            var phase = gameData ? (gameData.phase || 'waiting') : 'waiting';
            useEffect(function () {
                if (phase === 'running') autoEndedRef.current = false;
            }, [phase]);

            /* ── derived ─────────────────────────────────────────── */
            var roles             = gameData ? (gameData.roles || {}) : {};
            var scores            = gameData ? (gameData.scores || {}) : {};
            var assassinTable     = gameData ? gameData.assassinTable : null;
            var confirmedCorrect  = gameData ? !!gameData.confirmedCorrect : false;
            var roundResult       = gameData ? (gameData.roundResult || null) : null;
            var usedAccusations   = gameData ? (gameData.usedAccusations || {}) : {};
            var accusePtsNow        = (gameData && gameData.config && gameData.config.accusationPoints)    || parseInt(accusePts)        || 5;
            var victoryPtsNow       = (gameData && gameData.config && gameData.config.roleVictoryPoints)   || parseInt(victoryPts)       || 5;
            var participationPtsNow = (gameData && gameData.config && gameData.config.participationPoints) || parseInt(participationPts) || 2;
            var witnessHunt         = gameData ? (gameData.witnessHunt || null) : null;

            var sortedClients = Object.values(clients)
                .filter(function (c) { return c && c.tableNumber; })
                .sort(function (a, b) { return a.tableNumber - b.tableNumber; });

            var accusationList = Object.values(accusations)
                .sort(function (a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });

            var clientCount          = sortedClients.length;
            var accusationCount      = accusationList.length;
            var usedAccusationCount  = Object.keys(usedAccusations).length;

            /* auto-end: all tables used accusation, master answered all as wrong, nobody correct */
            useEffect(function () {
                if (phase !== 'running' || !clientCount || !gameData) return;
                if (confirmedCorrect || autoEndedRef.current) return;
                if (usedAccusationCount >= clientCount && accusationCount === 0 && !witnessHunt) {
                    autoEndedRef.current = true;
                    doEndRound(null);
                }
            }, [usedAccusationCount, accusationCount, clientCount, phase, confirmedCorrect]);

            /* ── actions ─────────────────────────────────────────── */
            function doEndRound(winnerTable, escaped) {
                if (!sessionCode || !gameData) return;
                var s = Object.assign({}, gameData.scores || {});
                var result;

                /* assassin info — always included so clients can see the reveal */
                var aTable  = assassinTable;
                var aRole   = aTable ? roles[aTable] : null;
                var aCards  = aRole && aRole.secretInfo ? { blue: aRole.secretInfo.blueCard, red: aRole.secretInfo.redCard } : null;
                var aClient = aTable ? (clients[aTable] || {}) : {};
                var aName   = aClient.teamName || (aTable ? 'Mesa ' + aTable : '—');

                if (winnerTable !== null) {
                    s[winnerTable] = (s[winnerTable] || 0) + accusePtsNow;
                    /* participation points for investigators who did not accuse */
                    if (participationPtsNow > 0) {
                        Object.keys(roles).forEach(function (tNum) {
                            var r = roles[tNum] && roles[tNum].role;
                            if (r === 'investigador' && String(tNum) !== String(winnerTable)) {
                                s[tNum] = (s[tNum] || 0) + participationPtsNow;
                            }
                        });
                    }
                    var wc = clients[winnerTable] || {};
                    result = { winner: 'accusers', winnerTable: winnerTable, winnerTeam: wc.teamName || ('Mesa ' + winnerTable),
                               assassinTable: aTable, assassinTeamName: aName, assassinCards: aCards };
                } else {
                    Object.keys(roles).forEach(function (tNum) {
                        var r = roles[tNum] && roles[tNum].role;
                        if (r === 'assassino' || r === 'cumplice') s[tNum] = (s[tNum] || 0) + victoryPtsNow;
                    });
                    result = { winner: 'killers', assassinTable: aTable, assassinTeamName: aName, assassinCards: aCards, escaped: !!escaped };
                }
                fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), {
                    phase: 'waiting', scores: s,
                    confirmedCorrect: winnerTable !== null,
                    roundResult: result,
                    witnessHunt: null,
                    timestamp: Date.now()
                });
            }

            var checkAndCreate = async function () {
                var code = codeInput.trim().toUpperCase();
                if (!code) return;
                var existing = activeSessions.find(function (s) { return s.sessionId === code; });
                if (existing) { setExistingData({ code: code, session: existing }); setShowExistDialog(true); return; }
                await doCreateSession(code);
            };

            var doCreateSession = async function (code) {
                var gs = {
                    gameType: GAME_TYPE, active: true, phase: 'waiting', round: 0,
                    buzzerName: buzzerName.trim() || T('dec_buzzer_default'),
                    config: { accusationPoints: parseInt(accusePts) || 5, roleVictoryPoints: parseInt(victoryPts) || 5, participationPoints: parseInt(participationPts) || 2 },
                    roleTexts: roleTexts,
                    roles: {}, assassinTable: null, accusations: {}, usedAccusations: {}, scores: {},
                    confirmedCorrect: false, roundResult: null, witnessHunt: null, timestamp: Date.now()
                };
                await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), gs);
                setSessionCode(code); setShowExistDialog(false);
            };

            var archiveAndCreate = async function () {
                if (!existingData) return;
                var code = existingData.code;
                var history = { round: existingData.session.round || 0, scores: existingData.session.scores || {} };
                var res = await SessionCore.archiveSession({ rtdb, fm, sessionId: code, gameType: GAME_TYPE, history: history, enrich: SessionCore.enrichers.attachClientsField });

                                h('div', { className: 'text-slate-400 text-sm mt-1' }, T('m_dec_tables_connected_n', { n: clientCount, s: clientCount !== 1 ? 's' : '' }))
                            ),
                            h('button', { className: 'rounded-2xl bg-rose-600 px-8 py-4 text-xl font-black text-white hover:bg-rose-500 active:scale-95 transition-all shadow-lg shadow-rose-900/40', onClick: function () { setShowNewRound(true); } }, T('m_dec_new_round_btn'))
                        ),

                        /* SETUP */
                        phase === 'setup' && h('div', { className: 'flex flex-col gap-4' },
                            h('div', { className: 'rounded-2xl border border-amber-500/30 bg-amber-950/30 px-4 py-4' },
                                h('div', { className: 'font-bold text-amber-200 mb-1' }, T('m_dec_setup_round_n', { n: gameData ? gameData.round : '—' })),
                                h('div', { className: 'text-sm text-amber-200/80' }, T('m_dec_setup_hint'))
                            ),
                            h('div', { className: 'text-sm text-slate-400' },
                                T('m_dec_cards_progress', { n: sortedClients.filter(function (c) { return c.blueCard || c.redCard; }).length, total: clientCount })
                            ),
                            h('button', { className: 'rounded-2xl bg-indigo-600 px-6 py-4 text-lg font-black text-white hover:bg-indigo-500 active:scale-95 transition-all', onClick: distributeRoles }, T('m_dec_distribute_roles'))
                        ),

                        /* RUNNING */
                        phase === 'running' && h('div', { className: 'flex flex-col gap-4' },
                            h('div', { className: 'flex flex-wrap gap-2' },
                                h('button', { className: 'rounded-xl border border-slate-700 bg-slate-800 px-4 py-2.5 text-sm font-semibold hover:bg-slate-700', onClick: resetAllAccusations }, T('m_dec_reset_buttons')),
                                h('button', { className: 'rounded-xl border border-rose-500/30 bg-rose-500/10 px-4 py-2.5 text-sm font-semibold text-rose-300 hover:bg-rose-500/20', onClick: endRoundManual }, T('m_dec_end_round')),
                                h('button', { className: 'rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-2.5 text-sm font-semibold text-emerald-300 hover:bg-emerald-500/20', onClick: function () { setShowNewRound(true); } }, T('m_dec_new_round_short'))
                            ),
                            /* witness hunt sub-phase */
                            witnessHunt && h('div', { className: 'rounded-2xl border border-orange-500/40 bg-orange-950/25 p-4 slide-in flex flex-col gap-3' },
                                h('div', { className: 'font-black text-orange-200 text-lg' }, T('m_dec_witness_hunt_title')),
                                h('div', { className: 'text-sm text-slate-300' }, T('m_dec_witness_hunt_desc', { team: witnessHunt.pendingWinnerTeam })),
                                h('div', { className: 'text-xs text-orange-200/70' }, T('m_dec_witness_hunt_hint')),
                                h('div', { className: 'flex flex-col gap-2 mt-1' },
                                    h('button', { className: 'rounded-xl bg-rose-700 px-4 py-3 text-sm font-bold text-white hover:bg-rose-600 active:scale-95 transition-all', onClick: function () { doEndRound(null, true); } }, T('m_dec_witness_correct', { n: victoryPtsNow })),
                                    h('button', { className: 'rounded-xl bg-emerald-700 px-4 py-3 text-sm font-bold text-white hover:bg-emerald-600 active:scale-95 transition-all', onClick: function () { doEndRound(witnessHunt.pendingWinnerTable); } }, T('m_dec_witness_wrong', { team: witnessHunt.pendingWinnerTeam, n: accusePtsNow }))
                                )
                            ),
                            h('div', { className: 'text-xs font-bold text-slate-500 uppercase tracking-wide' },
                                T('m_dec_pending_accusations', { n: accusationList.length })
                            ),
                            !accusationList.length && h('div', { className: 'rounded-2xl border border-slate-800 bg-slate-900/50 px-4 py-6 text-sm text-slate-500 text-center' },
                                usedAccusationCount > 0
                                    ? T('m_dec_answered_wrong_n', { n: usedAccusationCount, ao: usedAccusationCount > 1 ? 'ões' : 'ão', s: usedAccusationCount > 1 ? 's' : '' })
                                    : T('m_dec_no_accusations')
                            ),
                            h('div', { className: 'flex flex-col gap-3' },
                                accusationList.map(function (acc, idx) {
                                    var tNum = acc.tableNumber;
                                    var roleEntry = roles[tNum];
                                    var rl = roleEntry ? (ROLE_LABELS[roleEntry.role] || null) : null;
                                    var ts = acc.timestamp ? new Date(acc.timestamp).toLocaleTimeString(I18n.getCurrentLang() === 'en' ? 'en-GB' : 'pt-PT') : '';
                                    var blocked = !!witnessHunt;
                                    return h('div', { key: tNum, className: 'rounded-2xl border border-rose-500/40 bg-rose-950/25 p-4 slide-in' + (blocked ? ' opacity-50' : '') },
                                        h('div', { className: 'flex items-start justify-between gap-2 mb-1' },
                                            h('div', {},
                                                h('div', { className: 'font-bold' }, idx + 1 + 'º · ' + T('table_n', { n: tNum }) + (acc.teamName ? ' · ' + acc.teamName : '')),
                                                rl && h('div', { className: 'text-xs mt-0.5 ' + rl.color }, rl.icon + ' ' + rl.label),
                                                ts && h('div', { className: 'text-xs text-slate-500 mt-0.5' }, ts)
                                            ),
                                            h('span', { className: 'text-rose-400 text-xl' }, '⚡')
                                        ),
                                        h('div', { className: 'text-xs text-amber-400 mb-3' }, blocked ? T('m_dec_resolve_witness_first') : T('m_dec_respond_hint')),
                                        h('div', { className: 'flex flex-wrap gap-2' },
                                            h('button', { className: 'rounded-xl bg-emerald-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-emerald-500 disabled:opacity-40 disabled:cursor-not-allowed', disabled: blocked, onClick: function () { markCorrect(tNum); } }, T('m_dec_mark_correct', { n: accusePtsNow })),
                                            h('button', { className: 'rounded-xl bg-slate-700 px-4 py-2.5 text-sm font-bold text-white hover:bg-slate-600 disabled:opacity-40 disabled:cursor-not-allowed', disabled: blocked, onClick: function () { markWrong(tNum); } }, T('m_dec_mark_wrong'))
                                        )
                                    );
                                })
                            )
                        )
                    )
                ),

                /* modals */
                showNewRound && NewRoundModal(),
                showQR && QRModal(),
                showLeaderboard && LeaderboardModal(),
                showCloseConfirm && CloseModal(),
                showExistDialog && ExistDialog(),
                showHistory && HistoryModal()
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
