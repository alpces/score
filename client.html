<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>App Cliente - Visualização de Mesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/client-core.js"></script>
    <style>
        input, textarea { font-size: 16px !important; }
        html, body { height: 100dvh; min-height: 100dvh; margin: 0; padding: 0; padding-bottom: env(safe-area-inset-bottom); }
        #root { min-height: 100dvh; }
        .min-h-screen { min-height: 100dvh !important; }
        .h-screen { height: 100dvh !important; }
    </style>

    <!-- Sistema de Módulos de Jogos (para futura expansão) -->
    <script src="games/game-interface.js"></script>
    <script src="games/game-system.js"></script>
    <script src="games/generic.js"></script>
    <script src="games/diamant.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, set, update, get, remove, goOffline, goOnline } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = window.FirebaseConfig;

        const app = initializeApp(firebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, onValue, set, update, get, remove, goOffline, goOnline };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        const playBuzzer = () => {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 0.3);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 0.6);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 0.9);
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime + 1.2);
            oscillator.frequency.setValueAtTime(650, audioContext.currentTime + 1.5);
            
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.4, audioContext.currentTime + 1.8);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);
        };

        window.addEventListener('firebaseReady', () => {
            const { useState, useEffect, useRef, createElement: h } = React;
            const { rtdb, fbModules } = window;
            const { ref, onValue, set, update, get, remove } = fbModules;
            const fm = fbModules;

            const localStore = ClientCore.createLocalStore('score');
            const clearLocal = localStore.clear;
            const CLIENT_ID = ClientCore.getClientId('score_clientId');
            const HEARTBEAT_MS = 15000;

            // Esta app não tem i18n (PT-only) — traduzir as chaves de erro do ClientCore.joinSession
            const JOIN_ERRORS = {
                err_code_table_required: 'Código e número de mesa são obrigatórios',
                err_team_required: 'O nome da equipa é obrigatório',
                err_session_not_found: 'Sessão "{{code}}" não encontrada.',
                err_session_inactive: 'Sessão "{{code}}" já não está ativa.',
                err_wrong_game: 'Esta sessão pertence a outro jogo. Usa a aplicação correta.',
                err_tables_locked: 'Novas entradas estão bloqueadas pelo anfitrião.',
                err_table_taken: 'A Mesa {{n}} já está conectada noutro dispositivo! Escolhe outro número.',
                err_table_connected: 'A Mesa {{n}} já está conectada! Escolhe outro número.'
            };

            const translateJoinError = (key, vars) => {
                const tpl = JOIN_ERRORS[key];
                if (!tpl) return key;
                if (!vars) return tpl;
                return tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] !== undefined ? String(vars[k]) : `{{${k}}}`);
            };

            function App() {
                const [registered, setRegistered] = useState(false);
                const [sessionCode, setSessionCode] = useState('');
                const [tableNumber, setTableNumber] = useState('');
                const [teamName, setTeamName] = useState('');
                const [emails, setEmails] = useState(['']);
                const [error, setError] = useState('');
                const [connecting, setConnecting] = useState(false);
                const [autoReconnecting, setAutoReconnecting] = useState(false);
                const [sessionLost, setSessionLost] = useState(false);
                const [fbConnected, setFbConnected] = useState(true);
                const [resubKey, setResubKey] = useState(0);

                const [gameData, setGameData] = useState(null);
                const [myTable, setMyTable] = useState(null);
                const [buzzerState, setBuzzerState] = useState({ pressed: false, enabled: true });

                const [textInput, setTextInput] = useState('');
                const [textJustSubmitted, setTextJustSubmitted] = useState(false);
                const [isSubmitting, setIsSubmitting] = useState(false);
                const [lastSubmitted, setLastSubmitted] = useState('');
                const [submitError, setSubmitError] = useState('');
                const [clientNowTick, setClientNowTick] = useState(Date.now());

                const prevTextActiveRef = useRef(false);

                // Carregar sessão do URL ou localStorage
                useEffect(() => {
                    const saved = localStore.load();
                    if (saved) {
                        setSessionCode(saved.session);
                        setTableNumber(saved.table);
                        if (saved.team) setTeamName(saved.team);
                        const emailsArr = saved.emails ? saved.emails.split(',').filter(e => e.trim()) : [];
                        setEmails(emailsArr.length ? emailsArr : ['']);
                        setAutoReconnecting(true);
                        return;
                    }

                    const urlParams = new URLSearchParams(window.location.search);
                    const sessionFromUrl = urlParams.get('session');
                    if (sessionFromUrl) {
                        setSessionCode(sessionFromUrl.toUpperCase());
                    }
                }, []);

                // Auto-reconectar quando dados são carregados do localStorage
                useEffect(() => {
                    if (autoReconnecting && sessionCode && tableNumber) {
                        handleConnect(true);
                    }
                }, [autoReconnecting, sessionCode, tableNumber]);

                // Ligação em tempo real (heartbeat, presença, .info/connected, retomar ao voltar ao primeiro plano)
                useEffect(() => {
                    if (!registered || !sessionCode || !tableNumber) return;

                    const ctrl = ClientCore.connectClient({
                        rtdb, fm,
                        sessionCode, tableNumber,
                        heartbeatMs: HEARTBEAT_MS,
                        onGameState: setGameData,
                        onSessionLost: () => {
                            setSessionLost(true);
                            setRegistered(false);
                            setGameData(null);
                            setMyTable(null);
                            setBuzzerState({ pressed: false, enabled: true });
                            setTextJustSubmitted(false);
                            clearLocal();
                        },
                        onFbConnectionChange: setFbConnected,
                        onResume: () => setResubKey(k => k + 1)
                    });

                    return () => ctrl.disconnect();
                }, [registered, sessionCode, tableNumber]);

                // Manter o ecrã ligado enquanto a mesa estiver registada
                useEffect(() => {
                    if (!registered) return;
                    const lock = ClientCore.attachWakeLock();
                    return () => lock.release();
                }, [registered]);

                // Atualizar a mesa correspondente sempre que o estado do jogo mudar
                useEffect(() => {
                    if (gameData?.tables) {
                        const table = gameData.tables.find(t => t.id === parseInt(tableNumber));
                        setMyTable(table || null);
                    }
                }, [gameData, tableNumber]);

                // Garantir que o nó do buzzer existe (sem resetar em reconexão)
                useEffect(() => {
                    if (!registered || !gameData?.enableBuzzer || !sessionCode || !tableNumber) return;
                    const buzzerCheckRef = ref(rtdb, `sessions/${sessionCode}/buzzers/${tableNumber}`);
                    get(buzzerCheckRef).then((snapshot) => {
                        if (!snapshot.exists()) {
                            set(buzzerCheckRef, { pressed: false, enabled: true, timestamp: null });
                        }
                    }).catch(() => {});
                }, [registered, gameData?.enableBuzzer, sessionCode, tableNumber]);

                // Listeners do buzzer e da resposta de texto desta mesa (resubscrevem após retomar ligação)
                useEffect(() => {
                    if (!registered || !sessionCode || !tableNumber) return;

                    const buzzerRef = ref(rtdb, `sessions/${sessionCode}/buzzers/${tableNumber}`);
                    const textResponseRef = ref(rtdb, `sessions/${sessionCode}/textResponses/${tableNumber}`);

                    const unsubBuzzer = onValue(buzzerRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            setBuzzerState(data);
                        }
                    });

                    const unsubTextResponse = onValue(textResponseRef, (snapshot) => {
                        if (!snapshot.val()) {
                            setTextJustSubmitted(false);
                        }
                    });

                    return () => {
                        unsubBuzzer();
                        unsubTextResponse();
                    };
                }, [registered, sessionCode, tableNumber, resubKey]);

                // Reiniciar input/comprovativo quando começa uma nova ronda de texto
                useEffect(() => {
                    const newActive = !!gameData?.textInputActive;
                    if (!prevTextActiveRef.current && newActive) {
                        setTextInput('');
                        setTextJustSubmitted(false);
                        setSubmitError('');
                        setLastSubmitted('');
                    }
                    prevTextActiveRef.current = newActive;
                }, [gameData?.textInputActive]);

                // Tick do temporizador de ronda no cliente
                useEffect(() => {
                    const deadline = gameData?.roundTimerDeadline;
                    if (!deadline) return;
                    const id = setInterval(() => {
                        setClientNowTick(Date.now());
                        if (Date.now() >= deadline) clearInterval(id);
                    }, 500);
                    return () => clearInterval(id);
                }, [gameData?.roundTimerDeadline]);

                // Liga (registo manual) ou reconecta (silencioso, após refresh)
                const handleConnect = async (isAuto) => {
                    setError('');

                    if (!isAuto) {
                        if (!sessionCode.trim()) {
                            setError('Código da sessão é obrigatório');
                            return;
                        }
                        if (!tableNumber || tableNumber < 1 || tableNumber > 20) {
                            setError('Número da mesa inválido (1-20)');
                            return;
                        }
                        setConnecting(true);
                    }

                    const code = sessionCode.toUpperCase();
                    const table = tableNumber;

                    const giveUpAuto = () => {
                        clearLocal();
                        setAutoReconnecting(false);
                        setSessionCode('');
                        setTableNumber('');
                        setTeamName('');
                        setEmails(['']);
                    };

                    let existing = null;
                    try {
                        const snap = await get(ref(rtdb, `sessions/${code}/clients/${table}`));
                        existing = snap.val();
                    } catch (e) {
                        if (isAuto) { giveUpAuto(); return; }
                        setError('Erro ao conectar. Tenta novamente.');
                        setConnecting(false);
                        return;
                    }

                    if (!existing && isAuto) {
                        // Mesa foi removida pelo master entretanto - não recriar automaticamente
                        giveUpAuto();
                        return;
                    }

                    let emailsStr;
                    if (existing) {
                        emailsStr = (existing.emails || []).join(',');
                    } else {
                        const validEmails = emails.map(e => e.trim()).filter(Boolean);
                        if (validEmails.length === 0) {
                            setError('Pelo menos um e-mail tem que ser preenchido');
                            setConnecting(false);
                            return;
                        }
                        emailsStr = validEmails.join(',');
                    }

                    const finalTeamName = (existing && existing.teamName) || teamName.trim() || `Mesa ${table}`;

                    const result = await ClientCore.joinSession({
                        rtdb, fm,
                        sessionCode: code, tableNumber: table,
                        teamName: finalTeamName,
                        emails: emailsStr,
                        clientId: CLIENT_ID, gameType: 'generic',
                        isAuto
                    });

                    if (result.ok) {
                        localStore.save({ session: result.code, table: result.table, team: finalTeamName, emails: emailsStr });
                        setSessionCode(result.code);
                        setTableNumber(String(result.table));
                        setTeamName(finalTeamName);
                        const emailsArr = emailsStr.split(',').filter(e => e.trim());
                        setEmails(emailsArr.length ? emailsArr : ['']);
                        setRegistered(true);
                        ClientCore.showDedicatedWarning();
                        setAutoReconnecting(false);
                        setConnecting(false);
                        setSessionLost(false);
                        setError('');
                    } else {
                        if (isAuto || result.clearLocal) {
                            giveUpAuto();
                        } else {
                            setError(translateJoinError(result.error, { code, n: table }) || 'Erro ao conectar. Tenta novamente.');
                            setConnecting(false);
                        }
                    }
                };

                // Desconectar manualmente (botão X)
                const handleDisconnect = async () => {
                    if (!confirm('Tens a certeza que queres sair da sessão?')) return;

                    try {
                        await remove(ref(rtdb, `sessions/${sessionCode}/clients/${tableNumber}`));
                    } catch (e) {}

                    clearLocal();
                    setRegistered(false);
                    setSessionCode('');
                    setTableNumber('');
                    setTeamName('');
                    setEmails(['']);
                    setTextInput('');
                    setGameData(null);
                    setMyTable(null);
                    setBuzzerState({ pressed: false, enabled: true });
                    setTextJustSubmitted(false);
                    setLastSubmitted('');
                    setSubmitError('');
                    setError('');
                };

                const pressBuzzer = async () => {
                    if (!buzzerState.enabled || buzzerState.pressed) return;
                    if (gameData?.blockBuzzerAtZero && myTable?.score === 0) return;
                    if (gameData?.buzzersBlocked) return;
                    if (isTimerBlocking) return;

                    playBuzzer();

                    try {
                        await update(ref(rtdb, `sessions/${sessionCode}/buzzers/${tableNumber}`), {
                            pressed: true,
                            timestamp: Date.now(),
                            enabled: false
                        });
                    } catch (e) {
                        console.error('Erro ao pressionar buzzer:', e);
                    }
                };

                const submitTextResponse = async () => {
                    // Validações
                    if (!textInput.trim()) return;
                    if (isSubmitting) return; // Prevenir duplo clique

                    const canSubmit = isUnlimitedTime || textTimeRemaining > 0;
                    if (!canSubmit) return;

                    setIsSubmitting(true);
                    setSubmitError('');

                    const payload = {
                        text: textInput.trim(),
                        submitted: true,
                        timestamp: Date.now(),
                        clientId: CLIENT_ID
                    };

                    const result = await ClientCore.submitWithVerify({
                        rtdb, fm,
                        path: `sessions/${sessionCode}/textResponses/${tableNumber}`,
                        payload,
                        clientId: CLIENT_ID,
                        verifyKey: 'text'
                    });

                    if (result.ok) {
                        setTextJustSubmitted(true);
                        setLastSubmitted(payload.text);
                        setSubmitError('');
                        setTimeout(() => setIsSubmitting(false), 500);
                    } else {
                        setSubmitError('Erro ao enviar. Tenta novamente.');
                        setTextJustSubmitted(false);
                        setIsSubmitting(false);
                    }
                };

                const handleTextChange = (e) => {
                    setTextInput(e.target.value);
                    if (textJustSubmitted) {
                        setTextJustSubmitted(false);
                    }
                };

                const isBuzzerBlockedByZeroScore = gameData?.blockBuzzerAtZero && myTable?.score === 0;
                const isBuzzersBlockedByMaster = gameData?.buzzersBlocked;
                const selectedLogos = gameData?.selectedLogos || [];

                // Temporizador de ronda
                const roundTimerDeadline = gameData?.roundTimerDeadline || null;
                const roundTimerRemaining = roundTimerDeadline ? Math.max(0, Math.ceil((roundTimerDeadline - clientNowTick) / 1000)) : null;
                const isTimerBlocking = roundTimerRemaining === 0 && roundTimerDeadline !== null;
                const clientFormatTimer = (s) => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
                const mainLogo = selectedLogos.length > 0 ? selectedLogos[0] : null;
                const sponsorLogos = selectedLogos.slice(1);

                // Mostrar loading quando está a auto-reconectar
                if (autoReconnecting) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 p-4 flex items-center justify-center' },
                        h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-4xl mb-4 animate-spin' }, '🔄'),
                            h('div', { className: 'text-xl font-semibold' }, 'A reconectar...'),
                            h('div', { className: 'text-sm opacity-75 mt-2' }, 'Por favor aguarde')
                        )
                    );
                }

                if (sessionLost) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 p-4 flex items-center justify-center' },
                        h('div', { className: 'max-w-md w-full bg-white rounded-2xl shadow-2xl p-6 text-center' },
                            h('div', { className: 'text-5xl mb-4' }, '👋'),
                            h('h2', { className: 'text-xl font-bold text-gray-800 mb-2' }, 'Sessão terminada'),
                            h('p', { className: 'text-gray-600 mb-4' }, 'O anfitrião terminou esta sessão ou desconectou esta mesa.'),
                            h('button', {
                                onClick: () => {
                                    setSessionLost(false);
                                    setSessionCode('');
                                    setTableNumber('');
                                    setTeamName('');
                                    setEmails(['']);
                                },
                                className: 'w-full py-3 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold'
                            }, 'Voltar ao registo')
                        )
                    );
                }

                if (!registered) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 p-4 flex items-center justify-center' },
                        h('div', { className: 'max-w-md w-full bg-white rounded-2xl shadow-2xl p-6' },
                            h('div', { className: 'text-center mb-6' },
                                h('h1', { className: 'text-3xl font-bold text-gray-800' }, 'Registo de Mesa')
                            ),
                            error && h('div', { className: 'bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4' }, error),
                            h('div', { className: 'space-y-4' },
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'Código da Sessão *'),
                                    h('input', {
                                        type: 'text',
                                        value: sessionCode,
                                        onChange: (e) => setSessionCode(e.target.value.toUpperCase()),
                                        placeholder: 'Ex: ABC123',
                                        maxLength: 10,
                                        className: 'w-full px-4 py-3 text-lg font-mono border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500 uppercase'
                                    })
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'Número da Mesa *'),
                                    h('input', {
                                        type: 'number',
                                        min: 1,
                                        max: 20,
                                        value: tableNumber,
                                        onChange: (e) => setTableNumber(e.target.value),
                                        placeholder: '1-20',
                                        className: 'w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500'
                                    })
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'Nome da Equipa'),
                                    h('input', {
                                        type: 'text',
                                        value: teamName,
                                        onChange: (e) => setTeamName(e.target.value),
                                        placeholder: 'Nome da vossa equipa',
                                        className: 'w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:outline-none focus:border-purple-500'
                                    })
                                ),
                                h('div', null,
                                    h('div', { className: 'flex items-center justify-between mb-2' },
                                        h('label', { className: 'block text-sm font-semibold text-gray-700' }, 'E-mails *'),
                                        h('button', {
                                            onClick: () => setEmails([...emails, '']),
                                            className: 'text-sm text-purple-600 hover:text-purple-700 font-semibold'
                                        }, '+ Adicionar')
                                    ),
                                    h('div', { className: 'space-y-2 max-h-48 overflow-y-auto' },
                                        emails.map((email, index) =>
                                            h('div', { key: index, className: 'flex gap-2' },
                                                h('span', { className: 'text-gray-400 mt-3' }, '✉'),
                                                h('input', {
                                                    type: 'email',
                                                    value: email,
                                                    onChange: (e) => {
                                                        const newEmails = [...emails];
                                                        newEmails[index] = e.target.value;
                                                        setEmails(newEmails);
                                                    },
                                                    placeholder: 'email@exemplo.com',
                                                    className: 'flex-1 px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-purple-500'
                                                }),
                                                emails.length > 1 && h('button', {
                                                    onClick: () => setEmails(emails.filter((_, i) => i !== index)),
                                                    className: 'px-3 py-2 bg-red-500 text-white text-sm rounded-lg hover:bg-red-600'
                                                }, '✕')
                                            )
                                        )
                                    )
                                ),
                                h('button', {
                                    onClick: () => handleConnect(false),
                                    disabled: connecting,
                                    className: `w-full py-4 rounded-lg text-lg font-bold transition-colors shadow-lg ${
                                        connecting ? 'bg-gray-400 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-700 text-white'
                                    }`
                                }, connecting ? 'A Conectar...' : 'Conectar ao Jogo')
                            )
                        )
                    );
                }

                const showBuzzer = gameData?.enableBuzzer;
                const showTextInput = gameData?.enableTextInput && gameData?.textInputActive;
                const textTimeRemaining = gameData?.textInputTimeRemaining || 0;
                const isUnlimitedTime = showTextInput && textTimeRemaining === 0;

                return h('div', { className: 'h-screen bg-gradient-to-br from-purple-900 via-indigo-900 to-blue-900 p-4 flex flex-col overflow-hidden relative' },
                    // Banner de ligação ao servidor perdida
                    !fbConnected && h('div', { className: 'absolute top-0 inset-x-0 bg-red-600 text-white text-xs text-center py-1 z-50 font-bold animate-pulse' },
                        'Sem ligação ao servidor — a tentar reconectar...'
                    ),
                    // Logotipos patrocinadores em background
                    sponsorLogos.length > 0 && h('div', { className: 'absolute inset-0 pointer-events-none overflow-hidden' },
                        sponsorLogos.map((logo, index) => h('img', {
                            key: index,
                            src: logo,
                            alt: 'Patrocinador',
                            className: 'absolute opacity-10 h-16 object-contain',
                            style: {
                                top: `${15 + (index * 25) % 70}%`,
                                left: index % 2 === 0 ? '5%' : 'auto',
                                right: index % 2 === 1 ? '5%' : 'auto'
                            },
                            onError: (e) => e.target.style.display = 'none'
                        }))
                    ),
                    h('div', { className: 'max-w-4xl mx-auto w-full h-full flex flex-col relative z-10' },
                        // Header com logo centrado, mesa à esquerda, sessão à direita
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-3 mb-3 flex-shrink-0' },
                            h('div', { className: 'flex items-center' },
                                // Coluna esquerda - Mesa (flex-1 para ocupar espaço igual)
                                h('div', { className: 'flex-1' },
                                    h('div', { className: 'text-xs text-gray-600' }, `Mesa ${tableNumber}`),
                                    h('div', { className: 'text-lg font-bold text-gray-800' }, teamName || `Mesa ${tableNumber}`)
                                ),
                                // Coluna central - Logo principal (centrado)
                                h('div', { className: 'flex-shrink-0 px-4' },
                                    mainLogo ? h('img', {
                                        src: mainLogo,
                                        alt: 'Logo do Evento',
                                        className: 'h-12 max-w-32 object-contain',
                                        onError: (e) => e.target.style.display = 'none'
                                    }) : h('div', { className: 'h-12' }) // Placeholder para manter centragem
                                ),
                                // Coluna direita - Sessão e X (flex-1 para ocupar espaço igual, alinhado à direita)
                                h('div', { className: 'flex-1 flex items-center justify-end gap-2' },
                                    h('div', { className: 'text-xs text-gray-500 text-right' }, `Sessão: ${sessionCode}`),
                                    // Botão X para desconectar
                                    h('button', {
                                        onClick: handleDisconnect,
                                        className: 'w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition-colors',
                                        title: 'Sair da sessão'
                                    }, '✕')
                                )
                            )
                        ),
                        gameData?.categories && gameData.categories.length > 0 && h('div', { className: 'grid grid-cols-2 gap-2 mb-3 flex-shrink-0' },
                            gameData.yellowCategory && h('div', { className: 'bg-yellow-400 text-gray-900 rounded-xl p-4 font-black shadow-xl flex items-center justify-center h-24' },
                                h('span', { className: 'text-center leading-tight text-lg sm:text-xl' }, gameData.yellowCategory)
                            ),
                            gameData.redCategory && h('div', { className: 'bg-red-500 text-white rounded-xl p-4 font-black shadow-xl flex items-center justify-center h-24' },
                                h('span', { className: 'text-center leading-tight text-lg sm:text-xl' }, gameData.redCategory)
                            )
                        ),
                        roundTimerRemaining !== null && h('div', {
                            className: `rounded-xl px-4 py-2 text-center flex-shrink-0 font-black ${isTimerBlocking ? 'bg-red-600 text-white text-base' : roundTimerRemaining <= 10 ? 'bg-orange-500 text-white text-2xl animate-pulse' : roundTimerRemaining <= 30 ? 'bg-yellow-400 text-gray-900 text-2xl' : 'bg-white bg-opacity-20 text-white text-xl'}`
                        }, isTimerBlocking ? '⛔ Tempo esgotado!' : '⏱ ' + clientFormatTimer(roundTimerRemaining)),
                        h('div', { className: 'flex-1 flex flex-col items-center justify-center gap-4' },
                            showBuzzer && h('button', {
                                onClick: pressBuzzer,
                                disabled: !buzzerState.enabled || buzzerState.pressed || isBuzzerBlockedByZeroScore || isBuzzersBlockedByMaster || isTimerBlocking,
                                className: `${showTextInput ? 'w-44 h-44 sm:w-48 sm:h-48' : 'w-56 h-56 sm:w-64 sm:h-64'} rounded-full text-white font-black text-2xl sm:text-3xl shadow-2xl transition-all transform ${
                                    isBuzzersBlockedByMaster || isTimerBlocking
                                        ? 'bg-gray-400 cursor-not-allowed'
                                        : (!buzzerState.enabled || buzzerState.pressed || isBuzzerBlockedByZeroScore)
                                            ? 'bg-gray-400 cursor-not-allowed opacity-50'
                                            : 'bg-red-600 hover:bg-red-700 hover:scale-105 active:scale-95'
                                }`
                            }, h('div', { className: 'flex flex-col items-center gap-2' },
                                h('div', { className: 'text-5xl' },
                                    (isBuzzersBlockedByMaster || isTimerBlocking) ? '⏳' : (buzzerState.pressed || isBuzzerBlockedByZeroScore ? '🔒' : '🔔')
                                ),
                                h('div', null,
                                    (isBuzzersBlockedByMaster || isTimerBlocking) ? 'Aguarde' : (buzzerState.pressed || isBuzzerBlockedByZeroScore ? 'BLOQUEADO' : (gameData?.buzzerText || 'BUZZER'))
                                )
                            )),
                            showTextInput && h('div', { className: 'w-full max-w-2xl relative z-20' },
                                h('div', { className: 'bg-indigo-50 rounded-2xl shadow-2xl p-4' },
                                    !isUnlimitedTime && textTimeRemaining > 0 && h('div', { className: 'mb-2 text-center' },
                                        h('span', { className: 'text-sm font-bold text-indigo-600' }, `⏱️ Tempo restante: ${textTimeRemaining}s`)
                                    ),
                                    isUnlimitedTime && h('div', { className: 'mb-2 text-center' },
                                        h('span', { className: 'text-sm font-bold text-green-600' }, `✓ Tempo ilimitado`)
                                    ),
                                    h('textarea', {
                                        value: textInput,
                                        onChange: handleTextChange,
                                        disabled: !isUnlimitedTime && textTimeRemaining === 0,
                                        maxLength: 250,
                                        placeholder: (!isUnlimitedTime && textTimeRemaining === 0) ? 'Tempo esgotado!' : 'Escreve a tua resposta...',
                                        className: `w-full h-32 px-4 py-3 text-lg border-2 rounded-lg resize-none focus:outline-none ${
                                            !isUnlimitedTime && textTimeRemaining === 0
                                                ? 'border-gray-300 bg-gray-100 cursor-not-allowed' 
                                                : 'border-purple-500 focus:border-purple-600'
                                        }`
                                    }),
                                    h('div', { className: 'flex justify-between items-center mt-2' },
                                        h('span', { className: 'text-xs text-gray-500' }, `${textInput.length}/250`),
                                        h('button', {
                                            onClick: submitTextResponse,
                                            disabled: !textInput.trim() || (!isUnlimitedTime && textTimeRemaining === 0) || isSubmitting,
                                            className: `px-8 py-3 rounded-lg font-bold text-lg transition-all active:scale-95 ${
                                                isSubmitting
                                                    ? 'bg-yellow-500 text-white cursor-wait'
                                                    : textJustSubmitted
                                                        ? 'bg-green-500 text-white'
                                                        : (!textInput.trim() || (!isUnlimitedTime && textTimeRemaining === 0))
                                                            ? 'bg-gray-400 text-white cursor-not-allowed'
                                                            : 'bg-green-600 text-white hover:bg-green-700 shadow-lg hover:shadow-xl'
                                            }`
                                        }, isSubmitting ? '⏳ A enviar...' : (textJustSubmitted ? '✓ Enviado' : '📤 Enviar'))
                                    ),
                                    submitError && h('div', { className: 'mt-2 text-center text-sm text-red-600 font-semibold' }, submitError)
                                )
                            ),
                            !showTextInput && lastSubmitted && h('div', { className: 'w-full max-w-2xl' },
                                h('div', { className: 'bg-white bg-opacity-15 border border-white border-opacity-25 rounded-2xl p-4 backdrop-blur-sm' },
                                    h('div', { className: 'flex items-center gap-2 mb-2' },
                                        h('span', { className: 'text-green-300 text-sm font-black' }, '✓ Resposta enviada'),
                                        h('span', { className: 'text-white opacity-60 text-xs' }, '(visível só para vocês)')
                                    ),
                                    h('div', { className: 'text-white font-semibold text-base leading-snug' }, lastSubmitted)
                                )
                            )
                        ),
                        h('div', { className: 'flex-shrink-0 mb-3 mt-4' },
                            h('div', { className: 'bg-gray-50 rounded-2xl shadow-2xl p-6 text-center' },
                                h('div', { className: 'text-5xl sm:text-6xl font-black text-purple-600 mb-2' }, myTable?.score ?? '---'),
                                h('div', { className: 'text-lg text-gray-600 font-semibold' }, 'pontos')
                            )
                        ),
                        !gameData && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'animate-pulse' }, 'A aguardar início do jogo...')
                        )
                    )
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(h(App));
        });
    </script>
</body>
</html>
