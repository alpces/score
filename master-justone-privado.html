<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Just One – Evento Privado (Master)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/firebase-config.js"></script>
    <script src="shared/session-core.js"></script>
    <style>
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .blink { animation: blink 1s ease-in-out infinite; }
        @keyframes slideIn { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }
        .slide-in { animation: slideIn 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-900">
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, remove, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';
        const app = initializeApp(window.FirebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, set, remove, onValue, update, get };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    var CLIENT_URL      = window.AppConfig.CLIENT_JUSTONE_PRIVADO_URL;
    var GAME_TYPE       = 'justone-privado';
    var MASTER_MODE_KEY = 'justonePrivadoMasterMode';

    window.addEventListener('firebaseReady', function() {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;

        function capitalize(s) { if (!s) return s; return s.charAt(0).toUpperCase() + s.slice(1); }

        // — lista de palavras plana —
        function parseWordList(text) {
            return (text || '').split('\n').map(function(w) { return w.trim(); }).filter(function(w) { return w.length > 0; });
        }
        function drawWord(list, used) {
            var avail = (list || []).filter(function(w) { return (used || []).indexOf(w) < 0; });
            if (!avail.length) return null;
            return avail[Math.floor(Math.random() * avail.length)];
        }
        function drawWordExcluding(list, used, exclude) {
            var avail = (list || []).filter(function(w) { return (used || []).indexOf(w) < 0 && w !== exclude; });
            if (!avail.length) return null;
            return avail[Math.floor(Math.random() * avail.length)];
        }

        // — rotação de adivinhadores —
        function getNextGuesser(tables, currentGuesserId) {
            if (tables.length === 0) return null;
            var ids = tables.map(function(t) { return t.id; }).sort(function(a, b) { return a - b; });
            var idx = ids.indexOf(currentGuesserId);
            return ids[(idx + 1) % ids.length];
        }
        function getCompletedLaps(tables) {
            if (tables.length === 0) return 0;
            return Math.min.apply(null, tables.map(function(t) { return t.timesGuessed || 0; }));
        }
        function isLapComplete(tables) {
            if (tables.length === 0) return false;
            var first = tables[0].timesGuessed || 0;
            return tables.every(function(t) { return (t.timesGuessed || 0) === first; });
        }

        // — validação de pistas —
        function normalizeClueText(text) {
            return (text || '').toLowerCase().trim().normalize('NFD').replace(/[̀-ͯ]/g, '');
        }
        function detectDuplicateClues(clues) {
            var norm = {};
            Object.keys(clues).forEach(function(tid) {
                var n = normalizeClueText(clues[tid].text);
                if (!n) return;
                (norm[n] = norm[n] || []).push(tid);
            });
            var dupSet = {};
            Object.values(norm).forEach(function(ids) {
                if (ids.length >= 2) ids.forEach(function(id) { dupSet[id] = true; });
            });
            return dupSet;
        }
        function levenshtein(a, b) {
            var m = a.length, n = b.length, i, j, prev = [], curr = [], tmp;
            for (j = 0; j <= n; j++) prev[j] = j;
            for (i = 1; i <= m; i++) {
                curr[0] = i;
                for (j = 1; j <= n; j++) {
                    curr[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
                }
                tmp = prev; prev = curr; curr = tmp;
            }
            return prev[n];
        }
        function detectSimilarClues(clues, dupSet) {
            var ids = Object.keys(clues).filter(function(tid) { return clues[tid] && clues[tid].text; });
            var simSet = {};
            for (var i = 0; i < ids.length; i++) {
                for (var j = i + 1; j < ids.length; j++) {
                    if (dupSet[ids[i]] && dupSet[ids[j]]) continue;
                    var a = normalizeClueText(clues[ids[i]].text);
                    var b = normalizeClueText(clues[ids[j]].text);
                    if (a === b || a.length < 3 || b.length < 3) continue;
                    var dist = levenshtein(a, b);
                    var maxLen = Math.max(a.length, b.length);
                    if (dist <= 2 || (maxLen >= 6 && dist <= Math.floor(maxLen * 0.25))) {
                        (simSet[ids[i]] = simSet[ids[i]] || []).push(ids[j]);
                        (simSet[ids[j]] = simSet[ids[j]] || []).push(ids[i]);
                    }
                }
            }
            return simSet;
        }

        function buildVisibleClues(phase, justoneClues, clueStatus) {
            if (phase === 'guessing') {
                var valid = {};
                Object.keys(clueStatus).forEach(function(tid) {
                    if (clueStatus[tid] === 'valid' && justoneClues[tid]) valid[tid] = { text: justoneClues[tid].text };
                });
                return valid;
            }
            if (phase === 'best_clue_selection' || phase === 'reveal') {
                var all = {};
                Object.keys(justoneClues).forEach(function(tid) {
                    all[tid] = { text: justoneClues[tid].text, status: clueStatus[tid] || 'annulled' };
                });
                return all;
            }
            return null;
        }

        function teamLabel(table) {
            if (!table) return '';
            var tn = 'Equipa ' + table.id;
            return table.name ? (table.name + ' (' + tn + ')') : tn;
        }

        var DEFAULT_BEST_CLUE_CONFIG = { guesser: 3, bestClue: 3, otherClue: 1, penalty: 1 };
        function getDefaultBestClueConfig() { return Object.assign({}, DEFAULT_BEST_CLUE_CONFIG); }
        function loadBestClueConfig() {
            try {
                var raw = localStorage.getItem('justonePrivadoBestClueConfig');
                if (!raw) return getDefaultBestClueConfig();
                var cfg = JSON.parse(raw);
                var def = getDefaultBestClueConfig();
                ['guesser', 'bestClue', 'otherClue', 'penalty'].forEach(function(k) {
                    if (typeof cfg[k] !== 'number') cfg[k] = def[k];
                });
                return cfg;
            } catch(e) { return getDefaultBestClueConfig(); }
        }
        function saveBestClueConfig(cfg) {
            try { localStorage.setItem('justonePrivadoBestClueConfig', JSON.stringify(cfg)); return true; } catch(e) { return false; }
        }
        function loadTimerSeconds() {
            try { var n = parseInt(localStorage.getItem('justonePrivadoTimerSeconds') || '0', 10); return (isNaN(n) || n < 0) ? 0 : n; } catch(e) { return 0; }
        }
        function saveTimerSeconds(n) {
            try { localStorage.setItem('justonePrivadoTimerSeconds', String(n)); } catch(e) {}
        }

        function rankTables(sorted) {
            var result = [], rank = 1;
            for (var i = 0; i < sorted.length; i++) {
                if (i > 0 && sorted[i].score < sorted[i-1].score) rank = i + 1;
                result.push({ table: sorted[i], rank: rank });
            }
            return result;
        }
        var RANK_MEDALS = { 1: '🥇', 2: '🥈', 3: '🥉' };

        // ====================== APP ======================

        function App() {
            var _s = function(v) { return useState(v); };

            /* —— MODO —— */
            var m1 = _s(null);  var masterMode = m1[0];  var setMasterMode = m1[1];
            var m2 = _s(false); var modeChosen = m2[0];  var setModeChosen = m2[1];

            /* —— SETUP —— */
            var s1  = _s(false);  var setupDone = s1[0];       var setSetupDone = s1[1];
            var s2  = _s(null);   var sessionId = s2[0];       var setSessionId = s2[1];
            var s3  = _s('');     var codeInput = s3[0];       var setCodeInput = s3[1];
            var s4  = _s('');     var codeError = s4[0];       var setCodeError = s4[1];
            var s5  = _s(false);  var codeCopied = s5[0];      var setCodeCopied = s5[1];
            var s6  = _s([]);     var activeSessions = s6[0];  var setActiveSessions = s6[1];
            var s7  = _s([]);     var sessionHistory = s7[0];  var setSessionHistory = s7[1];
            var s8  = _s(false);  var showHistory = s8[0];     var setShowHistory = s8[1];
            var s9  = _s(false);  var showExistDialog = s9[0]; var setShowExistDialog = s9[1];
            var s10 = _s(null);   var existingData = s10[0];   var setExistingData = s10[1];
            var s11 = _s(null);   var histInfoId = s11[0];     var setHistInfoId = s11[1];
            var s12 = _s({});     var histInfoClients = s12[0];var setHistInfoClients = s12[1];

            /* —— LISTA DE PALAVRAS —— */
            var w1 = _s([]);     var wordList = w1[0];         var setWordList = w1[1];
            var w2 = _s('');     var wordListText = w2[0];     var setWordListText = w2[1];
            var w3 = _s(false);  var showWordEdit = w3[0];     var setShowWordEdit = w3[1];
            var w4 = _s(false);  var wordListSaved = w4[0];    var setWordListSaved = w4[1];
            var w5 = _s(false);  var showWordEditInGame = w5[0]; var setShowWordEditInGame = w5[1];
            var w6 = _s('');     var wordListTextInGame = w6[0]; var setWordListTextInGame = w6[1];

            /* —— PONTUAÇÃO / TIMER —— */
            var bc1 = _s(getDefaultBestClueConfig()); var bestClueConfig = bc1[0]; var setBestClueConfig = bc1[1];
            var bc2 = _s(false); var showBestClueEdit = bc2[0]; var setShowBestClueEdit = bc2[1];
            var bc3 = _s(false); var bestClueSaved = bc3[0];    var setBestClueSaved = bc3[1];
            var tm1 = _s(0);     var timerSeconds = tm1[0];     var setTimerSeconds = tm1[1];
            var tm2 = _s(false); var timerSaved = tm2[0];       var setTimerSaved = tm2[1];

            /* —— JOGO —— */
            var g1  = _s([]);    var tables = g1[0];           var setTables = g1[1];
            var g2  = _s('waiting'); var phase = g2[0];        var setPhase = g2[1];
            var g3  = _s(1);     var roundNumber = g3[0];      var setRoundNumber = g3[1];
            var g4  = _s(null);  var guesserTableId = g4[0];   var setGuesserTableId = g4[1];
            var g5  = _s(null);  var secretWord = g5[0];       var setSecretWord = g5[1];
            var g6  = _s([]);    var usedWords = g6[0];        var setUsedWords = g6[1];
            var g7  = _s({});    var clueStatus = g7[0];       var setClueStatus = g7[1];
            var g8  = _s(false); var revealAll = g8[0];        var setRevealAll = g8[1];
            var g9  = _s(null);  var guessResult = g9[0];      var setGuessResult = g9[1];
            var g10 = _s(null);  var clueDeadline = g10[0];    var setClueDeadline = g10[1];
            var g11 = _s(true);  var showScores = g11[0];      var setShowScores = g11[1];
            var g12 = _s(false); var tablesLocked = g12[0];    var setTablesLocked = g12[1];
            var g13 = _s(false); var publicShowScores = g13[0];var setPublicShowScores = g13[1];
            var g14 = _s(null);  var bestClueTableId = g14[0]; var setBestClueTableId = g14[1];
            var g15 = _s(null);  var pendingWord = g15[0];     var setPendingWord = g15[1];
            var g16 = _s(false); var showWordApproval = g16[0];var setShowWordApproval = g16[1];
            var g17 = _s('');    var customWordInput = g17[0]; var setCustomWordInput = g17[1];
            var g18 = _s(false); var showCustomWordInput = g18[0]; var setShowCustomWordInput = g18[1];

            /* —— PÚBLICO —— */
            var pb1 = _s(null);       var publicState = pb1[0];    var setPublicState = pb1[1];
            var pb2 = _s(Date.now()); var nowTick = pb2[0];        var setNowTick = pb2[1];
            var pb3 = _s({});         var publicClients = pb3[0];  var setPublicClients = pb3[1];
            var pb4 = _s(false);      var psHideScoresLocally = pb4[0]; var setPsHideScoresLocally = pb4[1];

            /* —— UI —— */
            var u1  = _s({});    var connectedClients = u1[0];  var setConnectedClients = u1[1];
            var u2  = _s({});    var justoneClues = u2[0];      var setJustoneClues = u2[1];
            var u3  = _s(false); var showReview = u3[0];        var setShowReview = u3[1];
            var u4  = _s(false); var showLeaderboard = u4[0];   var setShowLeaderboard = u4[1];
            var u5  = _s(false); var showQR = u5[0];            var setShowQR = u5[1];
            var u6  = _s(false); var showEndModal = u6[0];      var setShowEndModal = u6[1];
            var u7  = _s(false); var showManage = u7[0];        var setShowManage = u7[1];
            var u8  = _s(0);     var presenceTick = u8[0];      var setPresenceTick = u8[1];

            var archivingRef  = useRef(false);
            var syncTimerRef  = useRef(null);
            var pubSyncRef    = useRef(null);
            var lastSeenMapRef = useRef({});
            var pendingDrawRef = useRef(null);
            var autoReviewedRef = useRef(false);
            var processedBestClueVoteRef = useRef(null);

            // dados derivados
            var guesserTable  = tables.find(function(t) { return t.id === guesserTableId; });
            var completedLaps = getCompletedLaps(tables);
            var lapComplete   = isLapComplete(tables);
            var tableCount    = tables.length;
            var clueCount     = Object.keys(justoneClues).length;
            var clueTimerRemaining = clueDeadline ? Math.max(0, Math.ceil((clueDeadline - nowTick) / 1000)) : null;

            var phaseLabel = {
                'waiting':             'À espera',
                'clue_giving':         'Pistas',
                'reviewing':           'Revisão',
                'guessing':            'Adivinha',
                'best_clue_selection': 'Melhor pista',
                'reveal':              'Resultado'
            }[phase] || phase;

            var phaseColor = {
                'waiting':             'bg-slate-700 text-slate-300',
                'clue_giving':         'bg-blue-600 text-white',
                'reviewing':           'bg-purple-600 text-white',
                'guessing':            'bg-teal-600 text-white',
                'best_clue_selection': 'bg-pink-600 text-white',
                'reveal':              'bg-green-600 text-white'
            }[phase] || 'bg-slate-700 text-slate-300';

            /* —— RESOLUÇÃO DE MODO —— */
            useEffect(function() {
                var params = new URLSearchParams(window.location.search);
                var urlSession = params.get('session');
                var urlMode = params.get('mode');
                if (urlMode === 'public' && urlSession) {
                    setSessionId(urlSession.toUpperCase());
                    setSetupDone(true);
                    setMasterMode('public');
                    try { localStorage.setItem(MASTER_MODE_KEY, 'public'); } catch(e) {}
                    setModeChosen(true);
                    return;
                }
                if (urlSession) setCodeInput(urlSession.toUpperCase());
                if (urlMode === 'public' || urlMode === 'console') {
                    setMasterMode(urlMode);
                    try { localStorage.setItem(MASTER_MODE_KEY, urlMode); } catch(e) {}
                    setModeChosen(true);
                    return;
                }
                var saved;
                try { saved = localStorage.getItem(MASTER_MODE_KEY); } catch(e) {}
                if (saved === 'console' || saved === 'public') { setMasterMode(saved); setModeChosen(true); }
            }, []);

            /* —— CARREGAR CONFIG —— */
            useEffect(function() {
                setBestClueConfig(loadBestClueConfig());
                setTimerSeconds(loadTimerSeconds());
            }, []);

            /* —— TICK PRESENÇA —— */
            useEffect(function() {
                if (masterMode !== 'console') return;
                var iv = setInterval(function() { setPresenceTick(function(n) { return n + 1; }); }, 5000);
                return function() { clearInterval(iv); };
            }, [masterMode]);

            /* —— SESSÕES ATIVAS —— */
            useEffect(function() {
                if (setupDone) return;
                var unsub = SessionCore.subscribeActiveSessions({ rtdb: rtdb, fm: fm, gameType: GAME_TYPE, onChange: setActiveSessions });
                return function() { unsub(); };
            }, [setupDone]);

            /* —— HISTÓRICO —— */
            useEffect(function() {
                if (!showHistory) return;
                var unsub = SessionCore.subscribeSessionHistory({ rtdb: rtdb, fm: fm, gameType: GAME_TYPE, onChange: setSessionHistory });
                return function() { unsub(); };
            }, [showHistory]);

            useEffect(function() {
                if (!histInfoId) { setHistInfoClients({}); return; }
                var isActive = activeSessions.some(function(s) { return s.sessionId === histInfoId; });
                if (isActive) {
                    SessionCore.readClientsOnce({ rtdb: rtdb, fm: fm, sessionId: histInfoId }).then(setHistInfoClients);
                } else {
                    setHistInfoClients({});
                }
            }, [histInfoId]);

            /* —— SYNC gameState —— */
            function buildGameState() {
                return {
                    gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                    phase: phase, roundNumber: roundNumber,
                    guesserTableId: guesserTableId,
                    bestClueConfig: bestClueConfig,
                    bestClueTableId: bestClueTableId,
                    usedWords: usedWords,
                    wordList: wordList,
                    timerSeconds: timerSeconds,
                    clueDeadline: clueDeadline,
                    clueStatus: clueStatus,
                    revealAll: revealAll,
                    guessResult: guessResult,
                    visibleClues: buildVisibleClues(phase, justoneClues, clueStatus),
                    revealedWord: (revealAll || phase === 'best_clue_selection') ? secretWord : null,
                    tables: tables,
                    showScores: showScores,
                    publicShowScores: publicShowScores,
                    tablesLocked: tablesLocked
                };
            }

            useEffect(function() {
                if (!sessionId || masterMode !== 'console' || archivingRef.current) return;
                if (syncTimerRef.current) clearTimeout(syncTimerRef.current);
                syncTimerRef.current = setTimeout(function() {
                    fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/gameState'), buildGameState())
                        .catch(function(e) { console.error('Sync gameState:', e); });
                }, 200);
                return function() { clearTimeout(syncTimerRef.current); };
            }, [sessionId, masterMode, phase, roundNumber, guesserTableId, bestClueConfig, bestClueTableId,
                usedWords, wordList, timerSeconds, clueDeadline, clueStatus, revealAll, guessResult,
                tables, showScores, publicShowScores, tablesLocked, secretWord, justoneClues]);

            /* —— SYNC publicState —— */
            function buildPublicState() {
                var validIds   = Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'valid'; });
                var annulledIds = Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'annulled'; });
                return {
                    phase: phase, roundNumber: roundNumber, guesserTableId: guesserTableId,
                    bestClueTableId: bestClueTableId,
                    tables: tables.map(function(t) { return { id: t.id, name: t.name, score: t.score }; }),
                    cluesSubmitted: Object.keys(justoneClues).length,
                    cluesTotal: Math.max(0, tables.length - 1),
                    validClueCount: validIds.length, annulledClueCount: annulledIds.length,
                    clueDeadline: clueDeadline, guessResult: guessResult,
                    visibleClues: buildVisibleClues(phase, justoneClues, clueStatus),
                    revealedWord: (revealAll || phase === 'best_clue_selection') ? secretWord : null,
                    publicShowScores: publicShowScores,
                    completedLaps: getCompletedLaps(tables),
                    timestamp: Date.now()
                };
            }

            useEffect(function() {
                if (!sessionId || masterMode !== 'console' || archivingRef.current) return;
                if (pubSyncRef.current) clearTimeout(pubSyncRef.current);
                pubSyncRef.current = setTimeout(function() {
                    fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/publicState'), buildPublicState())
                        .catch(function(e) { console.error('Sync publicState:', e); });
                }, 200);
                return function() { clearTimeout(pubSyncRef.current); };
            }, [sessionId, masterMode, phase, roundNumber, guesserTableId, bestClueTableId, tables,
                justoneClues, clueStatus, guessResult, secretWord, revealAll, clueDeadline, publicShowScores]);

            /* —— CLIENTES —— */
            useEffect(function() {
                if (!sessionId || masterMode !== 'console') return;
                var unsub = SessionCore.subscribeClients({
                    rtdb: rtdb, fm: fm, sessionId: sessionId,
                    onLastSeen: function(lsMap) { lastSeenMapRef.current = lsMap; },
                    onStructural: function(data) {
                        setConnectedClients(data);
                        setTables(function(prev) {
                            var merged = prev.slice(), changed = false;
                            Object.values(data).forEach(function(client) {
                                var id = client.tableNumber;
                                var idx = merged.findIndex(function(t) { return t.id === id; });
                                if (idx < 0) {
                                    merged.push({ id: id, name: client.teamName || ('Equipa ' + id), score: 0, timesGuessed: 0 });
                                    changed = true;
                                } else if (client.teamName && client.teamName !== merged[idx].name) {
                                    merged[idx] = Object.assign({}, merged[idx], { name: client.teamName });
                                    changed = true;
                                }
                            });
                            return changed ? merged.sort(function(a, b) { return a.id - b.id; }) : prev;
                        });
                    }
                });
                return function() { unsub(); };
            }, [sessionId, masterMode]);

            /* —— PISTAS —— */
            useEffect(function() {
                if (!sessionId || masterMode !== 'console') return;
                var unsub = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/justoneClues'), function(snap) {
                    setJustoneClues(snap.val() || {});
                });
                return function() { unsub(); };
            }, [sessionId, masterMode]);

            /* —— PUBLICSTATE (modo projetor) —— */
            useEffect(function() {
                if (!sessionId || masterMode !== 'public') return;
                var unsub = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/publicState'), function(snap) {
                    setPublicState(snap.val() || null);
                });
                return function() { unsub(); setPublicState(null); };
            }, [sessionId, masterMode]);

            useEffect(function() {
                setPsHideScoresLocally(false);
            }, [publicState && !!publicState.publicShowScores]);

            useEffect(function() {
                if (!sessionId || masterMode !== 'public') return;
                var unsub = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/clients'), function(snap) {
                    setPublicClients(snap.val() || {});
                });
                return function() { unsub(); setPublicClients({}); };
            }, [sessionId, masterMode]);

            /* —— TIMER —— */
            useEffect(function() {
                var deadline = masterMode === 'public' ? (publicState && publicState.clueDeadline) : clueDeadline;
                if (!deadline) return;
                var id = setInterval(function() { setNowTick(Date.now()); }, 1000);
                return function() { clearInterval(id); };
            }, [masterMode, clueDeadline, publicState && publicState.clueDeadline]);

            useEffect(function() {
                if (masterMode !== 'console' || phase !== 'clue_giving' || !clueDeadline) {
                    if (phase !== 'clue_giving') autoReviewedRef.current = false;
                    return;
                }
                if (nowTick >= clueDeadline && !autoReviewedRef.current) {
                    autoReviewedRef.current = true;
                    openClueReview();
                }
            }, [masterMode, phase, clueDeadline, nowTick]);

            /* —— INICIAR SESSÃO —— */

                                        h('button', {
                                            onClick: function(id) { return function() { removeTable(id); }; }(table.id),
                                            className: 'px-3 py-1 bg-red-900/50 hover:bg-red-800 text-red-300 rounded-lg text-xs font-bold'
                                        }, 'Remover')
                                    );
                                })
                              ),
                        h('button', { onClick: function() { setShowManage(false); }, className: 'mt-4 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white' }, 'Fechar')
                    )
                ),

                showEndModal && h('div', { className: 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4' },
                    h('div', { className: 'bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-6 w-full max-w-sm slide-in' },
                        h('div', { className: 'text-4xl text-center mb-3' }, '🤫'),
                        h('h3', { className: 'text-xl font-black text-white text-center mb-2' }, 'Terminar sessão'),
                        h('p', { className: 'text-slate-400 text-sm text-center mb-5' }, 'Sessão: ' + sessionId),
                        h('div', { className: 'space-y-3' },
                            h('button', { onClick: endSessionArchive, className: 'w-full py-3 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-bold' }, 'Arquivar e fechar'),
                            h('button', { onClick: endSessionPause, className: 'w-full py-3 bg-amber-700 hover:bg-amber-600 text-white rounded-xl font-bold' }, 'Pausar (sem arquivar)'),
                            h('button', { onClick: endSessionDelete, className: 'w-full py-3 bg-red-900 hover:bg-red-800 text-red-300 rounded-xl font-bold' }, 'Eliminar sessão'),
                            h('button', { onClick: function() { setShowEndModal(false); }, className: 'w-full py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl font-bold' }, 'Cancelar')
                        )
                    )
                ),

                showQR && h('div', { className: 'fixed inset-0 bg-gradient-to-br from-teal-900 via-cyan-900 to-slate-900 flex flex-col items-center justify-center z-50 cursor-pointer', onClick: function() { setShowQR(false); } },
                    h('img', { src: qrUrl, alt: 'QR', className: 'w-[min(70vw,50vh)] h-[min(70vw,50vh)] bg-white p-4 rounded-2xl shadow-2xl', onClick: function(e) { e.stopPropagation(); } }),
                    h('div', { className: 'text-5xl font-black text-white mt-4 tracking-widest' }, sessionId),
                    h('div', { className: 'text-teal-300 mt-2 text-sm' }, 'Toca para voltar')
                ),

                showReview && ClueReviewModal(),
                showWordApproval && masterMode === 'console' && WordApprovalModal()
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
