<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mega Hitster - Mesa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuração Firebase, core de cliente partilhado e módulo Hitster -->
    <script src="shared/firebase-config.js"></script>
    <script src="shared/client-core.js"></script>
    <script src="games/hitster.js"></script>
    <style>
        input, textarea { font-size: 16px !important; }
        html, body { height: 100dvh; min-height: 100dvh; margin: 0; padding: 0; padding-bottom: env(safe-area-inset-bottom); }
        #root { min-height: 100dvh; }
        .min-h-screen { min-height: 100dvh !important; }
        /* h-screen usa 100dvh para contabilizar a barra do browser no mobile */
        .h-screen { height: 100dvh !important; }

        @keyframes jokerGlow {
            0%, 100% {
                box-shadow: 0 0 20px 6px #f59e0b, 0 0 45px 12px rgba(245,158,11,0.5);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 35px 12px #fbbf24, 0 0 70px 25px rgba(251,191,36,0.65);
                transform: scale(1.04);
            }
        }
        .joker-glow { animation: jokerGlow 1.1s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, set, remove, get, update, goOffline, goOnline } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = window.FirebaseConfig;

        const app = initializeApp(firebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, onValue, set, remove, get, update, goOffline, goOnline };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
    window.addEventListener('firebaseReady', function() {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;

        var HEARTBEAT_MS = 15000;
        var localStore  = ClientCore.createLocalStore('hitster');
        var clearLocal  = localStore.clear;                          // alias para call-sites existentes
        var CLIENT_ID   = ClientCore.getClientId('hitster_clientId');

        function App() {
            var _s = function(v) { return useState(v); };

            // — conexão —
            var r1 = _s(false);  var connected = r1[0];       var setConnected = r1[1];
            var r2 = _s('');     var sessionCode = r2[0];     var setSessionCode = r2[1];
            var r3 = _s('');     var tableNumber = r3[0];     var setTableNumber = r3[1];
            var r4 = _s('');     var teamName = r4[0];        var setTeamName = r4[1];
            var r5 = _s('');     var emails = r5[0];          var setEmails = r5[1];
            var r6 = _s('');     var connError = r6[0];       var setConnError = r6[1];
            var r7 = _s(false);  var autoRecon = r7[0];       var setAutoRecon = r7[1];
            var r8 = _s(false);  var sessionLost = r8[0];     var setSessionLost = r8[1];

            // — jogo —
            var g1 = _s(null);   var gameData = g1[0];        var setGameData = g1[1];
            var g2 = _s('');     var textInput = g2[0];       var setTextInput = g2[1];
            var g3 = _s(false);  var textSubmitted = g3[0];   var setTextSubmitted = g3[1];
            var g4 = _s(false);  var sending = g4[0];         var setSending = g4[1];
            var g5 = _s(0);      var jokerTimer = g5[0];      var setJokerTimer = g5[1];
            var g6 = _s(0);      var answerTimer = g6[0];     var setAnswerTimer = g6[1];
            var g7 = _s(0);      var resubKey = g7[0];        var setResubKey = g7[1];
            var g8 = _s(true);   var fbConnected = g8[0];     var setFbConnected = g8[1];
            var g9 = _s('');     var submitError = g9[0];     var setSubmitError = g9[1];
            var g10 = _s(false); var showHelp = g10[0];       var setShowHelp = g10[1];
            var g11 = _s('');    var lastSubmitted = g11[0];  var setLastSubmitted = g11[1];

            var timerRef = useRef(null);
            var prevPhaseRef = useRef('waiting');
            var wakeLockRef = useRef(null);
            var localAnswerEndRef = useRef(0);

            // — Conexão à sessão: gameState, clients/<n>, .info/connected, heartbeat,
            //   visibility/focus → resume são todos geridos pelo ClientCore.connectClient.
            //   Listeners game-específicos (textResponses) são feitos à parte abaixo. —
            useEffect(function() {
                if (!connected || !sessionCode || !tableNumber) return;
                var ctrl = ClientCore.connectClient({
                    rtdb: rtdb, fm: fm,
                    sessionCode: sessionCode, tableNumber: tableNumber,
                    heartbeatMs: HEARTBEAT_MS,
                    onGameState: setGameData,
                    onSessionLost: function() {
                        setSessionLost(true); setConnected(false); setGameData(null);
                        clearLocal();
                    },
                    onFbConnectionChange: setFbConnected,
                    // Bump resubKey para que listeners game-específicos voltem a subscrever após resume
                    onResume: function() { setResubKey(function(k) { return k + 1; }); }
                });
                return function() { ctrl.disconnect(); };
            }, [connected, sessionCode, tableNumber]);

            // — wake lock: manter ecrã ligado enquanto conectado —
            useEffect(function() {
                if (!connected) return;
                var acquire = async function() {
                    try {
                        if ('wakeLock' in navigator)
                            wakeLockRef.current = await navigator.wakeLock.request('screen');
                    } catch(e) {}
                };
                acquire();
                var onVisible = function() {
                    if (document.visibilityState === 'visible') acquire();
                };
                document.addEventListener('visibilitychange', onVisible);
                return function() {
                    document.removeEventListener('visibilitychange', onVisible);
                    if (wakeLockRef.current) { wakeLockRef.current.release().catch(function(){}); wakeLockRef.current = null; }
                };
            }, [connected]);

            // — restaurar sessão local —
            useEffect(function() {
                var saved = localStore.load();
                if (saved) {
                    setSessionCode(saved.session);
                    setTableNumber(saved.table);
                    if (saved.team)   setTeamName(saved.team);
                    if (saved.emails) setEmails(saved.emails);
                    setAutoRecon(true);
                } else {
                    var p = new URLSearchParams(window.location.search);
                    var u = p.get('session');
                    if (u) setSessionCode(u.toUpperCase());
                }
            }, []);

            useEffect(function() {
                if (autoRecon && sessionCode && tableNumber) handleConnect(true);
            }, [autoRecon, sessionCode, tableNumber]);

            // — listener game-específico: textResponses/<n>.
            //   Re-subscreve quando resubKey muda (sinalizado pelo onResume do core
            //   após visibility/focus/online), garantindo que mudanças ocorridas
            //   enquanto a tab estava em background são apanhadas. —
            useEffect(function() {
                if (!connected || !sessionCode || !tableNumber) return;
                var unsubTxt = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/textResponses/' + tableNumber), function(snap) {
                    if (!snap.val()) setTextSubmitted(false);
                });
                return function() { unsubTxt(); };
            }, [connected, sessionCode, tableNumber, resubKey]);

            // — timers locais derivados de timestamps absolutos —
            // localAnswerEndRef persiste durante answering→reviewing para que o contador
            // do cliente nunca desapareça antes de chegar a 0, mesmo com desfasamento de relógio
            useEffect(function() {
                var phase = gameData ? (gameData.phase || 'waiting') : 'waiting';
                var jEnd = gameData ? (gameData.jokerTimerEndAt || 0) : 0;
                var aEnd = gameData ? (gameData.answerTimerEndAt || 0) : 0;

                if (phase === 'answering' && aEnd > 0) {
                    localAnswerEndRef.current = aEnd;
                } else if (phase === 'waiting' || phase === 'joker_window') {
                    localAnswerEndRef.current = 0;
                    setAnswerTimer(0);
                }
                // 'reviewing': mantém localAnswerEndRef para o contador terminar naturalmente

                if (timerRef.current) clearInterval(timerRef.current);

                var tick = function() {
                    var now = Date.now();
                    if (phase === 'joker_window' && jEnd > 0) {
                        setJokerTimer(Math.max(0, Math.ceil((jEnd - now) / 1000)));
                    } else if (localAnswerEndRef.current > 0) {
                        var rem = Math.max(0, Math.ceil((localAnswerEndRef.current - now) / 1000));
                        setAnswerTimer(rem);
                        if (rem === 0) localAnswerEndRef.current = 0;
                    }
                };
                tick();
                timerRef.current = setInterval(tick, 250);

                return function() { if (timerRef.current) clearInterval(timerRef.current); };
            }, [
                gameData ? gameData.phase : null,
                gameData ? gameData.jokerTimerEndAt : 0,
                gameData ? gameData.answerTimerEndAt : 0
            ]);

            // — limpar input quando a fase muda —
            useEffect(function() {
                var newPhase = gameData ? (gameData.phase || 'waiting') : 'waiting';
                if (prevPhaseRef.current !== 'answering' && newPhase === 'answering') {
                    // Nova ronda: limpar tudo
                    setTextInput(''); setTextSubmitted(false);
                    setSubmitError(''); setLastSubmitted('');
                }
                if (newPhase === 'waiting') {
                    // Volta ao waiting: esconder comprovativo (nova ronda a caminho)
                    setLastSubmitted('');
                }
                prevPhaseRef.current = newPhase;
            }, [gameData ? gameData.phase : null]);

            // — conexão —
            var handleConnect = async function(isAuto) {
                var code = sessionCode.trim().toUpperCase();
                var table = parseInt(tableNumber);
                if (!code || !table || table < 1) {
                    setConnError('Código e número de mesa são obrigatórios');
                    setAutoRecon(false); return;
                }
                if (!isAuto && !teamName.trim()) {
                    setConnError('O nome da equipa é obrigatório'); return;
                }
                try {
                    var gsSnap = await new Promise(function(r) {
                        fm.onValue(fm.ref(rtdb, 'sessions/' + code + '/gameState'), r, { onlyOnce: true });
                    });
                    var gs = gsSnap.val();
                    if (!gs) { setConnError('Sessão "' + code + '" não encontrada.'); setAutoRecon(false); return; }
                    if (gs.active === false) { setConnError('Sessão "' + code + '" já não está ativa.'); setAutoRecon(false); return; }
                    if (gs.gameType && gs.gameType !== 'hitster') { setConnError('Esta sessão pertence a outro jogo. Usa a aplicação correta.'); setAutoRecon(false); return; }

                    if (gs.tablesLocked && !isAuto) {
                        var exSnap = await new Promise(function(r) {
                            fm.onValue(fm.ref(rtdb, 'sessions/' + code + '/clients/' + table), r, { onlyOnce: true });
                        });
                        if (!exSnap.val()) {
                            setConnError('Novas entradas estão bloqueadas pelo anfitrião.');
                            setAutoRecon(false); return;
                        }
                    }

                    // Verificar se a mesa já está ocupada por outro dispositivo
                    var cSnap = await new Promise(function(r) {
                        fm.onValue(fm.ref(rtdb, 'sessions/' + code + '/clients/' + table), r, { onlyOnce: true });
                    });
                    var existing = cSnap.val();
                    if (existing) {
                        if (existing.clientId && existing.clientId !== CLIENT_ID) {
                            // Mesa pertence a outro dispositivo
                            if (isAuto) {
                                clearLocal();
                                setConnError('Outro dispositivo está agora a usar a Mesa ' + table + '. Inicia sessão de novo.');
                            } else {
                                setConnError('A Mesa ' + table + ' já está conectada noutro dispositivo! Escolhe outro número.');
                            }
                            setAutoRecon(false); return;
                        }
                        if (!isAuto && !existing.clientId) {
                            // Cliente legacy sem clientId — manter o comportamento antigo (bloqueia entrada manual)
                            setConnError('A Mesa ' + table + ' já está conectada! Escolhe outro número.');
                            setAutoRecon(false); return;
                        }
                    }

                    await fm.set(fm.ref(rtdb, 'sessions/' + code + '/clients/' + table), {
                        tableNumber: table,
                        teamName: teamName.trim() || ('Mesa ' + table),
                        emails: emails.trim() ? emails.split(',').map(function(e) { return e.trim(); }) : [],
                        connectedAt: Date.now(),
                        lastSeen: Date.now(),
                        clientId: CLIENT_ID
                    });

                    localStore.save({ session: code, table: table, team: teamName, emails: emails });

                    setConnected(true); setAutoRecon(false); setConnError(''); setSessionLost(false);
                } catch(e) {
                    setConnError('Erro ao conectar. Tenta novamente.');
                    setAutoRecon(false);
                }
            };

            var handleDisconnect = async function() {
                if (!confirm('Sair da sessão?')) return;
                try { await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients/' + tableNumber)); } catch(e) {}
                clearLocal();
                setConnected(false); setGameData(null); setTextInput(''); setTextSubmitted(false);
            };

            var withTimeout = ClientCore.withTimeout;

            var pressJoker = async function() {
                if (!sessionCode || !tableNumber || !gameData) return;
                var tableId = parseInt(tableNumber);
                var jokerOrder = gameData.jokerOrder || [];
                if (jokerOrder.indexOf(tableId) >= 0) return;
                if (gameData.phase !== 'joker_window') return;
                if (gameData.currentCategory && gameData.currentCategory.isTimeline) return;
                // Tenta 2x antes de desistir — protege contra falhas momentâneas de rede
                for (var attempt = 0; attempt < 2; attempt++) {
                    try {
                        await withTimeout(fm.set(fm.ref(rtdb, 'sessions/' + sessionCode + '/histerJokers/' + tableNumber), {
                            activated: true, timestamp: Date.now(), clientId: CLIENT_ID
                        }), 5000);
                        return;
                    } catch(e) {
                        if (attempt === 1) console.error('Joker falhou após retry:', e);
                    }
                }
            };

            var submitText = async function() {
                if (!textInput.trim() || sending || answerTimer <= 0) return;
                setSending(true);
                setSubmitError('');
                var payload = { text: textInput.trim(), timestamp: Date.now(), clientId: CLIENT_ID };
                var path = 'sessions/' + sessionCode + '/textResponses/' + tableNumber;
                // Tenta até 3x com timeout — assegura que a resposta chega ao servidor
                // ou que o utilizador é claramente avisado da falha.
                var lastErr = null;
                for (var attempt = 0; attempt < 3; attempt++) {
                    try {
                        await withTimeout(fm.set(fm.ref(rtdb, path), payload), 6000);
                        // Verify-after-write: confirma que o servidor tem a resposta
                        var snap = await withTimeout(fm.get(fm.ref(rtdb, path)), 5000);
                        var v = snap.val();
                        if (v && v.clientId === CLIENT_ID && v.text === payload.text) {
                            setTextSubmitted(true);
                            setLastSubmitted(payload.text);
                            setSubmitError('');
                            setTimeout(function() { setSending(false); }, 500);
                            return;
                        }
                        lastErr = new Error('verify_mismatch');
                    } catch(e) {
                        lastErr = e;
                    }
                    // pequeno backoff antes de retentar
                    await new Promise(function(r) { setTimeout(r, 400); });
                }
                console.error('Submit falhou:', lastErr);
                setSubmitError('Falha ao enviar. Verifica a ligação e tenta novamente.');
                setSending(false);
                setTextSubmitted(false);
            };

            // — dados derivados —
            var tableId = parseInt(tableNumber || '0');
            var phase = gameData ? (gameData.phase || 'waiting') : 'waiting';
            var cat = gameData ? gameData.currentCategory : null;
            var jokerOrder = gameData ? (gameData.jokerOrder || []) : [];
            var myJokerUsed = jokerOrder.indexOf(tableId) >= 0;
            var singingId = gameData ? (gameData.singingTeamId || null) : null;
            var isSinging = singingId === tableId;
            var allTables = gameData ? (gameData.tables || []) : [];
            var myTable = allTables.find(function(t) { return t.id === tableId; });
            var myScore = myTable ? myTable.score : 0;
            var selLogos = gameData ? (gameData.selectedLogos || []) : [];
            var mainLogo = selLogos.length > 0 ? selLogos[0] : null;
            var secLogos = selLogos.slice(1);

            var allJokersUsed = gameData ? (gameData.allJokersUsed || false) : false;
            var jokerWindowOpen = phase === 'joker_window';
            var isTimeline = cat && cat.isTimeline;
            // Joker desativado: se janela fechada, joker já usado, timeline, OU equipa canta
            var jokerEnabled = jokerWindowOpen && !myJokerUsed && !isTimeline && !isSinging;
            var showInput = !isSinging && answerTimer > 0;
            var showCat = cat && (phase === 'joker_window' || phase === 'answering' || phase === 'reviewing');

            // — sessão perdida —
            if (sessionLost) {
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-violet-900 via-purple-900 to-indigo-900 flex items-center justify-center p-4' },
                    h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center' },
                        h('div', { className: 'text-5xl mb-4' }, '🎵'),
                        h('h2', { className: 'text-xl font-bold text-gray-800 mb-2' }, 'Sessão Terminada'),
                        h('p', { className: 'text-gray-600 mb-4' }, 'A sessão foi terminada pelo anfitrião.'),
                        h('button', {
                            onClick: function() { setSessionLost(false); setSessionCode(''); setTableNumber(''); },
                            className: 'w-full py-3 bg-violet-600 hover:bg-violet-700 text-white rounded-xl font-bold'
                        }, 'Voltar ao Início')
                    )
                );
            }

            // — a reconectar —
            if (autoRecon) {
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-violet-900 via-purple-900 to-indigo-900 flex items-center justify-center' },
                    h('div', { className: 'text-center text-white' },
                        h('div', { className: 'text-5xl mb-4 animate-spin' }, '🎵'),
                        h('div', { className: 'text-xl font-semibold' }, 'A reconectar...')
                    )
                );
            }

            // — login —
            if (!connected) {
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-violet-900 via-purple-900 to-indigo-900 p-4 flex items-center justify-center' },
                    h('div', { className: 'w-full max-w-sm' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6' },
                            h('div', { className: 'text-center mb-6' },
                                h('div', { className: 'text-5xl mb-2' }, '🎵'),
                                h('h1', { className: 'text-2xl font-black text-violet-800' }, 'Mega Hitster')
                            ),
                            connError && h('div', { className: 'bg-red-100 border border-red-400 text-red-700 px-3 py-2 rounded-lg mb-4 text-sm font-semibold' }, connError),
                            h('div', { className: 'space-y-4' },
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold mb-1' }, 'Código da Sessão'),
                                    h('input', {
                                        type: 'text', value: sessionCode,
                                        onChange: function(e) { setSessionCode(e.target.value.toUpperCase()); },
                                        placeholder: 'ABC123',
                                        className: 'w-full px-4 py-3 border-2 rounded-xl text-center font-mono text-xl uppercase focus:border-violet-500 outline-none'
                                    })
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold mb-1' }, 'Número da Mesa'),
                                    h('input', {
                                        type: 'number', min: 1,
                                        value: tableNumber,
                                        onChange: function(e) { setTableNumber(e.target.value); },
                                        placeholder: 'Ex: 1',
                                        className: 'w-full px-4 py-3 border-2 rounded-xl text-center text-xl focus:border-violet-500 outline-none'
                                    })
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold mb-1' }, 'Nome da Equipa *'),
                                    h('input', {
                                        type: 'text', value: teamName,
                                        onChange: function(e) { setTeamName(e.target.value); },
                                        placeholder: 'Nome da vossa equipa',
                                        className: 'w-full px-4 py-2 border-2 rounded-xl focus:border-violet-500 outline-none'
                                    })
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold mb-1' }, 'Email(s) *'),
                                    h('input', {
                                        type: 'text', value: emails,
                                        onChange: function(e) { setEmails(e.target.value); },
                                        placeholder: 'email1@ex.com, email2@ex.com',
                                        className: 'w-full px-4 py-2 border-2 rounded-xl focus:border-violet-500 outline-none text-sm'
                                    })
                                ),
                                h('button', {
                                    onClick: function() { handleConnect(false); },
                                    className: 'w-full py-4 bg-violet-600 hover:bg-violet-700 text-white rounded-xl font-bold text-lg shadow-lg active:scale-95 transition-transform'
                                }, '🎵 Entrar')
                            )
                        )
                    )
                );
            }

            // — jogo —
            return h('div', { className: 'h-screen bg-gradient-to-br from-violet-900 via-purple-900 to-indigo-900 flex flex-col overflow-hidden' },

                // banner offline
                !fbConnected && h('div', {
                    className: 'absolute top-0 inset-x-0 bg-red-600 text-white text-xs text-center py-1 z-50 font-bold animate-pulse'
                }, '⚠️ Sem ligação — a tentar reconectar...'),

                // header
                h('div', { className: 'relative z-10 bg-white bg-opacity-10 backdrop-blur-sm px-4 py-2 flex items-center justify-between flex-shrink-0' },
                    h('div', { className: 'text-white' },
                        h('div', { className: 'text-xs opacity-70' }, 'Mesa ' + tableNumber),
                        h('div', { className: 'font-bold text-sm leading-tight truncate max-w-32' }, teamName || ('Mesa ' + tableNumber))
                    ),
                    mainLogo
                        ? h('img', { src: mainLogo, alt: 'logo', className: 'h-8 object-contain', onError: function(e) { e.target.style.display = 'none'; } })
                        : h('div', { className: 'text-2xl' }, '🎵'),
                    h('div', { className: 'flex items-center gap-2' },
                        h('button', {
                            onClick: function() { setShowHelp(true); },
                            style: { boxShadow: '0 0 7px 2px rgba(255,255,255,0.22), 0 0 0 1.5px rgba(255,255,255,0.18)' },
                            className: 'w-8 h-8 flex items-center justify-center bg-white bg-opacity-20 hover:bg-opacity-30 text-white rounded-full text-sm font-black transition-all active:scale-95'
                        }, '?'),
                        h('div', { className: 'text-xs text-white opacity-60 font-mono' }, sessionCode),
                        h('button', {
                            onClick: handleDisconnect,
                            className: 'w-7 h-7 flex items-center justify-center bg-red-600 hover:bg-red-500 text-white rounded text-sm font-bold transition-all active:scale-95'
                        }, '✕')
                    )
                ),

                // pontuação — sempre visível para o cliente (ocultar pontos só aplica no master)
                h('div', { className: 'relative z-10 mx-4 mt-3 bg-white bg-opacity-15 rounded-2xl p-3 text-center flex-shrink-0' },
                    h('div', { className: 'text-5xl font-black text-white' }, myScore),
                    h('div', { className: 'text-xs text-white opacity-70 mt-0.5' }, 'pontos')
                ),

                // área principal
                h('div', { className: 'relative z-10 flex-1 flex flex-col items-center justify-center gap-4 p-4 overflow-hidden' },

                    // categoria
                    showCat && h('div', { className: 'bg-yellow-400 text-yellow-900 rounded-2xl px-5 py-4 w-full max-w-sm text-center shadow-xl' },
                        h('div', { className: 'text-xl font-black mb-1' }, cat.name),
                        h('div', { className: 'text-sm font-semibold opacity-75' }, cat.description),
                        h('div', { className: 'mt-2 inline-block bg-yellow-300 bg-opacity-70 rounded-lg px-3 py-0.5' },
                            h('span', { className: 'font-black' }, cat.points + (cat.points === 1 ? ' ponto' : ' pontos'))
                        )
                    ),

                    // timer joker
                    phase === 'joker_window' &&
                        h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-3xl font-bold animate-pulse' }, '⏱️ ' + jokerTimer + 's'),
                            h('div', { className: 'text-sm opacity-75' }, allJokersUsed ? 'A preparar a música...' : 'Tempo para usar o Joker')
                        ),

                    // timer resposta
                    phase === 'answering' && !isSinging &&
                        h('div', { className: 'text-center' },
                            h('div', {
                                className: 'text-3xl font-bold ' + (answerTimer <= 5 ? 'text-red-300 animate-pulse' : 'text-white')
                            }, answerTimer <= 0 ? '⏱️ Tempo esgotado' : ('⏱️ ' + answerTimer + 's'))
                        ),

                    // aguardar
                    phase === 'waiting' &&
                        h('div', { className: 'text-center text-white opacity-75' },
                            h('div', { className: 'text-5xl mb-3' }, '🎵'),
                            h('div', { className: 'text-lg font-semibold' }, 'A aguardar ronda...')
                        ),

                    // revisão
                    phase === 'reviewing' &&
                        h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-5xl mb-3' }, '✅'),
                            h('div', { className: 'text-lg font-semibold' }, 'Respostas em revisão...'),
                            h('div', { className: 'text-sm opacity-70 mt-1' }, 'O anfitrião está a validar')
                        ),

                    // equipa canta
                    isSinging && (phase === 'joker_window' || phase === 'answering') &&
                        h('div', { className: 'bg-purple-500 bg-opacity-80 rounded-2xl p-5 w-full max-w-sm text-center text-white shadow-xl' },
                            h('div', { className: 'text-4xl mb-2' }, '🎤'),
                            h('div', { className: 'font-black text-xl' }, 'A vossa equipa canta!'),
                            h('div', { className: 'text-sm opacity-80 mt-1' }, 'Não precisam de responder')
                        ),

                    // campo de resposta
                    showInput &&
                        h('div', { className: 'w-full max-w-sm' },
                            h('div', { className: 'bg-white rounded-2xl shadow-xl p-4' },
                                h('textarea', {
                                    value: textInput,
                                    onChange: function(e) {
                                        setTextInput(e.target.value);
                                        if (textSubmitted) setTextSubmitted(false);
                                        if (submitError) setSubmitError('');
                                    },
                                    maxLength: 200,
                                    placeholder: 'Escreve a tua resposta...',
                                    autoFocus: true,
                                    className: 'w-full h-24 px-3 py-2 text-base border-2 border-violet-400 focus:border-violet-600 rounded-lg resize-none focus:outline-none'
                                }),
                                submitError && h('div', { className: 'mt-2 px-3 py-2 bg-red-100 border border-red-400 text-red-700 text-xs rounded-lg font-semibold flex items-center gap-2' },
                                    h('span', null, '⚠️'),
                                    h('span', { className: 'flex-1' }, submitError)
                                ),
                                h('div', { className: 'flex justify-between items-center mt-2' },
                                    h('span', { className: 'text-xs text-gray-400' }, textInput.length + '/200'),
                                    h('button', {
                                        onClick: submitText,
                                        disabled: !textInput.trim() || sending,
                                        className: 'px-6 py-2 rounded-lg font-bold text-white text-sm transition-all active:scale-95 ' + (
                                            sending ? 'bg-yellow-500 cursor-wait' :
                                            textSubmitted ? 'bg-green-500' :
                                            submitError ? 'bg-red-600 hover:bg-red-700 shadow-md' :
                                            !textInput.trim() ? 'bg-gray-400 cursor-not-allowed' :
                                            'bg-green-600 hover:bg-green-700 shadow-md'
                                        )
                                    }, sending ? '⏳ A enviar...' : (textSubmitted ? '✓ Enviado' : (submitError ? '🔄 Tentar de novo' : '📤 Enviar')))
                                )
                            )
                        ),

                    // comprovativo — resposta confirmada visível quando o input desapareceu
                    // (tempo esgotado ou fase reviewing). Persiste até nova ronda.
                    !showInput && lastSubmitted && (phase === 'answering' || phase === 'reviewing') &&
                        h('div', { className: 'w-full max-w-sm' },
                            h('div', { className: 'bg-white bg-opacity-15 border border-white border-opacity-25 rounded-2xl p-4 backdrop-blur-sm' },
                                h('div', { className: 'flex items-center gap-2 mb-2' },
                                    h('span', { className: 'text-green-300 text-sm font-black' }, '✓ Resposta enviada'),
                                    h('span', { className: 'text-white opacity-40 text-xs' }, '(visível só para ti)')
                                ),
                                h('div', { className: 'text-white font-semibold text-base leading-snug' }, lastSubmitted)
                            )
                        ),

                    // botão joker — indicador "já usado" durante janela, desaparece fora da janela
                    (jokerWindowOpen && myJokerUsed)
                        ? h('div', { className: 'w-36 h-36 rounded-full flex flex-col items-center justify-center gap-1 bg-gray-700 bg-opacity-60 border-2 border-gray-600 select-none' },
                            h('div', { className: 'text-4xl opacity-40' }, '🃏'),
                            h('div', { className: 'text-xs font-black tracking-wider text-gray-400' }, 'JOKER'),
                            h('div', { className: 'text-xs text-gray-500 font-semibold' }, 'já usado')
                          )
                        : (!myJokerUsed && h('button', {
                            onClick: jokerEnabled ? pressJoker : undefined,
                            disabled: !jokerEnabled,
                            className: 'relative w-36 h-36 rounded-full font-black text-lg shadow-2xl transition-all transform select-none ' + (
                                jokerEnabled
                                    ? 'bg-yellow-500 text-yellow-900 joker-glow hover:scale-105 active:scale-95 cursor-pointer'
                                    : 'bg-gray-600 text-gray-400 cursor-not-allowed opacity-40'
                            )
                        },
                            h('div', { className: 'flex flex-col items-center gap-1' },
                                h('div', { className: 'text-4xl' }, '🃏'),
                                h('div', { className: 'text-sm font-black tracking-wider' }, jokerEnabled ? 'JOKER!' : 'JOKER')
                            )
                        ))
                ),

                // modal de ajuda
                showHelp && h('div', {
                    className: 'absolute inset-0 bg-black bg-opacity-80 z-50 flex items-end justify-center',
                    onClick: function(e) { if (e.target === e.currentTarget) setShowHelp(false); }
                },
                    h('div', { className: 'bg-slate-900 rounded-t-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-5 pb-8' },
                        // header do modal
                        h('div', { className: 'flex items-center justify-between mb-4' },
                            h('div', { className: 'flex items-center gap-2' },
                                h('span', { className: 'text-2xl' }, '🎵'),
                                h('span', { className: 'font-black text-white text-lg' }, 'Como Jogar')
                            ),
                            h('button', {
                                onClick: function() { setShowHelp(false); },
                                className: 'w-8 h-8 flex items-center justify-center rounded-full bg-white bg-opacity-10 text-white font-bold hover:bg-opacity-20'
                            }, '✕')
                        ),

                        // regras + pontuações
                        (function() {
                            var DEFAULT_RULES = [
                                { id: 'phases',  title: 'Fases de cada Ronda', content: '🃏 Janela do Joker — tens uns segundos para decidir se usas o joker\n✍️ A Responder — escreve e envia a tua resposta antes do tempo acabar\n✅ Em Revisão — o anfitrião valida as respostas e atribui pontos' },
                                { id: 'joker',   title: '🃏 O Joker',           content: 'Duplica os pontos que ganhas nessa ronda\nCada equipa só tem um joker para todo o jogo\nNão pode ser usado em Timeline Duel\nA equipa cantora não pode usar joker' },
                                { id: 'cantora', title: '🎤 A Cantora',          content: 'A equipa em último lugar canta a próxima música\nNão precisa de responder\nGanha pontos por cada equipa que acerte (máximo 3)' }
                            ];
                            var rc = gameData && Array.isArray(gameData.rulesConfig) && gameData.rulesConfig.length > 0
                                ? gameData.rulesConfig : DEFAULT_RULES;
                            var cats = gameData && Array.isArray(gameData.categories) && gameData.categories.length > 0
                                ? gameData.categories : window.HitsterGame.DEFAULT_CATEGORIES;

                            var ruleBlocks = rc.map(function(block, idx) {
                                var lines = (block.content || '').split('\n').filter(function(l) { return l.trim(); });
                                return h('div', { key: block.id || idx, className: 'bg-white bg-opacity-5 rounded-2xl p-4 mb-3' },
                                    h('div', { className: 'text-xs font-black uppercase tracking-widest text-violet-400 mb-2' }, block.title),
                                    h('div', { className: 'space-y-1.5 text-sm text-slate-300' },
                                        lines.map(function(line, i) {
                                            return h('div', { key: i }, '• ' + line.trim());
                                        })
                                    )
                                );
                            });

                            var scoresBlock = h('div', { key: 'scores', className: 'bg-white bg-opacity-5 rounded-2xl p-4' },
                                h('div', { className: 'text-xs font-black uppercase tracking-widest text-slate-400 mb-3' }, '🏆 Pontuações'),
                                h('div', { className: 'space-y-2' },
                                    cats.map(function(cat) {
                                        return h('div', { key: cat.id, className: 'flex items-center justify-between gap-3' },
                                            h('div', { className: 'flex-1 min-w-0' },
                                                h('div', { className: 'text-white text-sm font-bold' }, cat.name),
                                                cat.description && h('div', { className: 'text-slate-400 text-xs' }, cat.description)
                                            ),
                                            h('div', { className: 'flex-shrink-0 bg-violet-600 text-white text-xs font-black px-2.5 py-1 rounded-full' },
                                                cat.points + (cat.points === 1 ? ' pt' : ' pts')
                                            )
                                        );
                                    })
                                )
                            );

                            return ruleBlocks.concat([scoresBlock]);
                        })()
                    )
                ),

                // barra de logos secundários
                secLogos.length > 0 && h('div', { className: 'flex-shrink-0 bg-black bg-opacity-20 px-4 py-1.5 flex items-center justify-center gap-4 overflow-hidden' },
                    secLogos.map(function(logo, idx) {
                        return h('img', {
                            key: idx, src: logo, alt: '',
                            className: 'h-6 object-contain opacity-75 flex-shrink-0',
                            onError: function(e) { e.target.style.display = 'none'; }
                        });
                    })
                )
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
