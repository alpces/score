                                            className: 'text-xs px-3 py-1 rounded-lg font-bold transition-colors ' + (scoringSaved ? 'bg-green-100 text-green-700' : 'bg-teal-600 text-white hover:bg-teal-700')
                                        }, scoringSaved ? T('m_j_scoring_saved') : T('m_j_scoring_save'))
                                    )
                                ),
                                h('div', { className: 'overflow-x-auto' },
                                    h('table', { className: 'w-full text-xs text-center border-collapse' },
                                        h('thead', null,
                                            h('tr', { className: 'text-gray-500' },
                                                h('th', { className: 'py-1 text-left' }, ''),
                                                h('th', { className: 'py-1 px-1' }, T('m_j_scoring_col_guesser')),
                                                h('th', { className: 'py-1 px-1' }, T('m_j_scoring_col_cluegiver')),
                                                h('th', { className: 'py-1 px-1' }, T('m_j_scoring_col_penalty'))
                                            )
                                        ),
                                        h('tbody', null,
                                            ['easy', 'medium', 'hard'].map(function(tier) {
                                                return h('tr', { key: tier },
                                                    h('td', { className: 'py-1 text-left font-bold text-gray-700' }, T('m_j_difficulty_' + tier)),
                                                    ['guesser', 'clueGiver', 'penalty'].map(function(field) {
                                                        return h('td', { key: field, className: 'py-1 px-1' },
                                                            h('input', {
                                                                type: 'number', min: 0, step: 1,
                                                                value: scoringConfig[tier][field],
                                                                onChange: function(e) { updateScoringField(tier, field, e.target.value); },
                                                                className: 'w-14 px-1 py-1 border border-gray-300 rounded text-center font-bold focus:border-teal-500 outline-none'
                                                            })
                                                        );
                                                    })
                                                );
                                            })
                                        )
                                    )
                                ),
                                h('p', { className: 'text-xs text-gray-400 mt-1' }, T('m_j_scoring_penalty_note'))
                            ),

                            /* —— PONTUAÇÃO MELHOR PISTA (só no modo best_clue) —— */
                            scoringMode === 'best_clue' && h('div', null,
                                h('div', { className: 'flex items-center justify-between mb-2' },
                                    h('label', { className: 'block text-sm font-bold text-gray-700' }, T('m_j_best_clue_config_title')),
                                    h('div', { className: 'flex items-center gap-2' },
                                        h('button', {
                                            onClick: resetBestClueConfig,
                                            className: 'text-xs text-pink-600 hover:text-pink-800 font-semibold'
                                        }, T('m_j_scoring_reset')),
                                        h('button', {
                                            onClick: saveBestClueConfigHandler,
                                            className: 'text-xs px-3 py-1 rounded-lg font-bold transition-colors ' + (bestClueSaved ? 'bg-green-100 text-green-700' : 'bg-pink-600 text-white hover:bg-pink-700')
                                        }, bestClueSaved ? T('m_j_scoring_saved') : T('m_j_scoring_save'))
                                    )
                                ),
                                h('div', { className: 'space-y-1' },
                                    [['guesser', 'm_j_best_clue_guesser'], ['bestClue', 'm_j_best_clue_best'], ['otherClue', 'm_j_best_clue_other'], ['penalty', 'm_j_best_clue_penalty']].map(function(pair) {
                                        var field = pair[0], key = pair[1];
                                        return h('div', { key: field, className: 'flex items-center justify-between' },
                                            h('span', { className: 'text-sm text-gray-700' }, T(key)),
                                            h('input', {
                                                type: 'number', min: 0, step: 1,
                                                value: bestClueConfig[field],
                                                onChange: function(e) { updateBestClueField(field, e.target.value); },
                                                className: 'w-16 px-2 py-1 border border-gray-300 rounded text-center font-bold focus:border-pink-500 outline-none'
                                            })
                                        );
                                    })
                                )
                            ),

                            /* —— TIMER DE PISTAS —— */
                            h('div', null,
                                h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, T('m_j_timer_label')),
                                h('div', { className: 'flex items-center gap-2' },
                                    h('input', {
                                        type: 'number', min: 0, step: 5,
                                        value: timerSeconds,
                                        onChange: function(e) { setTimerSeconds(Math.max(0, parseInt(e.target.value) || 0)); },
                                        className: 'w-24 px-3 py-2 border-2 border-gray-300 rounded-lg text-center font-bold focus:border-teal-500 outline-none'
                                    }),
                                    h('span', { className: 'text-xs text-gray-500' }, timerSeconds === 0 ? T('m_j_timer_off') : 's'),
                                    h('button', {
                                        onClick: resetTimerSeconds,
                                        className: 'text-xs text-teal-600 hover:text-teal-800 font-semibold ml-auto'
                                    }, T('m_j_timer_reset')),
                                    h('button', {
                                        onClick: saveTimerSecondsHandler,
                                        className: 'text-xs px-3 py-1 rounded-lg font-bold transition-colors ' + (timerSaved ? 'bg-green-100 text-green-700' : 'bg-teal-600 text-white hover:bg-teal-700')
                                    }, timerSaved ? T('m_j_timer_saved') : T('m_j_timer_save'))
                                ),
                                h('p', { className: 'text-xs text-gray-400 mt-1' }, T('m_j_timer_hint'))
                            ),

                            availableLogos.length > 0 && h('div', null,
                                h('label', { className: 'block text-sm font-bold text-gray-700 mb-2' }, T('m_logos')),
                                h('div', { className: 'bg-gray-800 p-3 rounded-xl flex gap-3 flex-wrap' },
                                    availableLogos.map(function(logo) {
                                        var sel = selectedLogos.indexOf(logo) >= 0;
                                        return h('div', {
                                            key: logo,
                                            onClick: function() {
                                                setSelectedLogos(function(prev) {
                                                    return sel ? prev.filter(function(l) { return l !== logo; }) : prev.concat([logo]);
                                                });
                                            },
                                            className: 'cursor-pointer rounded-xl border-2 p-1.5 bg-gray-700 transition-all ' + (sel ? 'border-teal-400 ring-2 ring-teal-400' : 'border-gray-600 hover:border-gray-400')
                                        },
                                            h('img', { src: logo, alt: logo, className: 'h-10 w-16 object-contain', onError: function(e) { e.target.parentElement.style.display='none'; } })
                                        );
                                    })
                                )
                            ),
                            h('button', {
                                onClick: initSession,
                                className: 'w-full py-4 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-black text-xl shadow-lg active:scale-95 transition-transform'
                            }, T('m_j_start_session'))
                        ),
                        h('div', { className: 'mt-4 text-center' },
                            h('button', {
                                onClick: function() { setShowHistory(true); },
                                className: 'text-teal-300 hover:text-white text-sm font-semibold'
                            }, T('m_view_history'))
                        )
                    ),
                    showExistDialog && existingData && h('div', { className: 'fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full' },
                            h('div', { className: 'text-3xl text-center mb-3' }, '⚠️'),
                            h('h3', { className: 'text-lg font-black text-gray-800 text-center mb-2' }, T('m_active_session_found')),
                            h('p', { className: 'text-gray-600 text-sm text-center mb-5' },
                                T('m_j_session_active_msg', { code: existingData.code, n: existingData.data.tables ? existingData.data.tables.length : 0 })
                            ),
                            h('div', { className: 'space-y-3' },
                                h('button', { onClick: function() { handleExistingChoice('resume'); }, className: 'w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold' }, T('m_resume_session')),
                                h('button', { onClick: function() { handleExistingChoice('new'); }, className: 'w-full py-3 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-bold' }, T('m_archive_create_new')),
                                h('button', { onClick: function() { setShowExistDialog(false); }, className: 'w-full py-3 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-xl font-bold' }, T('m_cancel'))
                            )
                        )
                    )
                );
            }

            /* —— ESCOLHA DE MODO —— */
            if (setupDone && !modeChosen) {
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-teal-900 via-cyan-900 to-slate-900 flex items-center justify-center p-4' },
                    h('div', { className: 'max-w-md w-full text-center' },
                        h('div', { className: 'text-5xl mb-2' }, '🤫'),
                        h('h1', { className: 'text-3xl font-black text-white mb-1' }, 'Mega Just One'),
                        h('p', { className: 'text-teal-300 mb-8 font-mono text-lg' }, sessionId),
                        h('div', { className: 'space-y-4' },
                            h('button', {
                                onClick: function() { chooseMode('console'); },
                                className: 'w-full bg-white rounded-2xl p-5 text-left shadow-xl hover:scale-[1.02] transition-transform active:scale-95'
                            },
                                h('div', { className: 'text-3xl mb-1' }, '🎮'),
                                h('div', { className: 'font-black text-lg text-gray-800' }, T('m_j_mode_console_label')),
                                h('div', { className: 'text-sm text-gray-500 mt-1' }, T('m_j_mode_console_hint'))
                            ),
                            h('button', {
                                onClick: function() { chooseMode('public'); },
                                className: 'w-full bg-white rounded-2xl p-5 text-left shadow-xl hover:scale-[1.02] transition-transform active:scale-95'
                            },
                                h('div', { className: 'text-3xl mb-1' }, '📺'),
                                h('div', { className: 'font-black text-lg text-gray-800' }, T('m_j_mode_public_label')),
                                h('div', { className: 'text-sm text-gray-500 mt-1' }, T('m_j_mode_public_hint'))
                            )
                        )
                    )
                );
            }

            /* —— RENDER: MODO PÚBLICO —— */
            if (masterMode === 'public') {
                if (!publicState) {
                    return h('div', { className: 'min-h-screen bg-slate-900 flex flex-col items-center justify-center text-white p-4 text-center' },
                        h('div', { className: 'text-5xl mb-4' }, '🤫'),
                        h('div', { className: 'text-xl font-bold' }, T('m_j_public_waiting_data')),
                        h('div', { className: 'font-mono text-teal-400 mt-2 text-lg' }, sessionId),
                        h('button', { onClick: switchMode, className: 'mt-8 text-teal-300 hover:text-white text-sm font-semibold' }, T('m_j_mode_switch'))
                    );
                }

                var ps = publicState;
                /* mesas conhecidas por publicState + qualquer mesa já em sessions/{id}/clients
                   ainda não refletida no último publicState (entrada ao vivo, sem refresh) */
                var psTables = (ps.tables || []).slice();
                var psKnownIds = {};
                psTables.forEach(function(t) { psKnownIds[t.id] = true; });
                Object.values(publicClients).forEach(function(c) {
                    var tid = c && c.tableNumber;
                    if (tid && !psKnownIds[tid]) {
                        psTables.push({ id: tid, name: c.teamName || null, score: 0 });
                        psKnownIds[tid] = true;
                    }
                });
                var psGuesser = psTables.find(function(t) { return t.id === ps.guesserTableId; });
                var psSorted = psTables.slice().sort(function(a, b) { return b.score - a.score; });
                var psShowScores = !!ps.publicShowScores;
                /* placar passou a modal — o corpo principal usa sempre tamanhos grandes */
                var psBodyWidth = 'max-w-4xl';
                var psVisibleCount = Object.keys(ps.visibleClues || {}).length;
                var psClueTextSize = psVisibleCount <= 3 ? 'text-6xl' : psVisibleCount <= 6 ? 'text-4xl' : psVisibleCount <= 10 ? 'text-3xl' : 'text-2xl';
                var psRevealClueTextSize = psVisibleCount <= 4 ? 'text-3xl' : psVisibleCount <= 8 ? 'text-2xl' : 'text-xl';
                var psRevealWordTextSize = 'text-6xl';

                var psPhaseLabel = {
                    'waiting':              T('m_j_phase_waiting'),
                    'choosing_difficulty':  T('m_j_phase_choosing_difficulty'),
                    'clue_giving':          T('m_j_phase_clue_giving'),
                    'reviewing':            T('m_j_phase_reviewing'),
                    'guessing':             T('m_j_phase_guessing'),
                    'best_clue_selection':  T('m_j_phase_best_clue_selection'),
                    'reveal':               T('m_j_phase_reveal')
                }[ps.phase] || ps.phase;

                var psPhaseColor = {
                    'waiting':              'bg-slate-700 text-slate-300',
                    'choosing_difficulty':  'bg-amber-500 text-amber-900',
                    'clue_giving':          'bg-blue-600 text-white',
                    'reviewing':            'bg-purple-600 text-white',
                    'guessing':             'bg-teal-600 text-white',
                    'best_clue_selection':  'bg-pink-600 text-white',
                    'reveal':               'bg-green-600 text-white'
                }[ps.phase] || 'bg-slate-700 text-slate-300';

                var psTimerRemaining = ps.clueDeadline ? Math.max(0, Math.ceil((ps.clueDeadline - nowTick) / 1000)) : null;

                var psDifficultyBadge = ps.secretWordDifficulty && h('span', {
                    className: 'inline-block px-3 py-1 rounded-full text-sm font-bold ' + (DIFFICULTY_BADGE_COLORS[ps.secretWordDifficulty] || '')
                }, T('m_j_difficulty_badge', { name: T('m_j_difficulty_' + ps.secretWordDifficulty) }));

                var psBody = null;
                if (ps.phase === 'waiting') {
                    psBody = h('div', { className: 'text-teal-300 text-lg font-bold' }, T('m_j_phase_waiting'));
                } else if (ps.phase === 'choosing_difficulty') {
                    psBody = h('div', { className: 'text-center' },
                        h('div', { className: 'text-2xl font-black' }, T('m_j_pub_choosing_difficulty', { name: teamLabel(psGuesser) }))
                    );
                } else if (ps.phase === 'clue_giving') {
                    psBody = h('div', { className: 'text-center space-y-3' },
                        psDifficultyBadge,
                        h('div', { className: 'text-2xl font-black' }, T('m_j_pub_collecting_clues')),
                        h('div', { className: 'text-lg text-teal-300 font-bold' }, ps.cluesSubmitted + ' / ' + ps.cluesTotal),
                        psTimerRemaining !== null && h('div', { className: 'text-5xl font-black ' + (psTimerRemaining <= 5 ? 'text-red-400' : 'text-white') }, psTimerRemaining + 's')
                    );
                } else if (ps.phase === 'reviewing') {
                    psBody = h('div', { className: 'text-center space-y-3' },
                        psDifficultyBadge,
                        h('div', { className: 'text-2xl font-black' }, T('m_j_pub_validating'))
                    );
                } else if (ps.phase === 'guessing') {
                    var psVisibleClues = ps.visibleClues || {};
                    psBody = h('div', { className: 'text-center space-y-3 ' + psBodyWidth },
                        psDifficultyBadge,
                        ps.revealedWord && h('div', { className: 'inline-block bg-amber-500 text-amber-950 font-black text-2xl px-6 py-2 rounded-2xl' }, capitalize(ps.revealedWord)),
                        h('div', { className: 'flex flex-wrap gap-3 justify-center' },
                            Object.keys(psVisibleClues).slice().sort(function(a, b) {
                                var ta = psVisibleClues[a].text.toLowerCase();
                                var tb = psVisibleClues[b].text.toLowerCase();
                                return ta < tb ? -1 : ta > tb ? 1 : 0;
                            }).map(function(tid) {
                                return h('div', { key: tid, className: 'bg-slate-800 border border-teal-700 rounded-xl px-4 py-2 font-black ' + psClueTextSize }, capitalize(psVisibleClues[tid].text));
                            })
                        ),
                        h('div', { className: 'text-sm text-slate-400' }, T('m_j_annulled_count', { n: ps.annulledClueCount || 0 }))
                    );
                } else if (ps.phase === 'best_clue_selection') {
                    var psBcsClues = ps.visibleClues || {};
                    var psBcsSorted = Object.keys(psBcsClues).slice().sort(function(a, b) {
                        var ta = psBcsClues[a].text.toLowerCase();
                        var tb = psBcsClues[b].text.toLowerCase();
                        return ta < tb ? -1 : ta > tb ? 1 : 0;
                    });
                    psBody = h('div', { className: 'text-center space-y-4 ' + psBodyWidth },
                        h('div', { className: 'text-2xl font-black text-pink-300' }, T('m_j_phase_best_clue_selection')),
                        ps.revealedWord && h('div', { className: 'inline-block bg-amber-500 text-amber-950 font-black text-2xl px-6 py-2 rounded-2xl' }, capitalize(ps.revealedWord)),
                        psGuesser && h('div', { className: 'text-lg text-slate-300' }, T('m_j_pub_choosing_difficulty', { name: teamLabel(psGuesser) })),
                        psBcsSorted.length > 0 && h('div', { className: 'flex flex-wrap gap-3 justify-center mt-2' },
                            psBcsSorted.map(function(tid) {
                                var c = psBcsClues[tid];
                                return h('div', { key: tid,
                                    className: 'rounded-xl px-4 py-2 font-bold ' + psClueTextSize + ' ' + (c.status === 'valid' ? 'bg-teal-700 text-white' : 'bg-slate-700 text-slate-400 line-through opacity-60')
                                }, capitalize(c.text));
                            })
                        )
                    );
                } else if (ps.phase === 'reveal') {
                    var psVisibleAll = ps.visibleClues || {};
                    var psResultBadge = {
                        correct:   { emoji: '✅', cls: 'bg-green-600' },
                        incorrect: { emoji: '❌', cls: 'bg-red-600' },
                        passed:    { emoji: '⏭️', cls: 'bg-slate-600' }
                    }[ps.guessResult] || null;
                    var psRevealSorted = Object.keys(psVisibleAll).slice().sort(function(a, b) {
                        var ta = psVisibleAll[a].text.toLowerCase();
                        var tb = psVisibleAll[b].text.toLowerCase();
                        return ta < tb ? -1 : ta > tb ? 1 : 0;
                    });
                    psBody = ps.revealedWord
                        ? h('div', { className: 'text-center space-y-3 ' + psBodyWidth },
                            psDifficultyBadge,
                            h('div', { className: 'font-black text-amber-300 tracking-wide ' + psRevealWordTextSize }, capitalize(ps.revealedWord)),
                            psRevealSorted.length > 0 && h('div', { className: 'flex flex-wrap gap-3 justify-center' },
                                psRevealSorted.map(function(tid) {
                                    var c = psVisibleAll[tid];
                                    return h('div', {
                                        key: tid,
                                        className: 'rounded-xl px-4 py-2 font-bold ' + psRevealClueTextSize + ' ' + (c.status === 'valid' ? 'bg-green-700' : 'bg-slate-700 line-through opacity-60')
                                    }, capitalize(c.text));
                                })
                            ),
                            psResultBadge && psGuesser && h('div', { className: 'inline-block px-4 py-2 rounded-xl font-black text-lg ' + psResultBadge.cls },
                                psResultBadge.emoji + ' ' + teamLabel(psGuesser)
                            ),
                            h('div', { className: 'text-xs text-slate-400' }, T('m_j_completed_laps', { n: ps.completedLaps || 0 }))
                        )
                        : h('div', { className: 'text-teal-300 text-lg font-bold' }, T('m_j_phase_waiting'));
                }

                return h('div', { className: 'min-h-screen bg-slate-900 text-white flex flex-col' },
                    h('div', { className: 'bg-teal-900 px-6 py-3 flex items-center justify-between flex-shrink-0' },
                        h('div', { className: 'flex items-center gap-3' },
                            h('div', { className: 'text-3xl' }, '🤫'),
                            h('div', null,
                                h('div', { className: 'text-xl font-black' }, 'Mega Just One'),
                                h('div', { className: 'text-xs text-teal-300 font-mono' }, sessionId + ' • 📺 ' + T('m_j_mode_projector_label'))
                            )
                        ),
                        h('div', { className: 'flex items-center gap-2' },
                            h('button', {
                                onClick: function() { setShowQR(true); },
                                className: 'px-3 py-1.5 bg-white text-teal-900 hover:bg-teal-100 rounded-lg text-xs font-bold'
                            }, '📱 QR'),
                            h('button', { onClick: switchMode, className: 'px-3 py-1.5 bg-white bg-opacity-10 hover:bg-opacity-20 rounded-lg text-xs font-bold' }, T('m_j_mode_switch'))
                        )
                    ),
                    h('div', { className: 'px-6 py-3 text-center flex-shrink-0 ' + psPhaseColor },
                        h('div', { className: 'text-xl font-black' }, psPhaseLabel + ' • ' + T('j_round_label', { n: ps.roundNumber || 1 }))
                    ),

                    // Equipas conectadas: nome + nº de mesa sempre visíveis, sem pontos;
                    // a equipa que adivinha fica em destaque.
                    psTables.length > 0 && h('div', { className: 'flex flex-wrap justify-center gap-2 px-4 py-3 flex-shrink-0 bg-black bg-opacity-20' },
                        psTables.map(function(t) {
                            var isGuesser = t.id === ps.guesserTableId && ps.phase !== 'waiting';
                            return h('div', {
                                key: t.id,
                                className: 'px-4 py-2 rounded-xl font-black transition-all ' + (isGuesser
                                    ? 'bg-teal-400 text-teal-950 text-lg sm:text-2xl ring-4 ring-teal-300 scale-105'
                                    : 'bg-slate-800 text-slate-200 text-sm sm:text-base')
                            }, (isGuesser ? '🎯 ' : '') + teamLabel(t));
                        })
                    ),

                    h('div', { className: 'flex-1 flex flex-col items-center justify-center p-6 gap-6' },
                        psBody
                    ),

                    // Placar em modal, tal como o ranking no modo Consola — só quando ativado
                    psShowScores && !psHideScoresLocally && h('div', { className: 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-40 p-4', onClick: function() { setPsHideScoresLocally(true); } },
                        h('div', { className: 'bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-6 w-full max-w-md slide-in', onClick: function(e) { e.stopPropagation(); } },
                            h('div', { className: 'flex items-center justify-between mb-4' },
                                h('h3', { className: 'text-2xl font-black text-white' }, '🏆 ' + T('m_h_ranking')),
                                h('button', { onClick: function() { setPsHideScoresLocally(true); }, className: 'text-slate-400 hover:text-white text-2xl leading-none px-2' }, '✕')
                            ),
                            h('div', { className: 'space-y-2' },
                                rankTables(psSorted).map(function(item) {
                                    var t = item.table, medal = RANK_MEDALS[item.rank] || item.rank + '.';
                                    var isGuesser = t.id === ps.guesserTableId;
                                    return h('div', {
                                        key: t.id,
                                        className: 'flex items-center justify-between p-3 rounded-xl ' + (isGuesser ? 'bg-teal-700 ring-2 ring-teal-400' : 'bg-slate-700')
                                    },
                                        h('div', { className: 'flex items-center gap-2' },
                                            h('span', { className: 'text-3xl' }, medal),
                                            h('span', { className: 'font-black text-2xl' }, teamLabel(t))
                                        ),
                                        h('span', { className: 'font-black text-4xl text-teal-400' }, t.score)
                                    );
                                })
                            )
                        )
                    ),

                    // QR full-screen para os jogadores entrarem
                    showQR && h('div', {
                        className: 'fixed inset-0 bg-gradient-to-br from-teal-900 via-cyan-900 to-slate-900 flex flex-col items-center justify-center z-50 cursor-pointer overflow-y-auto py-8',
                        onClick: function() { setShowQR(false); }
                    },
                        h('img', {
                            src: qrUrl, alt: 'QR Code',
                            className: 'w-[min(70vw,50vh)] h-[min(70vw,50vh)] bg-white p-4 rounded-2xl shadow-2xl',
                            onClick: function(e) { e.stopPropagation(); }
                        }),
                        h('div', { className: 'text-5xl font-black text-white mt-4 tracking-widest' }, sessionId),
                        h('div', { className: 'text-teal-300 mt-2 text-sm' }, T('m_tap_to_go_back'))
                    )
                );
            }

            /* —— RENDER: MODO CONSOLA —— */
            var clueCount = Object.keys(justoneClues).length;
            var clueTimerRemaining = clueDeadline ? Math.max(0, Math.ceil((clueDeadline - nowTick) / 1000)) : null;
            var allTiersExhausted = ['easy', 'medium', 'hard'].every(function(level) {
                return isTierExhausted(wordPool, wordPoolLang, usedWords, level);
            });

            return h('div', { className: 'min-h-screen bg-slate-900 flex flex-col text-white' },

                /* —— HEADER —— */
                h('div', { className: 'bg-teal-900 px-3 sm:px-4 py-2 flex-shrink-0 shadow-xl relative' },
                    selectedLogos.length > 0 && h('img', {
                        src: selectedLogos[0], alt: 'logo',
                        className: 'hidden sm:block absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 h-8 object-contain pointer-events-none',
                        onError: function(e) { e.target.style.display = 'none'; }
                    }),
                    h('div', { className: 'flex items-center gap-2 flex-wrap' },
                        h('div', { className: 'text-base sm:text-lg font-black whitespace-nowrap' }, '🤫 Mega Just One'),
                        h('div', { className: 'flex items-center gap-2 bg-teal-800 rounded-lg px-3 py-1' },
                            h('span', { className: 'text-xs opacity-60 hidden sm:inline' }, T('m_h_session_label')),
                            h('span', { className: 'font-mono font-bold tracking-wider' }, sessionId),
                            h('button', {
                                onClick: function() {
                                    navigator.clipboard.writeText(CLIENT_URL + '?session=' + sessionId);
                                    setCodeCopied(true);
                                    setTimeout(function() { setCodeCopied(false); }, 2000);
                                },
                                className: 'text-xs bg-teal-700 hover:bg-teal-600 px-2 py-0.5 rounded'
                            }, codeCopied ? '✓' : '📋')
                        ),
                        h('button', {
                            onClick: function() { setShowEndModal(true); },
                            className: 'ml-auto bg-red-700 hover:bg-red-600 px-3 py-1.5 rounded-lg text-sm font-bold flex-shrink-0'
                        }, T('m_h_exit'))
                    ),
                    h('div', { className: 'flex items-center gap-2 flex-wrap mt-1.5' },
                        h('div', { className: 'text-xs opacity-70 bg-black bg-opacity-20 px-2 py-1 rounded-lg' }, T('m_h_tables_online', { tables: tableCount, online: Object.keys(connectedClients).length })),
                        h('button', {
                            onClick: function() { setShowScores(!showScores); },
                            className: 'bg-teal-800 hover:bg-teal-700 px-3 py-1.5 rounded-lg text-xs font-semibold'
                        }, showScores ? T('m_h_hide_pts') : T('m_h_show_pts')),
                        h('button', {
                            onClick: function() { setPublicShowScores(!publicShowScores); },
                            className: 'bg-teal-800 hover:bg-teal-700 px-3 py-1.5 rounded-lg text-xs font-semibold'
                        }, publicShowScores ? T('m_j_pub_scores_hide') : T('m_j_pub_scores_show')),
                        h('button', {
                            onClick: switchMode,
                            className: 'bg-teal-800 hover:bg-teal-700 px-3 py-1.5 rounded-lg text-xs font-semibold'
                        }, T('m_j_mode_switch'))
                    )
                ),

                /* —— BARRA DE FASE —— */
                h('div', { className: 'px-4 py-2 flex items-center gap-2 flex-wrap bg-slate-800 border-b border-slate-700 flex-shrink-0' },
                    h('div', { className: 'px-4 py-1.5 rounded-full font-bold text-sm ' + phaseColor + ((phase === 'clue_giving' || phase === 'guessing') ? ' blink' : '') }, phaseLabel),
                    guesserTable && phase !== 'waiting' && h('div', { className: 'bg-teal-700 text-teal-100 px-3 py-1 rounded-full text-sm font-bold' },
                        T('m_j_guesser_label') + ' ' + teamLabel(guesserTable)
                    ),
                    secretWordDifficulty && h('span', {
                        className: 'px-3 py-1 rounded-full text-sm font-bold ' + (DIFFICULTY_BADGE_COLORS[secretWordDifficulty] || '')
                    }, T('m_j_difficulty_badge', { name: T('m_j_difficulty_' + secretWordDifficulty) })),
                    secretWord && phase !== 'waiting' && h('div', { className: 'bg-amber-500 text-amber-900 px-3 py-1 rounded-full text-sm font-black' },
                        T('m_j_secret_word_label') + ' ' + capitalize(secretWord)
                    ),
                    phase === 'clue_giving' && h('div', { className: 'bg-blue-700 text-blue-100 px-3 py-1 rounded-full text-sm font-bold' },
                        T('m_j_clues_received', { n: clueCount, total: Math.max(0, tableCount - 1) })
                    ),
                    clueTimerRemaining !== null && phase === 'clue_giving' && h('div', {
                        className: 'px-3 py-1 rounded-full text-sm font-black ' + (clueTimerRemaining <= 5 ? 'bg-red-600 text-white' : 'bg-slate-700 text-white')
                    }, '⏱️ ' + clueTimerRemaining + 's')
                ),

                /* —— CONTEÚDO PRINCIPAL —— */
                h('div', { className: 'flex-1 flex overflow-hidden' },

                    /* —— GRELHA DE MESAS —— */
                    h('div', { className: 'flex-1 overflow-y-auto p-4' },
                        tables.length === 0
                            ? h('div', { className: 'text-center text-slate-500 mt-16' },
                                h('div', { className: 'text-5xl mb-3' }, '⏳'),
                                h('div', { className: 'text-lg font-semibold' }, T('m_h_waiting_tables')),
                                h('div', { className: 'text-sm mt-1' }, T('m_h_share_qr'))
                              )
                            : h('div', { className: 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3' },
                                tables.map(function(table) {
                                    var client = connectedClients[table.id];
                                    var isGuesserCard = guesserTableId === table.id;
                                    var hasClue = !!(justoneClues[table.id] && justoneClues[table.id].text);
                                    var cStatus = clueStatus[table.id];
                                    var lastSeen = lastSeenMapRef.current[table.id] || 0;
                                    var sinceSeen = lastSeen ? (Date.now() - lastSeen) : Infinity;
                                    var connState = !client ? 'gone' : (sinceSeen < 30000 ? 'online' : (sinceSeen < 60000 ? 'idle' : 'offline'));
                                    return h('div', {
                                        key: table.id,
                                        className: 'bg-slate-800 rounded-xl border p-3 transition-all ' + (
                                            isGuesserCard ? 'border-teal-500 bg-teal-900/30' :
                                            hasClue ? 'border-blue-600' :
                                            connState === 'offline' ? 'border-red-700/60 opacity-70' :
                                            'border-slate-700'
                                        )
                                    },
                                        h('div', { className: 'flex justify-between items-start mb-1' },
                                            h('div', null,
                                                h('div', { className: 'text-xs text-slate-500' }, T('table_n', { n: table.id })),
                                                connState === 'online'  && h('span', { className: 'text-xs text-green-400', title: 'Ativo' }, T('m_h_conn_online')),
                                                connState === 'idle'    && h('span', { className: 'text-xs text-amber-400', title: 'Sem heartbeat há ' + Math.round(sinceSeen/1000) + 's' }, T('m_h_conn_idle')),
                                                connState === 'offline' && h('span', { className: 'text-xs text-red-400 font-bold', title: 'Sem heartbeat há ' + Math.round(sinceSeen/1000) + 's — pode ter perdido o jogo' }, T('m_h_conn_offline')),
                                                connState === 'gone'    && h('span', { className: 'text-xs text-slate-600' }, T('m_h_conn_gone'))
                                            ),
                                            h('div', { className: 'flex gap-1 items-center' },
                                                h('span', { className: 'text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded-full font-bold' }, (table.timesGuessed || 0) + 'x'),
                                                isGuesserCard && h('span', { className: 'text-sm' }, '🎯'),
                                                hasClue && (phase === 'clue_giving') && h('span', { className: 'text-sm' }, '✍️'),
                                                cStatus === 'valid' && (phase === 'guessing' || phase === 'reveal') && h('span', { className: 'text-sm' }, '✅'),
                                                cStatus === 'annulled' && (phase === 'guessing' || phase === 'reveal') && h('span', { className: 'text-sm' }, '🚫')
                                            )
                                        ),
                                        h('div', { className: 'font-bold text-white text-sm truncate mb-2' }, table.name || T('table_n', { n: table.id })),
                                        showScores && h('div', { className: 'text-3xl font-black text-teal-400 text-center mb-2' }, table.score),
                                        !showScores && h('div', { className: 'text-3xl font-black text-slate-600 text-center mb-2' }, '—'),
                                        h('div', { className: 'flex gap-1 justify-center' },
                                            h('button', {
                                                onClick: function(id) { return function() { adjustScore(id, -1); }; }(table.id),
                                                className: 'px-2 py-1 bg-red-900/50 hover:bg-red-800 text-red-300 rounded font-bold text-xs'
                                            }, '-1'),
                                            h('button', {
                                                onClick: function(id) { return function() { adjustScore(id, 1); }; }(table.id),
                                                className: 'px-2 py-1 bg-green-900/50 hover:bg-green-800 text-green-300 rounded font-bold text-xs'
                                            }, '+1')
                                        )
                                    );
                                })
                              )
                    ),

                    /* —— PAINEL LATERAL (ranking; oculto em telemóvel, ver "Ranking" na barra inferior) —— */
                    showScores && h('div', { className: 'hidden lg:flex flex-col w-60 bg-slate-800 border-l border-slate-700 overflow-hidden flex-shrink-0' },
                        h('div', { className: 'flex-1 overflow-y-auto p-3' },
                            h('div', { className: 'text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide' }, T('m_h_ranking')),
                            h('div', { className: 'space-y-1' },
                                rankTables(tables.slice().sort(function(a, b) { return b.score - a.score; })).map(function(item) {
                                    var t = item.table, medal = RANK_MEDALS[item.rank] || '';
                                    return h('div', { key: t.id, className: 'flex items-center justify-between text-sm' },
                                        h('div', { className: 'flex items-center gap-1' },
                                            h('span', null, medal || item.rank + '.'),
                                            h('span', { className: 'font-semibold text-slate-300 truncate max-w-28' }, teamLabel(t))
                                        ),
                                        h('span', { className: 'font-black text-teal-400' }, t.score)
                                    );
                                })
                            )
                        )
                    )
                ),

                /* —— BARRA INFERIOR —— */
                h('div', { className: 'bg-slate-800 border-t border-slate-700 px-4 py-3 flex items-center gap-3 flex-shrink-0 flex-wrap' },

                    phase === 'waiting' && !showWordApproval && h('button', {
                        onClick: startRound,
                        disabled: tables.length < 2,
                        className: 'px-6 py-2.5 rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform ' + (tables.length < 2 ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'bg-teal-600 hover:bg-teal-500 text-white')
                    }, T('m_j_start_round_1')),

                    phase === 'choosing_difficulty' && h('div', { className: 'flex-1 flex flex-col gap-2' },
                        h('div', { className: 'text-sm text-slate-300 font-semibold' },
                            T('m_j_choose_difficulty_for_team', { name: teamLabel(guesserTable) })
                        ),
                        h('div', { className: 'text-xs text-slate-500' }, T('m_j_waiting_difficulty_choice')),
                        h('div', { className: 'flex gap-2 flex-wrap' },
                            ['easy', 'medium', 'hard'].map(function(level) {
                                var exhausted = isTierExhausted(wordPool, wordPoolLang, usedWords, level);
                                return h('button', {
                                    key: level,
                                    disabled: exhausted,
                                    onClick: function() { confirmDifficultyAndDrawWord(level); },
                                    title: exhausted ? T('m_j_tier_exhausted') : '',
                                    className: 'px-4 py-2 rounded-xl font-bold text-sm transition-transform active:scale-95 ' + (exhausted ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : (DIFFICULTY_BUTTON_COLORS[level] || 'bg-slate-600 text-white'))
                                }, T('m_j_difficulty_button_label', { name: T('m_j_difficulty_' + level), points: scoringConfig[level].guesser }));
                            })
                        ),
                        allTiersExhausted && h('div', { className: 'text-xs text-amber-400 font-semibold' }, T('m_j_all_tiers_exhausted'))
                    ),

                    phase === 'clue_giving' && h('div', { className: 'flex items-center gap-3' },
                        h('button', {
                            onClick: function() {
                                if (!confirm(T('m_j_clue_approval_confirm'))) return;
                                openClueReview();
                            },
                            className: 'px-6 py-2.5 bg-purple-600 hover:bg-purple-500 text-white rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform' + (clueCount > 0 ? ' blink' : '')
                        }, T('m_j_view_clues', { n: clueCount })),
                        h('button', {
                            onClick: restartRound,
                            className: 'px-4 py-2.5 bg-red-700 hover:bg-red-600 text-white rounded-xl font-bold text-sm'
                        }, T('m_j_restart_round'))
                    ),

                    phase === 'reviewing' && h('div', { className: 'flex items-center gap-3' },
                        h('button', {
                            onClick: function() { setShowReview(true); },
                            className: 'px-6 py-2.5 bg-purple-600 hover:bg-purple-500 text-white rounded-xl font-black text-base shadow-lg blink active:scale-95 transition-transform'
                        }, T('m_j_validate_clues_title')),
                        h('button', {
                            onClick: restartRound,
                            className: 'px-4 py-2.5 bg-red-700 hover:bg-red-600 text-white rounded-xl font-bold text-sm'
                        }, T('m_j_restart_round'))
                    ),

                    phase === 'guessing' && (scoringMode === 'best_clue' || secretWordDifficulty) && h('div', { className: 'flex-1 flex gap-2' },
                        h('button', {
                            onClick: function() { resolveGuess(true); },
                            className: 'flex-1 py-3 bg-green-600 hover:bg-green-500 text-white rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform'
                        }, scoringMode === 'best_clue'
                            ? T('m_j_guess_correct', { points: bestClueConfig.guesser })
                            : T('m_j_guess_correct', { points: scoringConfig[secretWordDifficulty] ? scoringConfig[secretWordDifficulty].guesser : 0 })),
                        h('button', {
                            onClick: function() { resolveGuess(false); },
                            className: 'flex-1 py-3 bg-red-600 hover:bg-red-500 text-white rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform'
                        }, scoringMode === 'best_clue'
                            ? T('m_j_guess_incorrect', { points: bestClueConfig.penalty })
                            : T('m_j_guess_incorrect', { points: scoringConfig[secretWordDifficulty] ? scoringConfig[secretWordDifficulty].penalty : 0 })),
                        h('button', {
                            onClick: passGuess,
                            className: 'px-6 py-3 bg-slate-600 hover:bg-slate-500 text-white rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform'
                        }, T('m_j_guess_pass'))
                    ),

                    phase === 'best_clue_selection' && h('div', { className: 'flex-1' },
                        h('div', { className: 'text-sm font-bold text-pink-300 mb-2' }, T('m_j_best_clue_select_title')),
                        h('p', { className: 'text-xs text-slate-400 mb-3' }, T('m_j_best_clue_select_hint')),
                        h('div', { className: 'flex flex-wrap gap-2' },
                            Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'valid'; }).map(function(tid) {
                                var t2 = tables.find(function(t3) { return t3.id === Number(tid); });
                                var clue = justoneClues[tid];
                                return clue && h('button', {
                                    key: tid,
                                    onClick: function() { confirmBestClue(Number(tid)); },
                                    className: 'px-4 py-2 bg-pink-600 hover:bg-pink-500 text-white rounded-xl font-bold text-sm shadow active:scale-95 transition-transform'
                                }, T('m_j_best_clue_select_btn') + ' ' + (t2 ? t2.name : 'Mesa ' + tid) + ': "' + capitalize(clue.text) + '"');
                            }),
                            h('button', {
                                onClick: function() { confirmBestClue(null); },
                                className: 'px-4 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-xl font-bold text-sm shadow active:scale-95 transition-transform'
                            }, T('m_j_best_clue_skip'))
                        )
                    ),

                    phase === 'reveal' && !showWordApproval && h('div', { className: 'flex items-center gap-3' },
                        h('button', {
                            onClick: nextRound,
                            className: 'px-6 py-2.5 bg-teal-600 hover:bg-teal-500 text-white rounded-xl font-black text-base shadow-lg active:scale-95 transition-transform'
                        }, T('m_j_next_round', { n: roundNumber + 1 })),
                        h('div', { className: 'text-xs text-slate-400' }, T('m_j_completed_laps', { n: completedLaps }))
                    ),

                    h('div', { className: 'flex-1' }),

                    h('div', { className: 'flex items-center gap-2 flex-wrap' },
                        h('button', {
                            onClick: function() { setTablesLocked(!tablesLocked); },
                            className: 'px-3 py-2 rounded-lg font-bold text-sm ' + (tablesLocked ? 'bg-red-800 text-red-200' : 'bg-slate-700 text-slate-300 hover:bg-slate-600')
                        }, tablesLocked ? T('m_h_tables_locked') : T('m_h_tables_open')),
                        h('button', {
                            onClick: function() { setShowManage(!showManage); },
                            className: 'px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg font-bold text-sm'
                        }, T('m_h_manage_tables')),
                        h('button', {
                            onClick: function() { setShowStats(true); },
                            className: 'px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg font-bold text-sm'
                        }, T('m_j_stats_button')),
                        h('button', {
                            onClick: function() { setShowLeaderboard(true); },
                            className: 'px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-lg font-bold text-sm'
                        }, T('m_h_ranking'))
                    )
                ),

                /* —— MODAIS —— */

                // Leaderboard
                showLeaderboard && h('div', { className: 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4', onClick: function() { setShowLeaderboard(false); } },
                    h('div', { className: 'bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-6 w-full max-w-sm slide-in', onClick: function(e) { e.stopPropagation(); } },
                        h('h3', { className: 'text-xl font-black text-white mb-4 text-center' }, T('m_leaderboard')),
                        h('div', { className: 'space-y-2' },
                            rankTables(tables.slice().sort(function(a, b) { return b.score - a.score; })).map(function(item) {
                                var t = item.table, medal = RANK_MEDALS[item.rank] || item.rank + '.';
                                return h('div', { key: t.id, className: 'flex items-center justify-between p-3 rounded-xl bg-slate-700' },
                                    h('div', { className: 'flex items-center gap-2' },
                                        h('span', { className: 'text-xl' }, medal),
                                        h('div', { className: 'font-bold text-white' }, teamLabel(t))
                                    ),
                                    h('div', { className: 'text-2xl font-black text-teal-400' }, t.score)
                                );
                            })
                        ),
                        h('button', { onClick: function() { setShowLeaderboard(false); }, className: 'mt-4 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white' }, T('close'))
                    )
                ),

                // Gerir Mesas
                showManage && h('div', { className: 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4', onClick: function() { setShowManage(false); } },
                    h('div', { className: 'bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-5 w-full max-w-sm slide-in', onClick: function(e) { e.stopPropagation(); } },
                        h('h3', { className: 'text-lg font-black text-white mb-4' }, T('m_h_manage_title')),
                        tables.length === 0
                            ? h('p', { className: 'text-slate-400 text-center italic' }, T('m_h_no_tables_conn'))
                            : h('div', { className: 'space-y-2 max-h-80 overflow-y-auto' },
                                tables.map(function(table) {
                                    var online = !!connectedClients[table.id];
                                    return h('div', { key: table.id, className: 'flex items-center justify-between p-2 rounded-lg border border-slate-600' },
                                        h('div', null,
                                            h('div', { className: 'font-bold text-sm text-white' }, teamLabel(table)),
                                            h('div', { className: 'text-xs ' + (online ? 'text-green-400' : 'text-slate-500') }, online ? '● Online' : '○ Offline')
                                        ),
                                        h('button', {
                                            onClick: function(id) { return function() { removeTable(id); }; }(table.id),
                                            className: 'px-3 py-1 bg-red-900/50 hover:bg-red-800 text-red-300 rounded-lg text-xs font-bold'
                                        }, T('m_h_remove'))
                                    );
                                })
                              ),
                        h('button', { onClick: function() { setShowManage(false); }, className: 'mt-4 w-full py-2 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-white' }, T('close'))
                    )
                ),

                // Terminar sessão
                showEndModal && h('div', { className: 'fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4' },
                    h('div', { className: 'bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl p-6 w-full max-w-sm slide-in' },
                        h('div', { className: 'text-4xl text-center mb-3' }, '🤫'),
                        h('h3', { className: 'text-xl font-black text-white text-center mb-2' }, T('m_h_end_session_title')),
                        h('p', { className: 'text-slate-400 text-sm text-center mb-5' }, T('m_h_end_session_msg', { code: sessionId })),
                        !lapComplete && h('p', { className: 'text-amber-400 text-xs text-center mb-3' }, T('m_j_end_session_locked', { n: completedLaps })),
                        h('div', { className: 'space-y-3' },
                            h('button', {
                                onClick: endSessionArchive,
                                disabled: !lapComplete,
                                className: 'w-full py-3 rounded-xl font-bold ' + (lapComplete ? 'bg-teal-600 hover:bg-teal-500 text-white' : 'bg-slate-700 text-slate-500 cursor-not-allowed')
                            }, T('m_archive_close')),
                            h('button', { onClick: endSessionPause, className: 'w-full py-3 bg-amber-700 hover:bg-amber-600 text-white rounded-xl font-bold' }, T('m_h_pause_session')),
                            h('button', { onClick: function() { setShowEndModal(false); }, className: 'w-full py-3 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-xl font-bold' }, T('m_cancel'))
                        )
                    )
                ),

                showReview && ClueReviewModal(),
                showStats && StatsModal(),
                showWordApproval && masterMode === 'console' && WordApprovalModal()
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    });
    </script>
</body>
</html>
