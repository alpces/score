    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, remove, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const app = initializeApp(firebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, set, remove, onValue, update, get };

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script>
    var CLIENT_URL = window.AppConfig.CLIENT_JUSTONE_URL;
    var GAME_TYPE  = 'justone';
    var MASTER_MODE_KEY = 'justoneMasterMode';

    window.addEventListener('firebaseReady', function() {
        var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
        var rtdb = window.rtdb, fm = window.fbModules;
        var T = I18n.t;
        function capitalize(s) { if (!s) return s; return s.charAt(0).toUpperCase() + s.slice(1); }

        // — pool de palavras: parser de texto + fallback embutido por idioma —
        function parseWordPoolText(text) {
            var pools = { easy: [], medium: [], hard: [] };
            var current = 'easy';
            (text || '').split('\n').forEach(function(rawLine) {
                var line = rawLine.trim();
                if (!line) return;
                if (line.charAt(0) === '#') {
                    var norm = line.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
                    if (norm.indexOf('medio') >= 0 || norm.indexOf('medium') >= 0) current = 'medium';
                    else if (norm.indexOf('dificil') >= 0 || norm.indexOf('hard') >= 0) current = 'hard';
                    else if (norm.indexOf('facil') >= 0 || norm.indexOf('easy') >= 0) current = 'easy';
                    return;
                }
                pools[current].push(line);
            });
            return pools;
        }

        var EMBEDDED_FALLBACK_WORDS = {
            pt: {
                easy:   ['cão', 'gato', 'casa', 'sol', 'praia'],
                medium: ['castelo', 'floresta', 'biblioteca', 'vulcão', 'mochila'],
                hard:   ['liberdade', 'saudade', 'silêncio', 'coragem', 'mistério']
            },
            en: {
                easy:   ['dog', 'cat', 'house', 'sun', 'beach'],
                medium: ['castle', 'forest', 'library', 'volcano', 'backpack'],
                hard:   ['freedom', 'longing', 'silence', 'courage', 'mystery']
            }
        };

        function getTierPool(pool, wordPoolLang, difficulty) {
            return (pool && pool[difficulty] && pool[difficulty].length)
                ? pool[difficulty] : EMBEDDED_FALLBACK_WORDS[wordPoolLang || 'pt'][difficulty];
        }

        function isTierExhausted(pool, wordPoolLang, usedWords, difficulty) {
            var tierPool = getTierPool(pool, wordPoolLang, difficulty);
            return tierPool.every(function(w) { return (usedWords || []).indexOf(w) >= 0; });
        }

        function drawSecretWord(pool, wordPoolLang, usedWords, difficulty) {
            var tierPool = getTierPool(pool, wordPoolLang, difficulty);
            var available = tierPool.filter(function(w) { return usedWords.indexOf(w) < 0; });
            if (available.length === 0) return null;
            var word = available[Math.floor(Math.random() * available.length)];
            return { word: word, usedWords: usedWords.concat([word]) };
        }

        // — rotação de adivinhadores e voltas completas —
        function getNextGuesser(tables, currentGuesserId) {
            if (tables.length === 0) return null;
            var ids = tables.map(function(t) { return t.id; }).sort(function(a, b) { return a - b; });
            var idx = ids.indexOf(currentGuesserId);
            return ids[(idx + 1) % ids.length];
        }

        function getCompletedLaps(tables) {
            if (tables.length === 0) return 0;
            return Math.min.apply(null, tables.map(function(t) { return t.timesGuessed || 0; }));
        }

        function isLapComplete(tables) {
            if (tables.length === 0) return false;
            var first = tables[0].timesGuessed || 0;
            return tables.every(function(t) { return (t.timesGuessed || 0) === first; });
        }

        // — validação de pistas —
        function normalizeClueText(text) {
            return (text || '').toLowerCase().trim().normalize('NFD').replace(/[̀-ͯ]/g, '');
        }

        function detectDuplicateClues(clues) {
            var norm = {};
            Object.keys(clues).forEach(function(tid) {
                var n = normalizeClueText(clues[tid].text);
                if (!n) return;
                (norm[n] = norm[n] || []).push(tid);
            });
            var dupSet = {};
            Object.values(norm).forEach(function(ids) {
                if (ids.length >= 2) ids.forEach(function(id) { dupSet[id] = true; });
            });
            return dupSet;
        }

        function levenshtein(a, b) {
            var m = a.length, n = b.length, i, j, prev = [], curr = [], tmp;
            for (j = 0; j <= n; j++) prev[j] = j;
            for (i = 1; i <= m; i++) {
                curr[0] = i;
                for (j = 1; j <= n; j++) {
                    curr[j] = a[i-1] === b[j-1] ? prev[j-1] : 1 + Math.min(prev[j], curr[j-1], prev[j-1]);
                }
                tmp = prev; prev = curr; curr = tmp;
            }
            return prev[n];
        }

        function detectSimilarClues(clues, dupSet) {
            // Returns {tid: [tid2, ...]} for clues similar but NOT identical to another
            var ids = Object.keys(clues).filter(function(tid) { return clues[tid] && clues[tid].text; });
            var simSet = {};
            for (var i = 0; i < ids.length; i++) {
                for (var j = i + 1; j < ids.length; j++) {
                    if (dupSet[ids[i]] && dupSet[ids[j]]) continue; // already flagged as exact dup
                    var a = normalizeClueText(clues[ids[i]].text);
                    var b = normalizeClueText(clues[ids[j]].text);
                    if (a === b || a.length < 3 || b.length < 3) continue;
                    var dist = levenshtein(a, b);
                    var maxLen = Math.max(a.length, b.length);
                    if (dist <= 2 || (maxLen >= 6 && dist <= Math.floor(maxLen * 0.25))) {
                        (simSet[ids[i]] = simSet[ids[i]] || []).push(ids[j]);
                        (simSet[ids[j]] = simSet[ids[j]] || []).push(ids[i]);
                    }
                }
            }
            return simSet;
        }

        // — projeção partilhada gameState.visibleClues / publicState.visibleClues —
        function buildVisibleClues(phase, justoneClues, clueStatus) {
            if (phase === 'guessing') {
                var valid = {};
                Object.keys(clueStatus).forEach(function(tid) {
                    if (clueStatus[tid] === 'valid' && justoneClues[tid]) valid[tid] = { text: justoneClues[tid].text };
                });
                return valid;
            }
            if (phase === 'best_clue_selection' || phase === 'reveal') {
                var all = {};
                Object.keys(justoneClues).forEach(function(tid) {
                    all[tid] = { text: justoneClues[tid].text, status: clueStatus[tid] || 'annulled' };
                });
                return all;
            }
            return null;
        }

        // — nome de equipa + nº de mesa, sempre juntos —
        function teamLabel(table) {
            if (!table) return '';
            var tn = T('table_n', { n: table.id });
            return table.name ? (table.name + ' (' + tn + ')') : tn;
        }

        // — pontuação: configuração por defeito + persistência —
        var DEFAULT_SCORING_CONFIG = {
            easy:   { guesser: 2, clueGiver: 1, penalty: 1 },
            medium: { guesser: 3, clueGiver: 1, penalty: 1 },
            hard:   { guesser: 5, clueGiver: 1, penalty: 1 }
        };
        function getDefaultScoringConfig() { return JSON.parse(JSON.stringify(DEFAULT_SCORING_CONFIG)); }

        function loadScoringConfig() {
            try {
                var raw = localStorage.getItem('justoneScoringConfig');
                if (!raw) return getDefaultScoringConfig();
                var cfg = JSON.parse(raw);
                var def = getDefaultScoringConfig();
                ['easy', 'medium', 'hard'].forEach(function(tier) {
                    if (!cfg[tier]) cfg[tier] = def[tier];
                    if (typeof cfg[tier].penalty !== 'number') cfg[tier].penalty = 1;
                });
                return cfg;
            } catch(e) { return getDefaultScoringConfig(); }
        }
        function saveScoringConfig(cfg) {
            try { localStorage.setItem('justoneScoringConfig', JSON.stringify(cfg)); return true; } catch(e) { return false; }
        }

        function loadTimerSeconds() {
            try {
                var raw = localStorage.getItem('justoneTimerSeconds');
                var n = raw !== null ? parseInt(raw, 10) : 0;
                return (isNaN(n) || n < 0) ? 0 : n;
            } catch(e) { return 0; }
        }
        function saveTimerSeconds(n) {
            try { localStorage.setItem('justoneTimerSeconds', String(n)); return true; } catch(e) { return false; }
        }

        var DEFAULT_BEST_CLUE_CONFIG = { guesser: 3, bestClue: 3, otherClue: 1, penalty: 1 };
        function getDefaultBestClueConfig() { return Object.assign({}, DEFAULT_BEST_CLUE_CONFIG); }
        function loadBestClueConfig() {
            try {
                var raw = localStorage.getItem('justoneBestClueConfig');
                if (!raw) return getDefaultBestClueConfig();
                var cfg = JSON.parse(raw);
                var def = getDefaultBestClueConfig();
                ['guesser', 'bestClue', 'otherClue', 'penalty'].forEach(function(k) {
                    if (typeof cfg[k] !== 'number') cfg[k] = def[k];
                });
                return cfg;
            } catch(e) { return getDefaultBestClueConfig(); }
        }
        function saveBestClueConfig(cfg) {
            try { localStorage.setItem('justoneBestClueConfig', JSON.stringify(cfg)); return true; } catch(e) { return false; }
        }
        function loadScoringMode() {
            try { var v = localStorage.getItem('justoneScoringMode'); return v === 'difficulty' ? 'difficulty' : 'best_clue'; } catch(e) { return 'best_clue'; }
        }
        function saveScoringMode(mode) {
            try { localStorage.setItem('justoneScoringMode', mode); } catch(e) {}
        }

        function drawWordFromAllTiers(pool, wordPoolLang2, usedWords2) {
            var combined = [];
            ['easy', 'medium', 'hard'].forEach(function(t) {
                getTierPool(pool, wordPoolLang2, t).forEach(function(w) {
                    if ((usedWords2 || []).indexOf(w) < 0) combined.push(w);
                });
            });
            if (combined.length === 0) return null;
            return combined[Math.floor(Math.random() * combined.length)];
        }

        var DIFFICULTY_BUTTON_COLORS = {
            easy:   'bg-green-500 hover:bg-green-600',
            medium: 'bg-amber-500 hover:bg-amber-600',
            hard:   'bg-red-500 hover:bg-red-600'
        };
        var DIFFICULTY_BADGE_COLORS = {
            easy:   'bg-green-100 text-green-800',
            medium: 'bg-amber-100 text-amber-800',
            hard:   'bg-red-100 text-red-800'
        };

        // — estatísticas —
        function aggregateStats(statsObj) {
            var byDiff = { easy: { chosen: 0, correct: 0, incorrect: 0, passed: 0 },
                           medium: { chosen: 0, correct: 0, incorrect: 0, passed: 0 },
                           hard: { chosen: 0, correct: 0, incorrect: 0, passed: 0 } };
            Object.values(statsObj || {}).forEach(function(r) {
                var d = byDiff[r.difficulty]; if (!d) return;
                d.chosen++;
                if (r.result === 'correct') d.correct++;
                else if (r.result === 'incorrect') d.incorrect++;
                else if (r.result === 'passed') d.passed++;
            });
            return byDiff;
        }

        function statsToCsv(statsObj) {
            var header = 'round,difficulty,result,activeTables,validClues,annulledClues,timestamp';
            var rows = Object.values(statsObj || {}).sort(function(a, b) { return a.round - b.round; })
                .map(function(r) {
                    return [r.round, r.difficulty, r.result, r.activeTables, r.validClues, r.annulledClues, r.timestamp].join(',');
                });
            return [header].concat(rows).join('\n');
        }

        function rankTables(sorted) {
            // Standard competition ranking: ties share the same position, next rank skips
            var result = [];
            var rank = 1;
            for (var i = 0; i < sorted.length; i++) {
                if (i > 0 && sorted[i].score < sorted[i-1].score) rank = i + 1;
                result.push({ table: sorted[i], rank: rank });
            }
            return result;
        }

        var RANK_MEDALS = { 1: '🥇', 2: '🥈', 3: '🥉' };

        function downloadBlob(content, filename, mime) {
            var blob = new Blob([content], { type: mime });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a);
            setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
        }

            var w3 = _s({ easy: [], medium: [], hard: [] });
            var wordPool = w3[0]; var setWordPool = w3[1];
            var w4 = _s(false);    var showWordPoolEdit = w4[0];   var setShowWordPoolEdit = w4[1];
            var w5 = _s(false);    var wordPoolSaved = w5[0];      var setWordPoolSaved = w5[1];

            /* —— SETUP: PONTUAÇÃO —— */

            var scoringConfig = sc1[0]; var setScoringConfig = sc1[1];
            var sc2 = _s(false);   var showScoringEdit = sc2[0];   var setShowScoringEdit = sc2[1];

            var tm1 = _s(0);       var timerSeconds = tm1[0];      var setTimerSeconds = tm1[1];
            var tm2 = _s(false);   var timerSaved = tm2[0];        var setTimerSaved = tm2[1];

            /* —— SETUP: VARIANTE DE PONTUAÇÃO —— */
            var sm1 = _s('best_clue'); var scoringMode = sm1[0];        var setScoringMode = sm1[1];
            var bc1 = _s(getDefaultBestClueConfig());
            var bestClueConfig = bc1[0]; var setBestClueConfig = bc1[1];
            var bc2 = _s(false);   var showBestClueEdit = bc2[0];  var setShowBestClueEdit = bc2[1];
            var bc3 = _s(false);   var bestClueSaved = bc3[0];     var setBestClueSaved = bc3[1];

            /* —— JOGO —— */
            var g1  = _s([]);             var tables = g1[0];               var setTables = g1[1];
            var g2  = _s('waiting');      var phase = g2[0];                var setPhase = g2[1];

            var g5  = _s(null);           var secretWord = g5[0];           var setSecretWord = g5[1];
            var g6  = _s(null);           var secretWordDifficulty = g6[0]; var setSecretWordDifficulty = g6[1];
            var g7  = _s([]);             var usedWords = g7[0];            var setUsedWords = g7[1];
            var g8  = _s({});             var clueStatus = g8[0];           var setClueStatus = g8[1];
            var g9  = _s(false);          var revealAll = g9[0];            var setRevealAll = g9[1];
            var g10 = _s(null);           var guessResult = g10[0];         var setGuessResult = g10[1];
            var g11 = _s(null);           var clueDeadline = g11[0];        var setClueDeadline = g11[1];
            var g12 = _s(true);           var showScores = g12[0];          var setShowScores = g12[1];
            var g13 = _s(false);          var tablesLocked = g13[0];        var setTablesLocked = g13[1];
            var g14 = _s(false);          var publicShowScores = g14[0];    var setPublicShowScores = g14[1];
            var g15 = _s(null);           var bestClueTableId = g15[0];     var setBestClueTableId = g15[1];
            var g16 = _s(null);           var pendingWord = g16[0];         var setPendingWord = g16[1];
            var g17 = _s(null);           var pendingWordDiff = g17[0];     var setPendingWordDiff = g17[1];
            var g18 = _s(false);          var showWordApproval = g18[0];    var setShowWordApproval = g18[1];
            var g19 = _s('');             var customWordInput = g19[0];     var setCustomWordInput = g19[1];
            var g20 = _s(false);          var showCustomWordInput = g20[0]; var setShowCustomWordInput = g20[1];

            /* —— PÚBLICO (só leitura) —— */
            var pb1 = _s(null);    var publicState = pb1[0];       var setPublicState = pb1[1];
            var pb2 = _s(Date.now()); var nowTick = pb2[0];        var setNowTick = pb2[1];
            var pb3 = _s({});      var publicClients = pb3[0];     var setPublicClients = pb3[1];

            /* —— UI (CONSOLA) —— */
            var u1  = _s({});      var connectedClients = u1[0];        var setConnectedClients = u1[1];
            var u2  = _s({});      var justoneClues = u2[0];             var setJustoneClues = u2[1];

            /* —— REFS —— */
            var archivingRef = useRef(false);
            var syncTimerRef = useRef(null);
            var publicSyncTimerRef = useRef(null);
            var lastSeenMapRef = useRef({});
            var processedDifficultyChoiceRef = useRef(null);
            var processedBestClueVoteRef = useRef(null);
            var pendingDrawRef = useRef(null);
            var autoReviewedRef = useRef(false);

            /* —— RESOLUÇÃO DE MODO (Consola/Público) E PRÉ-PREENCHIMENTO DO CÓDIGO —— */
            useEffect(function() {
                var params = new URLSearchParams(window.location.search);
                var urlSession = params.get('session');
                var urlMode = params.get('mode');

                if (urlMode === 'public' && urlSession) {
                    // entrada direta em modo Público — salta o setup
                    setSessionId(urlSession.toUpperCase());
                    setSetupDone(true);
                    setMasterMode('public');
                    try { localStorage.setItem(MASTER_MODE_KEY, 'public'); } catch(e) {}
                    setModeChosen(true);
                    return;
                }

                if (urlSession) setCodeInput(urlSession.toUpperCase());

                if (urlMode === 'public' || urlMode === 'console') {
                    setMasterMode(urlMode);
                    try { localStorage.setItem(MASTER_MODE_KEY, urlMode); } catch(e) {}
                    setModeChosen(true);
                    return;
                }

                var saved;

                    setPendingWord(drawn);
                    setPendingWordDiff(null);
                    setCustomWordInput(''); setShowCustomWordInput(false);
                    setShowWordApproval(true);
                } else {
                    setPhase('choosing_difficulty');
                }
            };

            /* —— DIFICULDADE ESCOLHIDA: SORTEAR PALAVRA, MOSTRAR APROVAÇÃO —— */
            var confirmDifficultyAndDrawWord = function(difficulty) {
                var draw = drawSecretWord(wordPool, wordPoolLang, usedWords, difficulty);
                if (!draw) return; // nível esgotado — botão devia estar desativado
                setPendingWord(draw.word);
                setPendingWordDiff(difficulty);
                setCustomWordInput(''); setShowCustomWordInput(false);
                setShowWordApproval(true);
                // usedWords só é atualizado em commitPendingWord — palavras rejeitadas não ficam gastas
                // guardamos o draw.usedWords temporariamente via closure da função commitPendingWord
                // mas como o state não atualizou, precisamos passar o word resultado ao commit:
                // para simplificar, guardamos a ref do draw.usedWords via pendingDrawRef
                pendingDrawRef.current = draw;
            };

            /* —— COMMIT DA PALAVRA APROVADA (pendingWord -> clue_giving) —— */
            var commitPendingWord = function(word, difficulty) {
                var draw = pendingDrawRef.current;
                var newUsedWords;
                if (draw && draw.word === (pendingWord || word) && difficulty === pendingWordDiff) {
                    // palavra sorteada: usar usedWords do draw
                    newUsedWords = draw.usedWords;
                } else {
                    // palavra customizada ou re-aprovada: adicionar manualmente
                    newUsedWords = usedWords.concat([word]);
                }
                pendingDrawRef.current = null;
                setSecretWord(word);
                fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/secret'), { word: word }).catch(function(){});
                setSecretWordDifficulty(difficulty || null);
                setUsedWords(newUsedWords);
                setClueDeadline(timerSeconds > 0 ? (Date.now() + timerSeconds * 1000) : null);
                setShowWordApproval(false);
                setPendingWord(null); setPendingWordDiff(null);
                setCustomWordInput(''); setShowCustomWordInput(false);
                setPhase('clue_giving');
            };

            /* —— NOVO SORTEIO (sem adicionar a palavra atual a usedWords) —— */
            var redrawPendingWord = function() {
                var excludeWord = pendingWord;
                var diff = pendingWordDiff;
                var newDraw;
                if (scoringMode === 'best_clue') {
                    // combinar todos os tiers, excluindo a palavra atual
                    var combined = [];
                    ['easy', 'medium', 'hard'].forEach(function(t2) {
                        getTierPool(wordPool, wordPoolLang, t2).forEach(function(w) {
                            if (usedWords.indexOf(w) < 0 && w !== excludeWord) combined.push(w);
                        });
                    });
                    if (combined.length === 0) { alert(T('m_j_all_tiers_exhausted')); return; }
                    var picked = combined[Math.floor(Math.random() * combined.length)];
                    newDraw = { word: picked, usedWords: usedWords.concat([picked]) };
                    pendingDrawRef.current = newDraw;
                    setPendingWord(picked);
                    setPendingWordDiff(null);
                } else {
                    var tier = getTierPool(wordPool, wordPoolLang, diff);
                    var avail = tier.filter(function(w) { return usedWords.indexOf(w) < 0 && w !== excludeWord; });
                    if (avail.length === 0) { alert(T('m_j_tier_exhausted')); return; }
                    var picked2 = avail[Math.floor(Math.random() * avail.length)];
                    newDraw = { word: picked2, usedWords: usedWords.concat([picked2]) };
                    pendingDrawRef.current = newDraw;
                    setPendingWord(picked2);
                }
                setCustomWordInput(''); setShowCustomWordInput(false);
            };

            /* —— VER PISTAS: ABRE MODAL DE VALIDAÇÃO (clue_giving -> reviewing) —— */
            var openClueReview = function() {
                var dupSet = detectDuplicateClues(justoneClues);
                var initial = {};
                tables.forEach(function(t) {
                    if (t.id === guesserTableId) return;
                    var hasClue = !!(justoneClues[t.id] && justoneClues[t.id].text);
                    initial[t.id] = (!hasClue || dupSet[t.id]) ? 'annulled' : 'valid';
                });
                setClueStatus(initial);
                setPhase('reviewing');
                setShowReview(true);
            };

            /* —— TOGGLE VÁLIDA/ANULADA NO MODAL DE VALIDAÇÃO —— */
            var toggleClueStatus = function(tableId) {
                var hasClue = !!(justoneClues[tableId] && justoneClues[tableId].text);
                if (!hasClue) return; // sem pista -> bloqueado em 'annulled'
                setClueStatus(function(prev) {
                    var next = Object.assign({}, prev);
                    next[tableId] = prev[tableId] === 'valid' ? 'annulled' : 'valid';
                    return next;
                });
            };

            /* —— CONFIRMAR VALIDAÇÃO (reviewing -> guessing) —— */
            var confirmClueValidation = function() {
                setShowReview(false);
                setPhase('guessing');
            };

            /* —— CONTADOR DE VOLTAS —— */
            var incrementTimesGuessed = function(tableId) {
                setTables(function(prev) {
                    return prev.map(function(t) {
                        return t.id === tableId ? Object.assign({}, t, { timesGuessed: (t.timesGuessed || 0) + 1 }) : t;
                    });
                });
            };

            /* —— ESTATÍSTICAS: REGISTAR RONDA —— */
            var logRoundStats = function(result, validClueCount, annulledClueCount) {
                fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/justoneStats/' + roundNumber), {
                    round: roundNumber,
                    difficulty: secretWordDifficulty,
                    result: result,
                    activeTables: tables.length,
                    validClues: validClueCount,
                    annulledClues: annulledClueCount,
                    timestamp: Date.now()
                }).catch(function(){});
            };

            /* —— RESULTADO: ACERTOU / ERROU (guessing -> reveal ou best_clue_selection) —— */
            var resolveGuess = function(correct) {
                var validIds = Object.keys(clueStatus)
                    .filter(function(tid) { return clueStatus[tid] === 'valid'; })
                    .map(Number);
                var annulledCount = Object.keys(clueStatus)
                    .filter(function(tid) { return clueStatus[tid] === 'annulled'; }).length;

                if (scoringMode === 'best_clue') {
                    if (correct) {
                        // sem pontuação ainda — vai para best_clue_selection
                        setTables(function(prev) {
                            return prev.map(function(t) {
                                if (t.id === guesserTableId) return Object.assign({}, t, { timesGuessed: (t.timesGuessed || 0) + 1 });
                                return t;
                            });
                        });
                        setGuessResult('correct');
                        logRoundStats('correct', validIds.length, annulledCount);
                        setPhase('best_clue_selection');
                    } else {
                        // errou: penalização imediata, vai para reveal
                        var bcPenalty = bestClueConfig.penalty || 1;
                        setTables(function(prev) {
                            return prev.map(function(t) {
                                var next = t;
                                if (t.id === guesserTableId) {
                                    next = Object.assign({}, t, { score: Math.max(0, t.score - bcPenalty), timesGuessed: (t.timesGuessed || 0) + 1 });
                                }
                                return next;
                            });
                        });
                        setGuessResult('incorrect');
                        setRevealAll(true);
                        logRoundStats('incorrect', validIds.length, annulledCount);
                        setPhase('reveal');
                    }
                } else {
                    var cfg = scoringConfig[secretWordDifficulty];
                    setTables(function(prev) {
                        return prev.map(function(t) {
                            var next = t;
                            if (correct) {
                                if (t.id === guesserTableId) next = Object.assign({}, t, { score: t.score + cfg.guesser });
                                else if (validIds.indexOf(t.id) >= 0) next = Object.assign({}, t, { score: t.score + cfg.clueGiver });
                            } else if (t.id === guesserTableId) {
                                next = Object.assign({}, t, { score: Math.max(0, t.score - cfg.penalty) });
                            }
                            if (t.id === guesserTableId) next = Object.assign({}, next, { timesGuessed: (next.timesGuessed || 0) + 1 });
                            return next;
                        });
                    });
                    setGuessResult(correct ? 'correct' : 'incorrect');
                    setRevealAll(true);
                    logRoundStats(correct ? 'correct' : 'incorrect', validIds.length, annulledCount);
                    setPhase('reveal');
                }
            };

            /* —— RESULTADO: PASSAR (guessing -> reveal) —— */
            var passGuess = function() {
                var validCount = Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'valid'; }).length;
                var annulledCount = Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'annulled'; }).length;
                incrementTimesGuessed(guesserTableId);
                setBestClueTableId(null);
                setGuessResult('passed');
                setRevealAll(true);
                logRoundStats('passed', validCount, annulledCount);
                setPhase('reveal');
            };

            /* —— RECOMEÇAR RONDA (sorteia nova palavra, mantém adivinhador, marca a antiga como usada) —— */
            var restartRound = function() {
                if (!confirm(T('m_j_restart_round_confirm'))) return;
                var newUsedWords = (secretWord && usedWords.indexOf(secretWord) < 0) ? usedWords.concat([secretWord]) : usedWords;
                setUsedWords(newUsedWords);
                setSecretWord(null);
                fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/secret'), { word: null }).catch(function(){});
                setSecretWordDifficulty(null);
                setClueDeadline(null);
                setClueStatus({}); setRevealAll(false); setGuessResult(null);
                setBestClueTableId(null);
                setJustoneClues({}); setJustoneDifficultyChoice(null);
                processedDifficultyChoiceRef.current = null;
                processedBestClueVoteRef.current = null;
                fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/justoneClues')).catch(function(){});
                fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/justoneDifficultyChoice')).catch(function(){});
                fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/justoneBestClueVote')).catch(function(){});
                if (scoringMode === 'best_clue') {
                    var drawn = drawWordFromAllTiers(wordPool, wordPoolLang, newUsedWords);
                    if (!drawn) { alert(T('m_j_all_tiers_exhausted')); return; }
                    setPendingWord(drawn);
                    setPendingWordDiff(null);
                    setCustomWordInput(''); setShowCustomWordInput(false);
                    setShowWordApproval(true);
                } else {
                    setPhase('choosing_difficulty');
                }
            };

            /* —— AJUSTE MANUAL DE PONTUAÇÃO (±1, floor em 0) —— */
            var adjustScore = function(tableId, delta) {
                setTables(function(prev) {
                    return prev.map(function(t) {
                        return t.id === tableId ? Object.assign({}, t, { score: Math.max(0, t.score + delta) }) : t;
                    });
                });
            };

            var buildPublicState = function() {

                var annulledIds = Object.keys(clueStatus).filter(function(tid) { return clueStatus[tid] === 'annulled'; });
                return {
                    phase: phase,
                    roundNumber: roundNumber,
                    guesserTableId: guesserTableId,
                    secretWordDifficulty: secretWordDifficulty,
                    scoringMode: scoringMode,

                    cluesSubmitted: Object.keys(justoneClues).length,
                    cluesTotal: Math.max(0, tables.length - 1),
                    validClueCount: validIds.length,

                    clueDeadline: clueDeadline,
                    guessResult: guessResult,

                    publicShowScores: publicShowScores,

            };

            /* —— SETUP: LISTA DE PALAVRAS — guardar/repor —— */
            var saveWordPool = function() {

                var allEmpty = !parsed.easy.length && !parsed.medium.length && !parsed.hard.length;
                if (allEmpty) {
                    setWordPoolWarning(T('m_j_word_pool_low_warning'));
                    return;
                }
                try { localStorage.setItem('justoneWordPool_' + wordPoolLang, wordPoolText); } catch(e) {}
                setWordPool(parsed);
                var low = parsed.easy.length < 5 || parsed.medium.length < 5 || parsed.hard.length < 5;
                setWordPoolWarning(low ? T('m_j_word_pool_low_warning') : '');

                        setWordPoolWarning('');

                    .catch(function() {});

                    next[tier][field] = n;
                    return next;
