<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Diamant - Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bandeiras SVG via flag-icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <!-- Configuração Firebase, core de cliente partilhado e i18n -->
    <script src="shared/firebase-config.js"></script>
    <script src="shared/client-core.js"></script>
    <script src="shared/i18n.js"></script>
    <script src="shared/i18n-pt.js"></script>
    <script src="shared/i18n-en.js"></script>
    <style>
      input, textarea, select { font-size: 16px !important; }
      html, body { height: 100dvh; min-height: 100dvh; margin: 0; padding: 0; padding-bottom: env(safe-area-inset-bottom); }
      #root { min-height: 100dvh; }
      .min-h-screen { min-height: 100dvh !important; }

      /* Selector de língua — garante que as bandeiras SVG têm dimensão definida */
      .lang-flag { display: inline-block; width: 1.5rem; height: 1.5rem; flex-shrink: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, onValue, set, remove, get, update, goOffline, goOnline } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = window.FirebaseConfig;

        const app = initializeApp(firebaseConfig);
        window.rtdb = getDatabase(app);
        window.fbModules = { ref, onValue, set, remove, get, update, goOffline, goOnline };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        window.addEventListener('firebaseReady', function() {
            var useState = React.useState, useEffect = React.useEffect, h = React.createElement;
            var rtdb = window.rtdb, fm = window.fbModules;

            // Alias de tradução — lê _current dinamicamente, funciona com re-renders por i18n:change
            var T = I18n.t;

            var localStore = ClientCore.createLocalStore('diamant');
            var clearLocal = localStore.clear;
            var CLIENT_ID  = ClientCore.getClientId('diamant_clientId');

            function App() {
                var _s = function(v) { return useState(v); };
                var c1 = _s(false); var connected = c1[0]; var setConnected = c1[1];
                var c2 = _s(''); var sessionCode = c2[0]; var setSessionCode = c2[1];
                var c3 = _s(''); var tableNumber = c3[0]; var setTableNumber = c3[1];
                var c4 = _s(''); var teamName = c4[0]; var setTeamName = c4[1];
                var c5 = _s(''); var emails = c5[0]; var setEmails = c5[1];
                var c6 = _s(''); var connectionError = c6[0]; var setConnectionError = c6[1];
                var c7 = _s(false); var autoReconnecting = c7[0]; var setAutoReconnecting = c7[1];
                var c8 = _s(null); var gameData = c8[0]; var setGameData = c8[1];
                var c9 = _s(false); var voteSubmitted = c9[0]; var setVoteSubmitted = c9[1];
                var c10 = _s(false); var sessionLost = c10[0]; var setSessionLost = c10[1];
                var c11 = _s(false); var showTeamsList = c11[0]; var setShowTeamsList = c11[1];
                var c12 = _s(false); var showRules = c12[0]; var setShowRules = c12[1];
                var c13 = _s(0); var localTimer = c13[0]; var setLocalTimer = c13[1];
                var timerRef = React.useRef(null);
                var c14 = _s(null); var betTarget = c14[0]; var setBetTarget = c14[1];
                var c15 = _s(false); var betSubmitted = c15[0]; var setBetSubmitted = c15[1];
                var c16 = _s(1); var betAmount = c16[0]; var setBetAmount = c16[1];
                var c17 = _s(0); var resubKey = c17[0]; var setResubKey = c17[1];
                // — i18n: estado de língua para forçar re-render quando a língua muda —
                var lg1 = _s(I18n.getCurrentLang()); var lang = lg1[0]; var setLang = lg1[1];

                // — listener de mudança de língua —
                useEffect(function() {
                    var handler = function(e) { setLang(e.detail.lang); };
                    window.addEventListener('i18n:change', handler);
                    return function() { window.removeEventListener('i18n:change', handler); };
                }, []);

                // — restaurar sessão local —
                useEffect(function() {
                    var saved = localStore.load();
                    if (saved) {
                        setSessionCode(saved.session);
                        setTableNumber(saved.table);
                        if (saved.team)   setTeamName(saved.team);
                        if (saved.emails) setEmails(saved.emails);
                        setAutoReconnecting(true);
                    } else {
                        var p = new URLSearchParams(window.location.search);
                        var urlSession = p.get('session');
                        if (urlSession) setSessionCode(urlSession.toUpperCase());
                    }
                }, []);

                useEffect(function() {
                    if (autoReconnecting && sessionCode && tableNumber) handleConnect(true);
                }, [autoReconnecting, sessionCode, tableNumber]);

                // — conexão à sessão —
                useEffect(function() {
                    if (!connected || !sessionCode || !tableNumber) return;
                    var ctrl = ClientCore.connectClient({
                        rtdb: rtdb, fm: fm,
                        sessionCode: sessionCode, tableNumber: tableNumber,
                        onGameState: function(data) {
                            setGameData(function(prev) {
                                if (prev && prev.gameType === 'diamant') {
                                    var merged = Object.assign({}, data);
                                    if ((!data.savedScores || Object.keys(data.savedScores).length === 0) && prev.savedScores && Object.keys(prev.savedScores).length > 0) {
                                        merged.savedScores = prev.savedScores;
                                    }
                                    if (!data.tables && prev.tables) merged.tables = prev.tables;
                                    return merged;
                                }
                                return data;
                            });
                        },
                        onSessionLost: function() {
                            setSessionLost(true); setConnected(false); setGameData(null);
                            clearLocal();
                        },
                        onResume: function() { setResubKey(function(k) { return k + 1; }); }
                    });
                    return function() { ctrl.disconnect(); };
                }, [connected, sessionCode, tableNumber]);

                // — wake lock —
                useEffect(function() {
                    if (!connected) return;
                    var lock = ClientCore.attachWakeLock();
                    return function() { lock.release(); };
                }, [connected]);

                // — listeners game-específicos —
                useEffect(function() {
                    if (!connected || !sessionCode || !tableNumber) return;
                    var unsubV = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantVotes/' + tableNumber), function(snap) {
                        setVoteSubmitted(snap.val() !== null);
                    });
                    var unsubB = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantBets/' + tableNumber), function(snap) {
                        var bet = snap.val();
                        if (bet && bet.target) {
                            setBetTarget(bet.target); setBetAmount(bet.amount || 1); setBetSubmitted(true);
                        } else {
                            setBetTarget(null); setBetAmount(1); setBetSubmitted(false);
                        }
                    });
                    return function() { unsubV(); unsubB(); };
                }, [connected, sessionCode, tableNumber, resubKey]);

                // Timer sincronizado
                useEffect(function() {
                    var endAt = gameData ? gameData.votingTimerEndAt || 0 : 0;
                    var phase = gameData ? gameData.phase : null;
                    var tick = function() {
                        if (phase !== 'voting' || !endAt) { setLocalTimer(0); return; }
                        var rem = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
                        setLocalTimer(rem);
                    };
                    tick();
                    if (timerRef.current) clearInterval(timerRef.current);
                    if (phase === 'voting' && endAt) {
                        timerRef.current = setInterval(tick, 250);
                    }
                    return function() { if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; } };
                }, [gameData ? gameData.votingTimerEndAt : 0, gameData ? gameData.phase : null]);

                // Conexão
                var handleConnect = async function(isAuto) {
                    if (!isAuto && !emails.trim()) { setConnectionError(T('d_email_required')); return; }
                    var result = await ClientCore.joinSession({
                        rtdb: rtdb, fm: fm,
                        sessionCode: sessionCode, tableNumber: tableNumber,
                        teamName: teamName, emails: emails,
                        clientId: CLIENT_ID, gameType: 'diamant',
                        isAuto: isAuto
                    });
                    if (result.ok) {
                        localStore.save({ session: result.code, table: result.table, team: teamName, emails: emails });
                        setConnected(true); setAutoReconnecting(false); setConnectionError(''); setSessionLost(false);
                    } else {
                        if (result.clearLocal) clearLocal();
                        setConnectionError(result.error || T('connect_error'));
                        setAutoReconnecting(false);
                    }
                };

                var handleDisconnect = async function() {
                    if (!confirm(T('disconnect_confirm'))) return;
                    try { if (sessionCode && tableNumber) await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients/' + tableNumber)); } catch(e) {}
                    try { if (sessionCode && tableNumber) await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantVotes/' + tableNumber)); } catch(e) {}
                    try { if (sessionCode && tableNumber) await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantBets/' + tableNumber)); } catch(e) {}
                    clearLocal();
                    setConnected(false); setGameData(null); setVoteSubmitted(false);
                };

                var castVote = async function(vote) {
                    if (!sessionCode || !tableNumber) return;
                    try { await fm.set(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantVotes/' + tableNumber), vote);
                        setVoteSubmitted(true); } catch (e) {}
                };

                var placeBet = async function(targetId, amount) {
                    if (!sessionCode || !tableNumber || !amount || amount < 1) return;
                    try {
                        await fm.set(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantBets/' + tableNumber), {
                            target: targetId, amount: amount
                        });
                        setBetTarget(targetId); setBetAmount(amount); setBetSubmitted(true);
                    } catch (e) { console.error('Erro aposta:', e); }
                };

                var clearBet = async function() {
                    if (!sessionCode || !tableNumber) return;
                    try {
                        await fm.set(fm.ref(rtdb, 'sessions/' + sessionCode + '/diamantBets/' + tableNumber), null);
                        setBetTarget(null); setBetAmount(1); setBetSubmitted(false);
                    } catch (e) {}
                };

                // === DADOS ===
                var tableId = parseInt(tableNumber);
                var phase = gameData ? gameData.phase || 'waiting_start' : 'waiting_start';
                var isInExp = gameData && gameData.teamsInExpedition ? gameData.teamsInExpedition.indexOf(tableId) >= 0 : false;
                var discovered = gameData && gameData.discoveredScores ? gameData.discoveredScores[tableId] || 0 : 0;
                var saved = gameData && gameData.savedScores ? gameData.savedScores[tableId] || 0 : 0;
                var myVote = gameData && gameData.votes ? gameData.votes[tableId] : null;
                var votingTimedOut = gameData ? gameData.votingTimedOut || false : false;
                var hasTimer = gameData && gameData.votingTimerEndAt ? gameData.votingTimerEndAt > 0 : false;
                var localTimedOut = hasTimer && localTimer === 0 && phase === 'voting';
                var timerActive = !votingTimedOut && !localTimedOut;
                var teamsInExp = gameData ? gameData.teamsInExpedition || [] : [];
                var reserve = gameData ? gameData.reserve || 0 : 0;
                var lastCard = gameData ? gameData.lastCard : null;
                var lastReveal = gameData ? gameData.lastRevealResult : null;
                var selLogos = gameData ? gameData.selectedLogos || [] : [];
                var allTables = gameData ? gameData.tables || [] : [];
                var exitedTeams = gameData ? gameData.exitedTeams || [] : [];
                var multiplierActive = gameData ? gameData.multiplierActive || false : false;
                var multiplierVal = gameData ? gameData.multiplierValue || 2 : 2;
                var artifactVal = gameData ? gameData.artifactValue || 0 : 0;
                var revealStep = gameData ? gameData.revealStep || 0 : 0;
                var revealedBets = gameData ? gameData.revealedBets || [] : [];
                var mainLogo = selLogos.indexOf('logo1.png') >= 0 ? 'logo1.png' : null;
                var secLogos = selLogos.filter(function(l) { return l !== 'logo1.png'; });
                var canVote = phase === 'voting' && isInExp && !voteSubmitted && timerActive && revealStep === 0;
                var isExited = exitedTeams.indexOf(tableId) >= 0;
                var canBet = phase === 'voting' && isExited && !isInExp && discovered > 0 && timerActive;

                // — helper: nome de mesa com fallback traduzido —
                function tableName(id) {
                    var tbl = allTables.find(function(tb) { return tb.id === id; });
                    return tbl ? (tbl.name || T('table_n', { n: id })) : T('table_n', { n: id });
                }

                // — seletor de língua para o ecrã de login —
                function LangSelector() {
                    return h('div', { className: 'flex gap-2 justify-center mb-5' },
                        I18n.getLanguages().map(function(l) {
                            var isActive = l === lang;
                            return h('button', {
                                key: l,
                                onClick: function() { I18n.setLang(l); },
                                className: 'flex items-center gap-2 px-4 py-2 rounded-xl border-2 transition-all text-sm font-semibold active:scale-95 ' + (
                                    isActive
                                        ? 'border-amber-500 bg-amber-50 text-amber-700 shadow-sm'
                                        : 'border-gray-200 text-gray-400 hover:border-gray-300 hover:text-gray-600'
                                )
                            },
                                h('span', { className: 'fi fi-' + I18n.getCountryCode(l) + ' fi-circle lang-flag' }),
                                h('span', null, I18n.getName(l))
                            );
                        })
                    );
                }

                // === SESSÃO PERDIDA ===
                if (sessionLost) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-amber-900 via-orange-900 to-red-900 flex items-center justify-center p-4' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full text-center' },
                            h('div', { className: 'text-5xl mb-4' }, '📦'),
                            h('h2', { className: 'text-xl font-bold text-gray-800 mb-2' }, T('session_ended')),
                            h('p', { className: 'text-gray-600 mb-4' }, T('d_session_ended_msg')),
                            h('button', { onClick: function() { setSessionLost(false); setSessionCode(''); setTableNumber(''); }, className: 'w-full py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-bold' }, T('back_to_start'))
                        )
                    );
                }

                if (autoReconnecting) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-amber-900 via-orange-900 to-red-900 flex items-center justify-center' },
                        h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-5xl mb-4 animate-spin' }, '💎'),
                            h('div', { className: 'text-xl font-semibold' }, T('reconnecting'))
                        )
                    );
                }

                // === CONEXÃO ===
                if (!connected) {
                    return h('div', { className: 'min-h-screen bg-gradient-to-br from-amber-900 via-orange-900 to-red-900 p-4 flex items-center justify-center' },
                        h('div', { className: 'w-full max-w-sm' },
                            h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6' },
                                // Título
                                h('div', { className: 'text-center mb-4' },
                                    h('div', { className: 'text-5xl mb-2' }, '💎'),
                                    h('h1', { className: 'text-2xl font-black text-amber-800' }, T('d_title'))
                                ),
                                // Seletor de língua
                                LangSelector(),
                                // Separador
                                h('div', { className: 'border-t border-gray-100 mb-4' }),
                                // Formulário
                                h('div', { className: 'space-y-4' },
                                    h('div', null,
                                        h('label', { className: 'block text-sm font-semibold mb-1' }, T('session_code')),
                                        h('input', { type: 'text', value: sessionCode, onChange: function(e) { setSessionCode(e.target.value.toUpperCase()); }, placeholder: 'ABC123', className: 'w-full px-4 py-3 border-2 rounded-xl text-center font-mono text-xl uppercase focus:border-amber-500 outline-none' })
                                    ),
                                    h('div', null,
                                        h('label', { className: 'block text-sm font-semibold mb-1' }, T('table_number')),
                                        h('input', { type: 'number', min: 1, max: 50, value: tableNumber, onChange: function(e) { setTableNumber(e.target.value); }, placeholder: T('d_table_placeholder'), className: 'w-full px-4 py-3 border-2 rounded-xl text-center text-xl focus:border-amber-500 outline-none' })
                                    ),
                                    h('div', null,
                                        h('label', { className: 'block text-sm font-semibold mb-1' }, T('team_name_label')),
                                        h('input', { type: 'text', value: teamName, onChange: function(e) { setTeamName(e.target.value); }, className: 'w-full px-4 py-2 border-2 rounded-xl focus:border-amber-500 outline-none' })
                                    ),
                                    h('div', null,
                                        h('label', { className: 'block text-sm font-semibold mb-1' }, T('email_label')),
                                        h('input', { type: 'text', value: emails, onChange: function(e) { setEmails(e.target.value); }, className: 'w-full px-4 py-2 border-2 rounded-xl focus:border-amber-500 outline-none text-sm' })
                                    ),
                                    connectionError && h('p', { className: 'text-red-600 text-sm text-center font-semibold' }, connectionError),
                                    h('button', { onClick: function() { handleConnect(false); }, className: 'w-full py-4 bg-amber-600 hover:bg-amber-700 text-white rounded-xl font-bold text-lg shadow-lg' }, T('d_enter_btn'))
                                )
                            )
                        )
                    );
                }

                // === REGRAS ===
                if (showRules) {
                    return h('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50', onClick: function() { setShowRules(false); } },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-5 max-w-sm w-full max-h-[85vh] overflow-y-auto', onClick: function(e) { e.stopPropagation(); } },
                            h('h3', { className: 'text-lg font-black text-amber-800 mb-3 text-center' }, T('d_rules_title')),
                            h('div', { className: 'space-y-3 text-sm text-gray-700' },
                                h('div', { className: 'bg-amber-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-amber-800 mb-1' }, T('d_rules_rubies_title')),
                                    h('div', null, T('d_rules_rubies'))
                                ),
                                h('div', { className: 'bg-amber-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-amber-800 mb-1' }, T('d_rules_exit_title')),
                                    h('div', null, T('d_rules_exit'))
                                ),
                                h('div', { className: 'bg-teal-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-teal-800 mb-1' }, T('d_rules_artifacts_title')),
                                    h('div', null, T('d_rules_artifacts'))
                                ),
                                h('div', { className: 'bg-red-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-red-800 mb-1' }, T('d_rules_dangers_title')),
                                    h('div', null, T('d_rules_dangers'))
                                ),
                                h('div', { className: 'bg-indigo-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-indigo-800 mb-1' }, T('d_rules_bets_title')),
                                    h('div', null, T('d_rules_bets'))
                                ),
                                h('div', { className: 'bg-purple-50 p-3 rounded-lg' },
                                    h('div', { className: 'font-bold text-purple-800 mb-1' }, T('d_rules_scoring_title')),
                                    h('div', null, T('d_rules_scoring'))
                                )
                            ),
                            h('button', { onClick: function() { setShowRules(false); }, className: 'w-full mt-4 py-2 bg-amber-600 text-white rounded-lg font-bold' }, T('d_rules_understood'))
                        )
                    );
                }

                // === POPUP EQUIPAS EM JOGO ===
                if (showTeamsList) {
                    var discScores = gameData ? gameData.discoveredScores || {} : {};
                    return h('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50', onClick: function() { setShowTeamsList(false); } },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full', onClick: function(e) { e.stopPropagation(); } },
                            h('h3', { className: 'text-lg font-bold text-gray-800 mb-3' }, T('d_teams_in_cave')),
                            teamsInExp.length === 0
                                ? h('p', { className: 'text-gray-500 italic' }, T('d_no_teams_expedition'))
                                : h('div', { className: 'space-y-2' }, teamsInExp.map(function(id) {
                                    var d = discScores[id] || 0;
                                    return h('div', { key: id, className: 'flex items-center justify-between bg-green-50 border border-green-200 p-2 rounded-lg' },
                                        h('div', { className: 'flex items-center gap-2' },
                                            h('span', { className: 'text-green-600' }, '⛏️'),
                                            h('span', { className: 'font-semibold text-gray-800' }, tableName(id))
                                        ),
                                        h('span', { className: 'text-amber-600 font-bold text-sm' }, '💎 ' + d)
                                    );
                                })),
                            exitedTeams.length > 0 && h('div', { className: 'mt-4' },
                                h('h4', { className: 'text-sm font-bold text-gray-500 mb-2' }, T('d_already_left')),
                                h('div', { className: 'space-y-1' }, exitedTeams.map(function(id) {
                                    var d = discScores[id] || 0;
                                    return h('div', { key: id, className: 'flex items-center justify-between text-sm text-gray-400 px-2' },
                                        h('span', null, '🏕️ ' + tableName(id)),
                                        d > 0 && h('span', { className: 'text-amber-400' }, '💎 ' + d)
                                    );
                                }))
                            ),
                            h('button', { onClick: function() { setShowTeamsList(false); }, className: 'w-full mt-4 py-2 bg-gray-200 rounded-lg font-bold text-gray-700' }, T('close'))
                        )
                    );
                }

                // === JOGO ===
                return h('div', { className: 'min-h-screen bg-gradient-to-br from-amber-900 via-orange-900 to-red-900 flex flex-col' },
                    // Header
                    h('div', { className: 'bg-black/30 p-3 relative' },
                        h('div', { className: 'flex justify-between items-center' },
                            h('div', null,
                                h('div', { className: 'text-white font-bold' }, T('table_n', { n: tableNumber })),
                                h('div', { className: 'text-white/75 text-sm' }, teamName || T('d_team'))
                            ),
                            mainLogo && h('img', { src: mainLogo, className: 'h-10 object-contain', style: { position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%, -50%)' } }),
                            h('div', { className: 'flex items-center gap-2' },
                                h('button', { onClick: function() { setShowRules(true); }, className: 'text-white text-xl font-black bg-blue-500 hover:bg-blue-400 w-9 h-9 rounded-full flex items-center justify-center shadow-lg shadow-blue-400/80 ring-2 ring-blue-300/60 animate-pulse' }, '?'),
                                h('span', { className: 'text-white/75 text-sm font-mono' }, sessionCode),
                                h('button', { onClick: handleDisconnect, className: 'text-white/50 hover:text-white text-xl' }, '✕')
                            )
                        )
                    ),

                    multiplierActive && h('div', { className: 'bg-yellow-500/20 px-4 py-1.5 text-center' },
                        h('span', { className: 'text-yellow-200 text-xs' }, T('d_mega_expedition', { n: multiplierVal }))
                    ),

                    h('div', { className: 'flex-1 flex flex-col items-center justify-center p-4' },

                        // Pontuação
                        h('div', { className: 'bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mb-6' },
                            h('div', { className: 'flex justify-around text-center' },
                                h('div', { className: 'flex-1' },
                                    h('div', { className: 'text-sm text-amber-600 font-semibold' }, T('d_discovered')),
                                    h('div', { className: 'text-5xl font-black text-amber-500' }, discovered)
                                ),
                                h('div', { className: 'w-px bg-gray-200' }),
                                h('div', { className: 'flex-1' },
                                    h('div', { className: 'text-sm text-purple-600 font-semibold' }, T('d_saved')),
                                    h('div', { className: 'text-5xl font-black text-purple-600' }, saved)
                                )
                            )
                        ),

                        // Info expedição
                        h('div', { className: 'text-center text-white mb-6' },
                            h('div', { className: 'text-sm opacity-75' }, T('d_expedition_n', { n: gameData ? gameData.expedition || 1 : 1 })),
                            h('div', { className: 'flex items-center justify-center gap-2' },
                                h('span', { className: 'text-lg' }, T('d_explorers_in_cave', { n: teamsInExp.length })),
                                teamsInExp.length > 0 && h('button', { onClick: function() { setShowTeamsList(true); }, className: 'text-amber-300 hover:text-amber-100 text-sm underline' }, T('d_see'))
                            ),
                            reserve > 0 && h('div', { className: 'text-amber-300 mt-1' }, T('d_rubies_behind', { n: reserve })),
                            artifactVal > 0 && h('div', { className: 'text-teal-300 mt-1' }, T('d_artifacts_in_play', { n: artifactVal }))
                        ),

                        // Carta revelada
                        lastCard && phase === 'voting' && !voteSubmitted && lastCard.type === 'ruby' && h('div', {
                            className: 'text-center p-3 rounded-xl mb-4 w-full max-w-sm bg-amber-400 text-amber-900'
                        },
                            h('div', { className: 'text-2xl font-bold' }, T('d_ruby_card', { n: lastCard.value || lastCard.cardValue || '?' })),
                            h('div', { className: 'text-sm' }, T('d_per_team', { n: lastCard.perTeam != null ? lastCard.perTeam : 0 })),
                            lastCard.leftover > 0 && h('div', { className: 'text-sm font-bold mt-1' }, T(lastCard.leftover > 1 ? 'd_not_collected_pl' : 'd_not_collected_s', { n: lastCard.leftover }))
                        ),
                        lastCard && phase === 'voting' && !voteSubmitted && lastCard.type === 'danger' && h('div', {
                            className: 'text-center p-3 rounded-xl mb-4 w-full max-w-sm bg-red-500 text-white'
                        },
                            h('div', { className: 'text-xl font-bold' }, T('d_danger_no_repeat')),
                            h('div', { className: 'text-sm mt-1' }, T('d_continue_or_leave'))
                        ),
                        lastCard && phase === 'voting' && !voteSubmitted && lastCard.type === 'artifact' && h('div', {
                            className: 'text-center p-3 rounded-xl mb-4 w-full max-w-sm bg-teal-500 text-white'
                        },
                            h('div', { className: 'text-2xl font-bold' }, T('d_artifact_card', { n: lastCard.value || '?' })),
                            h('div', { className: 'text-sm mt-1' }, T('d_artifact_total', { n: lastCard.totalArtifact || lastCard.value || '?' })),
                            h('div', { className: 'text-xs opacity-75 mt-1' }, T('d_artifact_solo_only'))
                        ),

                        // Estados de fase
                        phase === 'waiting_start' && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, '⏳'),
                            h('div', { className: 'text-xl font-semibold' }, T('d_waiting_start'))
                        ),

                        !isInExp && phase !== 'waiting_start' && phase !== 'expedition_end' && phase !== 'voting' && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, '🏕️'),
                            h('div', { className: 'text-xl font-semibold' }, T('d_at_camp')),
                            h('div', { className: 'text-sm opacity-75 mt-2' }, T('d_waiting_next_card'))
                        ),

                        // Aposta
                        canBet && h('div', { className: 'w-full max-w-sm' },
                            localTimer > 0 && h('div', { className: 'text-center mb-3' },
                                h('span', { className: 'text-3xl font-bold text-orange-400 animate-pulse' }, '⏱️ ' + localTimer + 's')
                            ),
                            h('div', { className: 'text-center text-white mb-3' },
                                h('div', { className: 'text-lg font-semibold' }, T('d_bet_round')),
                                h('div', { className: 'text-xs opacity-75' }, T('d_bet_instructions'))
                            ),
                            !betSubmitted
                                ? h('div', { className: 'bg-white/10 rounded-xl p-4' },
                                    h('div', { className: 'text-white text-sm mb-2 font-semibold' }, T('d_who_will_leave')),
                                    h('div', { className: 'grid grid-cols-2 gap-2 mb-3' },
                                        teamsInExp.map(function(id) {
                                            var isSel = betTarget === id;
                                            return h('button', { key: id, onClick: function() { setBetTarget(id); },
                                                className: 'px-3 py-2 rounded-lg text-sm font-semibold transition-all ' + (isSel ? 'bg-red-500 text-white ring-2 ring-white' : 'bg-white/20 text-white hover:bg-white/30')
                                            }, tableName(id));
                                        })
                                    ),
                                    betTarget && h('div', null,
                                        h('div', { className: 'text-white text-sm mb-2 font-semibold' }, T('d_how_many_rubies', { n: Math.min(5, discovered) })),
                                        h('div', { className: 'flex gap-2 justify-center mb-3' },
                                            [1, 2, 3, 4, 5].map(function(v) {
                                                if (v > discovered) return null;
                                                return h('button', { key: v, onClick: function() { setBetAmount(v); },
                                                    className: 'w-10 h-10 rounded-lg font-bold text-lg ' + (betAmount === v ? 'bg-amber-500 text-white ring-2 ring-white' : 'bg-white/20 text-white hover:bg-white/30')
                                                }, v);
                                            })
                                        ),
                                        h('button', { onClick: function() { placeBet(betTarget, betAmount); }, className: 'w-full py-3 bg-red-500 hover:bg-red-600 text-white rounded-xl font-bold text-lg active:scale-95 transition-transform' },
                                            T('d_place_bet', { amount: betAmount })
                                        )
                                    )
                                )
                                : h('div', { className: 'bg-indigo-500/30 rounded-xl p-4 text-center text-white' },
                                    h('div', { className: 'text-lg mb-2' }, T('d_bet_placed')),
                                    h('div', { className: 'font-semibold' }, T('d_bet_summary', { name: tableName(betTarget), amount: betAmount })),
                                    h('button', { onClick: clearBet, className: 'mt-3 px-4 py-1 bg-white/20 text-white rounded-lg text-sm hover:bg-white/30' }, T('d_change_bet'))
                                )
                        ),

                        !isInExp && isExited && phase === 'voting' && !canBet && timerActive && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, '🏕️'),
                            h('div', { className: 'text-xl font-semibold' }, T('d_at_camp')),
                            discovered <= 0 && h('div', { className: 'text-sm opacity-75 mt-2' }, T('d_no_rubies_to_bet'))
                        ),

                        canVote && h('div', { className: 'w-full max-w-sm' },
                            localTimer > 0 && h('div', { className: 'text-center mb-4' },
                                h('span', { className: 'text-3xl font-bold text-orange-400 animate-pulse' }, '⏱️ ' + localTimer + 's')
                            ),
                            h('div', { className: 'flex gap-4' },
                                h('button', { onClick: function() { castVote('continue'); }, className: 'flex-1 py-8 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-transform' },
                                    h('div', null, h('div', { className: 'text-5xl mb-2' }, '💎'), h('div', null, T('d_vote_continue')))
                                ),
                                h('button', { onClick: function() { castVote('leave'); }, className: 'flex-1 py-8 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-transform' },
                                    h('div', null, h('div', { className: 'text-5xl mb-2' }, '🏃'), h('div', null, T('d_vote_leave')))
                                )
                            )
                        ),

                        phase === 'voting' && isInExp && !voteSubmitted && votingTimedOut && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, '⏱️'),
                            h('div', { className: 'text-xl font-semibold text-orange-400' }, T('d_time_up')),
                            h('div', { className: 'text-sm opacity-75 mt-2' }, T('d_continue_by_default'))
                        ),

                        phase === 'voting' && isInExp && voteSubmitted && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, myVote === 'leave' ? '🏃' : '💎'),
                            h('div', { className: 'text-xl font-semibold' }, myVote === 'leave' ? T('d_decided_leave') : T('d_decided_continue')),
                            h('div', { className: 'text-sm opacity-75 mt-2' }, T('d_waiting_others'))
                        ),

                        phase === 'exploring' && isInExp && h('div', { className: 'text-center text-white' },
                            h('div', { className: 'text-6xl mb-4' }, '⛏️'),
                            h('div', { className: 'text-xl font-semibold' }, T('d_exploring')),
                            h('div', { className: 'text-sm opacity-75 mt-2' }, T('d_waiting_next_card'))
                        ),

                        // Revelação inline
                        lastReveal && phase === 'exploring' && revealStep === 0 && h('div', { className: 'text-center text-white mt-4' },
                            lastReveal.dangerRepeated
                                ? h('div', { className: 'bg-red-500/50 rounded-xl p-4' },
                                    h('div', { className: 'text-2xl font-bold' }, T('d_danger_repeated')),
                                    h('div', { className: 'text-sm mt-1' }, T('d_all_lost_discovered'))
                                )
                                : lastReveal.leaving && lastReveal.leaving.length > 0 && h('div', { className: 'bg-white/20 rounded-xl p-4' },
                                    h('div', null, T('d_left_n', { n: lastReveal.leaving.length })),
                                    h('div', null, T('d_stayed_n', { n: lastReveal.staying ? lastReveal.staying.length : 0 })),
                                    lastReveal.artifactCollected > 0 && h('div', { className: 'text-teal-300 mt-1 font-bold' }, T('d_artifacts_collected', { n: lastReveal.artifactCollected })),
                                    lastReveal.betOutcomes && (function() {
                                        var myBet = lastReveal.betOutcomes.find(function(bo) { return bo.teamId === tableId; });
                                        if (!myBet) return null;
                                        var tName = myBet.targetName || T('table_n', { n: myBet.target });
                                        return h('div', { className: 'mt-2 p-2 rounded-lg ' + (myBet.correct ? 'bg-green-500/30' : 'bg-red-500/30') },
                                            h('div', { className: 'font-bold' }, T('d_bet_summary', { name: tName, amount: myBet.amount || 1 }) + ' ' + (myBet.correct ? '✅' : '❌')),
                                            h('div', { className: 'text-sm font-bold' }, (myBet.gain > 0 ? '+' : '') + myBet.gain + ' 💎')
                                        );
                                    })()
                                )
                        ),

                        phase === 'expedition_end' && h('div', { className: 'text-center text-white' },
                            lastReveal && lastReveal.dangerRepeated
                                ? h('div', null, h('div', { className: 'text-6xl mb-4' }, '💀'), h('div', { className: 'text-xl font-bold text-red-400' }, T('d_danger_repeated')))
                                : h('div', null, h('div', { className: 'text-6xl mb-4' }, '🏁'), h('div', { className: 'text-xl font-semibold' }, T('d_expedition_ended')))
                        )
                    ),

                    // === POPUP REVELAÇÃO ===
                    revealStep >= 1 && h('div', { className: 'fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-4 z-50' },
                        h('div', { className: 'bg-white rounded-2xl shadow-2xl p-5 max-w-sm w-full max-h-[85vh] overflow-y-auto' },
                            h('h2', { className: 'text-lg font-black text-gray-800 text-center mb-3' }, T('d_revelation')),

                            h('div', { className: 'mb-3' },
                                h('h3', { className: 'text-xs font-bold text-indigo-700 mb-2' }, T('d_bets_label')),
                                (function() {
                                    var items = revealStep === 2 && lastReveal && lastReveal.betOutcomes
                                        ? lastReveal.betOutcomes
                                        : (revealedBets || []);

                                    if (items.length === 0) return h('div', { className: 'text-gray-400 italic text-xs text-center py-2' }, T('d_no_bets'));

                                    return h('div', { className: 'space-y-1' }, items.map(function(item, idx) {
                                        var bName = item.teamName || T('table_n', { n: item.teamId });
                                        var tName = item.targetName || (function() { var tbl = allTables.find(function(tb) { return tb.id === item.target; }); return tbl ? (tbl.name || T('table_n', { n: item.target })) : T('table_n', { n: item.target }); })();
                                        var hasResult = item.correct !== undefined;
                                        var isMe = item.teamId === tableId;
                                        var bgColor = hasResult ? (item.correct ? 'bg-green-100 border-green-400' : 'bg-red-100 border-red-400') : (isMe ? 'bg-indigo-50 border-indigo-300' : 'bg-gray-50 border-gray-200');

                                        return h('div', { key: idx, className: 'flex items-center justify-between p-2 rounded-lg border text-xs ' + bgColor },
                                            h('div', { className: 'flex items-center gap-1' },
                                                hasResult && h('span', { className: 'text-base' }, item.correct ? '✅' : '❌'),
                                                h('span', { className: 'font-bold ' + (isMe ? 'text-indigo-700' : 'text-gray-800') }, bName)
                                            ),
                                            h('div', { className: 'flex items-center gap-1' },
                                                h('span', { className: 'text-gray-400' }, '→'),
                                                h('span', { className: 'font-semibold' }, tName),
                                                h('span', { className: 'px-1.5 py-0.5 rounded-full font-bold bg-red-200 text-red-800' },
                                                    '🏃 ' + (item.amount || 1) + '💎'
                                                ),
                                                hasResult && h('span', { className: 'font-bold ml-1 ' + (item.gain > 0 ? 'text-green-600' : 'text-red-600') },
                                                    (item.gain > 0 ? '+' : '') + item.gain + '💎'
                                                )
                                            )
                                        );
                                    }));
                                })()
                            ),

                            revealStep === 2 && lastReveal && !lastReveal.dangerRepeated && h('div', null,
                                h('hr', { className: 'my-2' }),
                                h('div', { className: 'grid grid-cols-2 gap-3' },
                                    h('div', { className: 'bg-green-50 rounded-xl p-2' },
                                        h('h4', { className: 'font-bold text-green-800 text-center mb-1 text-sm' }, T('d_stayed_n', { n: lastReveal.staying ? lastReveal.staying.length : 0 })),
                                        (lastReveal.staying && lastReveal.staying.length > 0)
                                            ? lastReveal.staying.map(function(id) {
                                                var tbl = allTables.find(function(tb) { return tb.id === id; });
                                                return h('div', { key: id, className: 'text-xs text-center py-0.5 text-green-800' }, tbl ? tbl.name : T('table_n', { n: id }));
                                            })
                                            : h('div', { className: 'text-xs text-center text-gray-400 italic' }, T('nobody'))
                                    ),
                                    h('div', { className: 'bg-red-50 rounded-xl p-2' },
                                        h('h4', { className: 'font-bold text-red-800 text-center mb-1 text-sm' }, T('d_left_n', { n: lastReveal.leaving ? lastReveal.leaving.length : 0 })),
                                        (lastReveal.leaving && lastReveal.leaving.length > 0)
                                            ? lastReveal.leaving.map(function(id) {
                                                var tbl = allTables.find(function(tb) { return tb.id === id; });
                                                return h('div', { key: id, className: 'text-xs text-center py-0.5 text-red-800' }, tbl ? tbl.name : T('table_n', { n: id }));
                                            })
                                            : h('div', { className: 'text-xs text-center text-gray-400 italic' }, T('nobody'))
                                    )
                                ),
                                lastReveal.artifactCollected > 0 && h('div', { className: 'mt-2 text-center text-sm font-bold text-teal-700' },
                                    T('d_artifacts_collected', { n: lastReveal.artifactCollected })
                                )
                            ),

                            revealStep === 1 && h('div', { className: 'text-center text-gray-400 text-sm mt-3 animate-pulse' }, T('d_waiting_reveal'))
                        )
                    ),

                    secLogos.length > 0 && h('div', { className: 'bg-black/20 py-2 flex justify-center items-center gap-4' },
                        secLogos.map(function(l) { return h('img', { key: l, src: l, className: 'h-8 object-contain opacity-80' }); })
                    )
                );
            }
            ReactDOM.createRoot(document.getElementById('root')).render(h(App));
        });
    </script>
</body>
</html>
