<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamant - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getDatabase, ref, set, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBudmIz5XvRzhlOfj0wHI0W5EIles3wsmY",
            authDomain: "contador-de-pontos-321ee.firebaseapp.com",
            projectId: "contador-de-pontos-321ee",
            storageBucket: "contador-de-pontos-321ee.firebasestorage.app",
            messagingSenderId: "817191889469",
            appId: "1:817191889469:web:cfb88023612f6b37491854",
            databaseURL: "https://contador-de-pontos-321ee-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.rtdb = getDatabase(app);
        window.fbModules = { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        /**
         * ====================================================================
         * DIAMANT - MASTER APP (v2.1)
         * ====================================================================
         * 
         * ALTERAÇÕES v2.1:
         * - Fix: clientes não vêm info de perigo durante awaitingConfirmation
         * - Fix: lastCard só relevante quando em fase de votação confirmada
         * - Ao arquivar sessão, clientes são desconectados (remove nó clients)
         * - Cores de revelação mais fortes (verde/vermelho mais carregados)
         * - Equipas fora da expedição em cinza escuro
         * 
         * ALTERAÇÕES v2.0:
         * - Mesas dinâmicas (registam-se via clientes)
         * - Botão revelar só quando todos votaram OU timeout expirou
         * - "Descobertos" / "Guardados"
         * - Logo1 destaque header, restantes rodapé
         * - Ranking: 6+ revelados, depois 5º a 1º
         * - Gestão de sessões completa
         * ====================================================================
         */
        
        const CLIENT_URL = 'https://alpces.github.io/score/client-diamant.html';
        const GAME_TYPE = 'diamant';

        window.addEventListener('firebaseReady', function() {
            var useState = React.useState;
            var useEffect = React.useEffect;
            var useRef = React.useRef;
            var h = React.createElement;
            var db = window.db;
            var rtdb = window.rtdb;
            var fm = window.fbModules;

            function App() {
                // === ESTADOS - SETUP ===
                var s1 = useState(false); var setupComplete = s1[0]; var setSetupComplete = s1[1];
                var s2 = useState(null); var sessionId = s2[0]; var setSessionId = s2[1];
                var s3 = useState(''); var customSessionCode = s3[0]; var setCustomSessionCode = s3[1];
                var s4 = useState(''); var codeError = s4[0]; var setCodeError = s4[1];
                var s5 = useState(false); var codeCopied = s5[0]; var setCodeCopied = s5[1];
                var s6 = useState(0); var votingTimeoutDefault = s6[0]; var setVotingTimeoutDefault = s6[1];
                var s7 = useState(true); var showDiscovered = s7[0]; var setShowDiscovered = s7[1];
                
                // === ESTADOS - JOGO ===
                var g1 = useState('waiting_start'); var phase = g1[0]; var setPhase = g1[1];
                var g2 = useState(1); var expedition = g2[0]; var setExpedition = g2[1];
                var g3 = useState(0); var reserve = g3[0]; var setReserve = g3[1];
                var g4 = useState([]); var teamsInExpedition = g4[0]; var setTeamsInExpedition = g4[1];
                var g5 = useState({}); var discoveredScores = g5[0]; var setDiscoveredScores = g5[1];
                var g6 = useState({}); var savedScores = g6[0]; var setSavedScores = g6[1];
                var g7 = useState({}); var votes = g7[0]; var setVotes = g7[1];
                var g8 = useState(0); var votingTimeout = g8[0]; var setVotingTimeout = g8[1];
                var g9 = useState(false); var votingTimedOut = g9[0]; var setVotingTimedOut = g9[1];
                var g10 = useState(null); var lastCard = g10[0]; var setLastCard = g10[1];
                var g11 = useState(null); var lastRevealResult = g11[0]; var setLastRevealResult = g11[1];
                var g12 = useState(''); var rubyInputValue = g12[0]; var setRubyInputValue = g12[1];
                
                // === ESTADOS - UI ===
                var u1 = useState([]); var tables = u1[0]; var setTables = u1[1];
                var u2 = useState({}); var connectedClients = u2[0]; var setConnectedClients = u2[1];
                var u3 = useState(false); var showQRCode = u3[0]; var setShowQRCode = u3[1];
                var u4 = useState(false); var showLeaderboard = u4[0]; var setShowLeaderboard = u4[1];
                var u5 = useState(null); var leaderboardRevealPosition = u5[0]; var setLeaderboardRevealPosition = u5[1];
                var u6 = useState([]); var availableLogos = u6[0]; var setAvailableLogos = u6[1];
                var u7 = useState([]); var selectedLogos = u7[0]; var setSelectedLogos = u7[1];
                var u8 = useState(false); var showHistory = u8[0]; var setShowHistory = u8[1];
                var u9 = useState([]); var sessionHistory = u9[0]; var setSessionHistory = u9[1];
                var u10 = useState([]); var activeSessions = u10[0]; var setActiveSessions = u10[1];
                var u11 = useState(false); var showExistingSessionDialog = u11[0]; var setShowExistingSessionDialog = u11[1];
                var u12 = useState(null); var existingSessionData = u12[0]; var setExistingSessionData = u12[1];
                var u13 = useState(false); var showEndSessionModal = u13[0]; var setShowEndSessionModal = u13[1];
                // Lista de equipas que já saíram em rondas anteriores desta expedição
                var u14 = useState([]); var exitedTeams = u14[0]; var setExitedTeams = u14[1];
                
                var timerRef = useRef(null);
                
                // === LOGOS ===
                useEffect(function() {
                    var logos = []; var loaded = 0;
                    for (var i = 1; i <= 5; i++) {
                        (function(idx) {
                            var img = new Image();
                            var path = 'logo' + idx + '.png';
                            img.onload = function() { logos.push(path); loaded++; if (loaded === 5) setAvailableLogos(logos.sort()); };
                            img.onerror = function() { loaded++; if (loaded === 5) setAvailableLogos(logos.sort()); };
                            img.src = path;
                        })(i);
                    }
                }, []);
                
                // === MONITORAR SESSÕES ATIVAS ===
                useEffect(function() {
                    var ref1 = fm.ref(rtdb, 'sessions');
                    var unsub = fm.onValue(ref1, function(snap) {
                        var data = snap.val();
                        if (data) {
                            var active = Object.keys(data).filter(function(code) {
                                var gs = data[code] && data[code].gameState;
                                return gs && gs.gameType === GAME_TYPE && gs.active !== false;
                            }).map(function(code) {
                                return Object.assign({ sessionId: code, timestamp: data[code].gameState.timestamp || Date.now() }, data[code].gameState);
                            }).sort(function(a, b) { return b.timestamp - a.timestamp; });
                            setActiveSessions(active);
                        } else setActiveSessions([]);
                    });
                    return function() { unsub(); };
                }, []);
                
                // === HISTÓRICO ===
                useEffect(function() {
                    if (!showHistory) return;
                    var ref1 = fm.ref(rtdb, 'sessionHistory');
                    var unsub = fm.onValue(ref1, function(snap) {
                        var data = snap.val();
                        if (data) {
                            var entries = Object.entries(data).filter(function(p) { return p[1].gameType === GAME_TYPE; })
                                .map(function(p) { return Object.assign({ id: p[0] }, p[1]); })
                                .sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
                            setSessionHistory(entries);
                        } else setSessionHistory([]);
                    });
                    return function() { unsub(); };
                }, [showHistory]);
                
                // === SYNC FIREBASE ===
                useEffect(function() {
                    if (!sessionId) return;
                    var sync = async function() {
                        try {
                            await fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/gameState'), {
                                gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                                phase: phase, expedition: expedition, reserve: reserve,
                                teamsInExpedition: teamsInExpedition,
                                discoveredScores: discoveredScores, savedScores: savedScores,
                                votes: votes, votingTimeout: votingTimeout, votingTimedOut: votingTimedOut,
                                lastCard: lastCard, lastRevealResult: lastRevealResult,
                                tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                                selectedLogos: selectedLogos, exitedTeams: exitedTeams
                            });
                        } catch (e) { console.error('Sync error:', e); }
                    };
                    sync();
                }, [sessionId, phase, expedition, reserve, teamsInExpedition, discoveredScores, savedScores, votes, votingTimeout, votingTimedOut, lastCard, lastRevealResult, tables, selectedLogos, exitedTeams]);
                
                // === LISTENERS CLIENTES E VOTOS ===
                useEffect(function() {
                    if (!sessionId) return;
                    var cRef = fm.ref(rtdb, 'sessions/' + sessionId + '/clients');
                    var unsubC = fm.onValue(cRef, function(snap) {
                        var data = snap.val();
                        setConnectedClients(data || {});
                        if (data) {
                            setTables(function(prev) {
                                var nt = prev.slice();
                                Object.entries(data).forEach(function(e) {
                                    var id = parseInt(e[0]), cd = e[1];
                                    var idx = nt.findIndex(function(t) { return t.id === id; });
                                    if (idx >= 0) {
                                        if (cd.teamName) nt[idx] = Object.assign({}, nt[idx], { name: cd.teamName });
                                    } else {
                                        nt.push({ id: id, name: cd.teamName || ('Mesa ' + id), score: 0 });
                                        setDiscoveredScores(function(ps) { var n = Object.assign({}, ps); if (!n[id]) n[id] = 0; return n; });
                                        setSavedScores(function(ds) { var n = Object.assign({}, ds); if (!n[id]) n[id] = 0; return n; });
                                    }
                                });
                                nt.sort(function(a, b) { return a.id - b.id; });
                                return nt;
                            });
                        }
                    });
                    var vRef = fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes');
                    var unsubV = fm.onValue(vRef, function(snap) {
                        var data = snap.val();
                        if (data) setVotes(function(prev) { return Object.assign({}, prev, data); });
                    });
                    return function() { unsubC(); unsubV(); };
                }, [sessionId]);
                
                // === TIMER ===
                useEffect(function() {
                    if (votingTimeout > 0) {
                        timerRef.current = setTimeout(function() {
                            setVotingTimeout(function(prev) {
                                if (prev <= 1) { setVotingTimedOut(true); return 0; }
                                return prev - 1;
                            });
                        }, 1000);
                    }
                    return function() { if (timerRef.current) clearTimeout(timerRef.current); };
                }, [votingTimeout]);
                
                // === SESSION MANAGEMENT ===
                var genCode = function() { var c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', r = ''; for (var i = 0; i < 6; i++) r += c.charAt(Math.floor(Math.random() * c.length)); return r; };
                
                var startSession = async function() {
                    var fc = customSessionCode.trim().toUpperCase();
                    if (fc) {
                        if (!/^[A-Z0-9]+$/.test(fc)) { setCodeError('Apenas letras e números'); return; }
                        if (fc.length > 10) { setCodeError('Máximo 10 caracteres'); return; }
                        var snap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + fc + '/gameState'), r, { onlyOnce: true }); });
                        var ad = snap.val();
                        if (ad && ad.active) { setExistingSessionData({ code: fc, data: ad }); setShowExistingSessionDialog(true); return; }
                    } else fc = genCode();
                    await proceedCreate(fc);
                };
                
                var proceedCreate = async function(code) {
                    setTables([]); setDiscoveredScores({}); setSavedScores({});
                    setSessionId(code); setSetupComplete(true); setPhase('waiting_start');
                    setExpedition(1); setReserve(0); setTeamsInExpedition([]);
                    setVotes({}); setLastCard(null); setLastRevealResult(null);
                    setVotingTimeout(0); setVotingTimedOut(false); setExitedTeams([]);
                    try {
                        await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), {
                            gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                            phase: 'waiting_start', expedition: 1, reserve: 0,
                            teamsInExpedition: [], discoveredScores: {}, savedScores: {},
                            votes: {}, votingTimeout: 0, votingTimedOut: false,
                            lastCard: null, lastRevealResult: null, tables: [],
                            selectedLogos: selectedLogos, exitedTeams: []
                        });
                    } catch (e) { console.error('Erro:', e); }
                };
                
                var handleExistingChoice = async function(choice) {
                    var code = existingSessionData.code, data = existingSessionData.data;
                    if (choice === 'yes') {
                        setShowExistingSessionDialog(false);
                        loadSession(Object.assign({ sessionId: code }, data), true);
                    } else if (choice === 'no') {
                        setShowExistingSessionDialog(false);
                        try {
                            await fm.update(fm.ref(rtdb, 'sessions/' + code + '/gameState'), { active: false, closedAt: Date.now() });
                            await new Promise(function(r) { setTimeout(r, 200); });
                            var hid = Math.random().toString(36).substring(2, 12);
                            await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), {
                                sessionId: code, timestamp: Date.now(), gameType: GAME_TYPE,
                                tables: data.tables || [], discoveredScores: data.discoveredScores || {},
                                savedScores: data.savedScores || {}, expedition: data.expedition || 1, archived: true
                            });
                            await fm.remove(fm.ref(rtdb, 'sessions/' + code));
                            await new Promise(function(r) { setTimeout(r, 200); });
                            await proceedCreate(code);
                        } catch (e) { alert('Erro: ' + e.message); }
                    } else { setShowExistingSessionDialog(false); setExistingSessionData(null); }
                };
                
                var resetToSetup = function() {
                    setSetupComplete(false); setSessionId(null); setPhase('waiting_start');
                    setExpedition(1); setReserve(0); setTeamsInExpedition([]);
                    setDiscoveredScores({}); setSavedScores({}); setVotes({});
                    setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setTables([]); setConnectedClients({}); setExitedTeams([]);
                    setShowLeaderboard(false); setShowQRCode(false); setShowEndSessionModal(false);
                };
                
                var endSessionArchive = async function() {
                    if (!sessionId) return;
                    try {
                        var curId = sessionId;
                        var hd = {
                            sessionId: curId, timestamp: Date.now(), gameType: GAME_TYPE,
                            tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                            discoveredScores: Object.assign({}, discoveredScores),
                            savedScores: Object.assign({}, savedScores),
                            expedition: expedition, emails: {}, selectedLogos: selectedLogos, archived: true
                        };
                        Object.values(connectedClients).forEach(function(c) { hd.emails[c.tableNumber] = c.emails || []; });
                        // Marcar inativo e depois remover toda a sessão (incluindo clientes)
                        await fm.update(fm.ref(rtdb, 'sessions/' + curId + '/gameState'), { active: false, closedAt: Date.now() });
                        await new Promise(function(r) { setTimeout(r, 300); });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), hd);
                        // Remove TODO o nó da sessão (gameState + clients + diamantVotes)
                        await fm.remove(fm.ref(rtdb, 'sessions/' + curId));
                        resetToSetup();
                    } catch (e) { alert('Erro: ' + e.message); }
                };
                
                var endSessionPause = function() { resetToSetup(); };
                
                var loadSession = async function(entry, skipConfirm) {
                    if (!skipConfirm && !confirm('Carregar esta sessão?')) return;
                    var code = entry.sessionId;
                    setShowHistory(false);
                    var lt = entry.tables || [];
                    var ld = entry.discoveredScores || {};
                    var ls = entry.savedScores || {};
                    if (Object.keys(ls).length === 0 && lt.length > 0) lt.forEach(function(t) { ls[t.id] = t.score || 0; ld[t.id] = 0; });
                    setTables(lt); setDiscoveredScores(ld); setSavedScores(ls);
                    setExpedition(entry.expedition || 1); setReserve(entry.reserve || 0);
                    setTeamsInExpedition(entry.teamsInExpedition || []);
                    setPhase(entry.phase || 'waiting_start');
                    setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setSelectedLogos(entry.selectedLogos || []);
                    setExitedTeams(entry.exitedTeams || []);
                    setConnectedClients({}); setShowLeaderboard(false); setShowQRCode(false);
                    setSessionId(code); setSetupComplete(true);
                    setTimeout(async function() {
                        try {
                            await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), {
                                gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                                phase: entry.phase || 'waiting_start', expedition: entry.expedition || 1,
                                reserve: entry.reserve || 0, teamsInExpedition: entry.teamsInExpedition || [],
                                discoveredScores: ld, savedScores: ls, votes: {}, votingTimeout: 0, votingTimedOut: false,
                                lastCard: null, lastRevealResult: null, tables: lt,
                                selectedLogos: entry.selectedLogos || [], exitedTeams: entry.exitedTeams || []
                            });
                        } catch (e) { console.error('Erro:', e); }
                    }, 100);
                };
                
                var closeActiveSession = async function(sessionCode) {
                    if (!confirm('Arquivar "' + sessionCode + '"?')) return;
                    try {
                        var snap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), r, { onlyOnce: true }); });
                        var sd = snap.val();
                        if (!sd) { alert('Não encontrada'); return; }
                        await fm.update(fm.ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { active: false, closedAt: Date.now() });
                        await new Promise(function(r) { setTimeout(r, 200); });
                        var cSnap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + sessionCode + '/clients'), r, { onlyOnce: true }); });
                        var cd = cSnap.val() || {};
                        var hd = {
                            sessionId: sessionCode, timestamp: Date.now(), gameType: GAME_TYPE,
                            tables: sd.tables || [], discoveredScores: sd.discoveredScores || {},
                            savedScores: sd.savedScores || {}, expedition: sd.expedition || 1,
                            emails: {}, selectedLogos: sd.selectedLogos || [], archived: true
                        };
                        Object.values(cd).forEach(function(c) { hd.emails[c.tableNumber] = c.emails || []; });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), hd);
                        // Remove TODO o nó (desconecta clientes)
                        await fm.remove(fm.ref(rtdb, 'sessions/' + sessionCode));
                    } catch (e) { alert('Erro: ' + e.message); }
                };
                
                var deleteHistoryEntry = async function(id) {
                    if (!confirm('Eliminar?')) return;
                    try { await fm.remove(fm.ref(rtdb, 'sessionHistory/' + id)); } catch (e) { console.error(e); }
                };
                
                // === JOGO ===
                var startExpedition = async function() {
                    if (tables.length === 0) { alert('Nenhuma equipa registada.'); return; }
                    var allIds = tables.map(function(t) { return t.id; });
                    var nd = {}; allIds.forEach(function(id) { nd[id] = 0; });
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setPhase('exploring'); setReserve(0); setTeamsInExpedition(allIds);
                    setDiscoveredScores(nd); setVotes({}); setLastCard(null);
                    setLastRevealResult(null); setVotingTimedOut(false); setExitedTeams([]);
                };
                
                var drawRubyCard = async function() {
                    var val = parseInt(rubyInputValue);
                    if (!val || val <= 0 || teamsInExpedition.length === 0) return;
                    var tc = teamsInExpedition.length;
                    var perTeam = Math.floor(val / tc), leftover = val % tc;
                    var nd = Object.assign({}, discoveredScores);
                    teamsInExpedition.forEach(function(id) { nd[id] = (nd[id] || 0) + perTeam; });
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setDiscoveredScores(nd); setReserve(reserve + leftover);
                    setPhase('voting'); setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard({ type: 'ruby', value: val, perTeam: perTeam, leftover: leftover });
                    setRubyInputValue('');
                };
                
                // Perigo: coloca awaitingConfirmation = true
                // Clientes NÃO vêm nada de diferente (ficam a ver "A explorar...")
                // Só após master confirmar "Não repetido" é que lastCard fica com isRepeated: false
                // e aí sim os clientes vêm opções de votar
                var drawDangerCard = async function() {
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    // Manter phase em 'exploring' durante a confirmação!
                    // Só muda para 'voting' quando o master confirma
                    setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard({ type: 'danger', awaitingConfirmation: true });
                    // NÃO mudar phase aqui — fica 'exploring' para os clientes
                };
                
                var confirmDanger = async function(isRepeated) {
                    if (isRepeated) {
                        setPhase('expedition_end'); setReserve(0); setTeamsInExpedition([]);
                        setDiscoveredScores({}); setVotes({});
                        setLastCard({ type: 'danger', isRepeated: true });
                        setLastRevealResult({ staying: [], leaving: [], dangerRepeated: true });
                    } else {
                        // Não repetido — AGORA sim muda para voting
                        setPhase('voting');
                        setLastCard({ type: 'danger', isRepeated: false });
                    }
                };
                
                var startVotingTimeout = function(s) { setVotingTimeout(s || 10); setVotingTimedOut(false); };
                
                var revealVotes = async function() {
                    var fv = Object.assign({}, votes);
                    teamsInExpedition.forEach(function(id) { if (fv[id] == null) fv[id] = 'continue'; });
                    var leaving = teamsInExpedition.filter(function(id) { return fv[id] === 'leave'; });
                    var staying = teamsInExpedition.filter(function(id) { return fv[id] !== 'leave'; });
                    var rpl = 0, rlo = 0;
                    if (leaving.length > 0 && reserve > 0) { rpl = Math.floor(reserve / leaving.length); rlo = reserve % leaving.length; }
                    var nd = Object.assign({}, discoveredScores), ns = Object.assign({}, savedScores);
                    leaving.forEach(function(id) { ns[id] = (ns[id] || 0) + (nd[id] || 0) + rpl; nd[id] = 0; });
                    var nr = staying.length > 0 ? rlo : 0;
                    if (leaving.length === 0) nr = reserve;
                    var ends = staying.length === 0;
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    // Adicionar equipas que saíram à lista de exitedTeams
                    setExitedTeams(function(prev) { return prev.concat(leaving); });
                    setDiscoveredScores(nd); setSavedScores(ns); setReserve(nr);
                    setTeamsInExpedition(staying); setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setPhase(ends ? 'expedition_end' : 'exploring');
                    setLastRevealResult({ staying: staying, leaving: leaving, reserveDistributed: rpl, reserveLost: ends ? rlo : 0 });
                };
                
                var prepareNewExpedition = function() {

                            // Perigo a aguardar confirmação (master-only, phase ainda é 'exploring')
                            dangerAwaiting && h('div', { className: 'flex gap-2 items-center' },
                                h('span', { className: 'text-sm font-semibold bg-red-100 text-red-800 px-3 py-1 rounded-full' }, '☠️ Perigo revelado!'),
                                h('span', { className: 'text-sm font-semibold' }, 'Repetido?'),
                                h('button', { onClick: function() { confirmDanger(false); }, className: 'px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-bold' }, '✓ Não'),
                                h('button', { onClick: function() { confirmDanger(true); }, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold' }, '✗ Sim!')
                            ),
                            
                            // Votação (após rubis ou perigo confirmado não-repetido)
                            phase === 'voting' && h('div', { className: 'flex gap-2 items-center flex-wrap' },
                                h('span', { className: 'text-sm font-semibold bg-blue-100 px-3 py-1 rounded-full' }, '🗳️ ' + votesRcvd + '/' + totalToVote),
                                votingTimeout === 0 && !votingTimedOut && h('button', { onClick: function() { startVotingTimeout(10); }, className: 'px-3 py-1 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-bold text-sm' }, '⏱️ 10s'),
                                votingTimeout > 0 && h('span', { className: 'text-xl font-bold text-orange-600 animate-pulse' }, '⏱️ ' + votingTimeout + 's'),
                                votingTimedOut && h('span', { className: 'text-sm font-semibold text-orange-600' }, '⏱️ Tempo esgotado!'),
                                (allVoted || votingTimedOut) && h('button', { onClick: revealVotes, className: 'px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold shadow-lg ml-2' }, '👁️ Revelar')
                            ),
                            
                            phase === 'expedition_end' && h('button', { onClick: prepareNewExpedition, className: 'px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg' }, '🔄 Nova Expedição'),
                            
                            h('div', { className: 'ml-auto flex items-center gap-3' },
                                h('div', { className: 'flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full' },
                                    h('span', { className: 'text-xl' }, '💎'),
                                    h('span', { className: 'font-bold text-amber-800' }, 'Reserva: ' + reserve)
                                ),
                                h('button', { onClick: function() { setShowDiscovered(!showDiscovered); }, className: 'px-3 py-1 rounded text-sm ' + (showDiscovered ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-600') }, showDiscovered ? '👁️ Desc' : '🙈 Desc'),
                                h('button', { onClick: showFinalLeaderboard, className: 'px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold text-sm' }, '🏆')
                            )
                        )
                    )
                );
            }
            ReactDOM.createRoot(document.getElementById('root')).render(h(App));
        });
    </script>
</body>
</html>
