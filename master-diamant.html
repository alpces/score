<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamant - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getDatabase, ref, set, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBudmIz5XvRzhlOfj0wHI0W5EIles3wsmY",
            authDomain: "contador-de-pontos-321ee.firebaseapp.com",
            projectId: "contador-de-pontos-321ee",
            storageBucket: "contador-de-pontos-321ee.firebasestorage.app",
            messagingSenderId: "817191889469",
            appId: "1:817191889469:web:cfb88023612f6b37491854",
            databaseURL: "https://contador-de-pontos-321ee-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.rtdb = getDatabase(app);
        window.fbModules = { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        /**
         * ====================================================================
         * DIAMANT - MASTER APP (v2.3)
         * ====================================================================
         * v2.3: Pontuação diferida — discovered mantêm-se congelados até
         *       a expedição terminar. Reserva vai para discovered, não saved.
         *       Guardados só atualizam no fim da expedição.
         * ====================================================================
         */
        
        const CLIENT_URL = 'https://alpces.github.io/score/client-diamant.html';
        const GAME_TYPE = 'diamant';

        window.addEventListener('firebaseReady', function() {
            var useState = React.useState, useEffect = React.useEffect, useRef = React.useRef, h = React.createElement;
            var rtdb = window.rtdb, fm = window.fbModules;

            function App() {
                // === SETUP ===
                var _s = function(v) { return useState(v); };
                var s1 = _s(false); var setupComplete = s1[0]; var setSetupComplete = s1[1];
                var s2 = _s(null); var sessionId = s2[0]; var setSessionId = s2[1];
                var s3 = _s(''); var customSessionCode = s3[0]; var setCustomSessionCode = s3[1];
                var s4 = _s(''); var codeError = s4[0]; var setCodeError = s4[1];
                var s5 = _s(false); var codeCopied = s5[0]; var setCodeCopied = s5[1];
                var s6 = _s(0); var votingTimeoutDefault = s6[0]; var setVotingTimeoutDefault = s6[1];
                var s7 = _s(true); var showDiscovered = s7[0]; var setShowDiscovered = s7[1];
                // Multiplicador
                var s8 = _s(9); var multiplierThreshold = s8[0]; var setMultiplierThreshold = s8[1];
                var s9 = _s(2); var multiplierValue = s9[0]; var setMultiplierValue = s9[1];
                
                // === JOGO ===
                var g1 = _s('waiting_start'); var phase = g1[0]; var setPhase = g1[1];
                var g2 = _s(1); var expedition = g2[0]; var setExpedition = g2[1];
                var g3 = _s(0); var reserve = g3[0]; var setReserve = g3[1];
                var g4 = _s([]); var teamsInExpedition = g4[0]; var setTeamsInExpedition = g4[1];
                var g5 = _s({}); var discoveredScores = g5[0]; var setDiscoveredScores = g5[1];
                var g6 = _s({}); var savedScores = g6[0]; var setSavedScores = g6[1];
                var g7 = _s({}); var votes = g7[0]; var setVotes = g7[1];
                var g8 = _s(0); var votingTimeout = g8[0]; var setVotingTimeout = g8[1];
                var g9 = _s(false); var votingTimedOut = g9[0]; var setVotingTimedOut = g9[1];
                var g10 = _s(null); var lastCard = g10[0]; var setLastCard = g10[1];
                var g11 = _s(null); var lastRevealResult = g11[0]; var setLastRevealResult = g11[1];
                var g12 = _s(''); var rubyInputValue = g12[0]; var setRubyInputValue = g12[1];
                var g13 = _s([]); var exitedTeams = g13[0]; var setExitedTeams = g13[1];
                var g14 = _s(0); var artifactValue = g14[0]; var setArtifactValue = g14[1];
                var g15 = _s(0); var revealStep = g15[0]; var setRevealStep = g15[1];
                var g16 = _s({}); var bets = g16[0]; var setBets = g16[1];
                
                // === UI ===
                var u1 = _s([]); var tables = u1[0]; var setTables = u1[1];
                var u2 = _s({}); var connectedClients = u2[0]; var setConnectedClients = u2[1];
                var u3 = _s(false); var showQRCode = u3[0]; var setShowQRCode = u3[1];
                var u4 = _s(false); var showLeaderboard = u4[0]; var setShowLeaderboard = u4[1];
                var u5 = _s(null); var leaderboardRevealPosition = u5[0]; var setLeaderboardRevealPosition = u5[1];
                var u6 = _s([]); var availableLogos = u6[0]; var setAvailableLogos = u6[1];
                var u7 = _s([]); var selectedLogos = u7[0]; var setSelectedLogos = u7[1];
                var u8 = _s(false); var showHistory = u8[0]; var setShowHistory = u8[1];
                var u9 = _s([]); var sessionHistory = u9[0]; var setSessionHistory = u9[1];
                var u10 = _s([]); var activeSessions = u10[0]; var setActiveSessions = u10[1];
                var u11 = _s(false); var showExistingSessionDialog = u11[0]; var setShowExistingSessionDialog = u11[1];
                var u12 = _s(null); var existingSessionData = u12[0]; var setExistingSessionData = u12[1];
                var u13 = _s(false); var showEndSessionModal = u13[0]; var setShowEndSessionModal = u13[1];
                
                var timerRef = useRef(null);
                
                // Multiplicador ativo?
                var multiplierActive = tables.length >= multiplierThreshold;
                var currentMultiplier = multiplierActive ? multiplierValue : 1;
                
                // === LOGOS ===
                useEffect(function() {
                    var logos = [], loaded = 0;
                    for (var i = 1; i <= 5; i++) { (function(idx) {
                        var img = new Image(), p = 'logo' + idx + '.png';
                        img.onload = function() { logos.push(p); loaded++; if (loaded === 5) setAvailableLogos(logos.sort()); };
                        img.onerror = function() { loaded++; if (loaded === 5) setAvailableLogos(logos.sort()); };
                        img.src = p;
                    })(i); }
                }, []);
                
                // === SESSÕES ATIVAS ===
                useEffect(function() {
                    var unsub = fm.onValue(fm.ref(rtdb, 'sessions'), function(snap) {
                        var data = snap.val();
                        if (data) {
                            var active = Object.keys(data).filter(function(c) {
                                var gs = data[c] && data[c].gameState;
                                return gs && gs.gameType === GAME_TYPE && gs.active !== false;
                            }).map(function(c) {
                                return Object.assign({ sessionId: c }, data[c].gameState);
                            }).sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
                            setActiveSessions(active);
                        } else setActiveSessions([]);
                    });
                    return function() { unsub(); };
                }, []);
                
                // === HISTÓRICO ===
                useEffect(function() {
                    if (!showHistory) return;
                    var unsub = fm.onValue(fm.ref(rtdb, 'sessionHistory'), function(snap) {
                        var data = snap.val();
                        if (data) {
                            var e = Object.entries(data).filter(function(p) { return p[1].gameType === GAME_TYPE; })
                                .map(function(p) { return Object.assign({ id: p[0] }, p[1]); })
                                .sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
                            setSessionHistory(e);
                        } else setSessionHistory([]);
                    });
                    return function() { unsub(); };
                }, [showHistory]);
                
                // === SYNC FIREBASE ===
                useEffect(function() {
                    if (!sessionId) return;
                    (async function() {
                        try {
                            await fm.set(fm.ref(rtdb, 'sessions/' + sessionId + '/gameState'), {
                                gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                                phase: phase, expedition: expedition, reserve: reserve,
                                teamsInExpedition: teamsInExpedition,
                                discoveredScores: discoveredScores, savedScores: savedScores,
                                votes: votes, votingTimeout: votingTimeout, votingTimedOut: votingTimedOut,
                                lastCard: lastCard, lastRevealResult: lastRevealResult,
                                tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                                selectedLogos: selectedLogos, exitedTeams: exitedTeams,
                                artifactValue: artifactValue,
                                revealStep: revealStep,
                                multiplierThreshold: multiplierThreshold, multiplierValue: multiplierValue,
                                multiplierActive: multiplierActive
                            });
                        } catch (e) { console.error('Sync:', e); }
                    })();
                }, [sessionId, phase, expedition, reserve, teamsInExpedition, discoveredScores, savedScores, votes, votingTimeout, votingTimedOut, lastCard, lastRevealResult, tables, selectedLogos, exitedTeams, artifactValue, revealStep, multiplierThreshold, multiplierValue]);
                
                // === LISTENERS ===
                useEffect(function() {
                    if (!sessionId) return;
                    var unsubC = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/clients'), function(snap) {
                        var data = snap.val();
                        setConnectedClients(data || {});
                        if (data) {
                            setTables(function(prev) {
                                var nt = prev.slice();
                                Object.entries(data).forEach(function(e) {
                                    var id = parseInt(e[0]), cd = e[1];
                                    var idx = nt.findIndex(function(t) { return t.id === id; });
                                    if (idx >= 0) { if (cd.teamName) nt[idx] = Object.assign({}, nt[idx], { name: cd.teamName }); }
                                    else {
                                        nt.push({ id: id, name: cd.teamName || ('Mesa ' + id), score: 0 });
                                        setDiscoveredScores(function(ps) { var n = Object.assign({}, ps); if (!n[id]) n[id] = 0; return n; });
                                        setSavedScores(function(ds) { var n = Object.assign({}, ds); if (!n[id]) n[id] = 0; return n; });
                                    }
                                });
                                nt.sort(function(a, b) { return a.id - b.id; });
                                return nt;
                            });
                        }
                    });
                    var unsubV = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'), function(snap) {
                        var data = snap.val();
                        if (data) setVotes(function(prev) { return Object.assign({}, prev, data); });
                    });
                    var unsubB = fm.onValue(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantBets'), function(snap) {
                        setBets(snap.val() || {});
                    });
                    return function() { unsubC(); unsubV(); unsubB(); };
                }, [sessionId]);
                
                // === TIMER ===
                useEffect(function() {
                    if (votingTimeout > 0) {
                        timerRef.current = setTimeout(function() {
                            setVotingTimeout(function(p) { if (p <= 1) { setVotingTimedOut(true); return 0; } return p - 1; });
                        }, 1000);
                    }
                    return function() { if (timerRef.current) clearTimeout(timerRef.current); };
                }, [votingTimeout]);
                
                // === SESSION MGMT ===
                var genCode = function() { var c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789', r = ''; for (var i = 0; i < 6; i++) r += c.charAt(Math.floor(Math.random() * c.length)); return r; };
                
                var startSession = async function() {
                    var fc = customSessionCode.trim().toUpperCase();
                    if (fc) {
                        if (!/^[A-Z0-9]+$/.test(fc)) { setCodeError('Apenas letras e números'); return; }
                        if (fc.length > 10) { setCodeError('Máximo 10 caracteres'); return; }
                        var snap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + fc + '/gameState'), r, { onlyOnce: true }); });
                        var ad = snap.val();
                        if (ad && ad.active) { setExistingSessionData({ code: fc, data: ad }); setShowExistingSessionDialog(true); return; }
                    } else fc = genCode();
                    await proceedCreate(fc);
                };
                
                var proceedCreate = async function(code) {
                    setTables([]); setDiscoveredScores({}); setSavedScores({});
                    setSessionId(code); setSetupComplete(true); setPhase('waiting_start');
                    setExpedition(1); setReserve(0); setTeamsInExpedition([]);
                    setVotes({}); setLastCard(null); setLastRevealResult(null);
                    setVotingTimeout(0); setVotingTimedOut(false); setExitedTeams([]);
                    setArtifactValue(0);
                    try {
                        await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), {
                            gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                            phase: 'waiting_start', expedition: 1, reserve: 0,
                            teamsInExpedition: [], discoveredScores: {}, savedScores: {},
                            votes: {}, votingTimeout: 0, votingTimedOut: false,
                            lastCard: null, lastRevealResult: null, tables: [],
                            selectedLogos: selectedLogos, exitedTeams: [],
                            artifactValue: 0,
                            multiplierThreshold: multiplierThreshold, multiplierValue: multiplierValue,
                            multiplierActive: false
                        });
                    } catch (e) { console.error(e); }
                };
                
                var handleExistingChoice = async function(choice) {
                    var code = existingSessionData.code, data = existingSessionData.data;
                    if (choice === 'yes') { setShowExistingSessionDialog(false); loadSession(Object.assign({ sessionId: code }, data), true); }
                    else if (choice === 'no') {
                        setShowExistingSessionDialog(false);
                        try {
                            await fm.update(fm.ref(rtdb, 'sessions/' + code + '/gameState'), { active: false, closedAt: Date.now() });
                            await new Promise(function(r) { setTimeout(r, 200); });
                            var hid = Math.random().toString(36).substring(2, 12);
                            await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), {
                                sessionId: code, timestamp: Date.now(), gameType: GAME_TYPE,
                                tables: data.tables || [], discoveredScores: data.discoveredScores || {},
                                savedScores: data.savedScores || {}, expedition: data.expedition || 1, archived: true
                            });
                            await fm.remove(fm.ref(rtdb, 'sessions/' + code));
                            await new Promise(function(r) { setTimeout(r, 200); });
                            await proceedCreate(code);
                        } catch (e) { alert('Erro: ' + e.message); }
                    } else { setShowExistingSessionDialog(false); setExistingSessionData(null); }
                };
                
                var resetToSetup = function() {
                    setSetupComplete(false); setSessionId(null); setPhase('waiting_start');
                    setExpedition(1); setReserve(0); setTeamsInExpedition([]);
                    setDiscoveredScores({}); setSavedScores({}); setVotes({});
                    setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setTables([]); setConnectedClients({}); setExitedTeams([]);
                    setArtifactValue(0);
                    setShowLeaderboard(false); setShowQRCode(false); setShowEndSessionModal(false);
                };
                
                var endSessionArchive = async function() {
                    if (!sessionId) return;
                    try {
                        var curId = sessionId;
                        var hd = {
                            sessionId: curId, timestamp: Date.now(), gameType: GAME_TYPE,
                            tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                            discoveredScores: Object.assign({}, discoveredScores), savedScores: Object.assign({}, savedScores),
                            expedition: expedition, emails: {}, selectedLogos: selectedLogos, archived: true
                        };
                        Object.values(connectedClients).forEach(function(c) { hd.emails[c.tableNumber] = c.emails || []; });
                        // Marcar inativo PRIMEIRO para clientes detectarem
                        await fm.update(fm.ref(rtdb, 'sessions/' + curId + '/gameState'), { active: false, closedAt: Date.now() });
                        // Esperar para clientes processarem
                        await new Promise(function(r) { setTimeout(r, 500); });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), hd);
                        // Remover TODO o nó (gameState + clients + diamantVotes)
                        await fm.remove(fm.ref(rtdb, 'sessions/' + curId));
                        resetToSetup();
                    } catch (e) { alert('Erro: ' + e.message); }
                };
                var endSessionPause = function() { resetToSetup(); };
                
                var loadSession = async function(entry, skipConfirm) {
                    if (!skipConfirm && !confirm('Carregar esta sessão?')) return;
                    var code = entry.sessionId;
                    setShowHistory(false);
                    var lt = entry.tables || [], ld = entry.discoveredScores || {}, ls = entry.savedScores || {};
                    if (Object.keys(ls).length === 0 && lt.length > 0) lt.forEach(function(t) { ls[t.id] = t.score || 0; ld[t.id] = 0; });
                    setTables(lt); setDiscoveredScores(ld); setSavedScores(ls);
                    setExpedition(entry.expedition || 1); setReserve(entry.reserve || 0);
                    setTeamsInExpedition(entry.teamsInExpedition || []);
                    setPhase(entry.phase || 'waiting_start');
                    setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setSelectedLogos(entry.selectedLogos || []);
                    setExitedTeams(entry.exitedTeams || []);
                    setArtifactValue(entry.artifactValue || 0);
                    if (entry.multiplierThreshold) setMultiplierThreshold(entry.multiplierThreshold);
                    if (entry.multiplierValue) setMultiplierValue(entry.multiplierValue);
                    setConnectedClients({}); setShowLeaderboard(false); setShowQRCode(false);
                    setSessionId(code); setSetupComplete(true);
                    setTimeout(async function() {
                        try { await fm.set(fm.ref(rtdb, 'sessions/' + code + '/gameState'), {
                            gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                            phase: entry.phase || 'waiting_start', expedition: entry.expedition || 1,
                            reserve: entry.reserve || 0, teamsInExpedition: entry.teamsInExpedition || [],
                            discoveredScores: ld, savedScores: ls, votes: {}, votingTimeout: 0, votingTimedOut: false,
                            lastCard: null, lastRevealResult: null, tables: lt,
                            selectedLogos: entry.selectedLogos || [], exitedTeams: entry.exitedTeams || [],
                            artifactValue: entry.artifactValue || 0,
                            multiplierThreshold: entry.multiplierThreshold || 9, multiplierValue: entry.multiplierValue || 2,
                            multiplierActive: lt.length >= (entry.multiplierThreshold || 9)
                        }); } catch (e) { console.error(e); }
                    }, 100);
                };
                
                var closeActiveSession = async function(sc) {
                    if (!confirm('Arquivar "' + sc + '"?')) return;
                    try {
                        var snap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + sc + '/gameState'), r, { onlyOnce: true }); });
                        var sd = snap.val(); if (!sd) { alert('Não encontrada'); return; }
                        await fm.update(fm.ref(rtdb, 'sessions/' + sc + '/gameState'), { active: false, closedAt: Date.now() });
                        await new Promise(function(r) { setTimeout(r, 500); });
                        var cSnap = await new Promise(function(r) { fm.onValue(fm.ref(rtdb, 'sessions/' + sc + '/clients'), r, { onlyOnce: true }); });
                        var cd = cSnap.val() || {};
                        var hd = { sessionId: sc, timestamp: Date.now(), gameType: GAME_TYPE, tables: sd.tables || [],
                            discoveredScores: sd.discoveredScores || {}, savedScores: sd.savedScores || {},
                            expedition: sd.expedition || 1, emails: {}, selectedLogos: sd.selectedLogos || [], archived: true };
                        Object.values(cd).forEach(function(c) { hd.emails[c.tableNumber] = c.emails || []; });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await fm.set(fm.ref(rtdb, 'sessionHistory/' + hid), hd);
                        await fm.remove(fm.ref(rtdb, 'sessions/' + sc));
                    } catch (e) { alert('Erro: ' + e.message); }
                };
                var deleteHistoryEntry = async function(id) { if (!confirm('Eliminar?')) return; try { await fm.remove(fm.ref(rtdb, 'sessionHistory/' + id)); } catch(e) {} };
                
                // === DESCONECTAR MESA INDIVIDUAL ===
                var disconnectTable = async function(tableId) {
                    if (!confirm('Desconectar Mesa ' + tableId + '?')) return;
                    try {
                        // Remover do nó clients
                        await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/clients/' + tableId));
                        // Remover da expedição se estiver em jogo
                        if (teamsInExpedition.indexOf(tableId) >= 0) {
                            setTeamsInExpedition(function(prev) { return prev.filter(function(id) { return id !== tableId; }); });
                            // Limpar descobertos (perdem-se ao ser desconectado)
                            setDiscoveredScores(function(prev) { var n = Object.assign({}, prev); n[tableId] = 0; return n; });
                            // Adicionar aos que saíram
                            setExitedTeams(function(prev) { return prev.concat([tableId]); });
                        }
                        // Remover votos
                        await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes/' + tableId));
                    } catch (e) { console.error(e); }
                };
                
                // === JOGO ===
                var startExpedition = async function() {
                    if (tables.length === 0) { alert('Nenhuma equipa registada.'); return; }
                    var allIds = tables.map(function(t) { return t.id; });
                    var nd = {}; allIds.forEach(function(id) { nd[id] = 0; });
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantBets'));
                    setPhase('exploring'); setReserve(0); setTeamsInExpedition(allIds);
                    setDiscoveredScores(nd); setVotes({}); setBets({}); setLastCard(null);
                    setLastRevealResult(null); setVotingTimedOut(false); setExitedTeams([]);
                    setArtifactValue(0); setRevealStep(0);
                };
                
                var drawRubyCard = async function() {
                    var cardVal = parseInt(rubyInputValue);
                    if (!cardVal || cardVal <= 0 || teamsInExpedition.length === 0) return;
                    var effectiveVal = cardVal * currentMultiplier;
                    var tc = teamsInExpedition.length;
                    var perTeam = Math.floor(effectiveVal / tc), leftover = effectiveVal % tc;
                    var nd = Object.assign({}, discoveredScores);
                    teamsInExpedition.forEach(function(id) { nd[id] = (nd[id] || 0) + perTeam; });
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantBets'));
                    setDiscoveredScores(nd); setReserve(reserve + leftover);
                    setPhase('voting'); setVotes({}); setBets({}); setVotingTimeout(0); setVotingTimedOut(false); setRevealStep(0);
                    setLastCard({ type: 'ruby', value: effectiveVal, cardValue: cardVal, perTeam: perTeam, leftover: leftover, multiplier: currentMultiplier });
                    setRubyInputValue('');
                };
                
                var drawDangerCard = async function() {
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantBets'));
                    setVotes({}); setBets({}); setVotingTimeout(0); setVotingTimedOut(false); setRevealStep(0);
                    setLastCard({ type: 'danger', awaitingConfirmation: true });
                };
                
                var drawArtifactCard = async function(val) {
                    if (!val || val <= 0) return;
                    var newArtifact = artifactValue + val;
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    await fm.remove(fm.ref(rtdb, 'sessions/' + sessionId + '/diamantBets'));
                    setArtifactValue(newArtifact);
                    setPhase('voting'); setVotes({}); setBets({}); setVotingTimeout(0); setVotingTimedOut(false); setRevealStep(0);
                    setLastCard({ type: 'artifact', value: val, totalArtifact: newArtifact });
                };
                
                var confirmDanger = async function(isRepeated) {
                    if (isRepeated) {
                        // Perigo repetido:
                        // - Equipas que já saíram: discovered → saved, discovered = 0
                        // - Equipas ainda na gruta: discovered = 0, nada para saved

                                    Object.entries(bets).map(function(entry) {
                                        var bettorId = parseInt(entry[0]); var bet = entry[1];
                                        if (!bet || !bet.target) return null;
                                        var bettorTable = tables.find(function(t) { return t.id === bettorId; });
                                        var targetTable = tables.find(function(t) { return t.id === bet.target; });
                                        var bettorName = bettorTable ? (bettorTable.name || 'Mesa ' + bettorId) : 'Mesa ' + bettorId;
                                        var targetName = targetTable ? (targetTable.name || 'Mesa ' + bet.target) : 'Mesa ' + bet.target;
                                        return h('div', { key: bettorId, className: 'flex items-center gap-2 bg-white p-2 rounded-lg text-sm' },
                                            h('span', { className: 'font-bold' }, bettorName),
                                            h('span', { className: 'text-gray-400' }, '→'),
                                            h('span', { className: 'font-semibold' }, targetName),
                                            h('span', { className: 'px-2 py-0.5 rounded-full text-xs font-bold ' + (bet.prediction === 'leave' ? 'bg-red-200 text-red-800' : 'bg-green-200 text-green-800') },
                                                bet.prediction === 'leave' ? '🏃 SAI' : '💎 FICA'
                                            )
                                        );
                                    })
                                )
                        ),
                        
                        // Banner revelação com duas colunas + resultados apostas
                        lastRevealResult && !lastRevealResult.dangerRepeated && lastRevealResult.leaving && lastRevealResult.leaving.length > 0 && (phase === 'exploring' || phase === 'expedition_end') && h('div', { className: 'bg-white/90 text-gray-800 rounded-xl p-4 mb-4' },
                            // Apostas com resultados (✅/❌)
                            lastRevealResult.betOutcomes && lastRevealResult.betOutcomes.length > 0 && h('div', { className: 'mb-3' },
                                h('div', { className: 'text-sm font-bold text-indigo-800 mb-2' }, '🎲 Apostas:'),
                                h('div', { className: 'space-y-1' },
                                    lastRevealResult.betOutcomes.map(function(bo, idx) {
                                        var bettorTable = tables.find(function(t) { return t.id === bo.teamId; });
                                        var targetTable = tables.find(function(t) { return t.id === bo.target; });
                                        var bettorName = bettorTable ? (bettorTable.name || 'Mesa ' + bo.teamId) : 'Mesa ' + bo.teamId;
                                        var targetName = targetTable ? (targetTable.name || 'Mesa ' + bo.target) : 'Mesa ' + bo.target;
                                        return h('div', { key: idx, className: 'flex items-center gap-2 text-sm' },
                                            h('span', { className: 'text-lg' }, bo.correct ? '✅' : '❌'),
                                            h('span', { className: 'font-semibold' }, bettorName),
                                            h('span', { className: 'text-gray-400' }, '→'),
                                            h('span', null, targetName + ' ' + (bo.prediction === 'leave' ? 'SAI' : 'FICA')),
                                            h('span', { className: 'font-bold ' + (bo.gain > 0 ? 'text-green-600' : 'text-red-600') }, (bo.gain > 0 ? '+' : '') + bo.gain + '💎')
                                        );
                                    })
                                ),
                                h('hr', { className: 'my-2' })
                            ),
                            // Duas colunas: Ficaram | Saíram
                            h('div', { className: 'grid grid-cols-2 gap-4' },
                                h('div', null,
                                    h('div', { className: 'text-sm font-bold text-green-700 mb-2 text-center' }, '⛏️ Ficaram (' + (lastRevealResult.staying ? lastRevealResult.staying.length : 0) + ')'),
                                    (lastRevealResult.staying || []).map(function(id) {
                                        var t = tables.find(function(tb) { return tb.id === id; });
                                        return h('div', { key: id, className: 'text-sm text-center py-0.5' }, t ? (t.name || 'Mesa ' + id) : 'Mesa ' + id);
                                    })
                                ),
                                h('div', null,
                                    h('div', { className: 'text-sm font-bold text-red-700 mb-2 text-center' }, '🏃 Saíram (' + lastRevealResult.leaving.length + ')'),
                                    lastRevealResult.leaving.map(function(id) {
                                        var t = tables.find(function(tb) { return tb.id === id; });
                                        return h('div', { key: id, className: 'text-sm text-center py-0.5' }, t ? (t.name || 'Mesa ' + id) : 'Mesa ' + id);
                                    })
                                )
                            ),
                            // Info rubis distribuídos
                            lastRevealResult.reserveDistributed > 0 && h('div', { className: 'text-sm mt-2 text-center' },
                                'Cada saída levou ' + lastRevealResult.reserveDistributed + ' rubi' + (lastRevealResult.reserveDistributed > 1 ? 's' : '') + ' dos deixados para trás'),
                            lastRevealResult.reserveRemaining > 0 && h('div', { className: 'text-sm font-bold text-amber-700 mt-1 text-center' },
                                '⬇️ Sobram ' + lastRevealResult.reserveRemaining + ' (deixar no caminho)'),
                            lastRevealResult.artifactCollected > 0 && h('div', { className: 'text-sm font-bold text-teal-700 mt-1 text-center' },
                                '🏺 Recolheu ' + lastRevealResult.artifactCollected + ' pontos de artefactos!')
                        ),
                        lastRevealResult && lastRevealResult.dangerRepeated && phase === 'expedition_end' && h('div', { className: 'bg-red-500/80 text-white rounded-xl p-3 mb-4 text-center' },
                            h('div', { className: 'text-xl font-bold' }, '💀 Perigo Repetido! Expedição perdida.')
                        ),
                        
                        // Grid mesas
                        h('div', { className: 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3' },
                            tables.map(function(table) {
                                var client = connectedClients[table.id];
                                var isInExp = teamsInExpedition.indexOf(table.id) >= 0;
                                var disc = discoveredScores[table.id] || 0;
                                var saved = savedScores[table.id] || 0;
                                var hasVoted = votes[table.id] != null;
                                var isExited = exitedTeams.indexOf(table.id) >= 0;
                                // Acabou de sair NESTA revelação
                                var justLeft = lastRevealResult && lastRevealResult.leaving && lastRevealResult.leaving.indexOf(table.id) >= 0 && (phase === 'exploring' || phase === 'expedition_end');
                                
                                var bgClass = 'bg-white', borderClass = 'border-transparent', textDim = '';
                                if (justLeft) {
                                    // Vermelho forte para quem acabou de sair
                                    bgClass = 'bg-red-200'; borderClass = 'border-red-600';
                                } else if (lastRevealResult && lastRevealResult.staying && lastRevealResult.staying.indexOf(table.id) >= 0 && phase === 'exploring') {
                                    // Verde forte para quem ficou
                                    bgClass = 'bg-green-200'; borderClass = 'border-green-600';
                                } else if (isExited && !isInExp && phase !== 'waiting_start' && phase !== 'expedition_end') {
                                    // Cinza escuro para já saíram antes
                                    bgClass = 'bg-gray-500'; borderClass = 'border-gray-600'; textDim = ' text-gray-300';
                                } else if (!isInExp && phase !== 'waiting_start' && phase !== 'expedition_end') {
                                    bgClass = 'bg-gray-200';
                                }
                                
                                return h('div', { key: table.id, className: bgClass + ' rounded-xl shadow-lg p-3 border-2 ' + borderClass + ' transition-all' },
                                    h('div', { className: 'flex justify-between items-center mb-1' },
                                        h('span', { className: 'text-xs' + (textDim || ' text-gray-500') }, 'Mesa ' + table.id),
                                        h('div', { className: 'flex items-center gap-1' },
                                            client && h('span', { className: 'text-xs text-green-600' }, '●'),
                                            // Botão desconectar
                                            client && h('button', { onClick: function() { disconnectTable(table.id); }, className: 'text-xs text-red-400 hover:text-red-600 ml-1', title: 'Desconectar' }, '✕')
                                        )
                                    ),
                                    h('div', { className: 'font-bold text-sm truncate mb-2' + (textDim || ' text-gray-800') }, table.name || 'Mesa ' + table.id),
                                    h('div', { className: 'flex justify-between items-center gap-2' },
                                        // Discovered: mostrar para equipas em jogo E para equipas que já saíram (score congelado)
                                        showDiscovered && (isInExp || (isExited && disc > 0)) && h('div', { className: 'text-center' },
                                            h('div', { className: 'text-xs ' + (isExited ? 'text-amber-400' : 'text-amber-600') }, isExited ? 'Desc ⏳' : 'Desc'),
                                            h('div', { className: 'text-lg font-bold ' + (isExited ? 'text-amber-300' : 'text-amber-500') }, disc)
                                        ),
                                        h('div', { className: 'text-center flex-1' },
                                            h('div', { className: 'text-xs' + (textDim || ' text-purple-600') }, 'Guard'),
                                            h('div', { className: 'text-2xl font-black' + (textDim || ' text-purple-600') }, saved)
                                        )
                                    ),
                                    phase === 'voting' && isInExp && h('div', { className: 'mt-2 text-center' },
                                        hasVoted ? h('span', { className: 'text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full' }, '✓ Votou')
                                        : h('span', { className: 'text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full animate-pulse' }, '⏳')
                                    )
                                );
                            })
                        )
                    ),
                    
                    // Logos secundários
                    secLogos.length > 0 && h('div', { className: 'bg-black/20 py-2 flex justify-center items-center gap-4' },
                        secLogos.map(function(l) { return h('img', { key: l, src: l, className: 'h-8 object-contain opacity-80' }); })
                    ),
                    
                    // Barra de controlos
                    h('div', { className: 'bg-white border-t-4 border-amber-500 p-3' },
                        h('div', { className: 'flex flex-wrap gap-2 items-center' },
                            phase === 'waiting_start' && h('button', { onClick: startExpedition, disabled: tables.length === 0,
                                className: 'px-6 py-3 rounded-xl font-bold shadow-lg ' + (tables.length > 0 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-300 text-gray-500')
                            }, '🚀 Iniciar (' + tables.length + ' eq)'),
                            
                            (phase === 'exploring' && !dangerAwaiting) && h('div', { className: 'flex gap-2 items-center flex-wrap' },
                                h('input', { type: 'number', min: 1, max: 15, value: rubyInputValue, onChange: function(e) { setRubyInputValue(e.target.value); }, placeholder: '💎', className: 'w-20 px-3 py-2 border-2 border-amber-400 rounded-xl text-center font-bold text-xl' }),
                                multiplierActive && h('span', { className: 'text-xs font-bold text-amber-700' }, '×' + currentMultiplier),
                                h('button', { onClick: drawRubyCard, disabled: !rubyInputValue, className: 'px-4 py-2 rounded-xl font-bold ' + (rubyInputValue ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-gray-300 text-gray-500') }, '💎 Rubis'),
                                h('div', { className: 'w-px h-10 bg-gray-300 mx-1' }),
                                h('button', { onClick: drawDangerCard, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold' }, '☠️ Perigo'),
                                h('div', { className: 'w-px h-10 bg-gray-300 mx-1' }),
                                // Artefactos — valores pré-definidos
                                h('div', { className: 'flex gap-1 items-center' },
                                    h('span', { className: 'text-sm font-semibold text-teal-700' }, '🏺'),
                                    [5, 7, 8, 10, 12].map(function(v) {
                                        return h('button', { key: v, onClick: function() { drawArtifactCard(v); }, className: 'px-2 py-1 bg-teal-500 hover:bg-teal-600 text-white rounded-lg font-bold text-sm' }, v);
                                    })
                                )
                            ),
                            
                            dangerAwaiting && h('div', { className: 'flex gap-2 items-center' },
                                h('span', { className: 'text-sm font-semibold bg-red-100 text-red-800 px-3 py-1 rounded-full' }, '☠️ Perigo!'),
                                h('span', { className: 'text-sm font-semibold' }, 'Repetido?'),
                                h('button', { onClick: function() { confirmDanger(false); }, className: 'px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-bold' }, '✓ Não'),
                                h('button', { onClick: function() { confirmDanger(true); }, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold' }, '✗ Sim!')
                            ),
                            
                            phase === 'voting' && revealStep === 0 && h('div', { className: 'flex gap-2 items-center flex-wrap' },
                                h('span', { className: 'text-sm font-semibold bg-blue-100 px-3 py-1 rounded-full' }, '🗳️ ' + votesRcvd + '/' + totalToVote),
                                exitedTeams.length > 0 && h('span', { className: 'text-sm font-semibold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full' }, '🎲 ' + Object.keys(bets).length + ' apostas'),
                                votingTimeout === 0 && !votingTimedOut && h('button', { onClick: function() { startVotingTimeout(10); }, className: 'px-3 py-1 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-bold text-sm' }, '⏱️ 10s'),
                                votingTimeout > 0 && h('span', { className: 'text-xl font-bold text-orange-600 animate-pulse' }, '⏱️ ' + votingTimeout + 's'),
                                votingTimedOut && h('span', { className: 'text-sm font-semibold text-orange-600' }, '⏱️ Esgotado!'),
                                (allVoted || votingTimedOut) && h('button', { onClick: revealBets, className: 'px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold shadow-lg ml-2' }, '👁️ Revelar')
                            ),
                            
                            // Passo 2: apostas reveladas — mostrar botão resultado
                            phase === 'voting' && revealStep === 1 && h('div', { className: 'flex gap-2 items-center' },
                                h('span', { className: 'text-sm font-semibold bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full' }, '🎲 Apostas reveladas'),
                                h('button', { onClick: revealResult, className: 'px-6 py-2 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg ml-2' }, '🎯 Revelar Resultado')
                            ),
                            
                            phase === 'expedition_end' && h('button', { onClick: prepareNewExpedition, className: 'px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg' }, '🔄 Nova Expedição'),
                            
                            h('div', { className: 'ml-auto flex items-center gap-3' },
                                h('div', { className: 'flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full' },
                                    h('span', { className: 'text-xl' }, '💎'),
                                    h('span', { className: 'font-bold text-amber-800 text-sm' }, 'Deixados: ' + reserve)
                                ),
                                artifactValue > 0 && h('div', { className: 'flex items-center gap-2 bg-teal-100 px-4 py-2 rounded-full' },
                                    h('span', { className: 'text-xl' }, '🏺'),
                                    h('span', { className: 'font-bold text-teal-800 text-sm' }, 'Artefactos: ' + artifactValue)
                                ),
                                h('button', { onClick: function() { setShowDiscovered(!showDiscovered); }, className: 'px-3 py-1 rounded text-sm ' + (showDiscovered ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-600') }, showDiscovered ? '👁️' : '🙈'),
                                h('button', { onClick: showFinalLeaderboard, className: 'px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold text-sm' }, '🏆')
                            )
                        )
                    )
                );
            }
            ReactDOM.createRoot(document.getElementById('root')).render(h(App));
        });
    </script>
</body>
</html>
