<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamant - Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, collection, getDocs, setDoc, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        import { getDatabase, ref, set, remove, onValue, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBudmIz5XvRzhlOfj0wHI0W5EIles3wsmY",
            authDomain: "contador-de-pontos-321ee.firebaseapp.com",
            projectId: "contador-de-pontos-321ee",
            storageBucket: "contador-de-pontos-321ee.firebasestorage.app",
            messagingSenderId: "817191889469",
            appId: "1:817191889469:web:cfb88023612f6b37491854",
            databaseURL: "https://contador-de-pontos-321ee-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        window.rtdb = getDatabase(app);
        window.fbModules = { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update };
        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script>
        /**
         * ====================================================================
         * DIAMANT - MASTER APP (v2)
         * ====================================================================
         * 
         * ALTERAÇÕES v2:
         * - Mesas dinâmicas (registam-se via clientes, sem definir nº no setup)
         * - Botão revelar só aparece quando todos votaram OU timeout expirou
         * - Timeout: ao fim, mostra botão revelar; clientes perdem opção de votar
         * - Divisão de rubis mostra quanto vai para reserva (tile)
         * - "Descobertos" e "Guardados" em vez de provisório/definitivo
         * - Logo1 em destaque no header, restantes no rodapé
         * - Perigo: clientes só votam após master confirmar NÃO repetido
         * - Ranking: 6+ revelados de imediato, depois 5º a 1º por clique
         * - Gestão de sessões: restaurar/arquivar como master genérico
         * 
         * ====================================================================
         */
        
        const CLIENT_URL = 'https://alpces.github.io/score/client-diamant.html';
        const GAME_TYPE = 'diamant';

        window.addEventListener('firebaseReady', () => {
            const { useState, useEffect, useRef, createElement: h } = React;
            const { db, rtdb, fbModules } = window;
            const { collection, getDocs, setDoc, doc, deleteDoc, ref, set, remove, onValue, update } = fbModules;

            function App() {
                // =============================================================
                // ESTADOS - SETUP
                // =============================================================
                const [setupComplete, setSetupComplete] = useState(false);
                const [sessionId, setSessionId] = useState(null);
                const [customSessionCode, setCustomSessionCode] = useState('');
                const [codeError, setCodeError] = useState('');
                const [codeCopied, setCodeCopied] = useState(false);
                
                // Config do jogo
                const [votingTimeoutDefault, setVotingTimeoutDefault] = useState(0);
                const [showDiscovered, setShowDiscovered] = useState(true);
                
                // =============================================================
                // ESTADOS - JOGO DIAMANT
                // =============================================================
                const [phase, setPhase] = useState('waiting_start');
                const [expedition, setExpedition] = useState(1);
                const [reserve, setReserve] = useState(0);
                const [teamsInExpedition, setTeamsInExpedition] = useState([]);
                const [discoveredScores, setDiscoveredScores] = useState({});
                const [savedScores, setSavedScores] = useState({});
                const [votes, setVotes] = useState({});
                const [votingTimeout, setVotingTimeout] = useState(0);
                const [votingTimedOut, setVotingTimedOut] = useState(false);
                const [lastCard, setLastCard] = useState(null);
                const [lastRevealResult, setLastRevealResult] = useState(null);
                const [rubyInputValue, setRubyInputValue] = useState('');
                
                // =============================================================
                // ESTADOS - UI
                // =============================================================
                const [tables, setTables] = useState([]);
                const [connectedClients, setConnectedClients] = useState({});
                const [showQRCode, setShowQRCode] = useState(false);
                const [showLeaderboard, setShowLeaderboard] = useState(false);
                const [leaderboardRevealPosition, setLeaderboardRevealPosition] = useState(null);
                const [availableLogos, setAvailableLogos] = useState([]);
                const [selectedLogos, setSelectedLogos] = useState([]);
                
                // Session management
                const [showHistory, setShowHistory] = useState(false);
                const [sessionHistory, setSessionHistory] = useState([]);
                const [activeSessions, setActiveSessions] = useState([]);
                const [showExistingSessionDialog, setShowExistingSessionDialog] = useState(false);
                const [existingSessionData, setExistingSessionData] = useState(null);
                const [showEndSessionModal, setShowEndSessionModal] = useState(false);
                
                // Timer ref
                const timerRef = useRef(null);
                
                // =============================================================
                // EFEITOS - LOGOS
                // =============================================================
                useEffect(() => {
                    const logos = [];
                    let loadedCount = 0;
                    const totalToCheck = 5;
                    for (let i = 1; i <= totalToCheck; i++) {
                        const img = new Image();
                        const logoPath = 'logo' + i + '.png';
                        img.onload = () => { logos.push(logoPath); loadedCount++; if (loadedCount === totalToCheck) setAvailableLogos(logos.sort()); };
                        img.onerror = () => { loadedCount++; if (loadedCount === totalToCheck) setAvailableLogos(logos.sort()); };
                        img.src = logoPath;
                    }
                }, []);
                
                // =============================================================
                // EFEITOS - MONITORAR SESSÕES ATIVAS (sempre)
                // =============================================================
                useEffect(() => {
                    const sessionsRef = ref(rtdb, 'sessions');
                    const unsub = onValue(sessionsRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const active = Object.keys(data)
                                .filter(code => {
                                    const gs = data[code] && data[code].gameState;
                                    if (!gs) return false;
                                    if (gs.gameType !== GAME_TYPE) return false;
                                    return gs.active !== false;
                                })
                                .map(code => ({
                                    sessionId: code,
                                    timestamp: data[code].gameState.timestamp || Date.now(),
                                    ...data[code].gameState
                                }))
                                .sort((a, b) => b.timestamp - a.timestamp);
                            setActiveSessions(active);
                        } else {
                            setActiveSessions([]);
                        }
                    });
                    return () => unsub();
                }, []);
                
                // =============================================================
                // EFEITOS - MONITORAR HISTÓRICO (quando visível)
                // =============================================================
                useEffect(() => {
                    if (!showHistory) return;
                    const historyRef = ref(rtdb, 'sessionHistory');
                    const unsub = onValue(historyRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            const entries = Object.entries(data)
                                .filter(function(pair) { return pair[1].gameType === GAME_TYPE; })
                                .map(function(pair) { return Object.assign({ id: pair[0] }, pair[1]); })
                                .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                            setSessionHistory(entries);
                        } else {
                            setSessionHistory([]);
                        }
                    });
                    return () => unsub();
                }, [showHistory]);
                
                // =============================================================
                // EFEITOS - SINCRONIZAÇÃO COM FIREBASE
                // =============================================================
                useEffect(() => {
                    if (!sessionId) return;
                    const syncGame = async () => {
                        try {
                            await set(ref(rtdb, 'sessions/' + sessionId + '/gameState'), {
                                gameType: GAME_TYPE,
                                active: true,
                                timestamp: Date.now(),
                                phase: phase,
                                expedition: expedition,
                                reserve: reserve,
                                teamsInExpedition: teamsInExpedition,
                                discoveredScores: discoveredScores,
                                savedScores: savedScores,
                                votes: votes,
                                votingTimeout: votingTimeout,
                                votingTimedOut: votingTimedOut,
                                lastCard: lastCard,
                                lastRevealResult: lastRevealResult,
                                tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                                selectedLogos: selectedLogos
                            });
                        } catch (e) { console.error('Erro ao sincronizar:', e); }
                    };
                    syncGame();
                }, [sessionId, phase, expedition, reserve, teamsInExpedition, discoveredScores, 
                    savedScores, votes, votingTimeout, votingTimedOut, lastCard, lastRevealResult, tables, selectedLogos]);
                
                // =============================================================
                // EFEITOS - LISTENERS FIREBASE (clientes e votos)
                // =============================================================
                useEffect(() => {
                    if (!sessionId) return;
                    
                    // Escutar clientes conectados — criar mesas dinamicamente
                    var clientsRef = ref(rtdb, 'sessions/' + sessionId + '/clients');
                    var unsubClients = onValue(clientsRef, function(snapshot) {
                        var data = snapshot.val();
                        setConnectedClients(data || {});
                        if (data) {
                            setTables(function(prev) {
                                var newTables = prev.slice();
                                Object.entries(data).forEach(function(entry) {
                                    var tableId = entry[0], clientData = entry[1];
                                    var id = parseInt(tableId);
                                    var existingIdx = newTables.findIndex(function(t) { return t.id === id; });
                                    if (existingIdx >= 0) {
                                        if (clientData.teamName) {
                                            newTables[existingIdx] = Object.assign({}, newTables[existingIdx], { name: clientData.teamName });
                                        }
                                    } else {
                                        newTables.push({ id: id, name: clientData.teamName || ('Mesa ' + id), score: 0 });
                                        setDiscoveredScores(function(ps) { var n = Object.assign({}, ps); if (!n[id]) n[id] = 0; return n; });
                                        setSavedScores(function(ds) { var n = Object.assign({}, ds); if (!n[id]) n[id] = 0; return n; });
                                    }
                                });
                                newTables.sort(function(a, b) { return a.id - b.id; });
                                return newTables;
                            });
                        }
                    });
                    
                    // Escutar votos
                    var votesRef = ref(rtdb, 'sessions/' + sessionId + '/diamantVotes');
                    var unsubVotes = onValue(votesRef, function(snapshot) {
                        var data = snapshot.val();
                        if (data) {
                            setVotes(function(prev) { return Object.assign({}, prev, data); });
                        }
                    });
                    
                    return function() { unsubClients(); unsubVotes(); };
                }, [sessionId]);
                
                // =============================================================
                // EFEITOS - TIMER DE VOTAÇÃO
                // =============================================================
                useEffect(() => {
                    if (votingTimeout > 0) {
                        timerRef.current = setTimeout(function() {
                            setVotingTimeout(function(prev) {
                                if (prev <= 1) {
                                    setVotingTimedOut(true);
                                    return 0;
                                }
                                return prev - 1;
                            });
                        }, 1000);
                    }
                    return function() { if (timerRef.current) clearTimeout(timerRef.current); };
                }, [votingTimeout]);
                
                // =============================================================
                // FUNÇÕES - SETUP / SESSION MANAGEMENT
                // =============================================================
                var generateSessionCode = function() {
                    var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                    var code = '';
                    for (var i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
                    return code;
                };
                
                var startSession = async function() {
                    var finalCode = customSessionCode.trim().toUpperCase();
                    
                    if (finalCode) {
                        if (!/^[A-Z0-9]+$/.test(finalCode)) { setCodeError('Apenas letras e números'); return; }
                        if (finalCode.length > 10) { setCodeError('Máximo 10 caracteres'); return; }
                        
                        // Verificar sessão ativa existente
                        var checkRef = ref(rtdb, 'sessions/' + finalCode + '/gameState');
                        var checkSnap = await new Promise(function(resolve) { onValue(checkRef, resolve, { onlyOnce: true }); });
                        var activeData = checkSnap.val();
                        
                        if (activeData && activeData.active) {
                            setExistingSessionData({ code: finalCode, isOpen: true, data: activeData });
                            setShowExistingSessionDialog(true);
                            return;
                        }
                    } else {
                        finalCode = generateSessionCode();
                    }
                    
                    await proceedWithSessionCreation(finalCode);
                };
                
                var proceedWithSessionCreation = async function(finalCode) {
                    setTables([]);
                    setDiscoveredScores({});
                    setSavedScores({});
                    setSessionId(finalCode);
                    setSetupComplete(true);
                    setPhase('waiting_start');
                    setExpedition(1);
                    setReserve(0);
                    setTeamsInExpedition([]);
                    setVotes({});
                    setLastCard(null);
                    setLastRevealResult(null);
                    setVotingTimeout(0);
                    setVotingTimedOut(false);
                    
                    try {
                        await set(ref(rtdb, 'sessions/' + finalCode + '/gameState'), {
                            gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                            phase: 'waiting_start', expedition: 1, reserve: 0,
                            teamsInExpedition: [], discoveredScores: {}, savedScores: {},
                            votes: {}, votingTimeout: 0, votingTimedOut: false,
                            lastCard: null, lastRevealResult: null, tables: [],
                            selectedLogos: selectedLogos
                        });
                        console.log('Sessão Diamant ' + finalCode + ' criada');
                    } catch (e) { console.error('Erro ao criar sessão:', e); }
                };
                
                var handleExistingSessionChoice = async function(choice) {
                    var code = existingSessionData.code;
                    var data = existingSessionData.data;
                    
                    if (choice === 'yes') {
                        setShowExistingSessionDialog(false);
                        loadSession(Object.assign({ sessionId: code }, data), true);
                    } else if (choice === 'no') {
                        setShowExistingSessionDialog(false);
                        try {
                            await update(ref(rtdb, 'sessions/' + code + '/gameState'), { active: false, closedAt: Date.now() });
                            await new Promise(function(r) { setTimeout(r, 200); });
                            var historyData = {
                                sessionId: code, timestamp: Date.now(), gameType: GAME_TYPE,
                                tables: data.tables || [], discoveredScores: data.discoveredScores || {},
                                savedScores: data.savedScores || {}, expedition: data.expedition || 1,
                                archived: true
                            };
                            var historyId = Math.random().toString(36).substring(2, 12);
                            await set(ref(rtdb, 'sessionHistory/' + historyId), historyData);
                            await remove(ref(rtdb, 'sessions/' + code));
                            await new Promise(function(r) { setTimeout(r, 200); });
                            await proceedWithSessionCreation(code);
                        } catch (e) { console.error('Erro:', e); alert('Erro ao arquivar: ' + e.message); }
                    } else {
                        setShowExistingSessionDialog(false);
                        setExistingSessionData(null);
                    }
                };
                
                var resetToSetup = function() {
                    setSetupComplete(false); setSessionId(null); setPhase('waiting_start');
                    setExpedition(1); setReserve(0); setTeamsInExpedition([]);
                    setDiscoveredScores({}); setSavedScores({}); setVotes({});
                    setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setTables([]); setConnectedClients({});
                    setShowLeaderboard(false); setShowQRCode(false); setShowEndSessionModal(false);
                };
                
                var endSessionArchive = async function() {
                    if (!sessionId) return;
                    try {
                        var curId = sessionId;
                        var historyData = {
                            sessionId: curId, timestamp: Date.now(), gameType: GAME_TYPE,
                            tables: tables.map(function(t) { return { id: t.id, name: t.name, score: savedScores[t.id] || 0 }; }),
                            discoveredScores: Object.assign({}, discoveredScores),
                            savedScores: Object.assign({}, savedScores),
                            expedition: expedition, emails: {}, selectedLogos: selectedLogos, archived: true
                        };
                        Object.values(connectedClients).forEach(function(c) { historyData.emails[c.tableNumber] = c.emails || []; });
                        await update(ref(rtdb, 'sessions/' + curId + '/gameState'), { active: false, closedAt: Date.now() });
                        await new Promise(function(r) { setTimeout(r, 200); });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await set(ref(rtdb, 'sessionHistory/' + hid), historyData);
                        await remove(ref(rtdb, 'sessions/' + curId));
                        resetToSetup();
                    } catch (e) { console.error('Erro:', e); alert('Erro: ' + e.message); }
                };
                
                var endSessionPause = function() { resetToSetup(); };
                
                var loadSession = async function(entry, skipConfirm) {
                    if (!skipConfirm && !confirm('Deseja carregar esta sessão?')) return;
                    var code = entry.sessionId;
                    setShowHistory(false);
                    var loadedTables = entry.tables || [];
                    var loadedDisc = entry.discoveredScores || {};
                    var loadedSaved = entry.savedScores || {};
                    if (Object.keys(loadedSaved).length === 0 && loadedTables.length > 0) {
                        loadedTables.forEach(function(t) { loadedSaved[t.id] = t.score || 0; loadedDisc[t.id] = 0; });
                    }
                    setTables(loadedTables); setDiscoveredScores(loadedDisc); setSavedScores(loadedSaved);
                    setExpedition(entry.expedition || 1); setReserve(entry.reserve || 0);
                    setTeamsInExpedition(entry.teamsInExpedition || []);
                    setPhase(entry.phase || 'waiting_start');
                    setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard(null); setLastRevealResult(null);
                    setSelectedLogos(entry.selectedLogos || []);
                    setConnectedClients({}); setShowLeaderboard(false); setShowQRCode(false);
                    setSessionId(code); setSetupComplete(true);
                    
                    setTimeout(async function() {
                        try {
                            await set(ref(rtdb, 'sessions/' + code + '/gameState'), {
                                gameType: GAME_TYPE, active: true, timestamp: Date.now(),
                                phase: entry.phase || 'waiting_start', expedition: entry.expedition || 1,
                                reserve: entry.reserve || 0, teamsInExpedition: entry.teamsInExpedition || [],
                                discoveredScores: loadedDisc, savedScores: loadedSaved,
                                votes: {}, votingTimeout: 0, votingTimedOut: false,
                                lastCard: null, lastRevealResult: null, tables: loadedTables,
                                selectedLogos: entry.selectedLogos || []
                            });
                        } catch (e) { console.error('Erro ao restaurar:', e); }
                    }, 100);
                };
                
                var closeActiveSession = async function(sessionCode) {
                    if (!confirm('Arquivar a sessão "' + sessionCode + '"?')) return;
                    try {
                        var sRef = ref(rtdb, 'sessions/' + sessionCode + '/gameState');
                        var snap = await new Promise(function(r) { onValue(sRef, r, { onlyOnce: true }); });
                        var sd = snap.val();
                        if (!sd) { alert('Sessão não encontrada'); return; }
                        await update(ref(rtdb, 'sessions/' + sessionCode + '/gameState'), { active: false, closedAt: Date.now() });
                        await new Promise(function(r) { setTimeout(r, 200); });
                        var cRef = ref(rtdb, 'sessions/' + sessionCode + '/clients');
                        var cSnap = await new Promise(function(r) { onValue(cRef, r, { onlyOnce: true }); });
                        var cd = cSnap.val() || {};
                        var hd = {
                            sessionId: sessionCode, timestamp: Date.now(), gameType: GAME_TYPE,
                            tables: sd.tables || [], discoveredScores: sd.discoveredScores || {},
                            savedScores: sd.savedScores || {}, expedition: sd.expedition || 1,
                            emails: {}, selectedLogos: sd.selectedLogos || [], archived: true
                        };
                        Object.values(cd).forEach(function(c) { hd.emails[c.tableNumber] = c.emails || []; });
                        var hid = Math.random().toString(36).substring(2, 12);
                        await set(ref(rtdb, 'sessionHistory/' + hid), hd);
                        await remove(ref(rtdb, 'sessions/' + sessionCode));
                    } catch (e) { console.error('Erro:', e); alert('Erro: ' + e.message); }
                };
                
                var deleteHistoryEntry = async function(entryId) {
                    if (!confirm('Eliminar este registo?')) return;
                    try { await remove(ref(rtdb, 'sessionHistory/' + entryId)); } catch (e) { console.error(e); }
                };
                
                // =============================================================
                // FUNÇÕES - JOGO DIAMANT
                // =============================================================
                var startExpedition = async function() {
                    if (tables.length === 0) { alert('Nenhuma equipa registada.'); return; }
                    var allIds = tables.map(function(t) { return t.id; });
                    var newDisc = {};
                    allIds.forEach(function(id) { newDisc[id] = 0; });
                    await remove(ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setPhase('exploring'); setReserve(0); setTeamsInExpedition(allIds);
                    setDiscoveredScores(newDisc); setVotes({}); setLastCard(null);
                    setLastRevealResult(null); setVotingTimedOut(false);
                };
                
                var drawRubyCard = async function() {
                    var value = parseInt(rubyInputValue);
                    if (!value || value <= 0) return;
                    var teamsCount = teamsInExpedition.length;
                    if (teamsCount === 0) return;
                    var perTeam = Math.floor(value / teamsCount);
                    var leftover = value % teamsCount;
                    var newDisc = Object.assign({}, discoveredScores);
                    teamsInExpedition.forEach(function(id) { newDisc[id] = (newDisc[id] || 0) + perTeam; });
                    await remove(ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setDiscoveredScores(newDisc); setReserve(reserve + leftover);
                    setPhase('voting'); setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard({ type: 'ruby', value: value, perTeam: perTeam, leftover: leftover });
                    setRubyInputValue('');
                };
                
                var drawDangerCard = async function() {
                    await remove(ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setPhase('voting'); setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setLastCard({ type: 'danger', awaitingConfirmation: true });
                };
                
                var confirmDanger = async function(isRepeated) {
                    if (isRepeated) {
                        setPhase('expedition_end'); setReserve(0); setTeamsInExpedition([]);
                        setDiscoveredScores({}); setVotes({});
                        setLastCard({ type: 'danger', isRepeated: true });
                        setLastRevealResult({ staying: [], leaving: [], dangerRepeated: true });
                    } else {
                        // Não repetido — agora clientes vêm botões de voto
                        setLastCard({ type: 'danger', isRepeated: false });
                    }
                };
                
                var startVotingTimeout = function(seconds) {
                    setVotingTimeout(seconds || 10);
                    setVotingTimedOut(false);
                };
                
                var revealVotes = async function() {
                    var finalVotes = Object.assign({}, votes);
                    teamsInExpedition.forEach(function(id) {
                        if (finalVotes[id] === null || finalVotes[id] === undefined) finalVotes[id] = 'continue';
                    });
                    var leaving = teamsInExpedition.filter(function(id) { return finalVotes[id] === 'leave'; });
                    var staying = teamsInExpedition.filter(function(id) { return finalVotes[id] !== 'leave'; });
                    var reservePerLeaver = 0, reserveLeftover = 0;
                    if (leaving.length > 0 && reserve > 0) {
                        reservePerLeaver = Math.floor(reserve / leaving.length);
                        reserveLeftover = reserve % leaving.length;
                    }
                    var newDisc = Object.assign({}, discoveredScores);
                    var newSaved = Object.assign({}, savedScores);
                    leaving.forEach(function(id) {
                        var disc = newDisc[id] || 0;
                        newSaved[id] = (newSaved[id] || 0) + disc + reservePerLeaver;
                        newDisc[id] = 0;
                    });
                    var newReserve = staying.length > 0 ? reserveLeftover : 0;
                    if (leaving.length === 0) newReserve = reserve;
                    var expeditionEnds = staying.length === 0;
                    await remove(ref(rtdb, 'sessions/' + sessionId + '/diamantVotes'));
                    setDiscoveredScores(newDisc); setSavedScores(newSaved);
                    setReserve(newReserve); setTeamsInExpedition(staying);
                    setVotes({}); setVotingTimeout(0); setVotingTimedOut(false);
                    setPhase(expeditionEnds ? 'expedition_end' : 'exploring');
                    setLastRevealResult({ staying: staying, leaving: leaving, reserveDistributed: reservePerLeaver, reserveLost: expeditionEnds ? reserveLeftover : 0 });
                };
                
                var prepareNewExpedition = function() {
                    setPhase('waiting_start'); setExpedition(expedition + 1);
                    setReserve(0); setTeamsInExpedition([]); setDiscoveredScores({});
                    setVotes({}); setLastCard(null); setLastRevealResult(null);

                                onClick: startExpedition,
                                disabled: tables.length === 0,
                                className: 'px-6 py-3 rounded-xl font-bold shadow-lg ' + (tables.length > 0 ? 'bg-green-600 hover:bg-green-700 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed')
                            }, '🚀 Iniciar Expedição (' + tables.length + ' equipas)'),
                            
                            // Explorando
                            phase === 'exploring' && h('div', { className: 'flex gap-2 items-center' },
                                h('input', { type: 'number', min: 1, max: 15, value: rubyInputValue, onChange: function(e) { setRubyInputValue(e.target.value); }, placeholder: '💎', className: 'w-20 px-3 py-2 border-2 border-amber-400 rounded-xl text-center font-bold text-xl' }),
                                h('button', { onClick: drawRubyCard, disabled: !rubyInputValue, className: 'px-4 py-2 rounded-xl font-bold ' + (rubyInputValue ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-gray-300 text-gray-500 cursor-not-allowed') }, '💎 Rubis'),
                                h('div', { className: 'w-px h-10 bg-gray-300 mx-2' }),
                                h('button', { onClick: drawDangerCard, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-xl font-bold' }, '☠️ Perigo')
                            ),
                            
                            // Votação
                            phase === 'voting' && h('div', { className: 'flex gap-2 items-center flex-wrap' },
                                h('span', { className: 'text-sm font-semibold bg-blue-100 px-3 py-1 rounded-full' }, '🗳️ ' + votesReceived + '/' + totalToVote),
                                // Confirmação de perigo
                                lastCard && lastCard.type === 'danger' && lastCard.awaitingConfirmation && h('div', { className: 'flex gap-2 items-center' },
                                    h('span', { className: 'text-sm font-semibold' }, 'Perigo repetido?'),
                                    h('button', { onClick: function() { confirmDanger(false); }, className: 'px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-lg font-bold' }, '✓ Não'),
                                    h('button', { onClick: function() { confirmDanger(true); }, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-bold' }, '✗ Sim, Repetido!')
                                ),
                                // Timeout (não aparece durante confirmação de perigo)
                                !(lastCard && lastCard.type === 'danger' && lastCard.awaitingConfirmation) && votingTimeout === 0 && !votingTimedOut && h('button', { onClick: function() { startVotingTimeout(10); }, className: 'px-3 py-1 bg-orange-500 hover:bg-orange-600 text-white rounded-lg font-bold text-sm' }, '⏱️ 10s'),
                                votingTimeout > 0 && h('span', { className: 'text-xl font-bold text-orange-600 animate-pulse' }, '⏱️ ' + votingTimeout + 's'),
                                votingTimedOut && h('span', { className: 'text-sm font-semibold text-orange-600' }, '⏱️ Tempo esgotado!'),
                                // Revelar — só quando TODOS votaram OU timeout expirou
                                !(lastCard && lastCard.type === 'danger' && lastCard.awaitingConfirmation) && (allVoted || votingTimedOut) && h('button', { onClick: revealVotes, className: 'px-6 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold shadow-lg ml-2' }, '👁️ Revelar')
                            ),
                            
                            // Expedição terminou
                            phase === 'expedition_end' && h('button', { onClick: prepareNewExpedition, className: 'px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl font-bold shadow-lg' }, '🔄 Nova Expedição'),
                            
                            // Info reserva + controles
                            h('div', { className: 'ml-auto flex items-center gap-3' },
                                h('div', { className: 'flex items-center gap-2 bg-amber-100 px-4 py-2 rounded-full' },
                                    h('span', { className: 'text-xl' }, '💎'),
                                    h('span', { className: 'font-bold text-amber-800' }, 'Reserva: ' + reserve)
                                ),
                                h('button', { onClick: function() { setShowDiscovered(!showDiscovered); }, className: 'px-3 py-1 rounded text-sm ' + (showDiscovered ? 'bg-blue-100 text-blue-700' : 'bg-gray-200 text-gray-600') }, showDiscovered ? '👁️ Desc' : '🙈 Desc'),
                                h('button', { onClick: showFinalLeaderboard, className: 'px-3 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg font-bold text-sm' }, '🏆')
                            )
                        )
                    )
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(h(App));
        });
    </script>
</body>
</html>
